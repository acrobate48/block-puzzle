<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56" width="100%" height="100%">
  <defs>
    <linearGradient id="npbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020C20"/>
      <stop offset="100%" stop-color="#010510"/>
    </linearGradient>
    <linearGradient id="npground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#002030"/>
      <stop offset="100%" stop-color="#001020"/>
    </linearGradient>
    <filter id="npglow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="80" height="56" rx="6" fill="url(#npbg)"/>

  <!-- Grid lines (circuit board feel) -->
  <line x1="0" y1="44" x2="80" y2="44" stroke="#00DDFF" stroke-width="0.4" opacity="0.3"/>
  <line x1="0" y1="48" x2="80" y2="48" stroke="#00DDFF" stroke-width="0.2" opacity="0.15"/>

  <!-- Circuit traces -->
  <path d="M0,44 H15 V46 H25 V44 H40 V42 H52 V44 H65 V46 H80"
        stroke="#00DDFF" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M10,48 H20 V50 H32 V48 H50 V50 H62 V48 H75"
        stroke="#00AACC" stroke-width="0.4" fill="none" opacity="0.3"/>
  <!-- Circuit nodes -->
  <circle cx="25" cy="44" r="1" fill="#00DDFF" opacity="0.6"/>
  <circle cx="52" cy="44" r="1" fill="#00DDFF" opacity="0.6"/>
  <circle cx="40" cy="42" r="0.8" fill="#00FFDD" opacity="0.5"/>

  <!-- Skyline buildings (left to right) -->
  <!-- Building 1 -->
  <rect x="2" y="34" width="7" height="10" fill="#030D1E"/>
  <rect x="2" y="34" width="7" height="10" stroke="#00DDFF" stroke-width="0.5" fill="none" opacity="0.4"/>
  <!-- Building 2 tall -->
  <rect x="11" y="22" width="9" height="22" fill="#040E20"/>
  <rect x="11" y="22" width="9" height="22" stroke="#00CCEE" stroke-width="0.5" fill="none" opacity="0.5"/>
  <!-- Building 3 mid -->
  <rect x="22" y="28" width="8" height="16" fill="#030C1C"/>
  <rect x="22" y="28" width="8" height="16" stroke="#00BBDD" stroke-width="0.4" fill="none" opacity="0.4"/>
  <!-- Building 4 small -->
  <rect x="32" y="32" width="6" height="12" fill="#020B1A"/>
  <rect x="32" y="32" width="6" height="12" stroke="#00DDFF" stroke-width="0.4" fill="none" opacity="0.3"/>
  <!-- Building 5 tallest -->
  <rect x="40" y="16" width="11" height="28" fill="#050F22"/>
  <rect x="40" y="16" width="11" height="28" stroke="#00EEFF" stroke-width="0.6" fill="none" opacity="0.6"/>
  <!-- Antenna on building 5 -->
  <line x1="45.5" y1="16" x2="45.5" y2="10" stroke="#00DDFF" stroke-width="0.8" opacity="0.7"/>
  <circle cx="45.5" cy="10" r="1.2" fill="#00EEFF" opacity="0.8"/>
  <!-- Building 6 -->
  <rect x="53" y="26" width="8" height="18" fill="#040E20"/>
  <rect x="53" y="26" width="8" height="18" stroke="#00BBDD" stroke-width="0.5" fill="none" opacity="0.5"/>
  <!-- Building 7 small -->
  <rect x="63" y="30" width="7" height="14" fill="#030C1C"/>
  <rect x="63" y="30" width="7" height="14" stroke="#00DDFF" stroke-width="0.4" fill="none" opacity="0.4"/>
  <!-- Building 8 -->
  <rect x="72" y="24" width="8" height="20" fill="#040E20"/>
  <rect x="72" y="24" width="8" height="20" stroke="#00CCEE" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Neon windows — building 2 -->
  <rect x="13" y="24" width="2" height="1.5" fill="#00DDFF" opacity="0.9"/>
  <rect x="17" y="24" width="2" height="1.5" fill="#00DDFF" opacity="0.7"/>
  <rect x="13" y="28" width="2" height="1.5" fill="#00FFEE" opacity="0.8"/>
  <rect x="17" y="28" width="2" height="1.5" fill="#00CCFF" opacity="0.6"/>
  <rect x="13" y="32" width="2" height="1.5" fill="#00DDFF" opacity="0.7"/>
  <rect x="17" y="36" width="2" height="1.5" fill="#00EEFF" opacity="0.8"/>
  <!-- Windows — building 5 -->
  <rect x="42" y="18" width="2" height="1.5" fill="#00EEFF" opacity="0.9"/>
  <rect x="46" y="18" width="2" height="1.5" fill="#00DDFF" opacity="0.8"/>
  <rect x="42" y="22" width="2" height="1.5" fill="#00CCFF" opacity="0.7"/>
  <rect x="46" y="22" width="2" height="1.5" fill="#00EEFF" opacity="0.9"/>
  <rect x="42" y="26" width="2" height="1.5" fill="#00DDFF" opacity="0.8"/>
  <rect x="46" y="26" width="2" height="1.5" fill="#00BBDD" opacity="0.6"/>
  <rect x="42" y="30" width="2" height="1.5" fill="#00EEFF" opacity="0.7"/>
  <rect x="46" y="34" width="2" height="1.5" fill="#00DDFF" opacity="0.8"/>
  <!-- Windows — building 6 -->
  <rect x="55" y="28" width="2" height="1.5" fill="#00DDFF" opacity="0.8"/>
  <rect x="59" y="28" width="2" height="1.5" fill="#00EEFF" opacity="0.7"/>
  <rect x="55" y="32" width="2" height="1.5" fill="#00CCFF" opacity="0.9"/>
  <rect x="59" y="36" width="2" height="1.5" fill="#00DDFF" opacity="0.6"/>

  <!-- Ground glow -->
  <rect x="0" y="43" width="80" height="1" fill="#00DDFF" opacity="0.4"/>
  <rect x="0" y="44" width="80" height="12" fill="url(#npground)"/>

  <!-- Theme name -->
  <text x="40" y="52" font-family="Arial, sans-serif" font-size="8" font-weight="bold"
        fill="#00DDFF" text-anchor="middle" dominant-baseline="middle">NEOPOLIS</text>

  <!-- Gloss overlay -->
  <rect width="80" height="20" rx="6" fill="white" opacity="0.05"/>
  <rect x="0" y="0" width="80" height="8" rx="6" fill="white" opacity="0.06"/>
</svg>
