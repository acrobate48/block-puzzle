<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="100%" height="100%">
  <defs>
    <linearGradient id="b-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5E3A1A"/>
      <stop offset="100%" stop-color="#3A1E08"/>
    </linearGradient>
    <linearGradient id="b-shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="b-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8904A"/>
      <stop offset="50%" stop-color="#A06830"/>
      <stop offset="100%" stop-color="#7A4818"/>
    </linearGradient>
    <linearGradient id="b-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A2810"/>
      <stop offset="100%" stop-color="#6A3C1C"/>
    </linearGradient>
    <linearGradient id="b-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A5028"/>
      <stop offset="100%" stop-color="#7A4020"/>
    </linearGradient>
    <!-- Veinure bois -->
    <filter id="b-grain" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.04 0.6" numOctaves="3" seed="5" result="noise"/>
      <feColorMatrix type="saturate" values="0.3" in="noise" result="cn"/>
      <feBlend in="SourceGraphic" in2="cn" mode="overlay" result="t"/>
      <feComposite in="t" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="b-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1A0800" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#b-bg)"/>

  <g filter="url(#b-shadow)">
    <polygon points="100,30 127.7,46 100,62 72.3,46"
             fill="url(#b-top)" filter="url(#b-grain)"
             stroke="#3A1E08" stroke-width="0.8"/>
    <polygon points="72.3,46 100,62 100,78 72.3,62"
             fill="url(#b-left)"
             stroke="#2A1008" stroke-width="0.8"/>
    <polygon points="127.7,46 100,62 100,78 127.7,62"
             fill="url(#b-right)"
             stroke="#4A2810" stroke-width="0.8"/>
  </g>

  <!-- Veinures manuelles top -->
  <line x1="76" y1="50" x2="118" y2="44" stroke="#6A3010" stroke-width="0.8" opacity="0.55"/>
  <line x1="80" y1="56" x2="112" y2="50" stroke="#6A3010" stroke-width="0.6" opacity="0.4"/>
  <line x1="86" y1="40" x2="114" y2="54" stroke="#C89050" stroke-width="0.5" opacity="0.3"/>
  <!-- Veinures flanc gauche -->
  <line x1="74" y1="52" x2="88" y2="68" stroke="#3A1808" stroke-width="0.7" opacity="0.5"/>
  <line x1="80" y1="50" x2="94" y2="66" stroke="#3A1808" stroke-width="0.5" opacity="0.35"/>
  <!-- Veinures flanc droit -->
  <line x1="114" y1="50" x2="122" y2="66" stroke="#6A3818" stroke-width="0.7" opacity="0.45"/>

  <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#b-shine)"/>

  <text x="100" y="115" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="14" text-anchor="middle" letter-spacing="2" fill="#D4A060"
        paint-order="stroke" stroke="#1A0800" stroke-width="2">BOIS</text>

  <rect x="1" y="1" width="198" height="138" rx="9.5" fill="none"
        stroke="#A06830" stroke-width="1.5" opacity="0.65"/>
</svg>
