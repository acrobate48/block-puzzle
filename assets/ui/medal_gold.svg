<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <!-- Ruban gradients -->
    <linearGradient id="gold-ribbon-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE030"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="gold-ribbon-right" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE030"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>

    <!-- Anneau gradient -->
    <linearGradient id="gold-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF0A0"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#C8860C"/>
    </linearGradient>

    <!-- Corps médaille radial gradient -->
    <radialGradient id="gold-body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFF5A0"/>
      <stop offset="35%" stop-color="#FFE860"/>
      <stop offset="70%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#C8860C"/>
    </radialGradient>

    <!-- Bord extérieur dentelé -->
    <radialGradient id="gold-rim" cx="50%" cy="50%" r="50%">
      <stop offset="75%" stop-color="#C8860C"/>
      <stop offset="85%" stop-color="#E0A020"/>
      <stop offset="100%" stop-color="#9A6200"/>
    </radialGradient>

    <!-- Etoile gradient -->
    <radialGradient id="gold-star" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#FFF8C0"/>
      <stop offset="100%" stop-color="#FFE090"/>
    </radialGradient>

    <!-- Halo / Drop shadow filter -->
    <filter id="gold-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#A06000" flood-opacity="0.55"/>
    </filter>

    <!-- Glow filter for star -->
    <filter id="gold-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Inner bevel filter -->
    <filter id="gold-inner-glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ===== RUBAN GAUCHE ===== -->
  <polygon points="42,6 55,6 55,42 36,42" fill="url(#gold-ribbon-left)"/>
  <!-- Lignes de texture ruban gauche -->
  <line x1="40" y1="10" x2="53" y2="10" stroke="#FFF0A0" stroke-width="0.6" opacity="0.5"/>
  <line x1="39" y1="15" x2="53" y2="15" stroke="#FFF0A0" stroke-width="0.6" opacity="0.4"/>
  <line x1="38" y1="20" x2="53" y2="20" stroke="#FFF0A0" stroke-width="0.6" opacity="0.35"/>
  <line x1="37" y1="25" x2="53" y2="25" stroke="#FFF0A0" stroke-width="0.6" opacity="0.3"/>
  <line x1="37" y1="30" x2="53" y2="30" stroke="#FFF0A0" stroke-width="0.6" opacity="0.25"/>
  <line x1="36" y1="35" x2="53" y2="35" stroke="#FFF0A0" stroke-width="0.6" opacity="0.2"/>
  <!-- Bord gauche ruban -->
  <line x1="42" y1="6" x2="36" y2="42" stroke="#B8860B" stroke-width="0.8" opacity="0.7"/>

  <!-- ===== RUBAN DROIT ===== -->
  <polygon points="65,6 78,6 84,42 65,42" fill="url(#gold-ribbon-right)"/>
  <!-- Lignes de texture ruban droit -->
  <line x1="67" y1="10" x2="80" y2="10" stroke="#FFF0A0" stroke-width="0.6" opacity="0.5"/>
  <line x1="67" y1="15" x2="81" y2="15" stroke="#FFF0A0" stroke-width="0.6" opacity="0.4"/>
  <line x1="67" y1="20" x2="82" y2="20" stroke="#FFF0A0" stroke-width="0.6" opacity="0.35"/>
  <line x1="67" y1="25" x2="83" y2="25" stroke="#FFF0A0" stroke-width="0.6" opacity="0.3"/>
  <line x1="67" y1="30" x2="83" y2="30" stroke="#FFF0A0" stroke-width="0.6" opacity="0.25"/>
  <line x1="67" y1="35" x2="84" y2="35" stroke="#FFF0A0" stroke-width="0.6" opacity="0.2"/>
  <!-- Bord droit ruban -->
  <line x1="78" y1="6" x2="84" y2="42" stroke="#B8860B" stroke-width="0.8" opacity="0.7"/>

  <!-- ===== ANNEAU DE SUSPENSION ===== -->
  <circle cx="60" cy="46" r="8" fill="none" stroke="url(#gold-ring)" stroke-width="4"/>
  <!-- Reflet anneau -->
  <path d="M54,42 A8,8 0 0,1 66,42" fill="none" stroke="#FFF8D0" stroke-width="1.5" opacity="0.7"/>

  <!-- ===== CORPS MÉDAILLE — bord extérieur (rim) ===== -->
  <circle cx="60" cy="95" r="44" fill="url(#gold-rim)" filter="url(#gold-shadow)"/>
  <!-- Dentelure simulée: cercle épais + cercle intérieur -->
  <circle cx="60" cy="95" r="42" fill="none" stroke="#E8A800" stroke-width="2.5" stroke-dasharray="3.2,2.1"/>

  <!-- ===== CORPS MÉDAILLE — fond principal ===== -->
  <circle cx="60" cy="95" r="40" fill="url(#gold-body)"/>

  <!-- Bevel / cadre intérieur -->
  <circle cx="60" cy="95" r="38" fill="none" stroke="#FFF0A0" stroke-width="1.2" opacity="0.5"/>
  <circle cx="60" cy="95" r="36.5" fill="none" stroke="#C8860C" stroke-width="0.7" opacity="0.6"/>

  <!-- ===== REFLET SPECULAIRE haut-gauche ===== -->
  <ellipse cx="47" cy="82" rx="14" ry="9" fill="white" opacity="0.35" transform="rotate(-30,47,82)"/>

  <!-- ===== ETOILE 5 BRANCHES ===== -->
  <polygon
    points="60,73 63.5,84 75,84 65.7,90.5 69.2,101.5 60,95 50.8,101.5 54.3,90.5 45,84 56.5,84"
    fill="url(#gold-star)"
    stroke="#C8860C"
    stroke-width="0.8"
    filter="url(#gold-glow)"
  />
  <!-- Reflet étoile -->
  <polygon
    points="60,73 62,79 67,79 63,82 64.5,88 60,85 55.5,88 57,82 53,79 58,79"
    fill="white"
    opacity="0.2"
  />

  <!-- ===== NUMÉRO 1 ===== -->
  <text
    x="60" y="117"
    text-anchor="middle"
    font-family="Impact, Arial Black, sans-serif"
    font-size="26"
    font-weight="bold"
    fill="#6B4000"
    filter="url(#gold-inner-glow)"
  >1</text>
  <!-- Highlight texte -->
  <text
    x="59" y="116"
    text-anchor="middle"
    font-family="Impact, Arial Black, sans-serif"
    font-size="26"
    font-weight="bold"
    fill="#FFF0A0"
    opacity="0.25"
  >1</text>

  <!-- ===== HALO GÉNÉRAL ===== -->
  <circle cx="60" cy="95" r="40" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.18"/>
  <circle cx="60" cy="95" r="43" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.10"/>
</svg>
