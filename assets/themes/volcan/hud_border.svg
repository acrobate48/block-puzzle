<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 20" width="100%" height="20" opacity="0.90">
  <defs>
    <filter id="vglow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ff4400" flood-opacity="0.9"/>
    </filter>
    <filter id="ember" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.2" flood-color="#ffaa00" flood-opacity="1"/>
    </filter>
    <linearGradient id="lava" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="50%" stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#660000"/>
    </linearGradient>
  </defs>

  <!-- Dark base -->
  <rect x="0" y="0" width="400" height="20" fill="#1a0000"/>

  <!-- Lava surface: irregular zigzag -->
  <path d="M0,16 L8,10 L14,15 L22,8 L30,14 L40,7 L50,13 L58,9 L66,15 L75,8 L84,13 L92,6 L100,12 L110,8 L118,14 L126,7 L135,13 L143,9 L150,15 L160,7 L168,12 L176,8 L185,14 L193,7 L200,13 L210,9 L218,15 L226,8 L234,12 L243,7 L252,14 L260,9 L268,15 L276,8 L285,13 L293,7 L300,14 L310,9 L318,15 L326,8 L334,12 L343,7 L350,13 L358,9 L366,15 L374,8 L382,13 L390,9 L400,15 L400,20 L0,20 Z"
        fill="url(#lava)" filter="url(#vglow)"/>

  <!-- Glowing lava cracks / highlights -->
  <path d="M0,16 L8,10 L14,15 L22,8 L30,14 L40,7 L50,13 L58,9 L66,15 L75,8 L84,13 L92,6 L100,12 L110,8 L118,14 L126,7 L135,13 L143,9 L150,15 L160,7 L168,12 L176,8 L185,14 L193,7 L200,13 L210,9 L218,15 L226,8 L234,12 L243,7 L252,14 L260,9 L268,15 L276,8 L285,13 L293,7 L300,14 L310,9 L318,15 L326,8 L334,12 L343,7 L350,13 L358,9 L366,15 L374,8 L382,13 L390,9 L400,15"
        fill="none" stroke="#ffcc00" stroke-width="0.8" opacity="0.7"/>

  <!-- Ember dots above lava surface -->
  <circle cx="25"  cy="5"  r="1.4" fill="#ffdd00" filter="url(#ember)"/>
  <circle cx="55"  cy="3"  r="1"   fill="#ff8800" filter="url(#ember)"/>
  <circle cx="95"  cy="4"  r="1.6" fill="#ffcc00" filter="url(#ember)"/>
  <circle cx="140" cy="2"  r="1.1" fill="#ffaa00" filter="url(#ember)"/>
  <circle cx="175" cy="5"  r="1.3" fill="#ffdd00" filter="url(#ember)"/>
  <circle cx="220" cy="3"  r="1"   fill="#ff8800" filter="url(#ember)"/>
  <circle cx="265" cy="4"  r="1.5" fill="#ffcc00" filter="url(#ember)"/>
  <circle cx="310" cy="2"  r="1.2" fill="#ffaa00" filter="url(#ember)"/>
  <circle cx="350" cy="5"  r="1"   fill="#ffdd00" filter="url(#ember)"/>
  <circle cx="385" cy="3"  r="1.4" fill="#ff8800" filter="url(#ember)"/>
</svg>
