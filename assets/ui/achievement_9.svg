<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <radialGradient id="bg9" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a0505"/>
      <stop offset="100%" stop-color="#0f0202"/>
    </radialGradient>
    <radialGradient id="burst9" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#FFFF40"/>
      <stop offset="60%" stop-color="#FF8020"/>
      <stop offset="100%" stop-color="#FF4040" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow9" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FF4040" flood-opacity="0.7"/>
    </filter>
    <filter id="burstglow9">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FF4040" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#FFFF00" flood-opacity="0.3"/>
    </filter>
    <filter id="textglow9">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#FF0000" flood-opacity="1"/>
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#FF4040" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Hexagonal background -->
  <polygon points="40,4 73,22 73,58 40,76 7,58 7,22" fill="url(#bg9)" filter="url(#shadow9)"/>
  <!-- Explosion rays - 12 rays radiating out -->
  <!-- Ray 1 - top -->
  <polygon points="40,38 37,14 43,14" fill="#FFD700" opacity="0.9" filter="url(#burstglow9)"/>
  <!-- Ray 2 - top right -->
  <polygon points="40,38 55,18 60,24" fill="#FF8020" opacity="0.85"/>
  <!-- Ray 3 - right -->
  <polygon points="40,38 64,33 64,43" fill="#FF4040" opacity="0.9"/>
  <!-- Ray 4 - bottom right -->
  <polygon points="40,38 60,54 55,60" fill="#FF8020" opacity="0.85"/>
  <!-- Ray 5 - bottom -->
  <polygon points="40,38 37,62 43,62" fill="#FFD700" opacity="0.9"/>
  <!-- Ray 6 - bottom left -->
  <polygon points="40,38 25,60 20,54" fill="#FF4040" opacity="0.85"/>
  <!-- Ray 7 - left -->
  <polygon points="40,38 16,33 16,43" fill="#FF8020" opacity="0.9"/>
  <!-- Ray 8 - top left -->
  <polygon points="40,38 20,24 25,18" fill="#FFFF40" opacity="0.85"/>
  <!-- Shorter intermediate rays -->
  <polygon points="40,38 50,20 53,22" fill="#FF6040" opacity="0.6"/>
  <polygon points="40,38 58,46 56,50" fill="#FF4040" opacity="0.6"/>
  <polygon points="40,38 22,50 24,46" fill="#FF8020" opacity="0.6"/>
  <polygon points="40,38 27,22 30,20" fill="#FFD700" opacity="0.6"/>
  <!-- Central burst glow -->
  <circle cx="40" cy="38" r="18" fill="url(#burst9)" opacity="0.7"/>
  <!-- x5 text - larger and bolder than x3 -->
  <text x="40" y="46" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#FF2020" text-anchor="middle" filter="url(#textglow9)">×5</text>
  <!-- White core highlight -->
  <text x="40" y="46" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle" opacity="0.3">×5</text>
  <!-- Label -->
  <text x="40" y="72.5" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#FF8060" text-anchor="middle" letter-spacing="0.5">COMBO ×5</text>
  <!-- Hex border -->
  <polygon points="40,4 73,22 73,58 40,76 7,58 7,22" fill="none" stroke="#FF4040" stroke-width="1.5" opacity="0.9"/>
  <polygon points="40,5.5 71.5,23 71.5,57 40,74.5 8.5,57 8.5,23" fill="none" stroke="#FF8080" stroke-width="0.5" opacity="0.4"/>
</svg>
