  <!-- LAYER 9: Specular light top-left (sunlight through water) -->
  <ellipse cx="850" cy="160" rx="900" ry="300" fill="url(#oSpecular)" filter="url(#blurHeavy)" opacity="0.8"/>
  <ellipse cx="1920" cy="80" rx="500" ry="180" fill="#A0F0FF" opacity="0.07" filter="url(#blurHeavy)"/>

  <!-- Deep abyss bottom -->
  <rect x="0" y="1750" width="3840" height="410" fill="#030820" opacity="0.7" filter="url(#blur)"/>
  <rect x="0" y="1950" width="3840" height="210" fill="#020614" opacity="0.95"/>

  <!-- Top water surface glow -->
  <rect x="0" y="0" width="3840" height="320" fill="#040C28" opacity="0.5" filter="url(#blurMid)"/>
  <rect x="0" y="0" width="3840" height="160" fill="#030820" opacity="0.75"/>

  <!-- LAYER 10: Foreground vignette -->
  <rect width="3840" height="2160" fill="url(#oVignette)"/>

  <!-- Water noise texture -->
  <rect width="3840" height="2160" fill="#2868A8" opacity="0.03" filter="url(#noise)"/>
</svg>
