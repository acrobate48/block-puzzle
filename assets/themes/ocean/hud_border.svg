<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 20" width="100%" height="20" opacity="0.90">
  <defs>
    <filter id="oglow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#00d4ff" flood-opacity="0.8"/>
    </filter>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#003a7a" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Back wave (deeper, darker) -->
  <path d="M0,13 C16,8 32,15 48,10 C64,5 80,13 96,9 C112,5 128,13 144,9 C160,5 176,13 192,9 C208,5 224,13 240,9 C256,5 272,13 288,9 C304,5 320,13 336,9 C352,5 368,13 384,9 C392,7 400,10 400,10 L400,20 L0,20 Z"
        fill="#005ea0" opacity="0.55"/>

  <!-- Front wave (bright, cyan) -->
  <path d="M0,15 C20,9 40,17 60,12 C80,7 100,15 120,11 C140,7 160,15 180,11 C200,7 220,15 240,11 C260,7 280,15 300,11 C320,7 340,15 360,11 C380,7 400,15 400,13 L400,20 L0,20 Z"
        fill="url(#ocean)" filter="url(#oglow)"/>

  <!-- Bubbles floating above the waves -->
  <circle cx="30" cy="7" r="2" fill="none" stroke="#7ef5ff" stroke-width="0.7" opacity="0.8"/>
  <circle cx="30" cy="7" r="0.7" fill="#ffffff" opacity="0.6"/>

  <circle cx="75" cy="5" r="1.4" fill="none" stroke="#7ef5ff" stroke-width="0.6" opacity="0.75"/>
  <circle cx="75" cy="5" r="0.5" fill="#ffffff" opacity="0.5"/>

  <circle cx="130" cy="6" r="2.2" fill="none" stroke="#00d4ff" stroke-width="0.7" opacity="0.8"/>
  <circle cx="130" cy="6" r="0.8" fill="#ffffff" opacity="0.55"/>

  <circle cx="190" cy="4" r="1.6" fill="none" stroke="#7ef5ff" stroke-width="0.6" opacity="0.7"/>
  <circle cx="190" cy="4" r="0.6" fill="#ffffff" opacity="0.5"/>

  <circle cx="250" cy="6" r="2" fill="none" stroke="#00d4ff" stroke-width="0.7" opacity="0.8"/>
  <circle cx="250" cy="6" r="0.7" fill="#ffffff" opacity="0.55"/>

  <circle cx="305" cy="5" r="1.3" fill="none" stroke="#7ef5ff" stroke-width="0.55" opacity="0.7"/>
  <circle cx="305" cy="5" r="0.5" fill="#ffffff" opacity="0.45"/>

  <circle cx="360" cy="7" r="1.8" fill="none" stroke="#00d4ff" stroke-width="0.65" opacity="0.75"/>
  <circle cx="360" cy="7" r="0.65" fill="#ffffff" opacity="0.5"/>
</svg>
