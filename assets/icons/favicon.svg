<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1A0F"/>
      <stop offset="100%" stop-color="#060A06"/>
    </linearGradient>
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="50%" stop-color="#D4B030"/>
      <stop offset="100%" stop-color="#A07820"/>
    </linearGradient>
    <filter id="fglow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bshadow">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1" flood-color="rgba(0,0,0,0.7)" flood-opacity="1"/>
    </filter>
    <filter id="borderglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded square background -->
  <rect x="1" y="1" width="62" height="62" rx="11" ry="11" fill="url(#bgGrad)"/>
  <!-- Subtle inner vignette -->
  <rect x="1" y="1" width="62" height="62" rx="11" ry="11"
        fill="none" stroke="rgba(0,0,0,0.5)" stroke-width="5"/>

  <!-- 3×3 isometric 3D block grid -->
  <!-- Block size s=8. Isometric: top=rhombus, right+left=parallelograms -->
  <!-- Layout: 3 columns × 3 rows, stagger-offset for isometric feel -->
  <!-- col centers: 16, 32, 48  row bands: 8..20, 20..32, 32..44 approx -->

  <!-- === ROW 1 === -->
  <!-- R1C1 — #3AC644 GREEN -->
  <g filter="url(#bshadow)">
    <!-- top face -->
    <polygon points="16,11 24,15 16,19 8,15" fill="#6EEA7A"/>
    <!-- right face -->
    <polygon points="16,19 24,15 24,23 16,27" fill="#3AC644"/>
    <!-- left face -->
    <polygon points="16,19 8,15 8,23 16,27" fill="#1E7228"/>
  </g>

  <!-- R1C2 — #C6D026 YELLOW-GREEN -->
  <g filter="url(#bshadow)">
    <polygon points="32,11 40,15 32,19 24,15" fill="#DCE84E"/>
    <polygon points="32,19 40,15 40,23 32,27" fill="#C6D026"/>
    <polygon points="32,19 24,15 24,23 32,27" fill="#828A14"/>
  </g>

  <!-- R1C3 — #DA4E30 RED -->
  <g filter="url(#bshadow)">
    <polygon points="48,11 56,15 48,19 40,15" fill="#ED7460"/>
    <polygon points="48,19 56,15 56,23 48,27" fill="#DA4E30"/>
    <polygon points="48,19 40,15 40,23 48,27" fill="#8E2814"/>
  </g>

  <!-- === ROW 2 === -->
  <!-- R2C1 — #EE8A1C ORANGE -->
  <g filter="url(#bshadow)">
    <polygon points="16,23 24,27 16,31 8,27" fill="#FFAA4E"/>
    <polygon points="16,31 24,27 24,35 16,39" fill="#EE8A1C"/>
    <polygon points="16,31 8,27 8,35 16,39" fill="#A05A0A"/>
  </g>

  <!-- R2C2 — #4EBC80 TEAL -->
  <g filter="url(#bshadow)">
    <polygon points="32,23 40,27 32,31 24,27" fill="#78D4A0"/>
    <polygon points="32,31 40,27 40,35 32,39" fill="#4EBC80"/>
    <polygon points="32,31 24,27 24,35 32,39" fill="#287C50"/>
  </g>

  <!-- R2C3 — #9E3AC6 PURPLE -->
  <g filter="url(#bshadow)">
    <polygon points="48,23 56,27 48,31 40,27" fill="#C066E0"/>
    <polygon points="48,31 56,27 56,35 48,39" fill="#9E3AC6"/>
    <polygon points="48,31 40,27 40,35 48,39" fill="#641882"/>
  </g>

  <!-- === ROW 3 === -->
  <!-- R3C1 — #30B2C6 CYAN -->
  <g filter="url(#bshadow)">
    <polygon points="16,35 24,39 16,43 8,39" fill="#5CCEDE"/>
    <polygon points="16,43 24,39 24,47 16,51" fill="#30B2C6"/>
    <polygon points="16,43 8,39 8,47 16,51" fill="#167688"/>
  </g>

  <!-- R3C2 — #EEB23A GOLD -->
  <g filter="url(#bshadow)">
    <polygon points="32,35 40,39 32,43 24,39" fill="#FFCC68"/>
    <polygon points="32,43 40,39 40,47 32,51" fill="#EEB23A"/>
    <polygon points="32,43 24,39 24,47 32,51" fill="#A07618"/>
  </g>

  <!-- R3C3 — #62DA4E LIME -->
  <g filter="url(#bshadow)">
    <polygon points="48,35 56,39 48,43 40,39" fill="#88EC74"/>
    <polygon points="48,43 56,39 56,47 48,51" fill="#62DA4E"/>
    <polygon points="48,43 40,39 40,47 48,51" fill="#389628"/>
  </g>

  <!-- Gold border with glow -->
  <rect x="1" y="1" width="62" height="62" rx="11" ry="11"
        fill="none" stroke="url(#goldBorder)" stroke-width="1.8"
        filter="url(#borderglow)" opacity="0.92"/>

  <!-- Top-left sheen highlight -->
  <path d="M12,2 Q32,2 52,2 Q63,2 63,12 Q63,5 52,3.5 Q32,2 12,3.5 Q2,5 2,12 Q2,2 12,2Z"
        fill="rgba(255,255,255,0.07)"/>
</svg>
