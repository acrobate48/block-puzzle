<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <defs>
    <!-- Radial gradient top rose vif -->
    <radialGradient id="candy-top-grad" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#FF90CC"/>
      <stop offset="60%"  stop-color="#F040A0"/>
      <stop offset="100%" stop-color="#C02070"/>
    </radialGradient>
    <!-- Gros reflet spéculaire -->
    <radialGradient id="candy-specular" cx="28%" cy="30%" r="35%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Left face -->
    <linearGradient id="candy-left-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#880040"/>
      <stop offset="100%" stop-color="#A81858"/>
    </linearGradient>
    <!-- Right face -->
    <linearGradient id="candy-right-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C82870"/>
      <stop offset="100%" stop-color="#B01A5C"/>
    </linearGradient>
    <!-- Glow rose -->
    <filter id="candy-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#FF50B0" flood-opacity="0.7"/>
    </filter>
    <!-- Clip -->
    <clipPath id="candy-top-clip">
      <polygon points="60,24 105.2,50 60,76 14.8,50"/>
    </clipPath>
  </defs>

  <g filter="url(#candy-glow)">
    <!-- Top face candy -->
    <polygon points="60,24 105.2,50 60,76 14.8,50"
             fill="url(#candy-top-grad)"
             stroke="#E060A0" stroke-width="1"/>
    <!-- Left face -->
    <polygon points="14.8,50 60,76 60,102 14.8,76"
             fill="url(#candy-left-grad)"
             stroke="#800038" stroke-width="1"/>
    <!-- Right face -->
    <polygon points="105.2,50 60,76 60,102 105.2,76"
             fill="url(#candy-right-grad)"
             stroke="#900040" stroke-width="1"/>
  </g>

  <!-- Grand reflet spéculaire sur top -->
  <polygon points="60,24 105.2,50 60,76 14.8,50"
           fill="url(#candy-specular)"/>

  <!-- Petit reflet ellipse haut-gauche -->
  <ellipse cx="40" cy="40" rx="12" ry="7"
           fill="#FFFFFF" opacity="0.45"
           transform="rotate(-30 40 40)"
           clip-path="url(#candy-top-clip)"/>

  <!-- Bords brillants roses -->
  <line x1="14.8" y1="50" x2="60" y2="24" stroke="#FFB0E0" stroke-width="1.5" opacity="0.8"/>
  <line x1="60"   y1="24" x2="105.2" y2="50" stroke="#FFB0E0" stroke-width="1.5" opacity="0.8"/>
</svg>
