<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" opacity="0.85">
  <defs>
    <linearGradient id="ocean-coral-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00838f"/>
      <stop offset="100%" stop-color="#4dd0e1"/>
    </linearGradient>
    <radialGradient id="ocean-bubble-grad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0097a7" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="ocean-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.8" flood-color="#004d56" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Tentacule principal de pieuvre depuis le coin -->
  <path d="M0,0 C6,10 4,22 12,28 C20,34 16,48 22,56 C26,62 24,72 20,80"
        fill="none" stroke="url(#ocean-coral-grad)" stroke-width="5"
        stroke-linecap="round" filter="url(#ocean-shadow)"/>
  <!-- Ventouses sur tentacule -->
  <g fill="#b2ebf2" stroke="#0097a7" stroke-width="0.5">
    <circle cx="8" cy="16" r="2.5"/>
    <circle cx="15" cy="34" r="2.5"/>
    <circle cx="21" cy="52" r="2.5"/>
    <circle cx="19" cy="70" r="2"/>
  </g>

  <!-- Tentacule secondaire -->
  <path d="M0,0 C14,4 26,8 30,20 C34,32 48,36 54,50 C58,60 68,68 76,72"
        fill="none" stroke="#0097a7" stroke-width="3.5"
        stroke-linecap="round" filter="url(#ocean-shadow)"/>
  <!-- Ventouses 2 -->
  <g fill="#b2ebf2" stroke="#0097a7" stroke-width="0.5">
    <circle cx="20" cy="10" r="2"/>
    <circle cx="38" cy="26" r="2"/>
    <circle cx="52" cy="42" r="2"/>
    <circle cx="66" cy="62" r="1.8"/>
  </g>

  <!-- Tentacule tertiaire (enroulé) -->
  <path d="M0,2 C18,2 32,6 36,18 C40,28 50,30 52,40 C54,50 46,58 50,66"
        fill="none" stroke="#4dd0e1" stroke-width="2.2"
        stroke-linecap="round" filter="url(#ocean-shadow)"/>

  <!-- Corail branchu en bas-droite -->
  <g stroke="#00838f" stroke-linecap="round" fill="none" filter="url(#ocean-shadow)">
    <line x1="60" y1="80" x2="60" y2="58" stroke-width="2.5"/>
    <line x1="60" y1="68" x2="50" y2="58" stroke-width="2"/>
    <line x1="60" y1="68" x2="70" y2="56" stroke-width="2"/>
    <line x1="60" y1="62" x2="54" y2="52" stroke-width="1.5"/>
    <line x1="60" y1="62" x2="66" y2="50" stroke-width="1.5"/>
    <line x1="50" y1="58" x2="44" y2="50" stroke-width="1.2"/>
    <line x1="70" y1="56" x2="76" y2="46" stroke-width="1.2"/>
    <!-- Bourgeons -->
    <circle cx="54" cy="52" r="2" fill="#4dd0e1" stroke="none"/>
    <circle cx="66" cy="50" r="2" fill="#4dd0e1" stroke="none"/>
    <circle cx="44" cy="50" r="1.8" fill="#80deea" stroke="none"/>
    <circle cx="76" cy="46" r="1.8" fill="#80deea" stroke="none"/>
    <circle cx="60" cy="58" r="2.5" fill="#26c6da" stroke="none"/>
  </g>

  <!-- Bulles remontantes -->
  <g fill="url(#ocean-bubble-grad)" stroke="#4dd0e1" stroke-width="0.7">
    <circle cx="38" cy="44" r="3.5"/>
    <circle cx="46" cy="32" r="2.5"/>
    <circle cx="42" cy="20" r="2"/>
    <circle cx="30" cy="38" r="1.8"/>
    <circle cx="56" cy="28" r="1.5"/>
    <circle cx="62" cy="18" r="2.2"/>
    <circle cx="70" cy="30" r="1.5"/>
  </g>
</svg>
