<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 20" width="100%" height="20" opacity="0.90">
  <defs>
    <filter id="iceglow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#aaeeff" flood-opacity="0.9"/>
    </filter>
    <filter id="frost" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="1" flood-color="#ffffff" flood-opacity="0.8"/>
    </filter>
    <linearGradient id="icegrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff7ff"/>
      <stop offset="60%" stop-color="#7cd4f0"/>
      <stop offset="100%" stop-color="#1a6a99"/>
    </linearGradient>
    <!-- Single ice crystal triangle -->
    <g id="crystal">
      <polygon points="0,0 -5,14 5,14" fill="url(#icegrad)" stroke="#aaeeff" stroke-width="0.6" filter="url(#iceglow)" opacity="0.92"/>
      <!-- center vein -->
      <line x1="0" y1="1" x2="0" y2="12" stroke="#ffffff" stroke-width="0.4" opacity="0.6"/>
      <!-- side facets -->
      <line x1="0" y1="4" x2="-3" y2="10" stroke="#ffffff" stroke-width="0.3" opacity="0.45"/>
      <line x1="0" y1="4" x2="3"  y2="10" stroke="#ffffff" stroke-width="0.3" opacity="0.45"/>
    </g>
    <!-- Small crystal -->
    <g id="crystalS">
      <polygon points="0,0 -3,9 3,9" fill="url(#icegrad)" stroke="#aaeeff" stroke-width="0.5" filter="url(#iceglow)" opacity="0.85"/>
      <line x1="0" y1="1" x2="0" y2="7" stroke="#ffffff" stroke-width="0.3" opacity="0.5"/>
    </g>
    <!-- Frost shard: short star-like burst -->
    <g id="froststars">
      <line x1="-3" y1="0" x2="3" y2="0" stroke="#dff7ff" stroke-width="0.7" filter="url(#frost)"/>
      <line x1="0" y1="-3" x2="0" y2="3" stroke="#dff7ff" stroke-width="0.7" filter="url(#frost)"/>
      <line x1="-2" y1="-2" x2="2" y2="2" stroke="#dff7ff" stroke-width="0.5" filter="url(#frost)"/>
      <line x1="2" y1="-2" x2="-2" y2="2" stroke="#dff7ff" stroke-width="0.5" filter="url(#frost)"/>
    </g>
  </defs>

  <!-- Icy base -->
  <rect x="0" y="14" width="400" height="6" fill="#1a6a99" opacity="0.6"/>
  <rect x="0" y="13" width="400" height="2" fill="#7cd4f0" opacity="0.4"/>

  <!-- Row of ice crystals (alternating tall/small) every ~28px -->
  <use href="#crystal"  transform="translate(14,6)"/>
  <use href="#crystalS" transform="translate(32,8)"/>
  <use href="#crystal"  transform="translate(50,5)"/>
  <use href="#crystalS" transform="translate(68,7)"/>
  <use href="#crystal"  transform="translate(86,6)"/>
  <use href="#crystalS" transform="translate(104,8)"/>
  <use href="#crystal"  transform="translate(122,5)"/>
  <use href="#crystalS" transform="translate(140,7)"/>
  <use href="#crystal"  transform="translate(158,6)"/>
  <use href="#crystalS" transform="translate(176,8)"/>
  <use href="#crystal"  transform="translate(194,5)"/>
  <use href="#crystalS" transform="translate(212,7)"/>
  <use href="#crystal"  transform="translate(230,6)"/>
  <use href="#crystalS" transform="translate(248,8)"/>
  <use href="#crystal"  transform="translate(266,5)"/>
  <use href="#crystalS" transform="translate(284,7)"/>
  <use href="#crystal"  transform="translate(302,6)"/>
  <use href="#crystalS" transform="translate(320,8)"/>
  <use href="#crystal"  transform="translate(338,5)"/>
  <use href="#crystalS" transform="translate(356,7)"/>
  <use href="#crystal"  transform="translate(374,6)"/>
  <use href="#crystalS" transform="translate(392,8)"/>

  <!-- Frost shards between crystals -->
  <use href="#froststars" transform="translate(23,3)"/>
  <use href="#froststars" transform="translate(59,2)"/>
  <use href="#froststars" transform="translate(95,3)"/>
  <use href="#froststars" transform="translate(131,2)"/>
  <use href="#froststars" transform="translate(167,3)"/>
  <use href="#froststars" transform="translate(203,2)"/>
  <use href="#froststars" transform="translate(239,3)"/>
  <use href="#froststars" transform="translate(275,2)"/>
  <use href="#froststars" transform="translate(311,3)"/>
  <use href="#froststars" transform="translate(347,2)"/>
  <use href="#froststars" transform="translate(383,3)"/>
</svg>
