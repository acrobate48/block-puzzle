<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 20" width="100%" height="20" opacity="0.90">
  <defs>
    <filter id="pglow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#00e5cc" flood-opacity="0.7"/>
    </filter>
    <filter id="sunglow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ff9900" flood-opacity="0.6"/>
    </filter>
    <linearGradient id="sand2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d98a"/>
      <stop offset="100%" stop-color="#c8922a"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00bcd4" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#006080" stop-opacity="1"/>
    </linearGradient>

    <!-- Shell: small stylized bivalve -->
    <g id="shell">
      <ellipse cx="0" cy="0" rx="4" ry="2.5" fill="#f5c5a0" stroke="#c8822a" stroke-width="0.5"/>
      <!-- ridges -->
      <line x1="-3.5" y1="0" x2="3.5" y2="0"  stroke="#c8822a" stroke-width="0.4" opacity="0.7"/>
      <line x1="-2.5" y1="-1.2" x2="2.5" y2="-1.2" stroke="#c8822a" stroke-width="0.3" opacity="0.5"/>
      <line x1="-2.5" y1="1.2"  x2="2.5" y2="1.2"  stroke="#c8822a" stroke-width="0.3" opacity="0.5"/>
    </g>

    <!-- Palm tree: small silhouette -->
    <g id="palm">
      <!-- trunk -->
      <path d="M0,0 Q1,-4 0,-10 Q-1,-4 0,0" fill="#8B5A2B" stroke="#5c3800" stroke-width="0.4"/>
      <!-- leaves -->
      <path d="M0,-10 Q-8,-14 -10,-12" stroke="#22aa00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M0,-10 Q-4,-16 -2,-15" stroke="#22aa00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M0,-10 Q8,-14 10,-12"  stroke="#2acc00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M0,-10 Q4,-16 2,-15"   stroke="#2acc00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M0,-10 Q0,-16 1,-15"   stroke="#33bb00" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Sand base -->
  <rect x="0" y="13" width="400" height="7" fill="url(#sand2)"/>

  <!-- Wave on top of sand -->
  <path d="M0,13 C20,8 40,14 60,10 C80,6 100,13 120,10 C140,7 160,13 180,10 C200,7 220,13 240,10 C260,7 280,13 300,10 C320,7 340,13 360,10 C380,7 400,13 400,12 L400,14 L0,14 Z"
        fill="url(#sea)" filter="url(#pglow)"/>
  <!-- Wave highlight -->
  <path d="M0,13 C20,8 40,14 60,10 C80,6 100,13 120,10 C140,7 160,13 180,10 C200,7 220,13 240,10 C260,7 280,13 300,10 C320,7 340,13 360,10 C380,7 400,13 400,12"
        fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.5"/>

  <!-- Shells on beach (y~16 = on sand surface) -->
  <use href="#shell" transform="translate(22,16)"/>
  <use href="#shell" transform="translate(65,16.5) rotate(25)"/>
  <use href="#shell" transform="translate(110,16) rotate(-15)"/>
  <use href="#shell" transform="translate(155,16.5)"/>
  <use href="#shell" transform="translate(200,16) rotate(20)"/>
  <use href="#shell" transform="translate(243,16.5) rotate(-10)"/>
  <use href="#shell" transform="translate(288,16)"/>
  <use href="#shell" transform="translate(333,16.5) rotate(15)"/>
  <use href="#shell" transform="translate(376,16) rotate(-20)"/>

  <!-- 3 palm trees (positioned above ground) -->
  <use href="#palm" transform="translate(50,20)" filter="url(#sunglow)"/>
  <use href="#palm" transform="translate(200,20)" filter="url(#sunglow)"/>
  <use href="#palm" transform="translate(350,20)" filter="url(#sunglow)"/>
</svg>
