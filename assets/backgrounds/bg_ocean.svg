<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 3840 2160" width="100%" height="100%"
     preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="oAtm1" cx="50%" cy="15%" r="60%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#50C8F0" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#2868A8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#040C28" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="oAtm2" cx="25%" cy="50%" r="50%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#28AAA0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#040C28" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="oAtm3" cx="75%" cy="65%" r="45%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C4888" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#030820" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="oCaustic1" cx="40%" cy="20%" r="35%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A0F0FF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#50C8F0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#040C28" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="oCaustic2" cx="70%" cy="30%" r="30%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A0F0FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#040C28" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="oBioGlow1" cx="30%" cy="70%" r="20%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#50C8F0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#040C28" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="oBioGlow2" cx="70%" cy="75%" r="18%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#28AAA0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#040C28" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="oVignette" cx="50%" cy="50%" r="72%" gradientUnits="userSpaceOnUse">
      <stop offset="35%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="oSpecular" cx="22%" cy="5%" r="30%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A0F0FF" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#50C8F0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#040C28" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="oDepth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#030820"/>
      <stop offset="15%" stop-color="#040C28"/>
      <stop offset="50%" stop-color="#070F38"/>
      <stop offset="80%" stop-color="#0C4888"/>
      <stop offset="100%" stop-color="#030820"/>
    </linearGradient>
    <linearGradient id="oSurface" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#50C8F0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#A0F0FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="oCausticRay" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#A0F0FF" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#50C8F0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#50C8F0" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="25" result="b2"/>
      <feColorMatrix in="b1" type="matrix"
        values="0 0 0 0 0.31  0 0 0 0 0.78  0 0 0 0 0.94  0 0 0 2 0" result="c1"/>
      <feColorMatrix in="b2" type="matrix"
        values="0 0 0 0 0.31  0 0 0 0 0.78  0 0 0 0 0.94  0 0 0 0.9 0" result="c2"/>
      <feMerge><feMergeNode in="c2"/><feMergeNode in="c1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowTeal" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b1"/>
      <feColorMatrix in="b1" type="matrix"
        values="0 0 0 0 0.16  0 0 0 0 0.67  0 0 0 0 0.63  0 0 0 2.5 0" result="c1"/>
      <feMerge><feMergeNode in="c1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#030820" flood-opacity="0.95"/>
    </filter>
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="gn"/>
      <feBlend in="SourceGraphic" in2="gn" mode="overlay" result="bl"/>
      <feComposite in="bl" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="blur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="blurHeavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blurMid" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="causticFilter">
      <feTurbulence type="turbulence" baseFrequency="0.025 0.02" numOctaves="5" seed="8" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="30" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="waterWave">
      <feTurbulence type="turbulence" baseFrequency="0.015 0.008" numOctaves="3" seed="15" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="20" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- LAYER 1: Deep ocean base -->
  <rect width="3840" height="2160" fill="url(#oDepth)"/>

  <!-- LAYER 2: Atmospheric depth radials -->
  <rect width="3840" height="2160" fill="url(#oAtm1)" filter="url(#blurHeavy)" opacity="0.85"/>
  <rect width="3840" height="2160" fill="url(#oAtm2)" filter="url(#blurMid)" opacity="0.7"/>
  <rect width="3840" height="2160" fill="url(#oAtm3)" filter="url(#blurMid)" opacity="0.6"/>

  <!-- LAYER 3: Caustic light patterns from surface -->
  <g opacity="0.45" filter="url(#causticFilter)">
    <ellipse cx="800" cy="400" rx="600" ry="200" fill="#A0F0FF" opacity="0.25"/>
    <ellipse cx="1800" cy="350" rx="550" ry="180" fill="#50C8F0" opacity="0.22"/>
    <ellipse cx="2900" cy="420" rx="580" ry="195" fill="#A0F0FF" opacity="0.25"/>
    <ellipse cx="1300" cy="600" rx="500" ry="160" fill="#50C8F0" opacity="0.2"/>
    <ellipse cx="2400" cy="580" rx="520" ry="170" fill="#A0F0FF" opacity="0.22"/>
  </g>
  <rect x="0" y="0" width="3840" height="800" fill="url(#oCausticRay)" opacity="0.55" filter="url(#blurMid)"/>

  <!-- LAYER 4: Light rays from ocean surface above (cyan beams) -->
  <g opacity="0.35" filter="url(#blurHeavy)">
    <polygon points="1840,0 1920,0 2200,2160 1700,2160" fill="#50C8F0"/>
    <polygon points="1700,0 1780,0 1950,2160 1580,2160" fill="#A0F0FF"/>
    <polygon points="1960,0 2040,0 2350,2160 2100,2160" fill="#50C8F0"/>
    <polygon points="1560,0 1640,0 1760,2160 1420,2160" fill="#A0F0FF"/>
    <polygon points="2080,0 2160,0 2550,2160 2300,2160" fill="#50C8F0"/>
    <polygon points="1420,0 1510,0 1580,2160 1250,2160" fill="#A0F0FF"/>
    <polygon points="2200,0 2290,0 2750,2160 2500,2160" fill="#50C8F0"/>
    <polygon points="2320,0 2400,0 2950,2160 2700,2160" fill="#A0F0FF"/>
  </g>

  <!-- LAYER 5: Depth layer gradients (surface glow at top) -->
  <rect x="0" y="0" width="3840" height="600" fill="url(#oSurface)" opacity="0.6" filter="url(#blurHeavy)"/>
  <rect x="0" y="0" width="3840" height="280" fill="#A0F0FF" opacity="0.08" filter="url(#blurHeavy)"/>

  <!-- LAYER 6: Bubble columns -->
  <g filter="url(#blurMid)" opacity="0.55">
    <!-- Column 1 -->
    <circle cx="380" cy="2100" r="8" fill="#A0F0FF" opacity="0.6"/>
    <circle cx="370" cy="1950" r="6" fill="#50C8F0" opacity="0.55"/>
    <circle cx="390" cy="1780" r="9" fill="#A0F0FF" opacity="0.5"/>
