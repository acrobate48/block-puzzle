<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- === BACKGROUND === -->
    <linearGradient id="bgOG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050E05"/>
      <stop offset="35%" stop-color="#081408"/>
      <stop offset="70%" stop-color="#060A06"/>
      <stop offset="100%" stop-color="#030603"/>
    </linearGradient>
    <!-- Center radial depth -->
    <radialGradient id="centerDepth" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#142414" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#0A140A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050E05" stop-opacity="0"/>
    </radialGradient>
    <!-- Left-side glow for title area -->
    <radialGradient id="leftGlow" cx="25%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#D4B030" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#D4B030" stop-opacity="0"/>
    </radialGradient>
    <!-- Right-side glow for blocks area -->
    <radialGradient id="rightGlow" cx="75%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#3AC644" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3AC644" stop-opacity="0"/>
    </radialGradient>
    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#060A06" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.72"/>
    </radialGradient>
    <!-- Gold title gradient -->
    <linearGradient id="titleGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE878"/>
      <stop offset="30%" stop-color="#F5D060"/>
      <stop offset="65%" stop-color="#D4B030"/>
      <stop offset="100%" stop-color="#9A7010"/>
    </linearGradient>
    <!-- CTA button gradient -->
    <linearGradient id="ctaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5AE030"/>
      <stop offset="100%" stop-color="#2A8810"/>
    </linearGradient>
    <!-- Premium badge gradient -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE060"/>
      <stop offset="100%" stop-color="#B08010"/>
    </linearGradient>
    <!-- Block glass shine -->
    <linearGradient id="shineOG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.60"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Block color glow filters -->
    <filter id="blockGlowOG" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="titleGlow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ctaGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow" x="-15%" y="-50%" width="130%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadowOG" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000000" flood-opacity="0.75"/>
    </filter>
    <filter id="particleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === BACKGROUND LAYERS === -->
  <rect width="1200" height="630" fill="url(#bgOG)"/>
  <rect width="1200" height="630" fill="url(#centerDepth)"/>
  <rect width="1200" height="630" fill="url(#leftGlow)"/>
  <rect width="1200" height="630" fill="url(#rightGlow)"/>

  <!-- Background grid texture -->
  <g opacity="0.04" stroke="#3AC644" stroke-width="0.8">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Colorful particle glow spots -->
  <g filter="url(#particleGlow)" opacity="0.55">
    <!-- Green particles -->
    <circle cx="80"  cy="120" r="5" fill="#3AC644" opacity="0.7"/>
    <circle cx="150" cy="480" r="4" fill="#62DA4E" opacity="0.6"/>
    <circle cx="380" cy="60"  r="3" fill="#4EBC80" opacity="0.5"/>
    <circle cx="200" cy="320" r="6" fill="#3AC644" opacity="0.4"/>
    <!-- Gold particles -->
    <circle cx="320" cy="560" r="4" fill="#EEB23A" opacity="0.6"/>
    <circle cx="100" cy="380" r="3" fill="#D4B030" opacity="0.5"/>
    <!-- Blue/cyan particles -->
    <circle cx="420" cy="580" r="5" fill="#30B2C6" opacity="0.5"/>
    <circle cx="50"  cy="250" r="3" fill="#30B2C6" opacity="0.4"/>
    <!-- Purple -->
    <circle cx="280" cy="110" r="4" fill="#9E3AC6" opacity="0.5"/>
    <!-- Right side -->
    <circle cx="900" cy="80"  r="5" fill="#DA4E30" opacity="0.6"/>
    <circle cx="1050" cy="200" r="4" fill="#EE8A1C" opacity="0.5"/>
    <circle cx="750"  cy="560" r="6" fill="#3AC644" opacity="0.5"/>
    <circle cx="1150" cy="450" r="4" fill="#C6D026" opacity="0.5"/>
    <circle cx="820"  cy="580" r="3" fill="#9E3AC6" opacity="0.5"/>
    <circle cx="680"  cy="50"  r="4" fill="#30B2C6" opacity="0.4"/>
    <circle cx="1100" cy="580" r="5" fill="#EEB23A" opacity="0.6"/>
  </g>

  <!-- Vignette overlay -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- === DIVIDER LINE === -->
  <line x1="600" y1="30" x2="600" y2="600" stroke="#D4B030" stroke-width="0.8" opacity="0.15"/>

  <!-- ======================================== -->
  <!-- LEFT HALF — TITLE & CTA                 -->
  <!-- ======================================== -->

  <!-- Decorative flanking lines above title -->
  <line x1="60" y1="152" x2="260" y2="152" stroke="#D4B030" stroke-width="1.2" opacity="0.45"/>
  <line x1="320" y1="152" x2="560" y2="152" stroke="#D4B030" stroke-width="1.2" opacity="0.45"/>
  <circle cx="290" cy="152" r="4" fill="#D4B030" opacity="0.55"/>

  <!-- "— PREMIUM —" header -->
  <text x="308" y="148"
        font-family="'Arial','Helvetica',sans-serif"
        font-size="20" font-weight="400"
        text-anchor="middle"
        letter-spacing="10"
        fill="#D4B030" opacity="0.80"
        filter="url(#subtleGlow)">PREMIUM</text>

  <!-- "BLOCK" main title -->
  <text x="305" y="270"
        font-family="'Arial Black','Impact','Arial',sans-serif"
        font-size="118" font-weight="900"
        text-anchor="middle"
        letter-spacing="4"
        fill="url(#titleGold)"
        filter="url(#titleGlow)">BLOCK</text>

  <!-- "PUZZLE" main title -->
  <text x="305" y="382"
        font-family="'Arial Black','Impact','Arial',sans-serif"
        font-size="118" font-weight="900"
        text-anchor="middle"
        letter-spacing="4"
        fill="url(#titleGold)"
        filter="url(#titleGlow)">PUZZLE</text>

  <!-- Tagline -->
  <text x="305" y="428"
        font-family="'Arial','Helvetica',sans-serif"
        font-size="19" font-weight="300"
        text-anchor="middle"
        letter-spacing="5"
        fill="#7AC870" opacity="0.70">Place. Clear. Conquer.</text>

  <!-- Divider before CTA -->
  <line x1="100" y1="452" x2="510" y2="452" stroke="#D4B030" stroke-width="0.8" opacity="0.25"/>

  <!-- "PLAY FREE NOW" CTA Button -->
  <rect x="115" y="468" width="380" height="68" rx="34" fill="url(#ctaGrad)"
        filter="url(#ctaGlow)" opacity="0.95"/>
  <!-- Button top sheen -->
  <rect x="115" y="468" width="380" height="34" rx="34" fill="white" opacity="0.12"/>
  <!-- Button border -->
  <rect x="115" y="468" width="380" height="68" rx="34"
        fill="none" stroke="#5AE030" stroke-width="1.5" opacity="0.55"/>
  <!-- Button text -->
  <text x="305" y="512"
        font-family="'Arial Black','Impact','Arial',sans-serif"
        font-size="26" font-weight="900"
        text-anchor="middle"
        letter-spacing="5"
        fill="white"
        filter="url(#subtleGlow)">PLAY FREE NOW</text>

  <!-- Small bottom note -->
  <text x="305" y="598"
        font-family="'Arial','Helvetica',sans-serif"
        font-size="13" font-weight="300"
        text-anchor="middle"
        letter-spacing="3"
        fill="#D4B030" opacity="0.38">10 THEMES · GLOBAL LEADERBOARD · FREE</text>

  <!-- ======================================== -->
  <!-- RIGHT HALF — 3D ISOMETRIC BLOCKS         -->
  <!-- 12 blocks in a dynamic falling composition -->
  <!-- s=52, cx range 640-1180, cy range 40-590   -->
  <!-- ======================================== -->

  <g filter="url(#blockGlowOG)">

  <!-- Block 1 — cx=720 cy=100, s=52 — GREEN #3AC644 -->
  <polygon points="720,48 772,74 720,100 668,74" fill="#70EC7C"/>
  <polygon points="720,100 772,74 772,126 720,152" fill="#3AC644"/>
  <polygon points="720,100 668,74 668,126 720,152" fill="#1E7228"/>
  <polygon points="720,48 772,74 746,87 694,61" fill="white" opacity="0.22"/>

  <!-- Block 2 — cx=820 cy=140, s=46 — ORANGE #EE8A1C -->
  <polygon points="820,94 866,117 820,140 774,117" fill="#FFAA4A"/>
  <polygon points="820,140 866,117 866,163 820,186" fill="#EE8A1C"/>
  <polygon points="820,140 774,117 774,163 820,186" fill="#9E5A06"/>
  <polygon points="820,94 866,117 843,128 797,105" fill="white" opacity="0.22"/>

  <!-- Block 3 — cx=680 cy=210, s=44 — PURPLE #9E3AC6 -->
  <polygon points="680,166 724,188 680,210 636,188" fill="#C060E0"/>
  <polygon points="680,210 724,188 724,232 680,254" fill="#9E3AC6"/>
  <polygon points="680,210 636,188 636,232 680,254" fill="#621880"/>
  <polygon points="680,166 724,188 702,199 658,177" fill="white" opacity="0.22"/>

  <!-- Block 4 — cx=910 cy=90, s=50 — RED #DA4E30 -->
  <polygon points="910,40 960,65 910,90 860,65" fill="#EE7060"/>
  <polygon points="910,90 960,65 960,115 910,140" fill="#DA4E30"/>
  <polygon points="910,90 860,65 860,115 910,140" fill="#8C2A12"/>
  <polygon points="910,40 960,65 935,77 885,52" fill="white" opacity="0.22"/>

  <!-- Block 5 — cx=780 cy=280, s=48 — CYAN #30B2C6 -->
  <polygon points="780,232 828,256 780,280 732,256" fill="#5CCEDE"/>
  <polygon points="780,280 828,256 828,304 780,328" fill="#30B2C6"/>
  <polygon points="780,280 732,256 732,304 780,328" fill="#147888"/>
  <polygon points="780,232 828,256 804,268 756,244" fill="white" opacity="0.22"/>

  <!-- Block 6 — cx=660 cy=340, s=42 — GOLD #EEB23A -->
  <polygon points="660,298 702,319 660,340 618,319" fill="#FFCC68"/>
  <polygon points="660,340 702,319 702,361 660,382" fill="#EEB23A"/>
  <polygon points="660,340 618,319 618,361 660,382" fill="#A07618"/>
  <polygon points="660,298 702,319 681,329.5 639,308.5" fill="white" opacity="0.28"/>

  <!-- Block 7 — cx=900 cy=220, s=46 — LIME #62DA4E -->
  <polygon points="900,174 946,197 900,220 854,197" fill="#86EC72"/>
  <polygon points="900,220 946,197 946,243 900,266" fill="#62DA4E"/>
  <polygon points="900,220 854,197 854,243 900,266" fill="#369424"/>
  <polygon points="900,174 946,197 923,208.5 877,185.5" fill="white" opacity="0.22"/>

  <!-- Block 8 — cx=1020 cy=160, s=44 — YELLOW-GREEN #C6D026 -->
  <polygon points="1020,116 1064,138 1020,160 976,138" fill="#DCE84E"/>
  <polygon points="1020,160 1064,138 1064,182 1020,204" fill="#C6D026"/>
  <polygon points="1020,160 976,138 976,182 1020,204" fill="#828A14"/>
  <polygon points="1020,116 1064,138 1042,149 998,127" fill="white" opacity="0.22"/>

  <!-- Block 9 — cx=840 cy=370, s=50 — GREEN #3AC644 -->
  <polygon points="840,320 890,345 840,370 790,345" fill="#70EC7C"/>
  <polygon points="840,370 890,345 890,395 840,420" fill="#3AC644"/>
  <polygon points="840,370 790,345 790,395 840,420" fill="#1E7228"/>
  <polygon points="840,320 890,345 865,357.5 815,332.5" fill="white" opacity="0.22"/>

  <!-- Block 10 — cx=1000 cy=310, s=48 — TEAL #4EBC80 -->
  <polygon points="1000,262 1048,286 1000,310 952,286" fill="#76D49C"/>
  <polygon points="1000,310 1048,286 1048,334 1000,358" fill="#4EBC80"/>
  <polygon points="1000,310 952,286 952,334 1000,358" fill="#267A50"/>
  <polygon points="1000,262 1048,286 1024,298 976,274" fill="white" opacity="0.22"/>

  <!-- Block 11 — cx=700 cy=460, s=46 — RED #DA4E30 -->
  <polygon points="700,414 746,437 700,460 654,437" fill="#EE7060"/>
  <polygon points="700,460 746,437 746,483 700,506" fill="#DA4E30"/>
  <polygon points="700,460 654,437 654,483 700,506" fill="#8C2A12"/>
  <polygon points="700,414 746,437 723,448.5 677,425.5" fill="white" opacity="0.22"/>

  <!-- Block 12 — cx=950 cy=460, s=50 — ORANGE #EE8A1C -->
  <polygon points="950,410 1000,435 950,460 900,435" fill="#FFAA4A"/>
  <polygon points="950,460 1000,435 1000,485 950,510" fill="#EE8A1C"/>
  <polygon points="950,460 900,435 900,485 950,510" fill="#9E5A06"/>
  <polygon points="950,410 1000,435 975,447.5 925,422.5" fill="white" opacity="0.22"/>

  </g>

  <!-- ======================================== -->
  <!-- FINAL OVERLAY — vignette polish          -->
  <!-- ======================================== -->
  <rect width="1200" height="630" fill="url(#vignette)" opacity="0.4"/>

  <!-- Top-left corner sheen -->
  <path d="M0,0 L200,0 Q0,0 0,200 Z" fill="rgba(255,255,255,0.025)"/>
</svg>
