<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <defs>
    <!-- Gradient métal brossé top (3 stops) -->
    <linearGradient id="metal-top-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#D8E4F0"/>
      <stop offset="45%"  stop-color="#7888A0"/>
      <stop offset="100%" stop-color="#C8D4E4"/>
    </linearGradient>
    <!-- Reflet spéculaire ellipse -->
    <radialGradient id="metal-specular" cx="30%" cy="35%" r="35%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="60%"  stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Gradient left face -->
    <linearGradient id="metal-left-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#404E5E"/>
      <stop offset="100%" stop-color="#5A6878"/>
    </linearGradient>
    <!-- Gradient right face -->
    <linearGradient id="metal-right-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8898A8"/>
      <stop offset="100%" stop-color="#6A7888"/>
    </linearGradient>
    <!-- Effet brossé (fines stries horizontales) -->
    <filter id="metal-brush" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.0 0.9" numOctaves="1" seed="2" result="stripes"/>
      <feColorMatrix type="saturate" values="0" in="stripes" result="grayStripes"/>
      <feBlend in="SourceGraphic" in2="grayStripes" mode="soft-light" result="brushed"/>
      <feComposite in="brushed" in2="SourceGraphic" operator="in"/>
    </filter>
    <!-- Ombre nette -->
    <filter id="metal-shadow" x="-15%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="3" dy="4" stdDeviation="2" flood-color="#101820" flood-opacity="0.7"/>
    </filter>
  </defs>

  <g filter="url(#metal-shadow)">
    <!-- Top face chromée -->
    <polygon points="60,24 105.2,50 60,76 14.8,50"
             fill="url(#metal-top-grad)" filter="url(#metal-brush)"
             stroke="#C8C8C8" stroke-width="1"/>
    <!-- Left face -->
    <polygon points="14.8,50 60,76 60,102 14.8,76"
             fill="url(#metal-left-grad)"
             stroke="#C8C8C8" stroke-width="1"/>
    <!-- Right face -->
    <polygon points="105.2,50 60,76 60,102 105.2,76"
             fill="url(#metal-right-grad)"
             stroke="#C8C8C8" stroke-width="1"/>
  </g>

  <!-- Reflet spéculaire sur top face -->
  <polygon points="60,24 105.2,50 60,76 14.8,50"
           fill="url(#metal-specular)"/>

  <!-- Arêtes brillantes -->
  <line x1="14.8" y1="50" x2="60" y2="24" stroke="#E8EEF8" stroke-width="1.2" opacity="0.9"/>
  <line x1="60"   y1="24" x2="105.2" y2="50" stroke="#E8EEF8" stroke-width="1.2" opacity="0.9"/>
  <!-- Arête médiane verticale -->
  <line x1="60" y1="76" x2="60" y2="102" stroke="#D0D0D0" stroke-width="1" opacity="0.8"/>
</svg>
