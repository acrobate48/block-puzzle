<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 20" width="100%" height="20" opacity="0.90">
  <defs>
    <filter id="circglow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#00ffee" flood-opacity="1"/>
    </filter>
    <filter id="traceglow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#00ccdd" flood-opacity="0.85"/>
    </filter>
  </defs>

  <!-- PCB dark background -->
  <rect x="0" y="0" width="400" height="20" fill="#03080f"/>

  <!-- Main horizontal PCB trace (center line) -->
  <line x1="0" y1="10" x2="400" y2="10"
        stroke="#00ccdd" stroke-width="1.5" filter="url(#traceglow)"/>
  <!-- Secondary trace (top) -->
  <line x1="0" y1="5" x2="400" y2="5"
        stroke="#004455" stroke-width="0.8" opacity="0.6"/>
  <!-- Secondary trace (bottom) -->
  <line x1="0" y1="15" x2="400" y2="15"
        stroke="#004455" stroke-width="0.8" opacity="0.6"/>

  <!-- PCB junction nodes (circles on main trace) every ~33px -->
  <circle cx="16"  cy="10" r="3"   fill="#001520" stroke="#00ffee" stroke-width="1.2" filter="url(#circglow)"/>
  <circle cx="50"  cy="10" r="3"   fill="#001520" stroke="#00ffee" stroke-width="1.2" filter="url(#circglow)"/>
  <circle cx="84"  cy="10" r="3"   fill="#001520" stroke="#00ffee" stroke-width="1.2" filter="url(#circglow)"/>
  <circle cx="118" cy="10" r="3"   fill="#001520" stroke="#00ffee" stroke-width="1.2" filter="url(#circglow)"/>
  <circle cx="152" cy="10" r="3"   fill="#001520" stroke="#00ffee" stroke-width="1.2" filter="url(#circglow)"/>
  <circle cx="186" cy="10" r="3"   fill="#001520" stroke="#00ffee" stroke-width="1.2" filter="url(#circglow)"/>
  <circle cx="220" cy="10" r="3"   fill="#001520" stroke="#00ffee" stroke-width="1.2" filter="url(#circglow)"/>
  <circle cx="254" cy="10" r="3"   fill="#001520" stroke="#00ffee" stroke-width="1.2" filter="url(#circglow)"/>
  <circle cx="288" cy="10" r="3"   fill="#001520" stroke="#00ffee" stroke-width="1.2" filter="url(#circglow)"/>
  <circle cx="322" cy="10" r="3"   fill="#001520" stroke="#00ffee" stroke-width="1.2" filter="url(#circglow)"/>
  <circle cx="356" cy="10" r="3"   fill="#001520" stroke="#00ffee" stroke-width="1.2" filter="url(#circglow)"/>
  <circle cx="390" cy="10" r="3"   fill="#001520" stroke="#00ffee" stroke-width="1.2" filter="url(#circglow)"/>

  <!-- Bright filled dot at node center (LED-like) -->
  <circle cx="16"  cy="10" r="1" fill="#00ffee" opacity="0.9"/>
  <circle cx="50"  cy="10" r="1" fill="#00ffee" opacity="0.9"/>
  <circle cx="84"  cy="10" r="1" fill="#00ffee" opacity="0.9"/>
  <circle cx="118" cy="10" r="1" fill="#00ffee" opacity="0.9"/>
  <circle cx="152" cy="10" r="1" fill="#00ffee" opacity="0.9"/>
  <circle cx="186" cy="10" r="1" fill="#00ffee" opacity="0.9"/>
  <circle cx="220" cy="10" r="1" fill="#00ffee" opacity="0.9"/>
  <circle cx="254" cy="10" r="1" fill="#00ffee" opacity="0.9"/>
  <circle cx="288" cy="10" r="1" fill="#00ffee" opacity="0.9"/>
  <circle cx="322" cy="10" r="1" fill="#00ffee" opacity="0.9"/>
  <circle cx="356" cy="10" r="1" fill="#00ffee" opacity="0.9"/>
  <circle cx="390" cy="10" r="1" fill="#00ffee" opacity="0.9"/>

  <!-- Branch traces going up from some junctions -->
  <polyline points="50,10 50,5 66,5"       fill="none" stroke="#00aacc" stroke-width="0.9" filter="url(#traceglow)"/>
  <polyline points="152,10 152,5 168,5"    fill="none" stroke="#00aacc" stroke-width="0.9" filter="url(#traceglow)"/>
  <polyline points="254,10 254,5 270,5"    fill="none" stroke="#00aacc" stroke-width="0.9" filter="url(#traceglow)"/>
  <polyline points="356,10 356,5 372,5"    fill="none" stroke="#00aacc" stroke-width="0.9" filter="url(#traceglow)"/>

  <!-- Branch traces going down from some junctions -->
  <polyline points="84,10 84,15 100,15"    fill="none" stroke="#00aacc" stroke-width="0.9" filter="url(#traceglow)"/>
  <polyline points="186,10 186,15 202,15"  fill="none" stroke="#00aacc" stroke-width="0.9" filter="url(#traceglow)"/>
  <polyline points="288,10 288,15 304,15"  fill="none" stroke="#00aacc" stroke-width="0.9" filter="url(#traceglow)"/>

  <!-- Small square SMD pads at end of branches (top) -->
  <rect x="64" y="3"  width="5" height="3" rx="0.5" fill="#003344" stroke="#00ffee" stroke-width="0.7" filter="url(#circglow)"/>
  <rect x="166" y="3" width="5" height="3" rx="0.5" fill="#003344" stroke="#00ffee" stroke-width="0.7" filter="url(#circglow)"/>
  <rect x="268" y="3" width="5" height="3" rx="0.5" fill="#003344" stroke="#00ffee" stroke-width="0.7" filter="url(#circglow)"/>
  <rect x="370" y="3" width="5" height="3" rx="0.5" fill="#003344" stroke="#00ffee" stroke-width="0.7" filter="url(#circglow)"/>

  <!-- Small square SMD pads at end of branches (bottom) -->
  <rect x="98"  y="14" width="5" height="3" rx="0.5" fill="#003344" stroke="#00ffee" stroke-width="0.7" filter="url(#circglow)"/>
  <rect x="200" y="14" width="5" height="3" rx="0.5" fill="#003344" stroke="#00ffee" stroke-width="0.7" filter="url(#circglow)"/>
  <rect x="302" y="14" width="5" height="3" rx="0.5" fill="#003344" stroke="#00ffee" stroke-width="0.7" filter="url(#circglow)"/>
</svg>
