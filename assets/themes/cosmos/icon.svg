<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56" width="100%" height="100%">
  <defs>
    <linearGradient id="csbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C0020"/>
      <stop offset="100%" stop-color="#020008"/>
    </linearGradient>
    <radialGradient id="csnebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8020C0" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#5010A0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#300880" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="csplanet" cx="40%" cy="35%" r="55%" gradientUnits="objectBoundingBox"
                    x1="0.3" y1="0.2" x2="0.8" y2="0.9">
      <stop offset="0%" stop-color="#8858E8"/>
      <stop offset="100%" stop-color="#4020A8"/>
    </linearGradient>
    <linearGradient id="csring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C080FF" stop-opacity="0.2"/>
      <stop offset="40%" stop-color="#C080FF" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#C080FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C080FF" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="80" height="56" rx="6" fill="url(#csbg)"/>

  <!-- Nebula cloud -->
  <ellipse cx="40" cy="24" rx="28" ry="18" fill="url(#csnebula)"/>
  <ellipse cx="55" cy="18" rx="14" ry="10" fill="#6010A0" opacity="0.2"/>

  <!-- Stars -->
  <circle cx="8" cy="6" r="0.8" fill="white" opacity="0.9"/>
  <circle cx="16" cy="12" r="0.6" fill="#E0C0FF" opacity="0.8"/>
  <circle cx="72" cy="8" r="0.9" fill="white" opacity="0.9"/>
  <circle cx="65" cy="4" r="0.7" fill="#C0A0FF" opacity="0.7"/>
  <circle cx="12" cy="32" r="0.6" fill="white" opacity="0.6"/>
  <circle cx="74" cy="30" r="0.8" fill="#E0D0FF" opacity="0.8"/>
  <circle cx="60" cy="40" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="25" cy="8" r="0.5" fill="#B090FF" opacity="0.6"/>

  <!-- Star sparkle 1 -->
  <path d="M68,14 L69,17 L72,17 L69.6,18.8 L70.6,21.8 L68,20 L65.4,21.8 L66.4,18.8 L64,17 L67,17 Z"
        fill="#C880FF" opacity="0.8" transform="scale(0.45) translate(83,14)"/>

  <!-- Planet ring (behind planet) -->
  <ellipse cx="40" cy="26" rx="21" ry="5" fill="none"
           stroke="url(#csring)" stroke-width="2.5" opacity="0.6"
           transform="rotate(-18,40,26)"/>

  <!-- Planet body -->
  <circle cx="40" cy="26" r="11" fill="url(#csplanet)"/>
  <!-- Planet surface detail -->
  <path d="M32,20 Q40,23 48,20" stroke="#C080FF" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M30,26 Q40,30 50,26" stroke="#9060D0" stroke-width="0.8" fill="none" opacity="0.3"/>
  <ellipse cx="37" cy="22" rx="4" ry="2.5" fill="#A060E0" opacity="0.25"/>

  <!-- Planet ring (in front) -->
  <path d="M29,24.5 Q21,26 22,26 Q21,26 28,27.8" stroke="url(#csring)" stroke-width="2.5"
        fill="none" opacity="0.6" transform="rotate(-18,40,26)"/>

  <!-- Planet highlight -->
  <ellipse cx="36" cy="21" rx="4" ry="2.5" fill="white" opacity="0.12"/>

  <!-- Theme name -->
  <text x="40" y="52" font-family="Arial, sans-serif" font-size="8" font-weight="bold"
        fill="#B040F0" text-anchor="middle" dominant-baseline="middle">COSMOS</text>

  <!-- Gloss overlay -->
  <rect width="80" height="20" rx="6" fill="white" opacity="0.06"/>
  <rect x="0" y="0" width="80" height="8" rx="6" fill="white" opacity="0.07"/>
</svg>
