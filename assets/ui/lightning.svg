<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Bold yellow-gold bolt fill -->
    <linearGradient id="boltFill" x1="45%" y1="0%" x2="55%" y2="100%">
      <stop offset="0%"   stop-color="#FFFDE8"/>
      <stop offset="25%"  stop-color="#FFF040"/>
      <stop offset="60%"  stop-color="#FFD000"/>
      <stop offset="88%"  stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#FF9000"/>
    </linearGradient>
    <!-- Blue-white electric glow halo -->
    <radialGradient id="boltHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C0F8FF" stop-opacity="0.65"/>
      <stop offset="60%"  stop-color="#4080FF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0020CC" stop-opacity="0"/>
    </radialGradient>
    <!-- White core of bolt (bright strip) -->
    <linearGradient id="boltCore" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.80"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Blue electric glow filter -->
    <filter id="boltGlow" x="-45%" y="-25%" width="190%" height="150%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="boltShadow" x="-25%" y="-20%" width="165%" height="160%">
      <feDropShadow dx="3" dy="6" stdDeviation="6" flood-color="#003080" flood-opacity="0.50"/>
    </filter>
    <!-- Bloom -->
    <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Crackle glow -->
    <filter id="crackleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Ground shadow -->
    <radialGradient id="groundShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#0020AA" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0020AA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── GROUND GLOW ── -->
  <ellipse cx="55" cy="122" rx="38" ry="8" fill="url(#groundShadow)"/>

  <!-- ── ELECTRIC BLUE HALO ── -->
  <ellipse cx="60" cy="66" rx="52" ry="58" fill="url(#boltHalo)"/>

  <!-- Bolt path: upper half goes down-left, then jags right at mid point, continues down-left
       Main bolt: 80,6 → 50,62 → 70,62 → 38,122 → 76,52 → 56,52 → 86,6 → close -->
  <!-- ── GLOW PASS (cyan, behind main bolt) ── -->
  <path d="M 80,6 L 50,62 L 70,62 L 38,122 L 76,52 L 56,52 Z"
        fill="#A0F8FF" opacity="0.60" filter="url(#boltGlow)"/>

  <!-- ── MAIN BOLT BODY ── -->
  <path d="M 80,6 L 50,62 L 70,62 L 38,122 L 76,52 L 56,52 Z"
        fill="url(#boltFill)" stroke="#FFFFFF" stroke-width="1.2"
        stroke-linejoin="round" filter="url(#boltShadow)"/>

  <!-- ── WHITE CORE OVERLAY (left upper face for 3D lift) ── -->
  <path d="M 79,8 L 58,50 L 70,50 L 74,8 Z"
        fill="url(#boltCore)" filter="url(#bloom)"/>

  <!-- ── ELECTRIC CRACKLE BRANCHES ── -->
  <!-- Branch top-right -->
  <g stroke="#E0FFFF" stroke-linecap="round" filter="url(#crackleGlow)">
    <polyline points="75,14 84,8 90,14" stroke-width="1.8" fill="none" opacity="0.80"/>
    <polyline points="68,30 78,22 85,26" stroke-width="1.5" fill="none" opacity="0.65"/>
    <!-- Branch bottom-left -->
    <polyline points="44,108 35,116 30,110" stroke-width="1.8" fill="none" opacity="0.75"/>
    <polyline points="48,94 38,100 33,94" stroke-width="1.5" fill="none" opacity="0.60"/>
  </g>
  <!-- Secondary yellow crackles -->
  <g stroke="#FFEE00" stroke-linecap="round" filter="url(#crackleGlow)" opacity="0.55">
    <line x1="76" y1="18" x2="88" y2="10" stroke-width="1.2"/>
    <line x1="42" y1="112" x2="32" y2="118" stroke-width="1.2"/>
  </g>
</svg>
