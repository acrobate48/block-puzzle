<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Cup main gold: bright cream top → deep brown bottom -->
    <linearGradient id="cupGold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#FFF8C0"/>
      <stop offset="20%"  stop-color="#FFE040"/>
      <stop offset="50%"  stop-color="#D4A020"/>
      <stop offset="80%"  stop-color="#A06010"/>
      <stop offset="100%" stop-color="#6A3808"/>
    </linearGradient>
    <!-- Handle gold (lighter, side-lit) -->
    <linearGradient id="handleGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C88000"/>
      <stop offset="35%"  stop-color="#FFE040"/>
      <stop offset="65%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B07018"/>
    </linearGradient>
    <!-- Stem / base dark metal gold -->
    <linearGradient id="baseGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#CC8A00"/>
      <stop offset="50%"  stop-color="#886000"/>
      <stop offset="100%" stop-color="#4A2800"/>
    </linearGradient>
    <!-- Cup shine band -->
    <linearGradient id="cupShine" x1="20%" y1="0%" x2="20%" y2="55%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="55%"  stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Outer golden glow -->
    <filter id="trophyGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#FFAA00" flood-opacity="0.55"/>
    </filter>
    <!-- Drop shadow -->
    <filter id="trophyShadow" x="-25%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="3" dy="7" stdDeviation="6" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <!-- Bloom -->
    <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Specular soft -->
    <filter id="specSoft">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <!-- Ground shadow -->
    <radialGradient id="groundShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── GROUND SHADOW ── -->
  <ellipse cx="64" cy="124" rx="30" ry="6" fill="url(#groundShadow)"/>

  <!-- ── LEFT HANDLE ── -->
  <path d="M 34,28 Q 12,28 12,46 Q 12,62 34,62"
        stroke="url(#handleGold)" stroke-width="9" fill="none"
        stroke-linecap="round" filter="url(#trophyShadow)"/>
  <!-- Handle highlight -->
  <path d="M 34,28 Q 12,28 12,46 Q 12,62 34,62"
        stroke="#FFEE80" stroke-width="2.5" fill="none"
        stroke-linecap="round" opacity="0.45"/>

  <!-- ── RIGHT HANDLE ── -->
  <path d="M 94,28 Q 116,28 116,46 Q 116,62 94,62"
        stroke="url(#handleGold)" stroke-width="9" fill="none"
        stroke-linecap="round" filter="url(#trophyShadow)"/>
  <!-- Handle highlight -->
  <path d="M 94,28 Q 116,28 116,46 Q 116,62 94,62"
        stroke="#FFEE80" stroke-width="2.5" fill="none"
        stroke-linecap="round" opacity="0.45"/>

  <!-- ── CUP BODY ── -->
  <!-- Main trophy cup shape: wide top, narrows to stem -->
  <path d="M 28,14 L 100,14 Q 106,14 106,22 L 102,60 Q 98,82 64,86 Q 30,82 26,60 L 22,22 Q 22,14 28,14 Z"
        fill="url(#cupGold)" stroke="#7A4800" stroke-width="2"
        filter="url(#trophyGlow)"/>

  <!-- ── SHINE BAND ── -->
  <!-- Large diffuse shine -->
  <path d="M 30,16 L 60,16 Q 66,16 68,22 L 70,50 Q 68,58 56,60 Q 36,58 32,50 L 28,22 Q 28,16 30,16 Z"
        fill="url(#cupShine)"/>
  <!-- Hard specular line -->
  <line x1="38" y1="18" x2="44" y2="72" stroke="#FFFFFF" stroke-width="3"
        stroke-linecap="round" opacity="0.35" filter="url(#specSoft)"/>

  <!-- ── LAUREL WREATH DETAILS (left cluster) ── -->
  <g opacity="0.65">
    <!-- Left leaf cluster -->
    <ellipse cx="36" cy="52" rx="6" ry="4" fill="#C88000" transform="rotate(-40 36 52)"/>
    <ellipse cx="30" cy="58" rx="6" ry="4" fill="#C88000" transform="rotate(-55 30 58)"/>
    <ellipse cx="35" cy="65" rx="5" ry="3.5" fill="#B07000" transform="rotate(-30 35 65)"/>
    <!-- Right leaf cluster -->
    <ellipse cx="92" cy="52" rx="6" ry="4" fill="#C88000" transform="rotate(40 92 52)"/>
    <ellipse cx="98" cy="58" rx="6" ry="4" fill="#C88000" transform="rotate(55 98 58)"/>
    <ellipse cx="93" cy="65" rx="5" ry="3.5" fill="#B07000" transform="rotate(30 93 65)"/>
  </g>

  <!-- ── STAR ON CUP ── -->
  <polygon points="64,30 68.5,44 84,44 72,52.5 76.5,66.5 64,58 51.5,66.5 56,52.5 44,44 59.5,44"
           fill="#FFFCE0" opacity="0.80" filter="url(#bloom)"/>

  <!-- ── STEM ── -->
  <rect x="56" y="86" width="16" height="16" rx="3" fill="url(#baseGold)"
        stroke="#4A2800" stroke-width="1.5"/>
  <!-- Stem highlight -->
  <rect x="57" y="87" width="5" height="8" rx="2" fill="#FFFFFF" opacity="0.25"/>

  <!-- ── BASE PEDESTAL ── -->
  <rect x="36" y="102" width="56" height="14" rx="7"
        fill="url(#baseGold)" stroke="#3A1800" stroke-width="2"
        filter="url(#trophyShadow)"/>
  <!-- Pedestal shine -->
  <rect x="38" y="103" width="20" height="5" rx="2.5" fill="#FFFFFF" opacity="0.22"/>

  <!-- ── OVERALL GOLDEN AURA ── -->
  <path d="M 28,14 L 100,14 Q 106,14 106,22 L 102,60 Q 98,82 64,86 Q 30,82 26,60 L 22,22 Q 22,14 28,14 Z"
        fill="#FFD700" opacity="0.06" filter="url(#bloom)"/>
</svg>
