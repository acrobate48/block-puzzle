<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" opacity="0.85">
  <defs>
    <linearGradient id="plage-tronc-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a1887f"/>
      <stop offset="100%" stop-color="#5d4037"/>
    </linearGradient>
    <radialGradient id="plage-palme-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </radialGradient>
    <radialGradient id="plage-coquillage-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="60%" stop-color="#f06292"/>
      <stop offset="100%" stop-color="#c2185b"/>
    </radialGradient>
    <filter id="plage-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1a237e" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Tronc du palmier (courbe depuis coin bas-gauche vers haut-droite) -->
  <path d="M4,80 C6,68 10,58 16,48 C22,38 30,32 38,22 C42,16 44,10 46,4"
        fill="none" stroke="url(#plage-tronc-grad)" stroke-width="5"
        stroke-linecap="round" filter="url(#plage-shadow)"/>
  <!-- Texture du tronc (nœuds) -->
  <g stroke="#795548" stroke-width="1.5" stroke-linecap="round" fill="none">
    <path d="M8,70 C10,69 12,70 11,71"/>
    <path d="M12,62 C14,61 16,62 15,63"/>
    <path d="M18,52 C20,51 22,52 21,53"/>
    <path d="M24,44 C26,43 28,44 27,45"/>
    <path d="M30,36 C32,35 34,36 33,37"/>
    <path d="M36,28 C38,27 40,28 39,29"/>
  </g>

  <!-- Palme 1 (vers droite) -->
  <path d="M46,4 C52,2 62,4 70,2 C68,8 62,10 56,8 C62,12 66,16 68,22 C62,18 56,14 50,12 C52,18 52,24 50,28 C46,22 44,16 46,4Z"
        fill="url(#plage-palme-grad)" filter="url(#plage-shadow)"/>
  <!-- Nervure palme 1 -->
  <path d="M46,4 C56,8 64,14 68,22" fill="none" stroke="#1b5e20" stroke-width="0.8"/>

  <!-- Palme 2 (vers haut-gauche) -->
  <path d="M46,4 C40,0 30,0 20,2 C24,6 30,8 36,6 C30,10 26,14 26,20 C30,16 36,12 40,10 C38,16 38,22 40,26 C44,20 46,12 46,4Z"
        fill="#4caf50" filter="url(#plage-shadow)"/>
  <!-- Nervure palme 2 -->
  <path d="M46,4 C38,8 32,14 26,20" fill="none" stroke="#1b5e20" stroke-width="0.8"/>

  <!-- Palme 3 (vers le bas-droite, retombante) -->
  <path d="M46,4 C52,10 56,18 60,28 C54,26 50,20 48,14 C54,22 58,32 58,40 C52,36 48,28 46,20 C44,28 44,34 42,40 C40,34 40,24 46,4Z"
        fill="#388e3c" filter="url(#plage-shadow)"/>

  <!-- Noix de coco (2 petites) -->
  <g filter="url(#plage-shadow)">
    <circle cx="44" cy="10" r="4" fill="#5d4037"/>
    <circle cx="50" cy="8" r="3.5" fill="#4e342e"/>
    <line x1="44" y1="6" x2="44" y2="14" stroke="#3e2723" stroke-width="0.8"/>
    <line x1="40" y1="10" x2="48" y2="10" stroke="#3e2723" stroke-width="0.8"/>
  </g>

  <!-- Vague sinusoïdale en bas -->
  <path d="M0,72 Q10,66 20,72 Q30,78 40,72 Q50,66 60,72 Q70,78 80,72 L80,80 L0,80Z"
        fill="#29b6f6" filter="url(#plage-shadow)" opacity="0.75"/>
  <!-- Crête de vague -->
  <path d="M0,72 Q10,66 20,72 Q30,78 40,72 Q50,66 60,72 Q70,78 80,72"
        fill="none" stroke="#b3e5fc" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Coquillage -->
  <g transform="translate(64, 58)" filter="url(#plage-shadow)">
    <!-- Corps spiralé du coquillage -->
    <path d="M0,0 C-4,-4 -8,-2 -8,2 C-8,8 -4,12 0,12 C6,12 10,8 10,2 C10,-4 6,-8 0,-8 C-6,-8 -10,-4 -10,2"
          fill="url(#plage-coquillage-grad)" stroke="#c2185b" stroke-width="0.8"/>
    <!-- Spirale centrale -->
    <path d="M0,2 C-2,0 -2,4 0,4 C2,4 2,0 0,2"
          fill="#fce4ec"/>
    <!-- Stries -->
    <path d="M-8,2 C-5,0 -2,-2 0,-4" fill="none" stroke="#f8bbd9" stroke-width="0.6"/>
    <path d="M-6,6 C-3,4 0,2 2,-2" fill="none" stroke="#f8bbd9" stroke-width="0.6"/>
    <path d="M-2,10 C2,8 6,4 8,0" fill="none" stroke="#f8bbd9" stroke-width="0.6"/>
  </g>
</svg>
