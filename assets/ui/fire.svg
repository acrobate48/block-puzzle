<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Outer glow -->
    <filter id="fire-glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Outer flame gradient: orange-red -->
    <linearGradient id="flame-outer" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#FF2200"/>
      <stop offset="45%"  stop-color="#FF6600"/>
      <stop offset="100%" stop-color="#FF9900"/>
    </linearGradient>
    <!-- Mid flame: orange-yellow -->
    <linearGradient id="flame-mid" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#FF8800"/>
      <stop offset="50%"  stop-color="#FFCC00"/>
      <stop offset="100%" stop-color="#FFE44A"/>
    </linearGradient>
    <!-- Inner core: bright yellow-white -->
    <radialGradient id="flame-core" cx="50%" cy="80%" r="55%">
      <stop offset="0%"   stop-color="#FFFDE0"/>
      <stop offset="50%"  stop-color="#FFE040"/>
      <stop offset="100%" stop-color="#FF9900" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Glow halo ── -->
  <path d="M 32,60 C 18,58 8,48 8,38 C 8,26 16,20 18,14 C 20,8 18,3 18,3
           C 22,7 23,12 22,16 C 26,10 28,5 32,2
           C 32,8 30,14 32,18 C 34,12 38,8 42,4
           C 40,10 38,16 40,21 C 42,15 46,11 50,10
           C 48,16 46,22 46,28 C 50,22 54,20 56,22
           C 56,30 52,36 52,42 C 52,52 44,58 32,60 Z"
        fill="#FF5500" opacity="0.4" filter="url(#fire-glow)"/>

  <!-- ── Outer flame ── -->
  <path d="M 32,60 C 18,58 8,48 8,38 C 8,26 16,20 18,14 C 20,8 18,3 18,3
           C 22,7 23,12 22,16 C 26,10 28,5 32,2
           C 32,8 30,14 32,18 C 34,12 38,8 42,4
           C 40,10 38,16 40,21 C 42,15 46,11 50,10
           C 48,16 46,22 46,28 C 50,22 54,20 56,22
           C 56,30 52,36 52,42 C 52,52 44,58 32,60 Z"
        fill="url(#flame-outer)"/>

  <!-- ── Mid flame ── -->
  <path d="M 32,58 C 22,56 14,48 14,40 C 14,32 19,26 20,20 C 22,14 21,10 21,10
           C 24,14 25,19 24,23 C 27,17 29,12 32,9
           C 32,14 31,19 33,23 C 35,17 38,13 41,10
           C 39,16 38,22 39,27 C 42,22 45,20 47,21
           C 46,28 44,33 44,38 C 44,50 40,56 32,58 Z"
        fill="url(#flame-mid)"/>

  <!-- ── Inner core ── -->
  <path d="M 32,56 C 24,54 20,48 20,42 C 20,36 24,32 25,27 C 27,22 26,18 26,18
           C 28,21 29,25 28,28 C 30,23 31,19 32,17
           C 32,21 32,26 33,29 C 35,24 37,21 39,19
           C 38,23 37,28 38,32 C 40,27 42,25 43,26
           C 43,32 41,37 41,41 C 41,50 38,55 32,56 Z"
        fill="url(#flame-core)" opacity="0.9"/>
</svg>
