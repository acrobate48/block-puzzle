<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1200"/>
      <stop offset="100%" stop-color="#0f0800"/>
    </radialGradient>
    <radialGradient id="flame2a" cx="50%" cy="80%" r="70%">
      <stop offset="0%" stop-color="#FFE050"/>
      <stop offset="40%" stop-color="#FF8020"/>
      <stop offset="100%" stop-color="#CC3000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flame2b" cx="50%" cy="80%" r="70%">
      <stop offset="0%" stop-color="#FFD030"/>
      <stop offset="50%" stop-color="#FF6010"/>
      <stop offset="100%" stop-color="#AA2000" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FF8020" flood-opacity="0.7"/>
    </filter>
    <filter id="flameglow2">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#FF8020" flood-opacity="0.8"/>
    </filter>
  </defs>
  <!-- Hexagonal background -->
  <polygon points="40,4 73,22 73,58 40,76 7,58 7,22" fill="url(#bg2)" filter="url(#shadow2)"/>
  <!-- Triple flames -->
  <!-- Left flame -->
  <path d="M24 58 Q21 48 26 42 Q24 38 28 34 Q27 40 30 38 Q29 44 32 46 Q30 52 32 58 Z" fill="url(#flame2b)" filter="url(#flameglow2)" opacity="0.85"/>
  <!-- Right flame -->
  <path d="M56 58 Q59 48 54 42 Q56 38 52 34 Q53 40 50 38 Q51 44 48 46 Q50 52 48 58 Z" fill="url(#flame2b)" filter="url(#flameglow2)" opacity="0.85"/>
  <!-- Center main flame -->
  <path d="M40 60 Q33 50 36 40 Q33 33 38 26 Q37 34 42 30 Q40 38 44 36 Q43 44 46 42 Q44 52 47 58 Q44 62 40 60 Z" fill="url(#flame2a)" filter="url(#flameglow2)"/>
  <!-- Inner bright core center -->
  <path d="M40 56 Q37 50 39 44 Q41 48 42 44 Q43 50 40 56 Z" fill="#FFFAAA" opacity="0.9"/>
  <!-- x3 text -->
  <text x="40" y="44" font-family="Arial Black, Arial, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" filter="url(#flameglow2)">×3</text>
  <!-- Label -->
  <text x="40" y="72" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#ffaa60" text-anchor="middle" letter-spacing="0.5">COMBO ×3</text>
  <!-- Hex border -->
  <polygon points="40,4 73,22 73,58 40,76 7,58 7,22" fill="none" stroke="#FF8020" stroke-width="1.5" opacity="0.9"/>
  <polygon points="40,5.5 71.5,23 71.5,57 40,74.5 8.5,57 8.5,23" fill="none" stroke="#FFB060" stroke-width="0.5" opacity="0.4"/>
</svg>
