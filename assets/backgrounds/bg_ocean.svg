    <circle cx="2200" cy="940" r="3" fill="#A0F0FF" opacity="0.75"/>
    <circle cx="2440" cy="1140" r="4" fill="#50C8F0" opacity="0.85"/>
    <circle cx="2700" cy="860" r="3" fill="#50C8F0" opacity="0.8"/>
    <circle cx="2960" cy="1200" r="5" fill="#50C8F0" opacity="0.9"/>
    <circle cx="3220" cy="990" r="3" fill="#A0F0FF" opacity="0.75"/>
    <circle cx="3460" cy="1110" r="4" fill="#50C8F0" opacity="0.85"/>
    <circle cx="310" cy="1380" r="3" fill="#28AAA0" opacity="0.72"/>
    <circle cx="580" cy="1540" r="4" fill="#50C8F0" opacity="0.78"/>
    <circle cx="860" cy="1460" r="3" fill="#A0F0FF" opacity="0.68"/>
    <circle cx="1140" cy="1550" r="4" fill="#50C8F0" opacity="0.75"/>
    <circle cx="1480" cy="1400" r="3" fill="#28AAA0" opacity="0.7"/>
    <circle cx="1760" cy="1620" r="4" fill="#50C8F0" opacity="0.75"/>
    <circle cx="2040" cy="1480" r="3" fill="#A0F0FF" opacity="0.68"/>
    <circle cx="2320" cy="1580" r="4" fill="#50C8F0" opacity="0.78"/>
    <circle cx="2600" cy="1440" r="3" fill="#28AAA0" opacity="0.7"/>
    <circle cx="2880" cy="1560" r="4" fill="#50C8F0" opacity="0.75"/>
    <circle cx="3160" cy="1480" r="3" fill="#A0F0FF" opacity="0.68"/>
    <circle cx="3440" cy="1560" r="4" fill="#50C8F0" opacity="0.78"/>
    <circle cx="460" cy="680" r="3" fill="#A0F0FF" opacity="0.6"/>
    <circle cx="760" cy="620" r="2" fill="#50C8F0" opacity="0.55"/>
    <circle cx="1100" cy="660" r="3" fill="#A0F0FF" opacity="0.58"/>
    <circle cx="1500" cy="640" r="2" fill="#50C8F0" opacity="0.55"/>
    <circle cx="1900" cy="655" r="3" fill="#A0F0FF" opacity="0.58"/>
    <circle cx="2300" cy="635" r="2" fill="#50C8F0" opacity="0.55"/>
    <circle cx="2700" cy="648" r="3" fill="#A0F0FF" opacity="0.58"/>
    <circle cx="3100" cy="638" r="2" fill="#50C8F0" opacity="0.55"/>
    <circle cx="3500" cy="658" r="3" fill="#A0F0FF" opacity="0.58"/>
    <circle cx="580" cy="1780" r="4" fill="#28AAA0" opacity="0.52"/>
    <circle cx="1180" cy="1800" r="4" fill="#50C8F0" opacity="0.48"/>
    <circle cx="1780" cy="1790" r="4" fill="#28AAA0" opacity="0.52"/>
    <circle cx="2380" cy="1770" r="4" fill="#50C8F0" opacity="0.48"/>
    <circle cx="2980" cy="1780" r="4" fill="#28AAA0" opacity="0.52"/>
    <circle cx="3580" cy="1760" r="4" fill="#50C8F0" opacity="0.48"/>
  </g>
  <!-- Teal particles -->
  <g filter="url(#glowTeal)">
    <circle cx="520" cy="1100" r="3" fill="#28AAA0" opacity="0.82"/>
    <circle cx="1020" cy="1200" r="4" fill="#50C8F0" opacity="0.78"/>
    <circle cx="1620" cy="1050" r="3" fill="#28AAA0" opacity="0.85"/>
    <circle cx="2120" cy="1180" r="4" fill="#50C8F0" opacity="0.78"/>
    <circle cx="2720" cy="1080" r="3" fill="#28AAA0" opacity="0.82"/>
    <circle cx="3220" cy="1220" r="4" fill="#50C8F0" opacity="0.78"/>
    <circle cx="760" cy="1350" r="3" fill="#28AAA0" opacity="0.72"/>
    <circle cx="1460" cy="1420" r="4" fill="#50C8F0" opacity="0.68"/>
    <circle cx="2160" cy="1380" r="3" fill="#28AAA0" opacity="0.75"/>
    <circle cx="2860" cy="1450" r="4" fill="#50C8F0" opacity="0.72"/>
    <circle cx="3460" cy="1400" r="3" fill="#28AAA0" opacity="0.68"/>
