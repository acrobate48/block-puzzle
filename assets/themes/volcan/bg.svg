<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 3840 2160" width="100%" height="100%"
     preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="vAtm1" cx="50%" cy="85%" r="65%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F08020" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#A83C0C" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#180402" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vAtm2" cx="50%" cy="95%" r="50%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F03810" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#901804" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#100302" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vAtm3" cx="35%" cy="75%" r="40%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A04828" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#180402" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vLavaCrater" cx="50%" cy="100%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB060" stop-opacity="0.9"/>
      <stop offset="25%" stop-color="#F08020" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#A83C0C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#180402" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vMagmaCore" cx="50%" cy="100%" r="35%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB060" stop-opacity="1"/>
      <stop offset="40%" stop-color="#F08020" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#901804" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vVignette" cx="50%" cy="50%" r="72%" gradientUnits="userSpaceOnUse">
      <stop offset="30%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.92"/>
    </radialGradient>
    <radialGradient id="vSpecular" cx="22%" cy="6%" r="28%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB060" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#180402" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#100302"/>
      <stop offset="25%" stop-color="#180402"/>
      <stop offset="55%" stop-color="#240804"/>
      <stop offset="80%" stop-color="#A83C0C"/>
      <stop offset="100%" stop-color="#F08020"/>
    </linearGradient>
    <linearGradient id="vRock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A0A04"/>
      <stop offset="100%" stop-color="#180402"/>
    </linearGradient>
    <linearGradient id="vMagmaVein" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F08020" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FFB060" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F08020" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="b2"/>
      <feColorMatrix in="b1" type="matrix"
        values="0 0 0 0 0.94  0 0 0 0 0.50  0 0 0 0 0.13  0 0 0 2.2 0" result="c1"/>
      <feColorMatrix in="b2" type="matrix"
        values="0 0 0 0 0.94  0 0 0 0 0.50  0 0 0 0 0.13  0 0 0 0.9 0" result="c2"/>
      <feMerge><feMergeNode in="c2"/><feMergeNode in="c1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b1"/>
      <feColorMatrix in="b1" type="matrix"
        values="0 0 0 0 0.94  0 0 0 0 0.22  0 0 0 0 0.06  0 0 0 2.5 0" result="c1"/>
      <feMerge><feMergeNode in="c1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#100302" flood-opacity="0.95"/>
    </filter>
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="gn"/>
      <feBlend in="SourceGraphic" in2="gn" mode="overlay" result="bl"/>
      <feComposite in="bl" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="blur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="blurHeavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blurMid" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="heatDistort">
      <feTurbulence type="turbulence" baseFrequency="0.009 0.005" numOctaves="4" seed="6" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="35" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="rockTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.4 0.2" numOctaves="5" seed="9" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0.2 0 0 0 0.2  0 0.1 0 0 0.05  0 0 0.05 0 0.02  0 0 0 0.5 0" result="colored"/>
      <feBlend in="SourceGraphic" in2="colored" mode="multiply"/>
    </filter>
  </defs>

  <!-- LAYER 1: Volcanic sky base -->
  <rect width="3840" height="2160" fill="url(#vSky)"/>

  <!-- LAYER 2: Lava glow from below -->
  <rect width="3840" height="2160" fill="url(#vAtm1)" filter="url(#blurHeavy)" opacity="0.9"/>
  <rect width="3840" height="2160" fill="url(#vAtm2)" filter="url(#blurMid)" opacity="0.75"/>
  <rect width="3840" height="2160" fill="url(#vAtm3)" filter="url(#blurMid)" opacity="0.6"/>
  <rect width="3840" height="2160" fill="url(#vLavaCrater)" filter="url(#blurHeavy)" opacity="0.7"/>

  <!-- LAYER 3: Rock formations (background) -->
  <g filter="url(#blurHeavy)" opacity="0.65">
    <path d="M0,1400 Q300,1100 600,1350 Q900,1600 1200,1300 Q1500,1000 1800,1200 Q2100,1400 2400,1100 Q2700,800 3000,1050 Q3300,1300 3840,1150 L3840,2160 L0,2160 Z" fill="#1C0604"/>
    <path d="M0,1600 Q400,1350 800,1500 Q1200,1650 1600,1420 Q2000,1190 2400,1380 Q2800,1570 3200,1400 Q3520,1260 3840,1380 L3840,2160 L0,2160 Z" fill="#240804"/>
  </g>

  <!-- LAYER 4: Rock crosshatch texture overlay -->
  <g opacity="0.3" filter="url(#blur)" stroke-linecap="round">
    <!-- Rock crack/crosshatch lines in rock formations -->
    <line x1="200" y1="1650" x2="480" y2="1900" stroke="#3C1008" stroke-width="2"/>
    <line x1="480" y1="1650" x2="200" y2="1900" stroke="#3C1008" stroke-width="2"/>
    <line x1="650" y1="1580" x2="930" y2="1830" stroke="#3C1008" stroke-width="2"/>
    <line x1="930" y1="1580" x2="650" y2="1830" stroke="#3C1008" stroke-width="2"/>
    <line x1="1100" y1="1520" x2="1380" y2="1770" stroke="#3C1008" stroke-width="2"/>
    <line x1="1380" y1="1520" x2="1100" y2="1770" stroke="#3C1008" stroke-width="2"/>
    <line x1="1600" y1="1550" x2="1880" y2="1800" stroke="#3C1008" stroke-width="2"/>
    <line x1="1880" y1="1550" x2="1600" y2="1800" stroke="#3C1008" stroke-width="2"/>
    <line x1="2100" y1="1500" x2="2380" y2="1750" stroke="#3C1008" stroke-width="2"/>
    <line x1="2380" y1="1500" x2="2100" y2="1750" stroke="#3C1008" stroke-width="2"/>
    <line x1="2600" y1="1560" x2="2880" y2="1810" stroke="#3C1008" stroke-width="2"/>
    <line x1="2880" y1="1560" x2="2600" y2="1810" stroke="#3C1008" stroke-width="2"/>
    <line x1="3050" y1="1520" x2="3330" y2="1770" stroke="#3C1008" stroke-width="2"/>
    <line x1="3330" y1="1520" x2="3050" y2="1770" stroke="#3C1008" stroke-width="2"/>
    <line x1="3500" y1="1580" x2="3780" y2="1830" stroke="#3C1008" stroke-width="2"/>
    <line x1="3780" y1="1580" x2="3500" y2="1830" stroke="#3C1008" stroke-width="2"/>
    <!-- Diagonal cracks -->
    <path d="M400,1700 Q420,1750 390,1800 Q360,1850 380,1920" stroke="#5C1808" stroke-width="2.5" fill="none"/>
    <path d="M900,1630 Q930,1690 910,1760 Q890,1830 920,1900" stroke="#5C1808" stroke-width="2.5" fill="none"/>
    <path d="M1500,1660 Q1520,1720 1490,1800 Q1460,1880 1480,1960" stroke="#5C1808" stroke-width="2.5" fill="none"/>
    <path d="M2200,1580 Q2230,1650 2200,1740 Q2170,1830 2200,1920" stroke="#5C1808" stroke-width="2.5" fill="none"/>
    <path d="M2800,1640 Q2820,1700 2800,1780 Q2780,1860 2810,1940" stroke="#5C1808" stroke-width="2.5" fill="none"/>
    <path d="M3400,1660 Q3420,1730 3390,1820 Q3360,1910 3390,1990" stroke="#5C1808" stroke-width="2.5" fill="none"/>
  </g>

  <!-- LAYER 5: Magma vein network glowing in rock -->
  <g filter="url(#glow)">
    <path d="M0,1800 Q300,1750 600,1820 Q900,1890 1200,1830 Q1500,1770 1800,1850 Q2100,1930 2400,1870 Q2700,1810 3000,1880 Q3300,1950 3840,1900" stroke="url(#vMagmaVein)" stroke-width="5" fill="none" opacity="0.85"/>
    <path d="M0,1900 Q400,1840 800,1910 Q1200,1980 1600,1920 Q2000,1860 2400,1940 Q2800,2020 3200,1960 Q3600,1900 3840,1970" stroke="#F08020" stroke-width="4" fill="none" opacity="0.75"/>
    <path d="M200,1750 Q350,1720 500,1780 Q650,1840 800,1790" stroke="#FFB060" stroke-width="3" fill="none" opacity="0.8"/>
    <path d="M1100,1700 Q1250,1660 1400,1720 Q1550,1780 1700,1730" stroke="#FFB060" stroke-width="3" fill="none" opacity="0.8"/>
    <path d="M1900,1720 Q2050,1680 2200,1740 Q2350,1800 2500,1750" stroke="#FFB060" stroke-width="3" fill="none" opacity="0.8"/>
    <path d="M2700,1700 Q2850,1660 3000,1720 Q3150,1780 3300,1730" stroke="#FFB060" stroke-width="3" fill="none" opacity="0.8"/>
    <path d="M3500,1720 Q3620,1680 3840,1760" stroke="#FFB060" stroke-width="3" fill="none" opacity="0.75"/>
    <!-- Branch veins -->
    <path d="M600,1820 Q580,1780 560,1750 Q540,1720 510,1700" stroke="#F03810" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M1200,1830 Q1180,1790 1160,1760 Q1140,1730 1110,1710" stroke="#F03810" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M1800,1850 Q1820,1810 1840,1775 Q1860,1740 1900,1720" stroke="#F03810" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M2400,1870 Q2380,1830 2360,1800 Q2340,1770 2310,1745" stroke="#F03810" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M3000,1880 Q3020,1840 3040,1805 Q3060,1770 3100,1750" stroke="#F03810" stroke-width="2" fill="none" opacity="0.7"/>
  </g>

  <!-- LAYER 6: Smoke/dark overlay at top -->
  <rect x="0" y="0" width="3840" height="700" fill="#100302" opacity="0.8" filter="url(#blurHeavy)"/>
  <rect x="0" y="0" width="3840" height="400" fill="#0A0201" opacity="0.9"/>
  <g filter="url(#blurHeavy)" opacity="0.6">
    <ellipse cx="600" cy="400" rx="700" ry="400" fill="#180402"/>
    <ellipse cx="1500" cy="350" rx="800" ry="380" fill="#240804"/>
    <ellipse cx="2400" cy="420" rx="750" ry="390" fill="#180402"/>
    <ellipse cx="3300" cy="380" rx="720" ry="370" fill="#240804"/>
    <ellipse cx="1000" cy="300" rx="600" ry="350" fill="#100302"/>
    <ellipse cx="2000" cy="280" rx="650" ry="360" fill="#180402"/>
    <ellipse cx="3000" cy="320" rx="630" ry="355" fill="#100302"/>
  </g>

  <!-- LAYER 7: Heat distortion on magma zone -->
  <rect x="0" y="1600" width="3840" height="560" fill="#F08020" opacity="0.04" filter="url(#heatDistort)"/>

  <!-- LAYER 8: Ember particle field (rising) 50+ -->
  <g filter="url(#glow)">
    <circle cx="400" cy="1600" r="4" fill="#F08020" opacity="0.9"/>
    <circle cx="620" cy="1450" r="3" fill="#FFB060" opacity="0.85"/>
    <circle cx="850" cy="1300" r="5" fill="#F08020" opacity="0.92"/>
    <circle cx="1080" cy="1180" r="3" fill="#FFB060" opacity="0.8"/>
    <circle cx="1300" cy="1060" r="4" fill="#F08020" opacity="0.88"/>
    <circle cx="1550" cy="940" r="2" fill="#FFB060" opacity="0.75"/>
    <circle cx="1780" cy="820" r="3" fill="#F08020" opacity="0.82"/>
    <circle cx="2010" cy="700" r="4" fill="#FFB060" opacity="0.78"/>
    <circle cx="500" cy="1200" r="3" fill="#F03810" opacity="0.78"/>
    <circle cx="750" cy="1050" r="4" fill="#F08020" opacity="0.82"/>
    <circle cx="980" cy="900" r="2" fill="#FFB060" opacity="0.72"/>
    <circle cx="1220" cy="760" r="3" fill="#F08020" opacity="0.78"/>
    <circle cx="330" cy="1400" r="4" fill="#FFB060" opacity="0.85"/>
    <circle cx="700" cy="1200" r="3" fill="#F03810" opacity="0.75"/>
    <circle cx="960" cy="1050" r="5" fill="#F08020" opacity="0.88"/>
    <circle cx="1180" cy="900" r="3" fill="#FFB060" opacity="0.78"/>
    <circle cx="1480" cy="1500" r="4" fill="#F08020" opacity="0.88"/>
    <circle cx="1720" cy="1350" r="3" fill="#FFB060" opacity="0.82"/>
    <circle cx="1960" cy="1200" r="5" fill="#F08020" opacity="0.9"/>
    <circle cx="2200" cy="1080" r="3" fill="#FFB060" opacity="0.78"/>
    <circle cx="2420" cy="960" r="4" fill="#F08020" opacity="0.85"/>
    <circle cx="2660" cy="840" r="2" fill="#FFB060" opacity="0.72"/>
    <circle cx="2880" cy="720" r="3" fill="#F08020" opacity="0.78"/>
    <circle cx="1580" cy="1250" r="3" fill="#F03810" opacity="0.75"/>
    <circle cx="1820" cy="1100" r="4" fill="#F08020" opacity="0.82"/>
    <circle cx="2050" cy="950" r="2" fill="#FFB060" opacity="0.7"/>
    <circle cx="2280" cy="800" r="3" fill="#F08020" opacity="0.75"/>
    <circle cx="2480" cy="1500" r="4" fill="#F08020" opacity="0.88"/>
    <circle cx="2720" cy="1350" r="3" fill="#FFB060" opacity="0.82"/>
    <circle cx="2960" cy="1200" r="5" fill="#F08020" opacity="0.9"/>
    <circle cx="3180" cy="1080" r="3" fill="#FFB060" opacity="0.78"/>
    <circle cx="3400" cy="1600" r="4" fill="#F08020" opacity="0.88"/>
    <circle cx="3620" cy="1420" r="3" fill="#FFB060" opacity="0.82"/>
    <circle cx="3200" cy="1450" r="5" fill="#F08020" opacity="0.9"/>
    <circle cx="3450" cy="1300" r="3" fill="#FFB060" opacity="0.78"/>
    <circle cx="2600" cy="600" r="3" fill="#FFB060" opacity="0.65"/>
    <circle cx="3000" cy="550" r="2" fill="#F08020" opacity="0.6"/>
    <circle cx="3400" cy="580" r="3" fill="#FFB060" opacity="0.65"/>
    <circle cx="200" cy="700" r="2" fill="#F08020" opacity="0.58"/>
    <circle cx="600" cy="650" r="3" fill="#FFB060" opacity="0.62"/>
    <circle cx="1100" cy="620" r="2" fill="#F08020" opacity="0.58"/>
    <circle cx="1600" cy="640" r="2" fill="#FFB060" opacity="0.6"/>
    <circle cx="2100" cy="620" r="3" fill="#F08020" opacity="0.62"/>
  </g>

  <!-- LAYER 9: Lava bottom glow -->
  <rect width="3840" height="2160" fill="url(#vMagmaCore)" filter="url(#blurHeavy)" opacity="0.8"/>
  <rect x="0" y="1950" width="3840" height="210" fill="#F08020" opacity="0.55" filter="url(#blurMid)"/>
  <rect x="0" y="2050" width="3840" height="110" fill="#FFB060" opacity="0.45" filter="url(#blur)"/>

  <!-- Specular from top (very dim — dominated by bottom lava light) -->
  <ellipse cx="850" cy="160" rx="700" ry="250" fill="url(#vSpecular)" filter="url(#blurHeavy)" opacity="0.5"/>

  <!-- Rock texture overlay on mid ground -->
  <rect x="0" y="1350" width="3840" height="810" fill="#240804" opacity="0.04" filter="url(#rockTexture)"/>

  <!-- LAYER 10: Foreground vignette -->
  <rect width="3840" height="2160" fill="url(#vVignette)"/>

  <!-- Rock noise texture -->
  <rect width="3840" height="2160" fill="#A83C0C" opacity="0.03" filter="url(#noise)"/>
</svg>
