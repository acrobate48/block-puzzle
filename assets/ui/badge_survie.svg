<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 60" width="160" height="60">
  <defs>
    <linearGradient id="bg_survie" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2010"/>
      <stop offset="100%" stop-color="#184028"/>
    </linearGradient>
    <linearGradient id="icon_survie" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#90F0A0"/>
      <stop offset="100%" stop-color="#40A850"/>
    </linearGradient>
    <filter id="shadow_survie" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#60D080" flood-opacity="0.5"/>
    </filter>
    <filter id="glow_survie">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#60D080" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Badge pill background -->
  <rect x="1" y="1" width="158" height="58" rx="28" ry="28"
        fill="url(#bg_survie)"
        stroke="#60D080" stroke-width="1.5"
        filter="url(#shadow_survie)"/>

  <!-- Inner subtle highlight border -->
  <rect x="2.5" y="2.5" width="155" height="55" rx="27" ry="27"
        fill="none" stroke="#60D080" stroke-width="0.4" stroke-opacity="0.3"/>

  <!-- Shield icon (left, centered) -->
  <g transform="translate(30,30)" filter="url(#glow_survie)">
    <!-- Shield path -->
    <path d="M0,-13 L11,-8 L11,2 Q11,10 0,14 Q-11,10 -11,2 L-11,-8 Z"
          fill="url(#icon_survie)" stroke="#60D080" stroke-width="1"/>
    <!-- Star inside shield -->
    <text x="0" y="5" text-anchor="middle" font-size="10" fill="#0A2010" font-weight="bold">★</text>
  </g>

  <!-- Separator line -->
  <line x1="52" y1="12" x2="52" y2="48" stroke="#60D080" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- Mode name -->
  <text x="88" y="27" text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif" font-weight="900"
        font-size="15" fill="#60D080" letter-spacing="2">SURVIE</text>

  <!-- Subtitle -->
  <text x="88" y="41" text-anchor="middle"
        font-family="Arial, sans-serif" font-weight="400"
        font-size="9" fill="#60D080" fill-opacity="0.7" letter-spacing="1">Score libre</text>

  <!-- Light burst top-left -->
  <ellipse cx="18" cy="11" rx="7" ry="4" fill="#60D080" fill-opacity="0.18" transform="rotate(-30,18,11)"/>
  <ellipse cx="18" cy="11" rx="3" ry="1.5" fill="#FFFFFF" fill-opacity="0.25" transform="rotate(-30,18,11)"/>
</svg>
