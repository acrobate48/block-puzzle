<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Photorealistic sphere: bright highlight top-left → pitch black bottom-right -->
    <radialGradient id="bombBody" cx="33%" cy="28%" r="70%" fx="33%" fy="28%">
      <stop offset="0%"   stop-color="#AAAAAA"/>
      <stop offset="12%"  stop-color="#888888"/>
      <stop offset="35%"  stop-color="#444444"/>
      <stop offset="65%"  stop-color="#1C1C1C"/>
      <stop offset="88%"  stop-color="#080808"/>
      <stop offset="100%" stop-color="#020202"/>
    </radialGradient>
    <!-- Secondary mid-sphere ambient -->
    <radialGradient id="bombAmbient" cx="65%" cy="70%" r="50%">
      <stop offset="0%"  stop-color="#2A2A3A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Specular bright spot -->
    <radialGradient id="bombSpec" cx="28%" cy="22%" r="45%" fx="25%" fy="20%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Metal cap at fuse base -->
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#D0D0D0"/>
      <stop offset="40%"  stop-color="#888888"/>
      <stop offset="80%"  stop-color="#444444"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <!-- Ground shadow -->
    <radialGradient id="groundShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="bombShadow" x="-25%" y="-25%" width="170%" height="170%">
      <feDropShadow dx="4" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity="0.75"/>
    </filter>
    <!-- Bloom filter -->
    <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Spark glow -->
    <filter id="sparkGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft blur for specular and shadow -->
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <!-- Faint metallic noise -->
    <filter id="metalNoise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" result="noise" seed="8"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <!-- Spark radial -->
    <radialGradient id="sparkCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="30%"  stop-color="#FFEE80"/>
      <stop offset="70%"  stop-color="#FF8800"/>
      <stop offset="100%" stop-color="#FF4400" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── GROUND SHADOW ELLIPSE ── -->
  <ellipse cx="70" cy="116" rx="36" ry="8" fill="url(#groundShadow)"/>

  <!-- ── BOMB SPHERE (main body) ── -->
  <circle cx="62" cy="73" r="48" fill="url(#bombBody)" filter="url(#bombShadow)"/>

  <!-- Metallic surface noise overlay -->
  <circle cx="62" cy="73" r="48" fill="url(#bombBody)" filter="url(#metalNoise)" opacity="0.12"/>

  <!-- Ambient color on bottom-right -->
  <circle cx="62" cy="73" r="48" fill="url(#bombAmbient)"/>

  <!-- Dark metallic rim -->
  <circle cx="62" cy="73" r="48" fill="none" stroke="#030303" stroke-width="3"/>
  <!-- Subtle inner rim highlight -->
  <circle cx="62" cy="73" r="47" fill="none" stroke="#444444" stroke-width="0.8" opacity="0.3"/>

  <!-- Equatorial reflection band -->
  <ellipse cx="62" cy="73" rx="47" ry="22" fill="none" stroke="#555555"
           stroke-width="1.2" opacity="0.25" transform="rotate(-22 62 73)"/>

  <!-- ── SPECULAR HIGHLIGHT (top-left) ── -->
  <ellipse cx="45" cy="53" rx="18" ry="12" fill="url(#bombSpec)"
           filter="url(#softBlur)" transform="rotate(-15 45 53)"/>
  <!-- Hard glint -->
  <ellipse cx="41" cy="49" rx="6" ry="4" fill="#FFFFFF" opacity="0.65"/>

  <!-- ── FUSE ROPE ── -->
  <!-- Shadow of rope -->
  <path d="M 68 27 C 74 20, 84 16, 82 8 C 80 2, 90 -2, 94 6"
        fill="none" stroke="#3A2008" stroke-width="5" stroke-linecap="round"
        opacity="0.4" transform="translate(2,3)"/>
  <!-- Main rope -->
  <path d="M 68 27 C 74 20, 84 16, 82 8 C 80 2, 90 -2, 94 6"
        fill="none" stroke="#7B4F12" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Rope highlight filament -->
  <path d="M 68 27 C 74 20, 84 16, 82 8 C 80 2, 90 -2, 94 6"
        fill="none" stroke="#C07828" stroke-width="1.5"
        stroke-linecap="round" stroke-dasharray="3.5,5" opacity="0.55"/>

  <!-- ── METAL CAP (fuse base) ── -->
  <circle cx="67" cy="28" r="7" fill="url(#capGrad)"/>
  <circle cx="67" cy="28" r="7" fill="none" stroke="#111111" stroke-width="1.5"/>
  <!-- Cap specular -->
  <ellipse cx="64" cy="25" rx="3" ry="2" fill="#FFFFFF" opacity="0.5"/>

  <!-- ── FUSE SPARK TIP ── -->
  <!-- Deep orange glow halo -->
  <circle cx="94" cy="6" r="14" fill="#FF5500" opacity="0.3" filter="url(#sparkGlow)"/>
  <!-- Mid orange ring -->
  <circle cx="94" cy="6" r="9"  fill="#FF8800" opacity="0.55" filter="url(#sparkGlow)"/>
  <!-- Bright spark core -->
  <circle cx="94" cy="6" r="6"  fill="url(#sparkCore)" filter="url(#sparkGlow)"/>
  <!-- White hot center -->
  <circle cx="94" cy="6" r="2.8" fill="#FFFFFF" opacity="0.98"/>

  <!-- Spark rays (primary, bright) -->
  <g stroke="#FFDD00" stroke-width="2.2" stroke-linecap="round" filter="url(#sparkGlow)">
    <line x1="94" y1="6" x2="103" y2="-2"/>
    <line x1="94" y1="6" x2="104" y2="12"/>
    <line x1="94" y1="6" x2="86" y2="-2"/>
    <line x1="94" y1="6" x2="100" y2="17"/>
  </g>
  <!-- Spark rays (secondary, dimmer) -->
  <g stroke="#FF9900" stroke-width="1.3" stroke-linecap="round" opacity="0.65">
    <line x1="94" y1="6" x2="106" y2="4"/>
    <line x1="94" y1="6" x2="105" y2="16"/>
    <line x1="94" y1="6" x2="83" y2="1"/>
    <line x1="94" y1="6" x2="88" y2="16"/>
    <line x1="94" y1="6" x2="96" y2="-6"/>
  </g>
</svg>
