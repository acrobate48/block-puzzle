<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <!-- Ruban gradients -->
    <linearGradient id="silver-ribbon-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8E0E8"/>
      <stop offset="50%" stop-color="#C0C8D0"/>
      <stop offset="100%" stop-color="#707880"/>
    </linearGradient>
    <linearGradient id="silver-ribbon-right" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D8E0E8"/>
      <stop offset="50%" stop-color="#C0C8D0"/>
      <stop offset="100%" stop-color="#707880"/>
    </linearGradient>

    <!-- Anneau gradient -->
    <linearGradient id="silver-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="40%" stop-color="#C0C8D0"/>
      <stop offset="100%" stop-color="#808890"/>
    </linearGradient>

    <!-- Corps médaille radial gradient -->
    <radialGradient id="silver-body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#F0F4F8"/>
      <stop offset="65%" stop-color="#D0D8E0"/>
      <stop offset="100%" stop-color="#808890"/>
    </radialGradient>

    <!-- Bord extérieur -->
    <radialGradient id="silver-rim" cx="50%" cy="50%" r="50%">
      <stop offset="75%" stop-color="#808890"/>
      <stop offset="85%" stop-color="#A0A8B0"/>
      <stop offset="100%" stop-color="#606870"/>
    </radialGradient>

    <!-- Etoile gradient -->
    <radialGradient id="silver-star" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E0E8F0"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="silver-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#404850" flood-opacity="0.5"/>
    </filter>

    <!-- Glow filter for star -->
    <filter id="silver-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Inner glow filter -->
    <filter id="silver-inner-glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ===== RUBAN GAUCHE ===== -->
  <polygon points="42,6 55,6 55,42 36,42" fill="url(#silver-ribbon-left)"/>
  <!-- Lignes de texture ruban gauche -->
  <line x1="40" y1="10" x2="53" y2="10" stroke="#F0F4F8" stroke-width="0.6" opacity="0.55"/>
  <line x1="39" y1="15" x2="53" y2="15" stroke="#F0F4F8" stroke-width="0.6" opacity="0.45"/>
  <line x1="38" y1="20" x2="53" y2="20" stroke="#F0F4F8" stroke-width="0.6" opacity="0.38"/>
  <line x1="37" y1="25" x2="53" y2="25" stroke="#F0F4F8" stroke-width="0.6" opacity="0.30"/>
  <line x1="37" y1="30" x2="53" y2="30" stroke="#F0F4F8" stroke-width="0.6" opacity="0.25"/>
  <line x1="36" y1="35" x2="53" y2="35" stroke="#F0F4F8" stroke-width="0.6" opacity="0.20"/>
  <!-- Bord gauche ruban -->
  <line x1="42" y1="6" x2="36" y2="42" stroke="#707880" stroke-width="0.8" opacity="0.7"/>

  <!-- ===== RUBAN DROIT ===== -->
  <polygon points="65,6 78,6 84,42 65,42" fill="url(#silver-ribbon-right)"/>
  <!-- Lignes de texture ruban droit -->
  <line x1="67" y1="10" x2="80" y2="10" stroke="#F0F4F8" stroke-width="0.6" opacity="0.55"/>
  <line x1="67" y1="15" x2="81" y2="15" stroke="#F0F4F8" stroke-width="0.6" opacity="0.45"/>
  <line x1="67" y1="20" x2="82" y2="20" stroke="#F0F4F8" stroke-width="0.6" opacity="0.38"/>
  <line x1="67" y1="25" x2="83" y2="25" stroke="#F0F4F8" stroke-width="0.6" opacity="0.30"/>
  <line x1="67" y1="30" x2="83" y2="30" stroke="#F0F4F8" stroke-width="0.6" opacity="0.25"/>
  <line x1="67" y1="35" x2="84" y2="35" stroke="#F0F4F8" stroke-width="0.6" opacity="0.20"/>
  <!-- Bord droit ruban -->
  <line x1="78" y1="6" x2="84" y2="42" stroke="#707880" stroke-width="0.8" opacity="0.7"/>

  <!-- ===== ANNEAU DE SUSPENSION ===== -->
  <circle cx="60" cy="46" r="8" fill="none" stroke="url(#silver-ring)" stroke-width="4"/>
  <!-- Reflet anneau -->
  <path d="M54,42 A8,8 0 0,1 66,42" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>

  <!-- ===== CORPS MÉDAILLE — bord extérieur (rim) ===== -->
  <circle cx="60" cy="95" r="44" fill="url(#silver-rim)" filter="url(#silver-shadow)"/>
  <!-- Dentelure simulée -->
  <circle cx="60" cy="95" r="42" fill="none" stroke="#A8B0B8" stroke-width="2.5" stroke-dasharray="3.2,2.1"/>

  <!-- ===== CORPS MÉDAILLE — fond principal ===== -->
  <circle cx="60" cy="95" r="40" fill="url(#silver-body)"/>

  <!-- Bevel / cadre intérieur -->
  <circle cx="60" cy="95" r="38" fill="none" stroke="#F0F4F8" stroke-width="1.2" opacity="0.55"/>
  <circle cx="60" cy="95" r="36.5" fill="none" stroke="#808890" stroke-width="0.7" opacity="0.6"/>

  <!-- ===== REFLET SPECULAIRE haut-gauche ===== -->
  <ellipse cx="47" cy="82" rx="14" ry="9" fill="white" opacity="0.38" transform="rotate(-30,47,82)"/>

  <!-- ===== ETOILE 5 BRANCHES ===== -->
  <polygon
    points="60,73 63.5,84 75,84 65.7,90.5 69.2,101.5 60,95 50.8,101.5 54.3,90.5 45,84 56.5,84"
    fill="url(#silver-star)"
    stroke="#808890"
    stroke-width="0.8"
    filter="url(#silver-glow)"
  />
  <!-- Reflet étoile -->
  <polygon
    points="60,73 62,79 67,79 63,82 64.5,88 60,85 55.5,88 57,82 53,79 58,79"
    fill="white"
    opacity="0.22"
  />

  <!-- ===== NUMÉRO 2 ===== -->
  <text
    x="60" y="117"
    text-anchor="middle"
    font-family="Impact, Arial Black, sans-serif"
    font-size="26"
    font-weight="bold"
    fill="#404850"
    filter="url(#silver-inner-glow)"
  >2</text>
  <!-- Highlight texte -->
  <text
    x="59" y="116"
    text-anchor="middle"
    font-family="Impact, Arial Black, sans-serif"
    font-size="26"
    font-weight="bold"
    fill="#FFFFFF"
    opacity="0.28"
  >2</text>

  <!-- ===== HALO GÉNÉRAL ===== -->
  <circle cx="60" cy="95" r="40" fill="none" stroke="#C0C8D0" stroke-width="1" opacity="0.20"/>
  <circle cx="60" cy="95" r="43" fill="none" stroke="#C0C8D0" stroke-width="0.5" opacity="0.10"/>
</svg>
