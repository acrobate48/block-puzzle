<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Block Puzzle">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.googleapis.com; connect-src 'self' https://*.firebaseio.com wss://*.firebaseio.com https://*.googleapis.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; frame-ancestors 'none';">
<title>Block Puzzle — Premium</title>
<link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.svg">
<link rel="manifest" href="assets/icons/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta property="og:title" content="Block Puzzle Premium">
<meta property="og:description" content="A premium block puzzle game. Place blocks, clear lines, conquer the leaderboard.">
<meta property="og:type" content="website">
<meta property="og:image" content="assets/icons/og-image.svg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="assets/icons/og-image.svg">
<script src="config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:rgba(0,0,0,0)}
html,body{width:100%;height:100%;overflow:hidden;background:#000;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
canvas{display:block;touch-action:none;image-rendering:auto}
#lb-pseudo-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:99;align-items:center;justify-content:center;}
#lb-pseudo-box{background:linear-gradient(180deg,#1a2040,#0a1020);border:2px solid #4080ff;border-radius:18px;padding:28px 28px 22px;display:flex;flex-direction:column;align-items:center;gap:13px;box-shadow:0 0 48px #2040ff90;max-width:320px;width:88%;}
#lb-pseudo-box p{color:#90c8ff;font:bold 17px system-ui,-apple-system,"SF Pro Display",Arial,sans-serif;text-align:center;margin:0;}
#lb-pseudo-box small{color:#506080;font:13px system-ui,-apple-system,"SF Pro Display",Arial,sans-serif;text-align:center;}
#lb-pseudo-inp{width:100%;padding:11px 14px;border-radius:8px;border:2px solid #4080ff;background:#0a1830;color:#fff;font:16px system-ui,-apple-system,"SF Pro Display",Arial;outline:none;text-align:center;box-sizing:border-box;letter-spacing:1px;}
#lb-pseudo-inp:focus{border-color:#80b0ff;box-shadow:0 0 12px #4080ff60;}
#lb-pseudo-btn{padding:11px 0;border-radius:10px;border:none;background:linear-gradient(180deg,#4a8fff,#2040c0);color:#fff;font:bold 16px system-ui,-apple-system,"SF Pro Display",Arial;cursor:pointer;box-shadow:0 0 14px #4080ff80;width:100%;}
#lb-pseudo-btn:active{opacity:0.8;}
</style>
</head>
<body><canvas id="c"></canvas>
<div id="lb-pseudo-wrap">
  <div id="lb-pseudo-box">
    <p>🏆 Enregistre ton score</p>
    <small>Entre ton pseudo pour apparaître dans le classement mondial</small>
    <input id="lb-pseudo-inp" type="text" maxlength="16" placeholder="Ton pseudo (max 16)" autocomplete="off" spellcheck="false">
    <button id="lb-pseudo-btn">Valider ✓</button>
  </div>
</div>
<script>
'use strict';
window.addEventListener('error', (e) => {
  document.body.style.background = '#111';
  document.body.style.margin = '0';
  const pre = document.createElement('pre');
  pre.style.cssText = 'color:#fff;padding:20px;white-space:pre-wrap;';
  pre.textContent = (e.message||'Erreur inconnue') + '\n' + (e.filename||'') + '\nligne: ' + (e.lineno||'');
  document.body.innerHTML = '';
  document.body.appendChild(pre);
});
</script>
<script src="js/audio.js"></script>
<script src="js/constants.js"></script>
<script src="js/engine.js"></script>
<script src="js/canvas.js"></script>
<script src="js/render.js"></script>
<script src="js/logic.js"></script>
<script src="js/state.js"></script>
<script src="js/firebase.js"></script>
<script src="js/modes.js"></script>
<script src="js/menu.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
<script src="js/input.js"></script>
<script src="js/loop.js"></script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
