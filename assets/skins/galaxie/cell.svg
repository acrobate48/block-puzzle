<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <defs>
    <!-- Fond cosmique violet foncé top -->
    <linearGradient id="galaxie-top-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#100028"/>
      <stop offset="100%" stop-color="#200040"/>
    </linearGradient>
    <!-- Nébuleuse radiale -->
    <radialGradient id="galaxie-nebula" cx="55%" cy="45%" r="50%">
      <stop offset="0%"   stop-color="#6010C0" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#400080" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#200040" stop-opacity="0"/>
    </radialGradient>
    <!-- Texture nébuleuse turbulence -->
    <filter id="galaxie-nebulae" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.05 0.04" numOctaves="5" seed="42" result="turb"/>
      <feColorMatrix type="matrix"
        values="0.2 0   0 0 0.04
                0   0   0 0 0
                0.3 0.1 0 0 0.1
                0   0   0 3 -1"
        in="turb" result="nebula"/>
      <feBlend in="SourceGraphic" in2="nebula" mode="screen" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <!-- Left face -->
    <linearGradient id="galaxie-left-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#080014"/>
      <stop offset="100%" stop-color="#0C0020"/>
    </linearGradient>
    <!-- Right face -->
    <linearGradient id="galaxie-right-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#180030"/>
      <stop offset="100%" stop-color="#100020"/>
    </linearGradient>
    <!-- Glow violet intense -->
    <filter id="galaxie-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#8020FF" flood-opacity="0.7"/>
    </filter>
    <!-- Clip top -->
    <clipPath id="galaxie-top-clip">
      <polygon points="60,24 105.2,50 60,76 14.8,50"/>
    </clipPath>
  </defs>

  <g filter="url(#galaxie-shadow)">
    <!-- Top face cosmique -->
    <polygon points="60,24 105.2,50 60,76 14.8,50"
             fill="url(#galaxie-top-grad)" filter="url(#galaxie-nebulae)"
             stroke="#6020C0" stroke-width="0.8"/>
    <!-- Left face -->
    <polygon points="14.8,50 60,76 60,102 14.8,76"
             fill="url(#galaxie-left-grad)"
             stroke="#5018A0" stroke-width="0.8"/>
    <!-- Right face -->
    <polygon points="105.2,50 60,76 60,102 105.2,76"
             fill="url(#galaxie-right-grad)"
             stroke="#5018A0" stroke-width="0.8"/>
  </g>

  <!-- Nébuleuse overlay sur top -->
  <polygon points="60,24 105.2,50 60,76 14.8,50"
           fill="url(#galaxie-nebula)"/>

  <!-- 15 étoiles (points blancs/dorés dispersés) sur top face -->
  <g clip-path="url(#galaxie-top-clip)">
    <circle cx="35" cy="45" r="0.9" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="52" cy="35" r="1.1" fill="#FFFFD0" opacity="0.9"/>
    <circle cx="68" cy="38" r="0.8" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="82" cy="44" r="1.0" fill="#FFE0A0" opacity="0.9"/>
    <circle cx="92" cy="52" r="0.7" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="78" cy="62" r="0.9" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="60" cy="67" r="1.0" fill="#FFE8B0" opacity="0.8"/>
    <circle cx="42" cy="64" r="0.8" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="25" cy="54" r="0.9" fill="#FFFFC0" opacity="0.85"/>
    <circle cx="44" cy="50" r="0.6" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="62" cy="46" r="0.7" fill="#FFD890" opacity="0.8"/>
    <circle cx="75" cy="55" r="0.8" fill="#FFFFFF" opacity="0.75"/>
    <circle cx="55" cy="58" r="0.6" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="38" cy="38" r="0.7" fill="#FFE0C0" opacity="0.8"/>
    <circle cx="88" cy="60" r="0.8" fill="#FFFFFF" opacity="0.75"/>

    <!-- 3 grandes étoiles à 4 branches -->
    <!-- Étoile 1 (haut-gauche) -->
    <line x1="42" y1="40" x2="42" y2="46" stroke="#FFFFD0" stroke-width="1" opacity="0.85"/>
    <line x1="39" y1="43" x2="45" y2="43" stroke="#FFFFD0" stroke-width="1" opacity="0.85"/>

    <!-- Étoile 2 (centre) -->
    <line x1="62" y1="51" x2="62" y2="59" stroke="#FFE0A0" stroke-width="1.2" opacity="0.9"/>
    <line x1="58" y1="55" x2="66" y2="55" stroke="#FFE0A0" stroke-width="1.2" opacity="0.9"/>
    <circle cx="62" cy="55" r="1.2" fill="#FFE8B0" opacity="0.7"/>

    <!-- Étoile 3 (droite) -->
    <line x1="84" y1="46" x2="84" y2="52" stroke="#FFFFFF" stroke-width="1" opacity="0.8"/>
    <line x1="81" y1="49" x2="87" y2="49" stroke="#FFFFFF" stroke-width="1" opacity="0.8"/>
  </g>

  <!-- Bords violets lumineux -->
  <line x1="14.8" y1="50" x2="60" y2="24" stroke="#9040FF" stroke-width="1.2" opacity="0.8"/>
  <line x1="60"   y1="24" x2="105.2" y2="50" stroke="#9040FF" stroke-width="1.2" opacity="0.8"/>
</svg>
