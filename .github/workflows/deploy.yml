name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Generate config.js from secrets
        run: |
          cat > config.js << 'ENDOFFILE'
          window.FIREBASE_CONFIG = {
            apiKey: "PLACEHOLDER_API_KEY",
            authDomain: "PLACEHOLDER_AUTH_DOMAIN",
            databaseURL: "PLACEHOLDER_DATABASE_URL",
            projectId: "PLACEHOLDER_PROJECT_ID",
            storageBucket: "PLACEHOLDER_STORAGE_BUCKET",
            messagingSenderId: "PLACEHOLDER_SENDER_ID",
            appId: "PLACEHOLDER_APP_ID"
          };
          ENDOFFILE
          sed -i "s|PLACEHOLDER_API_KEY|${{ secrets.FIREBASE_API_KEY }}|g" config.js
          sed -i "s|PLACEHOLDER_AUTH_DOMAIN|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" config.js
          sed -i "s|PLACEHOLDER_DATABASE_URL|${{ secrets.FIREBASE_DATABASE_URL }}|g" config.js
          sed -i "s|PLACEHOLDER_PROJECT_ID|${{ secrets.FIREBASE_PROJECT_ID }}|g" config.js
          sed -i "s|PLACEHOLDER_STORAGE_BUCKET|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" config.js
          sed -i "s|PLACEHOLDER_SENDER_ID|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" config.js
          sed -i "s|PLACEHOLDER_APP_ID|${{ secrets.FIREBASE_APP_ID }}|g" config.js

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,*.py,*.bat,*.txt,*.json,*.log,__pycache__'
