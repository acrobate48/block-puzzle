<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="100%" height="100%">
  <defs>
    <linearGradient id="c-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2060A0"/>
      <stop offset="100%" stop-color="#0A2040"/>
    </linearGradient>
    <linearGradient id="c-shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="c-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A0DCFF"/>
      <stop offset="50%" stop-color="#60B8F0"/>
      <stop offset="100%" stop-color="#2888C8"/>
    </linearGradient>
    <linearGradient id="c-reflet" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="c-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1850A0"/>
      <stop offset="100%" stop-color="#2868B8"/>
    </linearGradient>
    <linearGradient id="c-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3888C0"/>
      <stop offset="100%" stop-color="#5098CC"/>
    </linearGradient>
    <filter id="c-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#40A8FF" flood-opacity="0.55"/>
    </filter>
    <filter id="c-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#c-bg)"/>

  <!-- Petit halo de fond derrière le bloc -->
  <ellipse cx="100" cy="62" rx="38" ry="22" fill="#40A8FF" opacity="0.12" filter="url(#c-glow)"/>

  <g filter="url(#c-shadow)">
    <polygon points="100,30 127.7,46 100,62 72.3,46"
             fill="url(#c-top)" opacity="0.88"
             stroke="#A0D8FF" stroke-width="0.8"/>
    <polygon points="72.3,46 100,62 100,78 72.3,62"
             fill="url(#c-left)" opacity="0.92"
             stroke="#204890" stroke-width="0.8"/>
    <polygon points="127.7,46 100,62 100,78 127.7,62"
             fill="url(#c-right)" opacity="0.90"
             stroke="#4090C0" stroke-width="0.8"/>
  </g>

  <!-- Reflet diagonal top face -->
  <polygon points="100,30 127.7,46 100,62 72.3,46" fill="url(#c-reflet)"/>
  <!-- Brillance interne -->
  <polygon points="100,33 120,44 100,55 80,44" fill="#FFFFFF" opacity="0.13"/>
  <!-- Arêtes lumineuses -->
  <line x1="72.3" y1="46" x2="100" y2="30" stroke="#C0ECFF" stroke-width="1.2" opacity="0.75"/>
  <line x1="100" y1="30" x2="127.7" y2="46" stroke="#C0ECFF" stroke-width="1.2" opacity="0.75"/>

  <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#c-shine)"/>

  <text x="100" y="115" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="14" text-anchor="middle" letter-spacing="2" fill="#00EEFF"
        paint-order="stroke" stroke="#0A2040" stroke-width="2">CRISTAL</text>

  <rect x="1" y="1" width="198" height="138" rx="9.5" fill="none"
        stroke="#60B8FF" stroke-width="1.5" opacity="0.7"/>
</svg>
