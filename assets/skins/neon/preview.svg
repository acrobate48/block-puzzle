<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="100%" height="100%">
  <defs>
    <linearGradient id="n-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050418"/>
      <stop offset="100%" stop-color="#0A0820"/>
    </linearGradient>
    <linearGradient id="n-shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#00DDFF" stop-opacity="0.10"/>
      <stop offset="50%" stop-color="#00DDFF" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#00DDFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="n-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#102030"/>
      <stop offset="100%" stop-color="#080F18"/>
    </linearGradient>
    <linearGradient id="n-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#040810"/>
      <stop offset="100%" stop-color="#081018"/>
    </linearGradient>
    <linearGradient id="n-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A1828"/>
      <stop offset="100%" stop-color="#081018"/>
    </linearGradient>
    <!-- Glow néon cyan -->
    <filter id="n-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="n-glow2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="n-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#00DDFF" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#n-bg)"/>

  <!-- Grille néon de fond (subtile) -->
  <line x1="0" y1="35" x2="200" y2="35" stroke="#00DDFF" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="70" x2="200" y2="70" stroke="#00DDFF" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="105" x2="200" y2="105" stroke="#00DDFF" stroke-width="0.3" opacity="0.08"/>
  <line x1="50" y1="0" x2="50" y2="140" stroke="#00DDFF" stroke-width="0.3" opacity="0.06"/>
  <line x1="100" y1="0" x2="100" y2="140" stroke="#00DDFF" stroke-width="0.3" opacity="0.06"/>
  <line x1="150" y1="0" x2="150" y2="140" stroke="#00DDFF" stroke-width="0.3" opacity="0.06"/>

  <!-- Halo néon derrière le bloc -->
  <ellipse cx="100" cy="60" rx="44" ry="26" fill="#00DDFF" opacity="0.07" filter="url(#n-glow2)"/>

  <g filter="url(#n-shadow)">
    <polygon points="100,30 127.7,46 100,62 72.3,46"
             fill="url(#n-top)"
             stroke="#00DDFF" stroke-width="1.0"/>
    <polygon points="72.3,46 100,62 100,78 72.3,62"
             fill="url(#n-left)"
             stroke="#00AACC" stroke-width="0.9"/>
    <polygon points="127.7,46 100,62 100,78 127.7,62"
             fill="url(#n-right)"
             stroke="#00CCEE" stroke-width="0.9"/>
  </g>

  <!-- Lignes néon sur arêtes (glow fort) -->
  <line x1="72.3" y1="46" x2="100" y2="30" stroke="#00DDFF" stroke-width="2.0" opacity="0.9" filter="url(#n-glow)"/>
  <line x1="100" y1="30" x2="127.7" y2="46" stroke="#00DDFF" stroke-width="2.0" opacity="0.9" filter="url(#n-glow)"/>
  <line x1="72.3" y1="46" x2="100" y2="62" stroke="#00AABB" stroke-width="1.2" opacity="0.7" filter="url(#n-glow)"/>
  <line x1="127.7" y1="46" x2="100" y2="62" stroke="#00AABB" stroke-width="1.2" opacity="0.7" filter="url(#n-glow)"/>
  <!-- Arêtes verticales -->
  <line x1="72.3" y1="62" x2="72.3" y2="46" stroke="#008899" stroke-width="1.0" opacity="0.6"/>
  <line x1="127.7" y1="46" x2="127.7" y2="62" stroke="#0099AA" stroke-width="1.0" opacity="0.6"/>
  <line x1="100" y1="62" x2="100" y2="78" stroke="#00BBCC" stroke-width="1.0" opacity="0.7" filter="url(#n-glow)"/>
  <!-- Lignes néon diagonales sur top face -->
  <line x1="82" y1="38" x2="118" y2="54" stroke="#00DDFF" stroke-width="0.6" opacity="0.30"/>
  <line x1="78" y1="46" x2="100" y2="36" stroke="#00DDFF" stroke-width="0.5" opacity="0.25"/>

  <!-- Points lumineux vertex -->
  <circle cx="100" cy="30" r="2.5" fill="#00DDFF" opacity="0.9" filter="url(#n-glow)"/>
  <circle cx="72.3" cy="46" r="1.8" fill="#00CCEE" opacity="0.7" filter="url(#n-glow)"/>
  <circle cx="127.7" cy="46" r="1.8" fill="#00CCEE" opacity="0.7" filter="url(#n-glow)"/>
  <circle cx="100" cy="62" r="2.0" fill="#00BBDD" opacity="0.8" filter="url(#n-glow)"/>

  <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#n-shine)"/>

  <text x="100" y="115" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="14" text-anchor="middle" letter-spacing="2" fill="#00DDFF"
        paint-order="stroke" stroke="#000818" stroke-width="2"
        filter="url(#n-glow)">NÉON</text>

  <rect x="1" y="1" width="198" height="138" rx="9.5" fill="none"
        stroke="#00DDFF" stroke-width="1.5" opacity="0.6" filter="url(#n-glow)"/>
</svg>
