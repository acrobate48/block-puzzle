function resize(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  const portrait=H>W;
  CELL=portrait?Math.floor((W-14)/COLS):Math.floor((H-52)/ROWS);
  CR=Math.max(3,CELL/7|0);
  GW=CELL*COLS;GH=CELL*ROWS;
  GRID_X=portrait?((W-GW)/2)|0:(W*0.06)|0;
  TRAY_H=Math.max((CELL*2.1)|0,68);
  const top=portrait?52:0;
  GRID_Y=portrait?top+Math.max(((H-top-GH-TRAY_H-14)/2)|0,0):((H-GH)/2)|0;
  if(GRID_Y<top)GRID_Y=top;
  TRAY_Y=GRID_Y+GH+6;
  PIECE_CELL=Math.floor(CELL*0.58);
  CELL_CACHE.clear();
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function hr(h){return parseInt(h.slice(1,3),16)}
function hg(h){return parseInt(h.slice(3,5),16)}
function hb(h){return parseInt(h.slice(5,7),16)}
function rgb(r,g,b){return`rgb(${r|0},${g|0},${b|0})`}
function rgba(r,g,b,a){return`rgba(${r|0},${g|0},${b|0},${+a.toFixed(3)})`}
function hexA(h,a){return rgba(hr(h),hg(h),hb(h),a)}
function cl(v,lo,hi){return v<lo?lo:v>hi?hi:v}
function lerp(a,b,t){return a+(b-a)*t}
function lerpC(c1,c2,t){return rgb(lerp(hr(c1),hr(c2),t),lerp(hg(c1),hg(c2),t),lerp(hb(c1),hb(c2),t))}
function rnd(lo,hi){return lo+Math.random()*(hi-lo)}
function rndI(lo,hi){return lo+(Math.random()*(hi-lo+1))|0}
function rndc(a){return a[Math.floor(Math.random()*a.length)]}
function seeded(s){let v=s;return()=>{v=(v*1664525+1013904223)&0xffffffff;return(v>>>0)/4294967296}}

// Rounded rect path (no fill/stroke)
function rp(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}
// Rounded rect fill+stroke
function rrect(ctx,x,y,w,h,r,fill,stroke,lw=1){
  rp(ctx,x,y,w,h,r);if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke()}
}
// Clip to rounded rect, call fn, restore
function rclip(ctx,x,y,sz,r,fn){ctx.save();rp(ctx,x,y,sz,sz,r);ctx.clip();fn();ctx.restore();}

// ─── PREMIUM TEXT ─────────────────────────────────────────────────────────────
// Gradient + outline + glow for title characters
function drawPremText(ctx,text,x,y,font,topCol,botCol,outlineCol,glowCol,glowSz=14,lw=3){
  ctx.save();ctx.font=font;ctx.textAlign='center';ctx.textBaseline='middle';
  const fsz=parseFloat((font.match(/[\d.]+/)||['14'])[0]);
  const g=ctx.createLinearGradient(0,y-fsz*0.5,0,y+fsz*0.5);
  g.addColorStop(0,topCol);g.addColorStop(0.55,botCol);g.addColorStop(1,lerpC(botCol,'#000000',0.3));
  if(glowCol){ctx.shadowColor=glowCol;ctx.shadowBlur=glowSz;}
  ctx.strokeStyle=outlineCol||'rgba(0,0,0,0.6)';ctx.lineWidth=lw;ctx.lineJoin='round';ctx.strokeText(text,x,y);
  ctx.shadowBlur=0;ctx.fillStyle=g;ctx.fillText(text,x,y);
  // Shine pass
  ctx.globalAlpha=0.18;
  const sg=ctx.createLinearGradient(x,y-fsz*0.5,x,y+fsz*0.1);
  sg.addColorStop(0,'rgba(255,255,255,1)');sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sg;ctx.fillText(text,x,y);
  ctx.globalAlpha=1;ctx.restore();
}

// Animated bouncing title (per char premium)
function bounceTitle(ctx,text,cx,by,t,font,topCol,botCol,glowCol,amp=7){
  ctx.save();ctx.font=font;ctx.textBaseline='middle';
  const chars=text.split('');
  const widths=chars.map(c=>ctx.measureText(c).width+1);
  const total=widths.reduce((s,w)=>s+w,0);
  let x=cx-total/2;
  const fsz=parseFloat((font.match(/[\d.]+/)||['14'])[0]);
  chars.forEach((ch,i)=>{
    const bob=Math.sin(t*0.0024+i*0.78)*amp;
    const shine=Math.sin(t*0.0028+i*0.4)*0.2;
    const gr=cl(hr(topCol)+shine*40,0,255),gg=cl(hg(topCol)+shine*40,0,255),gb=cl(hb(topCol)+shine*40,0,255);
    const g=ctx.createLinearGradient(x,by+bob-fsz*0.5,x,by+bob+fsz*0.5);
    g.addColorStop(0,rgb(gr,gg,gb));g.addColorStop(0.6,botCol);g.addColorStop(1,lerpC(botCol,'#000',0.4));
    ctx.save();
    ctx.shadowColor=glowCol;ctx.shadowBlur=16+Math.abs(bob);
    ctx.strokeStyle='rgba(0,0,0,0.55)';ctx.lineWidth=3;ctx.lineJoin='round';ctx.strokeText(ch,x,by+bob);
    ctx.shadowBlur=0;ctx.fillStyle=g;ctx.fillText(ch,x,by+bob);
    ctx.globalAlpha=0.22;
    const sg=ctx.createLinearGradient(x,by+bob-fsz*0.5,x,by+bob);
    sg.addColorStop(0,'#fff');sg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sg;ctx.fillText(ch,x,by+bob);
    ctx.globalAlpha=1;ctx.restore();
    x+=widths[i];
  });
  ctx.restore();
}
function titleWidth(ctx,text,font){ctx.save();ctx.font=font;const w=text.split('').reduce((s,c)=>s+ctx.measureText(c).width+1,0);ctx.restore();return w;}

// Small label with gradient + subtle glow
function labelText(ctx,text,x,y,col,font,align='center',glow=false){
  ctx.save();ctx.font=font;ctx.textAlign=align;ctx.textBaseline='middle';
  if(glow){ctx.shadowColor=col;ctx.shadowBlur=8;}
  ctx.fillStyle=col;ctx.fillText(text,x,y);
  ctx.shadowBlur=0;ctx.restore();
}

// ─── BONUS ICONS ─────────────────────────────────────────────────────────────
function drawBombIcon(ctx,cx,cy,sz){
  ctx.save();
  // Shadow under bomb
  ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=sz*0.3;ctx.shadowOffsetY=sz*0.08;
  // Bomb body – dark sphere
  const bg=ctx.createRadialGradient(cx-sz*0.12,cy-sz*0.1,sz*0.04,cx,cy+sz*0.05,sz*0.38);
  bg.addColorStop(0,'#555');bg.addColorStop(0.45,'#1A1A1A');bg.addColorStop(1,'#000');
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(cx,cy+sz*0.05,sz*0.38,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  // Shine spot
  ctx.fillStyle='rgba(255,255,255,0.28)';
  ctx.beginPath();ctx.ellipse(cx-sz*0.12,cy-sz*0.08,sz*0.13,sz*0.09,-0.4,0,Math.PI*2);ctx.fill();
  // Fuse cord (brown bezier)
  ctx.strokeStyle='#7B4F12';ctx.lineWidth=sz*0.09;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx+sz*0.26,cy-sz*0.28);
  ctx.quadraticCurveTo(cx+sz*0.48,cy-sz*0.52,cx+sz*0.32,cy-sz*0.68);ctx.stroke();
  // Fuse metal cap (small rect at top of body)
  ctx.fillStyle='#888';ctx.strokeStyle='#555';ctx.lineWidth=sz*0.04;
  ctx.beginPath();ctx.arc(cx+sz*0.26,cy-sz*0.25,sz*0.06,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Spark / ember at fuse tip
  ctx.shadowColor='#FF8800';ctx.shadowBlur=sz*0.5;
  ctx.fillStyle='#FFE040';ctx.beginPath();ctx.arc(cx+sz*0.32,cy-sz*0.68,sz*0.09,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFFFFF';ctx.beginPath();ctx.arc(cx+sz*0.32,cy-sz*0.68,sz*0.04,0,Math.PI*2);ctx.fill();
  // Spark rays
  ctx.strokeStyle='#FFA020';ctx.lineWidth=sz*0.06;ctx.lineCap='round';ctx.shadowBlur=sz*0.3;
  const rays=[[0,-1],[0.7,-0.7],[-0.6,-0.8],[0.85,0.1]];
  rays.forEach(([dx,dy])=>{const base=sz*0.1;ctx.beginPath();ctx.moveTo(cx+sz*0.32+dx*base,cy-sz*0.68+dy*base);ctx.lineTo(cx+sz*0.32+dx*(base+sz*0.14),cy-sz*0.68+dy*(base+sz*0.14));ctx.stroke();});
  ctx.shadowBlur=0;ctx.restore();
}
function drawX2Icon(ctx,cx,cy,sz){
  ctx.save();
  const fsz=sz*0.72;
  ctx.font=`bold ${fsz|0}px Impact,Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
  // Dark outline + shadow
  ctx.shadowColor='rgba(0,0,0,0.7)';ctx.shadowBlur=sz*0.25;
  ctx.strokeStyle='#4A2000';ctx.lineWidth=fsz*0.16;ctx.lineJoin='round';ctx.strokeText('×2',cx,cy);
  ctx.shadowBlur=0;
  // Gold gradient fill
  const g=ctx.createLinearGradient(cx,cy-fsz*0.5,cx,cy+fsz*0.5);
  g.addColorStop(0,'#FFF0A0');g.addColorStop(0.2,'#FFD700');g.addColorStop(0.6,'#FFA000');g.addColorStop(1,'#D46000');
  ctx.fillStyle=g;ctx.fillText('×2',cx,cy);
  // Shine pass
  ctx.globalAlpha=0.35;
  const sg=ctx.createLinearGradient(cx,cy-fsz*0.5,cx,cy+fsz*0.05);
  sg.addColorStop(0,'#fff');sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sg;ctx.fillText('×2',cx,cy);
  ctx.globalAlpha=1;ctx.restore();
}

// Parasite cell skin (replaces normal skin for parasite pieces/overlay)
function drawParasiteCell(ctx,x,y,sz,t,phase){
  rclip(ctx,x,y,sz,sz/4,()=>{
    // Dark corrupted base
    const bg=ctx.createRadialGradient(x+sz*0.4,y+sz*0.35,0,x+sz/2,y+sz/2,sz*0.7);
    bg.addColorStop(0,'#2A0A4E');bg.addColorStop(0.5,'#120228');bg.addColorStop(1,'#050010');
    ctx.fillStyle=bg;ctx.fillRect(x,y,sz,sz);
    // Pulsing green veins
    const pulse=0.5+0.5*Math.sin(t*0.006+phase);
    ctx.strokeStyle=`rgba(0,${(180+60*pulse)|0},${(40+20*pulse)|0},${(0.55+0.35*pulse).toFixed(2)})`;
    ctx.lineWidth=Math.max(1,sz*0.06);ctx.lineCap='round';
    // Vein pattern (seeded by position)
    const vr=seeded((x*31+y*17)&0xffff);
    for(let i=0;i<3;i++){
      const sx2=x+vr()*sz,sy2=y+vr()*sz,ex=x+vr()*sz,ey=y+vr()*sz;
      const mx=sx2+(ex-sx2)*0.5+Math.sin(t*0.004+i)*sz*0.12,my=sy2+(ey-sy2)*0.5+Math.cos(t*0.003+i)*sz*0.12;
      ctx.beginPath();ctx.moveTo(sx2,sy2);ctx.quadraticCurveTo(mx,my,ex,ey);ctx.stroke();
    }
    // Toxic glow dots
    ctx.shadowColor=`rgba(0,255,80,${0.6+0.4*pulse})`;ctx.shadowBlur=sz*0.4;
    const dr=seeded((x*13+y*29)&0xffff);
    for(let i=0;i<2;i++){
      ctx.fillStyle=`rgba(40,${(200+55*pulse)|0},60,${(0.7+0.3*pulse).toFixed(2)})`;
      ctx.beginPath();ctx.arc(x+dr()*sz,y+dr()*sz,sz*0.07,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;
    // Top shine
    const sh=ctx.createLinearGradient(x,y,x,y+sz*0.4);
    sh.addColorStop(0,'rgba(120,40,255,0.15)');sh.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sh;ctx.fillRect(x,y,sz,sz);
  });
}
// Parasite grid overlay (pulsing corrupt aura drawn on top of the host cell)
function drawParasiteOverlay(ctx,x,y,sz,t,phase){
  const pulse=0.5+0.5*Math.sin(t*0.007+phase);
  // Dark vignette border
  const bg=ctx.createRadialGradient(x+sz/2,y+sz/2,sz*0.18,x+sz/2,y+sz/2,sz*0.72);
  bg.addColorStop(0,'rgba(0,200,50,0)');bg.addColorStop(0.6,`rgba(0,80,20,${(0.18+0.12*pulse).toFixed(2)})`);bg.addColorStop(1,`rgba(0,180,40,${(0.38+0.22*pulse).toFixed(2)})`);
  ctx.fillStyle=bg;ctx.fillRect(x,y,sz,sz);
  // Scanning line
  const scanY=y+((t*0.06+phase*sz)%sz);
  const sg=ctx.createLinearGradient(x,scanY-2,x,scanY+3);
  sg.addColorStop(0,'rgba(0,255,80,0)');sg.addColorStop(0.5,`rgba(0,255,80,${(0.28*pulse).toFixed(2)})`);sg.addColorStop(1,'rgba(0,255,80,0)');
  ctx.fillStyle=sg;ctx.fillRect(x,scanY-2,sz,5);
  // Skull emoji hint (small, pulsing)
  const esz=Math.max(8,sz*0.36)|0;
  ctx.save();ctx.font=`${esz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.globalAlpha=0.55+0.35*pulse;ctx.shadowColor='#00FF50';ctx.shadowBlur=sz*0.3;
  ctx.fillText('☠',x+sz/2,y+sz/2);ctx.shadowBlur=0;ctx.restore();
}

// Score number with digit gradient
function drawScore(ctx,text,x,y,th,font){
  ctx.save();ctx.font=font;ctx.textAlign='center';ctx.textBaseline='middle';
  const fsz=parseFloat((font.match(/[\d.]+/)||['14'])[0]);
  const g=ctx.createLinearGradient(0,y-fsz*0.5,0,y+fsz*0.5);
  g.addColorStop(0,th.hi||th.tm);g.addColorStop(0.5,th.tm);g.addColorStop(1,lerpC(th.ta,'#000',0.2));
  ctx.shadowColor=th.tm;ctx.shadowBlur=18;
  ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=3;ctx.lineJoin='round';ctx.strokeText(text,x,y);
  ctx.shadowBlur=0;ctx.fillStyle=g;ctx.fillText(text,x,y);
  ctx.restore();
}

// ─── CELL CACHE ───────────────────────────────────────────────────────────────
function getCached(col,sz,skin){
  const k=`${skin}_${col}_${sz}`;
  if(CELL_CACHE.has(k))return CELL_CACHE.get(k);
  const oc=document.createElement('canvas');oc.width=sz;oc.height=sz;
  const c2=oc.getContext('2d');
  SKIN_FNS[skin](c2,col,0,0,sz,0);
  CELL_CACHE.set(k,oc);return oc;
}
function drawCell(ctx,col,x,y,sz,skin,t,alpha=1){
  x=x|0;y=y|0;sz=sz|0;if(sz<1)return;
  if(alpha<1)ctx.globalAlpha=alpha;
  if(ANIMATED_SKINS.has(skin))SKIN_FNS[skin](ctx,col,x,y,sz,t);
  else ctx.drawImage(getCached(col,sz,skin),x,y);
  if(alpha<1)ctx.globalAlpha=1;
}

// ─── 10 PREMIUM SKINS ─────────────────────────────────────────────────────────
// All skins use rclip for rounded corners + detailed multi-layer rendering

function skinPierre(ctx,col,x,y,sz,_t){
  rclip(ctx,x,y,sz,sz/5,()=>{
    const r=hr(col),g=hg(col),b=hb(col);
    // Base gradient
    const bg=ctx.createLinearGradient(x,y,x+sz,y+sz);
    bg.addColorStop(0,rgb(cl(r+60,0,255),cl(g+60,0,255),cl(b+60,0,255)));
    bg.addColorStop(1,rgb(cl(r-40,0,255),cl(g-40,0,255),cl(b-40,0,255)));
    ctx.fillStyle=bg;ctx.fillRect(x,y,sz,sz);
    // Stone grain lines
    const dk=rgba(0,0,0,0.12);const li=rgba(255,255,255,0.1);
    for(let i=0;i<4;i++){const gy=y+4+i*(sz-4)/4;ctx.strokeStyle=i%2?li:dk;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x+2,gy+Math.sin(i)*2);ctx.lineTo(x+sz-2,gy+Math.cos(i+1)*2);ctx.stroke();}
    // Top-left light
    const lg=ctx.createLinearGradient(x,y,x+sz*0.6,y+sz*0.6);

const SKIN_FNS=[skinPierre,skinCristal,skinBois,skinMetal,skinMarbre,
                skinCandy,skinGlace,skinFeu,skinNeon,skinGalaxie];

// ─── BACKGROUND ───────────────────────────────────────────────────────────────
function buildBg(ti){
  const th=THEMES[ti];
  const oc=document.createElement('canvas');oc.width=W;oc.height=H;
  const c=oc.getContext('2d');
  // Deep gradient
  const g=c.createLinearGradient(0,0,0,H);
  g.addColorStop(0,th.sky);g.addColorStop(0.5,lerpC(th.sky,th.bg,0.7));g.addColorStop(1,th.bg);
  c.fillStyle=g;c.fillRect(0,0,W,H);
  const rng=seeded(ti*7919+W+H);
  // Soft blobs
  for(let i=0;i<40;i++){
    const lx=rng()*W,ly=rng()*H,lr=20+rng()*50;
    c.fillStyle=rgba(hr(th.dc),hg(th.dc),hb(th.dc),0.04+rng()*0.07);
    c.beginPath();c.ellipse(lx,ly,lr,lr*0.65,rng()*Math.PI,0,Math.PI*2);c.fill();
  }
  // Theme-specific static detail
  if(ti===4||ti===6){for(let i=0;i<(ti===6?300:180);i++){const sx=rng()*W,sy=rng()*H,br=80+rng()*175|0,big=rng()<0.06;c.fillStyle=ti===6?rgba(cl(br+20,0,255),br/2|0,cl(br+30,0,255),0.85):rgba(br,br,cl(br+18,0,255),0.82);c.beginPath();c.arc(sx,sy,big?2:1,0,Math.PI*2);c.fill();}}
  if(ti===9){c.strokeStyle='rgba(0,200,255,0.05)';c.lineWidth=1;for(let gx=0;gx<W;gx+=38){c.beginPath();c.moveTo(gx,0);c.lineTo(gx,H);c.stroke();}for(let gy=0;gy<H;gy+=38){c.beginPath();c.moveTo(0,gy);c.lineTo(W,gy);c.stroke();}}
  if(ti===5){// Icy ground
    const ig=c.createLinearGradient(0,H*0.75,0,H);ig.addColorStop(0,'rgba(140,200,255,0)');ig.addColorStop(1,'rgba(140,200,255,0.12)');c.fillStyle=ig;c.fillRect(0,H*0.75,W,H*0.25);
  }
  // Vignette
  const vg=c.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.45)');
  c.fillStyle=vg;c.fillRect(0,0,W,H);
  return oc;
}

// ─── THEME FX ─────────────────────────────────────────────────────────────────
function initFx(ti){
  const fx={ti};

// ─── GAME LOGIC ───────────────────────────────────────────────────────────────
function newPiece(){return{shape:rndc(SHAPES),color:rndc(COLORS)};}
function newParasitePiece(){return{shape:rndc(SHAPES.filter(s=>s.flat().reduce((a,v)=>a+v,0)<=4)),color:'#1A0A2E',isParasite:true};}
function newTray(){
  const pieces=[newPiece(),newPiece(),newPiece()];
  // ~8% chance one slot becomes a parasite piece (only if none active on grid)
  if(parasites.length===0&&Math.random()<0.08){pieces[rndI(0,2)]=newParasitePiece();}
  return pieces;
}
function canPlace(grid,shape,row,col){for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++)if(shape[r][c]){const gr=row+r,gc=col+c;if(gr<0||gr>=ROWS||gc<0||gc>=COLS||grid[gr][gc])return false;}return true;}
function placePiece(grid,shape,color,row,col){for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++)if(shape[r][c])grid[row+r][col+c]=color;}
function clearLines(grid){const rf=[],cf=[];for(let r=0;r<ROWS;r++)if(grid[r].every(v=>v))rf.push(r);for(let c=0;c<COLS;c++){let f=true;for(let r=0;r<ROWS;r++)if(!grid[r][c]){f=false;break;}if(f)cf.push(c);}const cl2=new Set(),clC={};rf.forEach(r=>{for(let c=0;c<COLS;c++){const k=r*100+c;cl2.add(k);clC[k]=grid[r][c];}});cf.forEach(c=>{for(let r=0;r<ROWS;r++){const k=r*100+c;cl2.add(k);clC[k]=grid[r][c];}});cl2.forEach(k=>{grid[Math.floor(k/100)][k%100]=null;});return{n:rf.length+cf.length,cells:[...cl2].map(k=>({r:Math.floor(k/100),c:k%100})),colors:clC};}
function anyValid(grid,tray){for(const p of tray)if(p)for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(canPlace(grid,p.shape,r,c))return true;return false;}
function snapPos(mx,my,shape){return{gr:Math.round((my-GRID_Y)/CELL-shape.length/2),gc:Math.round((mx-GRID_X)/CELL-shape[0].length/2)};}

// ─── PARTICLES / DEBRIS / FLOATTEXT ──────────────────────────────────────────
function spawnParticles(cells,n,pow,colors){cells.forEach(({r,c})=>{const cx=GRID_X+c*CELL+CELL/2,cy=GRID_Y+r*CELL+CELL/2;for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),s=rnd(1.5,4)*pow;particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-rnd(0,1.5),color:rndc(colors),life:28+rnd(0,28),ml:56,size:rnd(2,3.5*pow),circle:Math.random()<0.5});}});}
class Debris{
  constructor(x,y,color,ti){this.x=x;this.y=y;this.ml=44+rnd(0,28);this.life=this.ml;this.sz=4+rnd(0,9);this.wave=rnd(0,Math.PI*2);const r=hr(color||'#3AC644'),g=hg(color||'#3AC644'),b=hb(color||'#3AC644');if(ti===2){this.vx=rnd(-1,1);this.vy=rnd(-3,-0.8);this.grav=-0.02;this.circ=true;this.r=cl(r*0.2+70|0,0,255);this.g=cl(g*0.4+105|0,0,255);this.b=cl(b*0.55+140|0,0,255);}else if(ti===3){this.vx=rnd(-1.2,1.2);this.vy=rnd(1.2,4);this.grav=0.22;this.circ=false;this.r=cl(r*0.3+200|0,0,255);this.g=cl(g*0.1+42|0,0,255);this.b=4;}else{const a=rnd(0,Math.PI*2),sp=rnd(2.5,6);this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp-rnd(0,2.5);this.grav=0.13;this.circ=Math.random()<0.5;this.r=r;this.g=g;this.b=b;}}
  update(){this.x+=this.vx+Math.sin(this.wave)*0.3;this.y+=this.vy;this.vy+=this.grav;this.wave+=0.1;this.life--;return this.life>0;}
  draw(ctx){const rat=this.life/this.ml,a=(0.8*rat).toFixed(3),sz=Math.max(1,this.sz*(0.25+0.75*rat));ctx.fillStyle=`rgba(${this.r},${this.g},${this.b},${a})`;if(this.circ){ctx.beginPath();ctx.arc(this.x,this.y,sz,0,Math.PI*2);ctx.fill();}else ctx.fillRect(this.x-sz,this.y-sz,sz*2,sz*2);}
}
function spawnDebris(clC,ti,n){Object.entries(clC).forEach(([k,color])=>{const r=Math.floor(+k/100),c=(+k)%100;const cx=GRID_X+c*CELL+CELL/2,cy=GRID_Y+r*CELL+CELL/2;for(let i=0;i<n;i++)debris.push(new Debris(cx+rnd(-CELL/4,CELL/4),cy+rnd(-CELL/4,CELL/4),color,ti));});}
class FloatText{
  constructor(text,x,y,col,sizeM=1,life=75){this.text=text;this.x=x;this.y=y;this.col=col;this.life=life;this.ml=life;this.vy=-1.1;this.sizeM=sizeM;}
  update(){this.y+=this.vy;this.vy*=0.97;this.life--;return this.life>0;}
  draw(ctx){const a=this.life/this.ml,fsz=Math.max(10,CELL*0.5*this.sizeM)|0;ctx.save();ctx.globalAlpha=a;ctx.font=`bold ${fsz}px Impact,Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor=this.col;ctx.shadowBlur=10;ctx.strokeStyle='rgba(0,0,0,0.55)';ctx.lineWidth=3;ctx.lineJoin='round';ctx.strokeText(this.text,this.x,this.y);ctx.fillStyle=this.col;ctx.fillText(this.text,this.x,this.y);ctx.restore();}
}

            shake=Math.max(shake,4);shakePow=Math.max(shakePow,2);
            floats.push(new FloatText('☠ PARASITE',GRID_X+nc*CELL+CELL/2,GRID_Y+nr*CELL,'#00FF60',0.8,55));
            // Check if grid is now losing validity
            if(tray.every(p2=>p2===null)){}  // tray refill happens after placement
            break; // only eat one cell per tick per source
          }
        }
      }
    });
    // Remove expired parasites
    parasites=parasites.filter(p=>now-p.born<PARASITE_LIFE);
    // Check game-over after eating
    const liveTray=tray.filter(Boolean);
    if(liveTray.length>0&&!anyValid(grid,liveTray)&&!showSecondChance){
      if(!secondChanceUsed)showSecondChance=true;
      else{over=true;overT=Date.now();setTimeout(()=>{gameState='gameover';},2000);}
    }
  }
  // Cells
  for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){
    const x=GRID_X+c*CELL,y=GRID_Y+r*CELL,color=grid[r][c];
    // Pop animation for recently placed cells
    const pop=placedCells.find(p=>p.r===r&&p.c===c);
    if(color){
      if(pop&&pop.f<8){const sc=0.72+0.28*(pop.f/8);const off=CELL*(1-sc)/2;drawCell(ctx,color,(x+off)|0,(y+off)|0,Math.ceil(CELL*sc),selSkin,t);}
      else drawCell(ctx,color,x,y,CELL,selSkin,t);
      // Star overlay

      // Parasite overlay (if this cell is an active parasite source)

    }else{
      ctx.fillStyle=hexA(th.ge,0.6);ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
      ctx.strokeStyle=hexA(th.sl,0.18);ctx.lineWidth=1;ctx.strokeRect(x+1,y+1,CELL-2,CELL-2);
    }

  // Update pop animations
  placedCells=placedCells.filter(p=>{p.f++;return p.f<8;});
  // Snap preview
  if(drag&&!over){
    const piece=tray[drag.idx];
    if(piece){
      const{gr,gc}=snapPos(mouseX,mouseY,piece.shape);
      const valid=canPlace(grid,piece.shape,gr,gc);
      const pr=valid?hr(piece.color):210,pg=valid?hg(piece.color):45,pb_=valid?hb(piece.color):45;
      const pt=Date.now()*0.006;const pa=0.25+0.12*Math.sin(pt);
      piece.shape.forEach((line,rr)=>line.forEach((v,cc)=>{if(v){const pr2=gr+rr,pc2=gc+cc;if(pr2>=0&&pr2<ROWS&&pc2>=0&&pc2<COLS){rclip(ctx,GRID_X+pc2*CELL+1,GRID_Y+pr2*CELL+1,CELL-2,CR,()=>{ctx.fillStyle=`rgba(${pr},${pg},${pb_},${pa})`;ctx.fillRect(GRID_X+pc2*CELL+1,GRID_Y+pr2*CELL+1,CELL-2,CELL-2);});ctx.strokeStyle=`rgba(${pr},${pg},${pb_},${0.7+0.2*Math.sin(pt)})`;ctx.lineWidth=2;ctx.strokeRect(GRID_X+pc2*CELL+2,GRID_Y+pr2*CELL+2,CELL-4,CELL-4);}}

      sh.forEach((line,rr)=>line.forEach((v,cc)=>{if(v)drawParasiteCell(ctx,ox+cc*PIECE_CELL,oy+rr*PIECE_CELL,PIECE_CELL,t,rr*17+cc*31);}));
      ctx.shadowBlur=0;ctx.restore();

      ctx.save();ctx.font=`bold ${lsz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle=`rgba(0,${(200+55*pulse)|0},60,0.95)`;ctx.shadowColor='#00FF60';ctx.shadowBlur=6;
      ctx.fillText('☠ PARASITE',GRID_X+i*pw+pw/2,TRAY_Y+TRAY_H-lsz*0.75);ctx.shadowBlur=0;ctx.restore();
    }else{
      sh.forEach((line,rr)=>line.forEach((v,cc)=>{if(v)drawCell(ctx,piece.color,ox+cc*PIECE_CELL,oy+rr*PIECE_CELL,PIECE_CELL,selSkin,t,dim?0.3:1);}));
    }
  }

  if(drag&&!over){

    if(piece){
      const sh=piece.shape,ox=(mouseX-sh[0].length*CELL/2)|0,oy=(mouseY-sh.length*CELL/2)|0;

    const bw2=Math.min(W-20,360),bh2=Math.round(H*0.092)+2;
    const bx2=(W-bw2)/2,by2=H-bh2-8;

    const ico=bh2*0.45;
    ctx.save();ctx.font=`${ico|0}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='#FFD700';ctx.shadowBlur=10;ctx.fillStyle='#FFD700';ctx.fillText('🎁',bx2+bh2*0.62,by2+bh2/2);ctx.shadowBlur=0;ctx.restore();
    // Text
    const bfsz2=cl(Math.floor(bh2*0.29),8,14);

    const tg2=ctx.createLinearGradient(0,by2+bh2*0.15,0,by2+bh2*0.85);

    ctx.shadowBlur=0;ctx.restore();
    addCellsBonusRect={x:bx2,y:by2,w:bw2,h:bh2};
  }else if(!showAddCellsBonus&&!showBonusPicker){addCellsBonusRect=null;}
  // Bonus piece picker overlay
  if(showBonusPicker&&!over&&!showSecondChance){
    bonusPickerRects=[];
    ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,0,W,H);
    const pw3=Math.min(W-20,400),ph3=Math.round(H*0.38);

    rp(ctx,px3,py3,pw3,ph3,16);ctx.strokeStyle=pbord;ctx.lineWidth=2;ctx.stroke();
    // Shine top
    const psh=ctx.createLinearGradient(px3,py3,px3,py3+ph3*0.35);
    psh.addColorStop(0,'rgba(255,255,255,0.1)');psh.addColorStop(1,'rgba(255,255,255,0)');
    rp(ctx,px3,py3,pw3,ph3*0.35,16);ctx.fillStyle=psh;ctx.fill();
    // Title
    const tsz=cl(pw3*0.062|0,10,19);
    ctx.save();ctx.font=`bold ${tsz}px Impact,Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    const ttg=ctx.createLinearGradient(0,py3+ph3*0.06,0,py3+ph3*0.2);
    ttg.addColorStop(0,'#FFF0A0');ttg.addColorStop(1,'#FFA000');
    ctx.fillStyle=ttg;ctx.shadowColor='rgba(255,200,0,0.7)';ctx.shadowBlur=12;
    ctx.fillText('✦  BONUS — Choisissez une pièce !  ✦',px3+pw3/2,py3+ph3*0.13);
    ctx.shadowBlur=0;ctx.restore();
    // 5 pieces grid
    const N=bonusPickerPieces.length;
    const slotW=pw3/N;const slotH=ph3*0.72;const slotY=py3+ph3*0.23;
    bonusPickerPieces.forEach((piece,i)=>{
      const sx=px3+i*slotW,sy=slotY;
      // Slot background
      const ishov=(mouseX>=sx&&mouseX<sx+slotW&&mouseY>=sy&&mouseY<sy+slotH);
      const slBg=ctx.createLinearGradient(sx,sy,sx,sy+slotH);
      slBg.addColorStop(0,ishov?'rgba(255,200,0,0.22)':'rgba(255,255,255,0.06)');
      slBg.addColorStop(1,ishov?'rgba(255,140,0,0.12)':'rgba(255,255,255,0.02)');
      rrect(ctx,sx+3,sy+3,slotW-6,slotH-6,10,slBg,ishov?hexA('#FFD700',0.6):hexA('#FFFFFF',0.15),ishov?1.5:0.8);
      // Draw piece centered in slot
      const sh=piece.shape;
      const pcol=sh[0].length,prow=sh.length;
      const maxDim=Math.max(pcol,prow);
      const pc2=Math.floor((slotW-16)/maxDim);
      const ox=sx+(slotW-pcol*pc2)/2,oy=sy+(slotH-prow*pc2)/2;
      sh.forEach((line,rr)=>line.forEach((v,cc)=>{if(v)drawCell(ctx,piece.color,ox+cc*pc2|0,oy+rr*pc2|0,pc2,selSkin,t);}));
      bonusPickerRects.push({x:sx,y:sy,w:slotW,h:slotH,idx:i});
    });
    // Dismiss hint
    const hsz=cl(pw3*0.038|0,8,12);
    ctx.save();ctx.font=`${hsz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='rgba(180,180,200,0.7)';
    ctx.fillText('(appuyez en dehors pour ignorer)',px3+pw3/2,py3+ph3*0.93);ctx.restore();
  }
  // Second Chance Panel
  if(showSecondChance){
    const scpW=Math.min(W-24,360),scpH=Math.round(H*0.4);
    const scpX=(W-scpW)/2,scpY=(H-scpH)/2;
    ctx.fillStyle='rgba(0,0,0,0.76)';ctx.fillRect(0,0,W,H);
    const spg=ctx.createLinearGradient(scpX,scpY,scpX,scpY+scpH);
    spg.addColorStop(0,hexA(th.gbg,0.97));spg.addColorStop(1,hexA(th.bg,0.95));
    rrect(ctx,scpX,scpY,scpW,scpH,16,spg,null);
    const spsh=ctx.createLinearGradient(scpX,scpY,scpX,scpY+scpH*0.35);
    spsh.addColorStop(0,'rgba(255,255,255,0.11)');spsh.addColorStop(1,'rgba(255,255,255,0)');
    rp(ctx,scpX,scpY,scpW,scpH*0.35,16);ctx.fillStyle=spsh;ctx.fill();
    rp(ctx,scpX,scpY,scpW,scpH,16);ctx.strokeStyle=hexA(th.dc,0.7);ctx.lineWidth=2;ctx.stroke();
    const qSz=cl(scpW*0.068|0,10,20);
    ctx.save();ctx.font=`bold ${qSz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=th.hi||th.tm;ctx.shadowColor=th.tm;ctx.shadowBlur=12;
    ctx.fillText('SECONDE CHANCE ?',scpX+scpW/2,scpY+scpH*0.18);
    ctx.shadowBlur=0;
    const scSub=cl(qSz*0.72|0,8,14);
    ctx.font=`${scSub}px Arial`;ctx.fillStyle=hexA(th.tg,0.9);ctx.shadowBlur=0;
    ctx.fillText('OUI : retire les 5 derniers blocs posés',scpX+scpW/2,scpY+scpH*0.33);
    ctx.fillText('et remplace le plateau par 3 à 5 nouvelles pièces',scpX+scpW/2,scpY+scpH*0.44);
    ctx.shadowBlur=0;ctx.restore();
    const btnW=Math.floor(scpW*0.32),btnH=Math.floor(scpH*0.2);
    const ouiX=scpX+scpW*0.12,ouiY=scpY+scpH*0.55;
    const ouiG=ctx.createLinearGradient(ouiX,ouiY,ouiX,ouiY+btnH);
    ouiG.addColorStop(0,'#40C060');ouiG.addColorStop(1,'#205030');
    rrect(ctx,ouiX,ouiY,btnW,btnH,btnH/3,ouiG,null);
    ctx.save();ctx.font=`bold ${Math.floor(btnH*0.5)}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#FFF';ctx.shadowColor='#60FF80';ctx.shadowBlur=6;ctx.fillText('OUI',ouiX+btnW/2,ouiY+btnH/2);ctx.restore();
    secondChanceBtns.oui={x:ouiX,y:ouiY,w:btnW,h:btnH};
    const nonX=scpX+scpW*0.56,nonY=ouiY;
    const nonG=ctx.createLinearGradient(nonX,nonY,nonX,nonY+btnH);
    nonG.addColorStop(0,'#C04040');nonG.addColorStop(1,'#601020');
    rrect(ctx,nonX,nonY,btnW,btnH,btnH/3,nonG,null);
    ctx.save();ctx.font=`bold ${Math.floor(btnH*0.5)}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#FFF';ctx.shadowColor='#FF6060';ctx.shadowBlur=6;ctx.fillText('NON',nonX+btnW/2,nonY+btnH/2);ctx.restore();
    secondChanceBtns.non={x:nonX,y:nonY,w:btnW,h:btnH};
  }
  // Game Over
  if(over){
    const el=Date.now()-overT;
    ctx.fillStyle=`rgba(0,0,0,${Math.min(0.78,el/600*0.78).toFixed(3)})`;ctx.fillRect(0,0,W,H);
    if(el>350){
      const pw2=Math.min(W-24,390),ph2=Math.round(H*0.44);
      const px=(W-pw2)/2,py=(H-ph2)/2-10;
      // Panel glass
      const pg2=ctx.createLinearGradient(px,py,px,py+ph2);
      pg2.addColorStop(0,hexA(th.gbg,0.95));pg2.addColorStop(1,hexA(th.bg,0.92));
      rrect(ctx,px,py,pw2,ph2,18,pg2,null);
      // Panel shine
      const psg=ctx.createLinearGradient(px,py,px,py+ph2*0.4);
      psg.addColorStop(0,'rgba(255,255,255,0.1)');psg.addColorStop(1,'rgba(255,255,255,0)');
      rp(ctx,px,py,pw2,ph2*0.4,18);ctx.fillStyle=psg;ctx.fill();
      rp(ctx,px,py,pw2,ph2,18);ctx.strokeStyle=hexA(th.dc,0.7);ctx.lineWidth=2;ctx.stroke();
      // Title
      const goSz=cl(pw2*0.12|0,16,40);
      drawPremText(ctx,'GAME OVER',W/2,py+ph2*0.24,`bold ${goSz}px Impact,Arial`,'#FF6040','#CC2010','rgba(0,0,0,0.6)','#FF4020',18,3);
      ctx.textAlign='center';ctx.textBaseline='middle';
      // Score
      const scSz=cl(pw2*0.075|0,12,26);
      const isRec=score>=best&&score>0;
      if(isRec){drawPremText(ctx,`★  ${score}  ★`,W/2,py+ph2*0.46,`bold ${scSz}px Impact,Arial`,'#FFEE60','#FFA020','rgba(0,0,0,0.5)','#FFCC00',12,2.5);}
      else{ctx.font=`bold ${scSz}px Impact,Arial`;ctx.fillStyle=th.tm;ctx.fillText(`Score : ${score}`,W/2,py+ph2*0.46);}
      ctx.font=`bold ${scSz*0.88}px Arial`;
      ctx.fillStyle=isRec?th.hi||th.ta:th.ta;ctx.fillText(isRec?'NOUVEAU RECORD !':` Record : ${best}`,W/2,py+ph2*0.63);
      if(el>1200){
        const tapA=0.5+0.5*Math.abs(Math.sin(Date.now()*0.004));
        ctx.globalAlpha=tapA;ctx.font=`bold ${scSz*0.85}px Arial`;ctx.fillStyle='#A0E8A0';ctx.shadowColor='#A0E8A0';ctx.shadowBlur=6;
        ctx.fillText('Toucher pour continuer',W/2,py+ph2*0.82);ctx.shadowBlur=0;ctx.globalAlpha=1;
      }
      ctx.textAlign='left';ctx.textBaseline='alphabetic';
    }
  }
}

function drawHUD(th){

    const bh=GRID_Y-3;
    const hg2=ctx.createLinearGradient(0,0,0,bh);

    if(doublePointsUntil>Date.now()){const rem=Math.ceil((doublePointsUntil-Date.now())/1000);ctx.save();ctx.font=`bold ${fz*0.65}px Arial`;ctx.fillStyle='#30FFAA';ctx.shadowColor='#00FFB0';ctx.shadowBlur=5;ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText(`×2 ${rem}s`,W-8,combo>1?bh*0.52:bh*0.72);ctx.shadowBlur=0;ctx.restore();}

    rrect(ctx,hx-3,GRID_Y,hw+3,GH,8,hg3,hexA(th.dc,0.45),1);
    let cy=GRID_Y+12;const fz=cl(hw*0.14|0,8,18);
    ctx.font=`${fz*0.72}px Arial`;ctx.fillStyle=th.tg;ctx.textBaseline='top';ctx.fillText('SCORE',hx,cy);cy+=fz*0.85;
    drawScore(ctx,`${score}`,hx+hw/2,cy+fz*0.7,th,`bold ${fz*1.35}px Impact,Arial`);cy+=fz*1.65;
    ctx.font=`${fz*0.72}px Arial`;ctx.fillStyle=th.tg;ctx.textBaseline='top';ctx.fillText(`REC: ${best}`,hx,cy);cy+=fz;
    ctx.fillText(`Pièces: ${placed}`,hx,cy);cy+=fz*1.2;
    if(combo>1){ctx.save();ctx.font=`bold ${fz}px Arial`;ctx.fillStyle=th.tm;ctx.shadowColor=th.tm;ctx.shadowBlur=7;ctx.fillText(`★ ×${combo}`,hx,cy);ctx.restore();cy+=fz*1.2;}
    ctx.font=`${fz*0.72}px Arial`;ctx.fillStyle=th.tg;ctx.fillText(THEMES[curTheme].name,hx,cy);ctx.textBaseline='alphabetic';

// ─── INPUT ───────────────────────────────────────────────────────────────────
function getPos(e){if(e.touches&&e.touches.length>0)return{x:e.touches[0].clientX,y:e.touches[0].clientY};if(e.changedTouches&&e.changedTouches.length>0)return{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};return{x:e.clientX,y:e.clientY};}
function onDown(e){e.preventDefault();const{x,y}=getPos(e);mouseX=x;mouseY=y;if(gameState==='menu'){handleMenuTap(x,y);return;}if(gameState==='gameover'){if(Date.now()-overT>1200)gameState='menu';return;}if(gameState==='playing'&&!over&&!showSecondChance&&!showBonusPicker){const pw=GW/3;for(let i=0;i<3;i++){if(x>=GRID_X+i*pw&&x<GRID_X+(i+1)*pw&&y>=TRAY_Y&&y<TRAY_Y+TRAY_H&&tray[i]){drag={idx:i};lastPickTime=Date.now();break;}}}}
function onMove(e){e.preventDefault();const{x,y}=getPos(e);mouseX=x;mouseY=y;}
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function onUp(e){
  e.preventDefault();const{x,y}=getPos(e);mouseX=x;mouseY=y;
  // Second chance buttons
  if(showSecondChance){
    const ob=secondChanceBtns.oui,nb=secondChanceBtns.non;
    if(ob&&x>=ob.x&&x<ob.x+ob.w&&y>=ob.y&&y<ob.y+ob.h){
      // Remove last up to 5 placed cells still on the grid
      const toUndo=placeHistory.splice(-5);
      toUndo.reverse().forEach(entry=>{
        entry.cells.forEach(({r,c})=>{
          grid[r][c]=null;gridStars[r][c]=false;gridBonus[r][c]=null;
        });
        // remove any parasites from those cells
        parasites=parasites.filter(p=>!entry.cells.some(cl=>cl.r===p.r&&cl.c===p.c));
      });
      // Refresh tray with 3–5 new pieces
      const newCount=rndI(3,5);
      tray=Array.from({length:newCount},()=>newPiece());
      showSecondChance=false;secondChanceUsed=true;combo=0;drag=null;
      screenFlash=160;screenFlashCol='#40FF80';
      floats.push(new FloatText('SECONDE CHANCE !',W/2,H/2,'#40FF80',1.4,120));
      return;
    }
    if(nb&&x>=nb.x&&x<nb.x+nb.w&&y>=nb.y&&y<nb.y+nb.h){
      showSecondChance=false;secondChanceUsed=true;
      over=true;overT=Date.now();
      if(score>best){best=score;try{localStorage.setItem('blockpuzzle_best',String(best));}catch(e2){}}
      setTimeout(()=>{gameState='gameover';},2000);drag=null;return;
    }
    drag=null;return;
  }
  // Bonus picker overlay
  if(showBonusPicker){
    // Check if a piece was picked
    let picked=false;
    for(let i=0;i<bonusPickerRects.length;i++){
      const br2=bonusPickerRects[i];
      if(x>=br2.x&&x<br2.x+br2.w&&y>=br2.y&&y<br2.y+br2.h){
        const chosen=bonusPickerPieces[br2.idx];
        // Fill first empty slot (there is always one since bonus triggers right after placing)
        let placed2=false;
        for(let s=0;s<tray.length;s++){if(!tray[s]){tray[s]=chosen;placed2=true;break;}}
        if(!placed2){tray[0]=chosen;}
        showBonusPicker=false;bonusPickerPieces=[];bonusPickerRects=[];
        drag=null;picked=true;break;
      }
    }
    if(!picked){
      // Tapped outside panel — dismiss
      const pw3=Math.min(W-20,400),ph3=Math.round(H*0.38);
      const px3=(W-pw3)/2,py3=(H-ph3)/2;
      if(x<px3||x>px3+pw3||y<py3||y>py3+ph3){
        showBonusPicker=false;bonusPickerPieces=[];bonusPickerRects=[];
      }
    }
    drag=null;return;
  }
  // Bonus banner click — open picker
  if(showAddCellsBonus&&addCellsBonusRect){
    const br=addCellsBonusRect;
    if(x>=br.x&&x<br.x+br.w&&y>=br.y&&y<br.y+br.h){
      bonusPickerPieces=Array.from({length:5},()=>newPiece());
      showBonusPicker=true;showAddCellsBonus=false;addCellsBonusRect=null;drag=null;return;
    }
  }
  if(drag&&gameState==='playing'&&!over&&!showSecondChance){
    const piece=tray[drag.idx];
    if(piece){const{gr,gc}=snapPos(x,y,piece.shape);if(canPlace(grid,piece.shape,gr,gc)){
      placePiece(grid,piece.shape,piece.color,gr,gc);
      // ── Speed mechanic ───────────────────────────────────────────────────
      const now2=Date.now();
      const thinkMs=lastPickTime>0?now2-lastPickTime:4000;
      let speedMul=1.0,speedLabel=null,speedCol='#FFFFFF',speedError=false;
      if(thinkMs<SPEED_TURBO){
        speedMul=1.8;speedLabel='⚡ TURBO ×1.8';speedCol='#FF4020';
        // Error chance: 60% — fill one random empty cell
        speedError=Math.random()<0.6;
      }else if(thinkMs<SPEED_FAST){
        speedMul=1.3;speedLabel='⚡ RAPIDE ×1.3';speedCol='#FFA020';
        speedError=Math.random()<0.25;
      }else if(thinkMs>=SPEED_SLOW){
        speedMul=0.8;speedLabel='🐢 LENT ×0.8';speedCol='#88AAFF';
      }
      if(speedError){
        // Random error: fill a random empty cell near placed piece
        const emptyCells=[];
        const cr2=gr+Math.floor(piece.shape.length/2),cc2=gc+Math.floor(piece.shape[0].length/2);
        for(let dr=-3;dr<=3;dr++)for(let dc=-3;dc<=3;dc++){const er=cr2+dr,ec=cc2+dc;if(er>=0&&er<ROWS&&ec>=0&&ec<COLS&&!grid[er][ec])emptyCells.push({r:er,c:ec});}
        shuffleArr(emptyCells);
        if(emptyCells.length>0){
          const{r:er,c:ec}=emptyCells[0];
          grid[er][ec]=rndc(COLORS);
          placedCells.push({r:er,c:ec,f:0});
          floats.push(new FloatText('ERREUR !',GRID_X+ec*CELL+CELL/2,GRID_Y+er*CELL,'#FF4020',0.9,65));
          shake=Math.max(shake,6);shakePow=Math.max(shakePow,2);
          screenFlash=Math.min(255,screenFlash+60);screenFlashCol='#FF3010';
        }
      }
      // ── Pop anim + stars/bonus assignment per cell ────────────────────────
      piece.shape.forEach((line,rr)=>line.forEach((v,cc)=>{if(v){const ri=gr+rr,ci=gc+cc;placedCells.push({r:ri,c:ci,f:0});
        if(piece.isParasite){
          parasites.push({r:ri,c:ci,born:now2,lastTick:now2});
          gridStars[ri][ci]=false;gridBonus[ri][ci]=null;
        }else{
          const rn=Math.random();gridStars[ri][ci]=rn<0.15;
          if(!gridStars[ri][ci]){const rn2=Math.random();gridBonus[ri][ci]=rn2<0.05?'bomb':rn2<0.09?'x2':null;}else gridBonus[ri][ci]=null;
        }
      }}));
      // ── Record in place history (for second chance undo) ─────────────────
      {
        const hCells=[];
        piece.shape.forEach((line,rr)=>line.forEach((v,cc)=>{if(v)hCells.push({r:gr+rr,c:gc+cc,color:piece.color});}));
        placeHistory.push({cells:hCells});
        if(placeHistory.length>5)placeHistory.shift();
      }
      tray[drag.idx]=null;placed++;
      showAddCellsBonus=false;addCellsBonusTimer--;
      if(addCellsBonusTimer<=0){showAddCellsBonus=true;addCellsBonusTimer=Math.floor(rnd(8,15));}
      const ti=getCurTheme(),{n,cells,colors}=clearLines(grid);
      if(n>0){
        let starPts=0;const bombList=[];let hasX2=false;
        // Kill parasites in cleared lines
        const clearedSet=new Set(cells.map(({r,c})=>r*100+c));
        const pBefore=parasites.length;
        parasites=parasites.filter(p=>!clearedSet.has(p.r*100+p.c));
        if(parasites.length<pBefore)floats.push(new FloatText('☠ PARASITE ÉLIMINÉ',GRID_X+GW/2,GRID_Y+GH*0.4,'#00FF80',1.0,90));
        cells.forEach(({r,c})=>{if(gridStars[r][c])starPts+=25;if(gridBonus[r][c]==='bomb')bombList.push({r,c});if(gridBonus[r][c]==='x2')hasX2=true;gridStars[r][c]=false;gridBonus[r][c]=null;});
        const bombKilled=[];
        bombList.forEach(({r,c})=>{for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const br=r+dr,bc=c+dc;if(br>=0&&br<ROWS&&bc>=0&&bc<COLS&&grid[br][bc]){bombKilled.push({r:br,c:bc});grid[br][bc]=null;gridStars[br][bc]=false;gridBonus[br][bc]=null;}}});
        if(bombKilled.length>0){spawnParticles(bombKilled,8,2,['#FF6020','#FFA020','#FF2010']);shake=Math.max(shake,14);shakePow=Math.max(shakePow,6);screenFlash=Math.min(255,screenFlash+120);screenFlashCol='#FF4010';}
        if(hasX2)doublePointsUntil=Date.now()+60000;
        combo++;
        let pts=Math.round(n===1?100*(1+(combo-1)*0.5):n===2?350*(1+(combo-1)*0.5):n*165*(1+(combo-1)*0.5));
        pts+=starPts;
        pts=Math.round(pts*speedMul);
        if(Date.now()<doublePointsUntil)pts=pts*2;
        score+=pts;
        spawnParticles(cells,6,1.2,THEMES[ti].pc);spawnDebris(colors,ti,8);
        if(n>=2){shake=Math.max(shake,10);shakePow=Math.max(shakePow,3+(n>=3?4:0));}
        screenFlash=Math.max(screenFlash,80+(n>=3?120:0));screenFlashCol=THEMES[ti].tm;
        const miny=Math.min(...cells.map(c=>c.r));
        floats.push(new FloatText(n>=3?`★ +${pts} ★`:`+${pts}`,GRID_X+GW/2,GRID_Y+miny*CELL,THEMES[ti].tm));
        if(n>=2){const cn=Math.min(n,4);floats.push(new FloatText(`COMBO ×${cn} POINT`,GRID_X+GW/2,GRID_Y+GH/2,THEMES[ti].hi||'#FFD700',1.6,110));}
        if(starPts>0)floats.push(new FloatText(`★+${starPts}`,GRID_X+GW/2,GRID_Y+miny*CELL-CELL*1.5,THEMES[ti].hi||'#FFE030',1.2,90));
        if(hasX2)floats.push(new FloatText('×2 POINTS 60s',GRID_X+GW/2,GRID_Y+GH*0.35,'#30FFAA',1.1,100));
        const newTh=getCurTheme();if(newTh!==curTheme){curTheme=newTh;gameBg=buildBg(curTheme);gameFx=initFx(curTheme);screenFlash=200;screenFlashCol=THEMES[newTh].tm;}
      }else combo=0;
      // Speed float (show regardless of line clear)
      if(speedLabel)floats.push(new FloatText(speedLabel,GRID_X+GW/2,GRID_Y+GH*0.25,speedCol,0.85,70));
      if(tray.every(p=>p===null))tray=newTray();
      if(!anyValid(grid,tray)){
        if(score>best){best=score;try{localStorage.setItem('blockpuzzle_best',String(best));}catch(e2){}}
        if(!secondChanceUsed){showSecondChance=true;}
        else{over=true;overT=Date.now();setTimeout(()=>{gameState='gameover';},2000);}
      }
    }}
    drag=null;
  }
}
function handleMenuTap(x,y){
  layoutMenu();
  for(let i=0;i<skinRects.length;i++){const{x:rx,y:ry,w,h}=skinRects[i];if(x>=rx&&x<rx+w&&y>=ry&&y<ry+h){selSkin=i;return;}}
  for(let i=0;i<themeRects.length;i++){const{x:rx,y:ry,w,h}=themeRects[i];if(x>=rx&&x<rx+w&&y>=ry&&y<ry+h){selTheme=i;menuBg=buildBg(i);menuFx=initFx(i);return;}}
  if(playRect){const{x:rx,y:ry,w,h}=playRect;if(x>=rx&&x<rx+w&&y>=ry&&y<ry+h){resize();resetGame();gameState='playing';}}
}
window.addEventListener('keydown',e=>{
  if(gameState==='gameover'){gameState='menu';return;}
  if(gameState==='menu'&&(e.key==='Enter'||e.key===' ')){resize();resetGame();gameState='playing';return;}
  if(gameState==='playing'){
    if(e.key==='Escape'){
      gameState='menu';
      return;
    }
    if(e.key==='r'||e.key==='R'){
      if(score > best){
        best = score;
        try {
          localStorage.setItem('blockpuzzle_best', String(best));
        } catch (err) {}
      }
      resetGame();
    }
  }
});
canvas.addEventListener('mousedown',onDown,{passive:false});
canvas.addEventListener('mousemove',onMove,{passive:false});
canvas.addEventListener('mouseup',onUp,{passive:false});
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onUp,{passive:false});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// ─── LOOP ─────────────────────────────────────────────────────────────────────
function loop(ts){
  ctx.clearRect(0,0,W,H);
  if(gameState==='menu')drawMenu(ts);else drawGame(ts);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
