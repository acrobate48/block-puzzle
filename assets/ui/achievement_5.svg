<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#0a0800"/>
    </radialGradient>
    <radialGradient id="ring5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8A0"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#A07000"/>
    </radialGradient>
    <radialGradient id="halo5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#FFD700" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FFD700" flood-opacity="0.7"/>
    </filter>
    <filter id="ringglow5">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#FFD700" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#FFFF80" flood-opacity="0.4"/>
    </filter>
    <filter id="checkglow5">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#FFFFFF" flood-opacity="0.8"/>
    </filter>
  </defs>
  <!-- Hexagonal background -->
  <polygon points="40,4 73,22 73,58 40,76 7,58 7,22" fill="url(#bg5)" filter="url(#shadow5)"/>
  <!-- Outer halo -->
  <circle cx="40" cy="38" r="28" fill="url(#halo5)"/>
  <!-- Outer gold ring -->
  <circle cx="40" cy="38" r="22" fill="none" stroke="url(#ring5)" stroke-width="4" filter="url(#ringglow5)"/>
  <!-- Second inner ring -->
  <circle cx="40" cy="38" r="17" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  <!-- Gold fill circle -->
  <circle cx="40" cy="38" r="14" fill="#1a1400"/>
  <!-- Sparkle dots on outer ring -->
  <circle cx="40" cy="16.5" r="2" fill="#FFFAAA" filter="url(#ringglow5)"/>
  <circle cx="58.5" cy="27" r="1.5" fill="#FFE050" filter="url(#ringglow5)" opacity="0.8"/>
  <circle cx="58.5" cy="49" r="1.5" fill="#FFE050" filter="url(#ringglow5)" opacity="0.8"/>
  <circle cx="40" cy="59.5" r="2" fill="#FFFAAA" filter="url(#ringglow5)"/>
  <circle cx="21.5" cy="49" r="1.5" fill="#FFE050" filter="url(#ringglow5)" opacity="0.8"/>
  <circle cx="21.5" cy="27" r="1.5" fill="#FFE050" filter="url(#ringglow5)" opacity="0.8"/>
  <!-- Checkmark -->
  <polyline points="30,38 37,46 52,28" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#checkglow5)"/>
  <polyline points="30,38 37,46 52,28" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Label -->
  <text x="40" y="72.5" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#FFD700" text-anchor="middle" letter-spacing="0.5">PARFAIT</text>
  <!-- Hex border -->
  <polygon points="40,4 73,22 73,58 40,76 7,58 7,22" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.9"/>
  <polygon points="40,5.5 71.5,23 71.5,57 40,74.5 8.5,57 8.5,23" fill="none" stroke="#FFFF80" stroke-width="0.5" opacity="0.4"/>
</svg>
