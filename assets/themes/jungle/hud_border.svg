<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 20" width="100%" height="20" opacity="0.90">
  <defs>
    <filter id="jglow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#7fff00" flood-opacity="0.7"/>
    </filter>
    <!-- Single leaf shape: ellipse tilted -->
    <g id="leaf">
      <ellipse cx="0" cy="0" rx="7" ry="3" fill="#3a8c1e" transform="rotate(-35)" filter="url(#jglow)"/>
      <line x1="0" y1="-3" x2="0" y2="3" stroke="#1d5c0a" stroke-width="0.5" transform="rotate(-35)"/>
    </g>
    <!-- Small flower -->
    <g id="flower">
      <circle cx="0" cy="0" r="1.5" fill="#ffd700"/>
      <circle cx="0" cy="-2.5" r="1" fill="#ffe066" opacity="0.85"/>
      <circle cx="0" cy="2.5" r="1" fill="#ffe066" opacity="0.85"/>
      <circle cx="-2.5" cy="0" r="1" fill="#ffe066" opacity="0.85"/>
      <circle cx="2.5" cy="0" r="1" fill="#ffe066" opacity="0.85"/>
    </g>
  </defs>

  <!-- Ground bar -->
  <rect x="0" y="15" width="400" height="5" fill="#1a4d08" opacity="0.6"/>

  <!-- 10 leaves spread across 400px (every 36px), centered vertically -->
  <use href="#leaf" transform="translate(18,11)"/>
  <use href="#leaf" transform="translate(54,9) scale(-1,1)"/>
  <use href="#leaf" transform="translate(90,11)"/>
  <use href="#leaf" transform="translate(126,9) scale(-1,1)"/>
  <use href="#leaf" transform="translate(162,11)"/>
  <use href="#leaf" transform="translate(198,9) scale(-1,1)"/>
  <use href="#leaf" transform="translate(234,11)"/>
  <use href="#leaf" transform="translate(270,9) scale(-1,1)"/>
  <use href="#leaf" transform="translate(306,11)"/>
  <use href="#leaf" transform="translate(342,9) scale(-1,1)"/>
  <use href="#leaf" transform="translate(378,11)"/>

  <!-- Flowers between leaves -->
  <use href="#flower" transform="translate(36,14)"/>
  <use href="#flower" transform="translate(72,13)"/>
  <use href="#flower" transform="translate(108,14)"/>
  <use href="#flower" transform="translate(144,13)"/>
  <use href="#flower" transform="translate(180,14)"/>
  <use href="#flower" transform="translate(216,13)"/>
  <use href="#flower" transform="translate(252,14)"/>
  <use href="#flower" transform="translate(288,13)"/>
  <use href="#flower" transform="translate(324,14)"/>
  <use href="#flower" transform="translate(360,13)"/>
</svg>
