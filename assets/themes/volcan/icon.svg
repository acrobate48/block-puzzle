<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56" width="100%" height="100%">
  <defs>
    <linearGradient id="vbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#380808"/>
      <stop offset="100%" stop-color="#180402"/>
    </linearGradient>
    <linearGradient id="vvolc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A1010"/>
      <stop offset="100%" stop-color="#1A0808"/>
    </linearGradient>
    <linearGradient id="vlava" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6800"/>
      <stop offset="100%" stop-color="#CC2000"/>
    </linearGradient>
    <radialGradient id="vglow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#FF4400" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF2200" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="80" height="56" rx="6" fill="url(#vbg)"/>

  <!-- Sky glow from eruption -->
  <ellipse cx="40" cy="4" rx="28" ry="18" fill="url(#vglow)"/>

  <!-- Volcano silhouette -->
  <path d="M5,44 L28,14 L40,10 L52,14 L75,44 Z" fill="url(#vvolc)"/>
  <!-- Volcano crater rim -->
  <path d="M32,12 Q40,8 48,12" stroke="#5A1808" stroke-width="2" fill="none"/>

  <!-- Lava flow left -->
  <path d="M35,12 Q31,20 28,28 Q25,34 26,40 Q28,44 24,44"
        stroke="url(#vlava)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Lava flow right -->
  <path d="M45,12 Q48,20 51,28 Q54,34 52,40 Q50,44 55,44"
        stroke="url(#vlava)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Lava pool at base -->
  <ellipse cx="40" cy="44" rx="18" ry="4" fill="#CC3000" opacity="0.8"/>
  <ellipse cx="40" cy="44" rx="12" ry="2.5" fill="#FF5000" opacity="0.6"/>

  <!-- Embers / sparks -->
  <circle cx="38" cy="8" r="1.2" fill="#FF8800" opacity="0.9"/>
  <circle cx="43" cy="6" r="0.8" fill="#FFAA00" opacity="0.8"/>
  <circle cx="34" cy="6" r="1" fill="#FF6600" opacity="0.7"/>
  <circle cx="46" cy="9" r="0.6" fill="#FF4400" opacity="0.6"/>
  <circle cx="40" cy="5" r="1.5" fill="#FFB800" opacity="0.8"/>

  <!-- Rock texture on volcano -->
  <path d="M25,32 L32,20 L28,26 Z" fill="#2A0808" opacity="0.4"/>
  <path d="M52,32 L46,20 L50,26 Z" fill="#2A0808" opacity="0.4"/>

  <!-- Theme name -->
  <text x="40" y="52" font-family="Arial, sans-serif" font-size="8" font-weight="bold"
        fill="#F08020" text-anchor="middle" dominant-baseline="middle">VOLCAN</text>

  <!-- Gloss overlay -->
  <rect width="80" height="20" rx="6" fill="white" opacity="0.06"/>
  <rect x="0" y="0" width="80" height="8" rx="6" fill="white" opacity="0.07"/>
</svg>
