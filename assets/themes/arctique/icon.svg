<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56" width="100%" height="100%">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#142840"/>
      <stop offset="100%" stop-color="#08121E"/>
    </linearGradient>
    <linearGradient id="aice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8F0FF"/>
      <stop offset="100%" stop-color="#88C8E8"/>
    </linearGradient>
    <radialGradient id="aglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60C8F0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#60C8F0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="80" height="56" rx="6" fill="url(#abg)"/>

  <!-- Aurora band -->
  <path d="M0,16 Q20,10 40,18 Q60,26 80,14" stroke="#40D0C0" stroke-width="3" fill="none" opacity="0.25"/>
  <path d="M0,20 Q20,14 40,22 Q60,30 80,18" stroke="#40A8F0" stroke-width="2" fill="none" opacity="0.2"/>

  <!-- Snowflake glow -->
  <circle cx="40" cy="26" r="16" fill="url(#aglow)"/>

  <!-- Snowflake — 6 main branches -->
  <g id="snowflake" stroke="url(#aice)" stroke-linecap="round">
    <!-- Branch 1: top-bottom -->
    <line x1="40" y1="12" x2="40" y2="40" stroke-width="1.8"/>
    <!-- Branch 2: diagonal -->
    <line x1="27.2" y1="19" x2="52.8" y2="33" stroke-width="1.8"/>
    <!-- Branch 3: other diagonal -->
    <line x1="52.8" y1="19" x2="27.2" y2="33" stroke-width="1.8"/>

    <!-- Sub-branches on branch 1 top -->
    <line x1="40" y1="16" x2="36" y2="12" stroke-width="1.1"/>
    <line x1="40" y1="16" x2="44" y2="12" stroke-width="1.1"/>
    <line x1="40" y1="20" x2="36" y2="16" stroke-width="1"/>
    <line x1="40" y1="20" x2="44" y2="16" stroke-width="1"/>
    <!-- Sub-branches on branch 1 bottom -->
    <line x1="40" y1="36" x2="36" y2="40" stroke-width="1.1"/>
    <line x1="40" y1="36" x2="44" y2="40" stroke-width="1.1"/>
    <line x1="40" y1="32" x2="36" y2="36" stroke-width="1"/>
    <line x1="40" y1="32" x2="44" y2="36" stroke-width="1"/>

    <!-- Sub-branches on diagonal branch 2 -->
    <line x1="30.6" y1="20.8" x2="28.6" y2="17" stroke-width="1.1"/>
    <line x1="30.6" y1="20.8" x2="27" y2="22.8" stroke-width="1.1"/>
    <line x1="49.4" y1="31.2" x2="51.4" y2="35" stroke-width="1.1"/>
    <line x1="49.4" y1="31.2" x2="53" y2="29.2" stroke-width="1.1"/>

    <!-- Sub-branches on diagonal branch 3 -->
    <line x1="49.4" y1="20.8" x2="51.4" y2="17" stroke-width="1.1"/>
    <line x1="49.4" y1="20.8" x2="53" y2="22.8" stroke-width="1.1"/>
    <line x1="30.6" y1="31.2" x2="28.6" y2="35" stroke-width="1.1"/>
    <line x1="30.6" y1="31.2" x2="27" y2="29.2" stroke-width="1.1"/>
  </g>

  <!-- Center hexagon -->
  <polygon points="40,22.5 43.5,24.75 43.5,29.25 40,31.5 36.5,29.25 36.5,24.75"
           fill="#88E0F8" opacity="0.8"/>
  <circle cx="40" cy="26" r="2" fill="white" opacity="0.9"/>

  <!-- Ground ice -->
  <rect x="0" y="44" width="80" height="12" rx="0" fill="#0A1E30" opacity="0.8"/>
  <path d="M0,44 Q10,41 20,44 Q30,47 40,43 Q52,39 65,43 Q72,45 80,42 L80,44 L0,44 Z" fill="#1A4060" opacity="0.6"/>

  <!-- Theme name -->
  <text x="40" y="52" font-family="Arial, sans-serif" font-size="8" font-weight="bold"
        fill="#88E0F8" text-anchor="middle" dominant-baseline="middle">ARCTIQUE</text>

  <!-- Gloss overlay -->
  <rect width="80" height="20" rx="6" fill="white" opacity="0.08"/>
  <rect x="0" y="0" width="80" height="8" rx="6" fill="white" opacity="0.10"/>
</svg>
