<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Gold gradient top→bottom: cream → yellow → amber → deep orange -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFF8C8"/>
      <stop offset="20%"  stop-color="#FFE840"/>
      <stop offset="52%"  stop-color="#FFD700"/>
      <stop offset="78%"  stop-color="#FF9200"/>
      <stop offset="100%" stop-color="#CC4E00"/>
    </linearGradient>
    <!-- White shine: opaque top → transparent mid -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.60"/>
      <stop offset="38%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="65%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Amber outer glow -->
    <filter id="x2OuterGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#FF9900" flood-opacity="0.75"/>
    </filter>
    <!-- Drop shadow for depth -->
    <filter id="x2Shadow" x="-25%" y="-25%" width="165%" height="165%">
      <feDropShadow dx="4" dy="6" stdDeviation="6" flood-color="#3A1200" flood-opacity="0.80"/>
    </filter>
    <!-- Bloom -->
    <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Inner glow merge -->
    <filter id="innerGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Specular softener -->
    <filter id="specSoft">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <!-- Clip to top 38% for shine -->
    <clipPath id="shineClip">
      <rect x="0" y="0" width="128" height="50"/>
    </clipPath>
  </defs>

  <!-- ── DARK BROWN BACKGROUND PLATE ── -->
  <rect x="8" y="16" width="112" height="96" rx="20" ry="20"
        fill="#1A0800" opacity="0.28"/>

  <!-- ── AMBER OUTER GLOW (behind text) ── -->
  <text x="64" y="88"
        font-family="Impact, Arial Black, sans-serif" font-weight="900"
        font-size="88" text-anchor="middle" dominant-baseline="auto"
        fill="#FF9900" opacity="0.55"
        filter="url(#x2OuterGlow)">×2</text>

  <!-- ── DEEP DARK STROKE OUTLINE (drop shadow layer) ── -->
  <text x="64" y="88"
        font-family="Impact, Arial Black, sans-serif" font-weight="900"
        font-size="88" text-anchor="middle" dominant-baseline="auto"
        fill="none" stroke="#3A1500" stroke-width="16" stroke-linejoin="round"
        filter="url(#x2Shadow)">×2</text>

  <!-- ── DARK OUTLINE (crisp edge) ── -->
  <text x="64" y="88"
        font-family="Impact, Arial Black, sans-serif" font-weight="900"
        font-size="88" text-anchor="middle" dominant-baseline="auto"
        fill="none" stroke="#5A2200" stroke-width="10" stroke-linejoin="round">×2</text>

  <!-- ── GOLD FILL ── -->
  <text x="64" y="88"
        font-family="Impact, Arial Black, sans-serif" font-weight="900"
        font-size="88" text-anchor="middle" dominant-baseline="auto"
        fill="url(#goldGrad)"
        filter="url(#bloom)">×2</text>

  <!-- ── WHITE SHINE (top portion, clipped) ── -->
  <text x="64" y="88"
        font-family="Impact, Arial Black, sans-serif" font-weight="900"
        font-size="88" text-anchor="middle" dominant-baseline="auto"
        fill="url(#shineGrad)"
        clip-path="url(#shineClip)">×2</text>

  <!-- ── SPECULAR GLINT (top-left corner accent) ── -->
  <ellipse cx="30" cy="30" rx="14" ry="6" fill="#FFFFFF" opacity="0.28"
           transform="rotate(-18 30 30)" filter="url(#specSoft)"/>
</svg>
