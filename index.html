let _ac=null,_soundEnabled=true,_volume=0.7;
function _getAC(){if(!_ac)try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return _ac;}
function _tone(freq,dur,type,vol,delay){
  if(!_soundEnabled)return;
  try{const ac=_getAC();if(!ac)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type=type||'square';o.frequency.value=freq;
  const t=ac.currentTime+(delay||0);
  g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime((vol||0.15)*_volume,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t);o.stop(t+dur+0.05);}catch(e){}
}
function _vib(pattern){try{if(navigator.vibrate)navigator.vibrate(pattern);}catch(e){}}

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  const portrait=H>W;
  CELL=portrait?Math.floor((W-14)/COLS):Math.floor((H-52)/ROWS);
  CR=Math.max(3,CELL/7|0);
  GW=CELL*COLS;GH=CELL*ROWS;
  GRID_X=portrait?((W-GW)/2)|0:(W*0.06)|0;
  TRAY_H=Math.max((CELL*2.1)|0,68);
  const top=portrait?52:0;
  GRID_Y=portrait?top+Math.max(((H-top-GH-TRAY_H-14)/2)|0,0):((H-GH)/2)|0;
  if(GRID_Y<top)GRID_Y=top;
  TRAY_Y=GRID_Y+GH+6;
  PIECE_CELL=Math.floor(CELL*0.58);
  CELL_CACHE.clear();
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function hr(h){return parseInt(h.slice(1,3),16)}
function hg(h){return parseInt(h.slice(3,5),16)}
function hb(h){return parseInt(h.slice(5,7),16)}
function rgb(r,g,b){return`rgb(${r|0},${g|0},${b|0})`}
function rgba(r,g,b,a){return`rgba(${r|0},${g|0},${b|0},${+a.toFixed(3)})`}
function hexA(h,a){return rgba(hr(h),hg(h),hb(h),a)}
function cl(v,lo,hi){return v<lo?lo:v>hi?hi:v}
function lerp(a,b,t){return a+(b-a)*t}
function lerpC(c1,c2,t){return rgb(lerp(hr(c1),hr(c2),t),lerp(hg(c1),hg(c2),t),lerp(hb(c1),hb(c2),t))}
function rnd(lo,hi){return lo+Math.random()*(hi-lo)}
function rndI(lo,hi){return lo+(Math.random()*(hi-lo+1))|0}
function rndc(a){return a[Math.floor(Math.random()*a.length)]}
function seeded(s){let v=s;return()=>{v=(v*1664525+1013904223)&0xffffffff;return(v>>>0)/4294967296}}

// Rounded rect path (no fill/stroke)
function rp(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}
// Rounded rect fill+stroke
function rrect(ctx,x,y,w,h,r,fill,stroke,lw=1){
  rp(ctx,x,y,w,h,r);if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke()}
}
// Clip to rounded rect, call fn, restore
function rclip(ctx,x,y,sz,r,fn){ctx.save();rp(ctx,x,y,sz,sz,r);ctx.clip();fn();ctx.restore();}

// ─── PREMIUM TEXT ─────────────────────────────────────────────────────────────
// Gradient + outline + glow for title characters
function drawPremText(ctx,text,x,y,font,topCol,botCol,outlineCol,glowCol,glowSz=14,lw=3){
  ctx.save();ctx.font=font;ctx.textAlign='center';ctx.textBaseline='middle';
  const fsz=parseFloat((font.match(/[\d.]+/)||['14'])[0]);
  const g=ctx.createLinearGradient(0,y-fsz*0.5,0,y+fsz*0.5);
  g.addColorStop(0,topCol);g.addColorStop(0.55,botCol);g.addColorStop(1,lerpC(botCol,'#000000',0.3));
  if(glowCol){ctx.shadowColor=glowCol;ctx.shadowBlur=glowSz;}
  ctx.strokeStyle=outlineCol||'rgba(0,0,0,0.6)';ctx.lineWidth=lw;ctx.lineJoin='round';ctx.strokeText(text,x,y);
  ctx.shadowBlur=0;ctx.fillStyle=g;ctx.fillText(text,x,y);
  // Shine pass
  ctx.globalAlpha=0.18;
  const sg=ctx.createLinearGradient(x,y-fsz*0.5,x,y+fsz*0.1);
  sg.addColorStop(0,'rgba(255,255,255,1)');sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sg;ctx.fillText(text,x,y);
  ctx.globalAlpha=1;ctx.restore();
}

// Animated bouncing title (per char premium)
function bounceTitle(ctx,text,cx,by,t,font,topCol,botCol,glowCol,amp=7){
  ctx.save();ctx.font=font;ctx.textBaseline='middle';
  const chars=text.split('');
  const widths=chars.map(c=>ctx.measureText(c).width+1);
  const total=widths.reduce((s,w)=>s+w,0);
  let x=cx-total/2;
  const fsz=parseFloat((font.match(/[\d.]+/)||['14'])[0]);
  chars.forEach((ch,i)=>{
    const bob=Math.sin(t*0.0024+i*0.78)*amp;
    const shine=Math.sin(t*0.0028+i*0.4)*0.2;
    const gr=cl(hr(topCol)+shine*40,0,255),gg=cl(hg(topCol)+shine*40,0,255),gb=cl(hb(topCol)+shine*40,0,255);
    const g=ctx.createLinearGradient(x,by+bob-fsz*0.5,x,by+bob+fsz*0.5);
    g.addColorStop(0,rgb(gr,gg,gb));g.addColorStop(0.6,botCol);g.addColorStop(1,lerpC(botCol,'#000',0.4));
    ctx.save();
    ctx.shadowColor=glowCol;ctx.shadowBlur=16+Math.abs(bob);
    ctx.strokeStyle='rgba(0,0,0,0.55)';ctx.lineWidth=3;ctx.lineJoin='round';ctx.strokeText(ch,x,by+bob);
    ctx.shadowBlur=0;ctx.fillStyle=g;ctx.fillText(ch,x,by+bob);
    ctx.globalAlpha=0.22;
    const sg=ctx.createLinearGradient(x,by+bob-fsz*0.5,x,by+bob);
    sg.addColorStop(0,'#fff');sg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sg;ctx.fillText(ch,x,by+bob);
    ctx.globalAlpha=1;ctx.restore();
    x+=widths[i];
  });
  ctx.restore();
}
function titleWidth(ctx,text,font){ctx.save();ctx.font=font;const w=text.split('').reduce((s,c)=>s+ctx.measureText(c).width+1,0);ctx.restore();return w;}

// Small label with gradient + subtle glow
function labelText(ctx,text,x,y,col,font,align='center',glow=false){
  ctx.save();ctx.font=font;ctx.textAlign=align;ctx.textBaseline='middle';
  if(glow){ctx.shadowColor=col;ctx.shadowBlur=8;}
  ctx.fillStyle=col;ctx.fillText(text,x,y);
  ctx.shadowBlur=0;ctx.restore();
}

// ─── BONUS ICONS ─────────────────────────────────────────────────────────────
function drawBombIcon(ctx,cx,cy,sz){
  ctx.save();
  // Shadow under bomb
  ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=sz*0.3;ctx.shadowOffsetY=sz*0.08;
  // Bomb body – dark sphere
  const bg=ctx.createRadialGradient(cx-sz*0.12,cy-sz*0.1,sz*0.04,cx,cy+sz*0.05,sz*0.38);
  bg.addColorStop(0,'#555');bg.addColorStop(0.45,'#1A1A1A');bg.addColorStop(1,'#000');
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(cx,cy+sz*0.05,sz*0.38,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  // Shine spot
  ctx.fillStyle='rgba(255,255,255,0.28)';
  ctx.beginPath();ctx.ellipse(cx-sz*0.12,cy-sz*0.08,sz*0.13,sz*0.09,-0.4,0,Math.PI*2);ctx.fill();
  // Fuse cord (brown bezier)
  ctx.strokeStyle='#7B4F12';ctx.lineWidth=sz*0.09;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx+sz*0.26,cy-sz*0.28);
  ctx.quadraticCurveTo(cx+sz*0.48,cy-sz*0.52,cx+sz*0.32,cy-sz*0.68);ctx.stroke();
  // Fuse metal cap (small rect at top of body)
  ctx.fillStyle='#888';ctx.strokeStyle='#555';ctx.lineWidth=sz*0.04;
  ctx.beginPath();ctx.arc(cx+sz*0.26,cy-sz*0.25,sz*0.06,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Spark / ember at fuse tip
  ctx.shadowColor='#FF8800';ctx.shadowBlur=sz*0.5;
  ctx.fillStyle='#FFE040';ctx.beginPath();ctx.arc(cx+sz*0.32,cy-sz*0.68,sz*0.09,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFFFFF';ctx.beginPath();ctx.arc(cx+sz*0.32,cy-sz*0.68,sz*0.04,0,Math.PI*2);ctx.fill();
  // Spark rays
  ctx.strokeStyle='#FFA020';ctx.lineWidth=sz*0.06;ctx.lineCap='round';ctx.shadowBlur=sz*0.3;
  const rays=[[0,-1],[0.7,-0.7],[-0.6,-0.8],[0.85,0.1]];
  rays.forEach(([dx,dy])=>{const base=sz*0.1;ctx.beginPath();ctx.moveTo(cx+sz*0.32+dx*base,cy-sz*0.68+dy*base);ctx.lineTo(cx+sz*0.32+dx*(base+sz*0.14),cy-sz*0.68+dy*(base+sz*0.14));ctx.stroke();});
  ctx.shadowBlur=0;ctx.restore();
}
function drawX2Icon(ctx,cx,cy,sz){
  ctx.save();
  const fsz=sz*0.72;
  ctx.font=`bold ${fsz|0}px Impact,Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
  // Dark outline + shadow
  ctx.shadowColor='rgba(0,0,0,0.7)';ctx.shadowBlur=sz*0.25;
  ctx.strokeStyle='#4A2000';ctx.lineWidth=fsz*0.16;ctx.lineJoin='round';ctx.strokeText('×2',cx,cy);
  ctx.shadowBlur=0;
  // Gold gradient fill
  const g=ctx.createLinearGradient(cx,cy-fsz*0.5,cx,cy+fsz*0.5);
  g.addColorStop(0,'#FFF0A0');g.addColorStop(0.2,'#FFD700');g.addColorStop(0.6,'#FFA000');g.addColorStop(1,'#D46000');
  ctx.fillStyle=g;ctx.fillText('×2',cx,cy);
  // Shine pass
  ctx.globalAlpha=0.35;
  const sg=ctx.createLinearGradient(cx,cy-fsz*0.5,cx,cy+fsz*0.05);
  sg.addColorStop(0,'#fff');sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sg;ctx.fillText('×2',cx,cy);
  ctx.globalAlpha=1;ctx.restore();
}

// Parasite cell skin (replaces normal skin for parasite pieces/overlay)
function drawParasiteCell(ctx,x,y,sz,t,phase){
  rclip(ctx,x,y,sz,sz/4,()=>{
    // Dark corrupted base
    const bg=ctx.createRadialGradient(x+sz*0.4,y+sz*0.35,0,x+sz/2,y+sz/2,sz*0.7);
    bg.addColorStop(0,'#2A0A4E');bg.addColorStop(0.5,'#120228');bg.addColorStop(1,'#050010');
    ctx.fillStyle=bg;ctx.fillRect(x,y,sz,sz);
    // Pulsing green veins
    const pulse=0.5+0.5*Math.sin(t*0.006+phase);
    ctx.strokeStyle=`rgba(0,${(180+60*pulse)|0},${(40+20*pulse)|0},${(0.55+0.35*pulse).toFixed(2)})`;
    ctx.lineWidth=Math.max(1,sz*0.06);ctx.lineCap='round';
    // Vein pattern (seeded by position)
    const vr=seeded((x*31+y*17)&0xffff);
    for(let i=0;i<3;i++){
      const sx2=x+vr()*sz,sy2=y+vr()*sz,ex=x+vr()*sz,ey=y+vr()*sz;
      const mx=sx2+(ex-sx2)*0.5+Math.sin(t*0.004+i)*sz*0.12,my=sy2+(ey-sy2)*0.5+Math.cos(t*0.003+i)*sz*0.12;
      ctx.beginPath();ctx.moveTo(sx2,sy2);ctx.quadraticCurveTo(mx,my,ex,ey);ctx.stroke();
    }
    // Toxic glow dots
    ctx.shadowColor=`rgba(0,255,80,${0.6+0.4*pulse})`;ctx.shadowBlur=sz*0.4;
    const dr=seeded((x*13+y*29)&0xffff);
    for(let i=0;i<2;i++){
      ctx.fillStyle=`rgba(40,${(200+55*pulse)|0},60,${(0.7+0.3*pulse).toFixed(2)})`;
      ctx.beginPath();ctx.arc(x+dr()*sz,y+dr()*sz,sz*0.07,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;
    // Top shine
    const sh=ctx.createLinearGradient(x,y,x,y+sz*0.4);
    sh.addColorStop(0,'rgba(120,40,255,0.15)');sh.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sh;ctx.fillRect(x,y,sz,sz);
  });
}
// Parasite grid overlay (pulsing corrupt aura drawn on top of the host cell)
function drawParasiteOverlay(ctx,x,y,sz,t,phase){
  const pulse=0.5+0.5*Math.sin(t*0.007+phase);
  // Dark vignette border
  const bg=ctx.createRadialGradient(x+sz/2,y+sz/2,sz*0.18,x+sz/2,y+sz/2,sz*0.72);

// Score number with digit gradient

  g.addColorStop(0,th.hi||th.tm);g.addColorStop(0.5,th.tm);g.addColorStop(1,lerpC(th.ta,'#000',0.2));

// ─── CELL CACHE ───────────────────────────────────────────────────────────────
function getCached(col,sz,skin){
  const k=`${skin}_${col}_${sz}`;
  if(CELL_CACHE.has(k))return CELL_CACHE.get(k);
  const oc=document.createElement('canvas');oc.width=sz;oc.height=sz;
  const c2=oc.getContext('2d');
  SKIN_FNS[skin](c2,col,0,0,sz,0);
  CELL_CACHE.set(k,oc);return oc;
}
function drawCell(ctx,col,x,y,sz,skin,t,alpha=1){
  x=x|0;y=y|0;sz=sz|0;if(sz<1)return;
  if(alpha<1)ctx.globalAlpha=alpha;
  if(ANIMATED_SKINS.has(skin))SKIN_FNS[skin](ctx,col,x,y,sz,t);
  else ctx.drawImage(getCached(col,sz,skin),x,y);
  if(alpha<1)ctx.globalAlpha=1;
}

}

// ─── BACKGROUND ───────────────────────────────────────────────────────────────
function buildBg(ti){
  const th=THEMES[ti];

  const c=oc.getContext('2d');

  const g=c.createLinearGradient(0,0,0,H);

  c.fillStyle=g;c.fillRect(0,0,W,H);

  for(let i=0;i<40;i++){
    const lx=rng()*W,ly=rng()*H,lr=20+rng()*50;

  if(ti===5){// Icy ground
    const ig=c.createLinearGradient(0,H*0.75,0,H);ig.addColorStop(0,'rgba(140,200,255,0)');ig.addColorStop(1,'rgba(140,200,255,0.12)');c.fillStyle=ig;c.fillRect(0,H*0.75,W,H*0.25);

// ─── GAME LOGIC ───────────────────────────────────────────────────────────────
// Rotate a shape 90° clockwise
function rotateShape(s){
  const rows=s.length,cols=s[0].length;
  const out=Array.from({length:cols},(_,r)=>Array.from({length:rows},(_,c)=>s[rows-1-c][r]));
  return out;
}
// Apply N*90° rotations
function rotateN(s,n){let r=s;for(let i=0;i<(n%4);i++)r=rotateShape(r);return r;}
function newPiece(){return{shape:rndc(SHAPES),color:rndc(COLORS)};}
function newParasitePiece(){return{shape:rndc(SHAPES.filter(s=>s.flat().reduce((a,v)=>a+v,0)<=4)),color:'#1A0A2E',isParasite:true};}
function newTray(){
  const pieces=[newPiece(),newPiece(),newPiece()];
  // ~8% chance one slot becomes a parasite piece (only if none active on grid)
  if(parasites.length===0&&Math.random()<0.08){pieces[rndI(0,2)]=newParasitePiece();}
  return pieces;
}
function canPlace(grid,shape,row,col){for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++)if(shape[r][c]){const gr=row+r,gc=col+c;if(gr<0||gr>=ROWS||gc<0||gc>=COLS||grid[gr][gc])return false;}return true;}
function placePiece(grid,shape,color,row,col){for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++)if(shape[r][c])grid[row+r][col+c]=color;}
function clearLines(grid){const rf=[],cf=[];for(let r=0;r<ROWS;r++)if(grid[r].every(v=>v))rf.push(r);for(let c=0;c<COLS;c++){let f=true;for(let r=0;r<ROWS;r++)if(!grid[r][c]){f=false;break;}if(f)cf.push(c);}const cl2=new Set(),clC={};rf.forEach(r=>{for(let c=0;c<COLS;c++){const k=r*100+c;cl2.add(k);clC[k]=grid[r][c];}});cf.forEach(c=>{for(let r=0;r<ROWS;r++){const k=r*100+c;cl2.add(k);clC[k]=grid[r][c];}});cl2.forEach(k=>{grid[Math.floor(k/100)][k%100]=null;});return{n:rf.length+cf.length,cells:[...cl2].map(k=>({r:Math.floor(k/100),c:k%100})),colors:clC};}
function anyValid(grid,tray){for(const p of tray)if(p)for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(_modeCanPlace(grid,p.shape,r,c))return true;return false;}
function _zenClearRows(){
  // Remove up to 2 rows with the most filled cells to make room
  const counts=Array.from({length:ROWS},(_,r)=>({r,n:grid[r].filter(Boolean).length}));
  counts.sort((a,b)=>b.n-a.n);
  const toClear=counts.slice(0,2).map(x=>x.r).filter(r=>counts.find(x=>x.r===r).n>0);
  toClear.forEach(r=>{grid[r]=Array(COLS).fill(null);gridStars[r]=Array(COLS).fill(false);gridBonus[r]=Array(COLS).fill(null);});
  if(toClear.length>0){screenFlash=100;screenFlashCol='#60C880';floats.push(new FloatText('🍃 ZEN — place libérée !',GRID_X+GW/2,GRID_Y+GH/2,'#60C880',1.0,80));}
}
function snapPos(mx,my,shape){return{gr:Math.round((my-GRID_Y)/CELL-shape.length/2),gc:Math.round((mx-GRID_X)/CELL-shape[0].length/2)};}

// ─── PARTICLES / DEBRIS / FLOATTEXT ──────────────────────────────────────────
function spawnParticles(cells,n,pow,colors){cells.forEach(({r,c})=>{const cx=GRID_X+c*CELL+CELL/2,cy=GRID_Y+r*CELL+CELL/2;for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),s=rnd(1.5,4)*pow;particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-rnd(0,1.5),color:rndc(colors),life:28+rnd(0,28),ml:56,size:rnd(2,3.5*pow),circle:Math.random()<0.5});}});}
class Debris{
  constructor(x,y,color,ti){this.x=x;this.y=y;this.ml=44+rnd(0,28);this.life=this.ml;this.sz=4+rnd(0,9);this.wave=rnd(0,Math.PI*2);const r=hr(color||'#3AC644'),g=hg(color||'#3AC644'),b=hb(color||'#3AC644');if(ti===2){this.vx=rnd(-1,1);this.vy=rnd(-3,-0.8);this.grav=-0.02;this.circ=true;this.r=cl(r*0.2+70|0,0,255);this.g=cl(g*0.4+105|0,0,255);this.b=cl(b*0.55+140|0,0,255);}else if(ti===3){this.vx=rnd(-1.2,1.2);this.vy=rnd(1.2,4);this.grav=0.22;this.circ=false;this.r=cl(r*0.3+200|0,0,255);this.g=cl(g*0.1+42|0,0,255);this.b=4;}else{const a=rnd(0,Math.PI*2),sp=rnd(2.5,6);this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp-rnd(0,2.5);this.grav=0.13;this.circ=Math.random()<0.5;this.r=r;this.g=g;this.b=b;}}
  update(){this.x+=this.vx+Math.sin(this.wave)*0.3;this.y+=this.vy;this.vy+=this.grav;this.wave+=0.1;this.life--;return this.life>0;}
  draw(ctx){const rat=this.life/this.ml,a=(0.8*rat).toFixed(3),sz=Math.max(1,this.sz*(0.25+0.75*rat));ctx.fillStyle=`rgba(${this.r},${this.g},${this.b},${a})`;if(this.circ){ctx.beginPath();ctx.arc(this.x,this.y,sz,0,Math.PI*2);ctx.fill();}else ctx.fillRect(this.x-sz,this.y-sz,sz*2,sz*2);}
}
function spawnDebris(clC,ti,n){Object.entries(clC).forEach(([k,color])=>{const r=Math.floor(+k/100),c=(+k)%100;const cx=GRID_X+c*CELL+CELL/2,cy=GRID_Y+r*CELL+CELL/2;for(let i=0;i<n;i++)debris.push(new Debris(cx+rnd(-CELL/4,CELL/4),cy+rnd(-CELL/4,CELL/4),color,ti));});}
class FloatText{
  constructor(text,x,y,col,sizeM=1,life=75){this.text=text;this.x=x;this.y=y;this.col=col;this.life=life;this.ml=life;this.vy=-1.1;this.sizeM=sizeM;}

  draw(ctx){const a=this.life/this.ml,fsz=Math.max(10,CELL*0.5*this.sizeM)|0;ctx.save();ctx.globalAlpha=a;ctx.font=`bold ${fsz}px Impact,Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor=this.col;ctx.shadowBlur=10;ctx.strokeStyle='rgba(0,0,0,0.55)';ctx.lineWidth=3;ctx.lineJoin='round';ctx.strokeText(this.text,this.x,this.y);ctx.fillStyle=this.col;ctx.fillText(this.text,this.x,this.y);ctx.restore();}
}

function tickParasites(){
  const now=Date.now();
  parasites.forEach(p=>{
    if(now-p.born>=PARASITE_LIFE){return;}
    if(now-p.lastTick>=PARASITE_TICK){
      p.lastTick=now;
      const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
      shuffleArr(dirs);
      for(const[dr,dc] of dirs){
        const nr=p.r+dr,nc=p.c+dc;
        if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&grid[nr][nc]){
          grid[nr][nc]=null;
          gridStars[nr][nc]=false;gridBonus[nr][nc]=null;
          spawnParticles([{r:nr,c:nc}],5,1,['#00FF60','#40FF90','#1A0A3E']);
          shake=Math.max(shake,4);shakePow=Math.max(shakePow,2);
          floats.push(new FloatText('☠ PARASITE',GRID_X+nc*CELL+CELL/2,GRID_Y+nr*CELL,'#00FF60',0.8,55));
          break;
        }
      }
    }
  });
  parasites=parasites.filter(p=>now-p.born<PARASITE_LIFE);
  // Determine which pieces are "playable" for the current mode
  const _tkEM=currentMode==='histoire'?_getHistoireSubMode():currentMode;
  const _tkCheck=_tkEM==='choix'?choixOptions:tray.filter(Boolean);
  if(_tkCheck.length>0&&!anyValid(grid,_tkCheck)&&!showSecondChance){
    const _eM_zen=currentMode==='histoire'?_getHistoireSubMode():currentMode;
    if(_eM_zen==='zen'){_zenClearRows();tray=newTray();}
    else if(!secondChanceUsed){showSecondChance=true;}
    else{over=true;overT=Date.now();setTimeout(()=>{gameState='gameover';},2000);}
  }
}

// Niveaux 1-20 : Survie (apprentissage)
// Niveaux 21-35 : Chrono (pression du temps)
// Niveaux 36-50 : Contraintes (cases bloquées)
const HISTOIRE_LEVELS=(()=>{
  const lvls=[];
  for(let i=0;i<50;i++){
    const n=i+1;
    let mode,goalVal,label;
    if(n<=20){mode='survie';goalVal=n*100;label=`Marque ${n*100} pts`;}
    else if(n<=35){mode='chrono';goalVal=Math.round(n*120);label=`${Math.round(n*120)} pts en temps limité`;}
    else{mode='contraintes';goalVal=Math.round(n*150);label=`${Math.round(n*150)} pts avec contraintes`;}
    lvls.push({mode,goalType:'score',goalVal,label});
  }
  return lvls;
})();

function _modeCanPlace(grid,shape,row,col){
  // Compute effective mode once, outside loop
  const _eM=currentMode==='histoire'?_getHistoireSubMode():currentMode;
  for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++)if(shape[r][c]){
    const gr=row+r,gc=col+c;
    if(gr<0||gr>=ROWS||gc<0||gc>=COLS)return false;
    if(grid[gr][gc])return false; // null=empty, any string=blocked (includes '__BLOCKED__')
    // Extra contraintes check: blocked cells are already set in grid, this covers visual-only case
    if(_eM==='contraintes'&&contraBlocked.some(b=>b.r===gr&&b.c===gc))return false;
  }
  return true;
}

function _generateContraBlocked(){
  // 8–14 random blocked cells, avoid edges fully (keep some space playable)
  contraBlocked=[];
  const count=8+rndI(0,6);
  const used=new Set();
  let tries=0;
  while(contraBlocked.length<count&&tries<200){
    tries++;
    const r=rndI(1,8),c=rndI(1,8);
    const k=r*100+c;
    if(!used.has(k)){used.add(k);contraBlocked.push({r,c});}
  }
}

function _generateChoixOptions(){
  choixOptions=[newPiece(),newPiece(),newPiece()];
  choixOptionRects=[];
  choixSelected=-1;
  choixState='picking';
  tray=[null,null,null]; // clear tray until pick
}

function _initMode(){
  // Called at start of each game to set up mode-specific state
  if(currentMode==='chrono'){
    chronoTimeLeft=chronoMaxTime;chronoLastTick=Date.now();
  }else if(currentMode==='choix'){
    _generateChoixOptions();
  }else if(currentMode==='contraintes'){
    _generateContraBlocked();
    // Mark blocked cells visually (dark fill)
    contraBlocked.forEach(({r,c})=>{grid[r][c]='__BLOCKED__';});
  }else if(currentMode==='histoire'){
    const lvlDef=HISTOIRE_LEVELS[histoireLevel%HISTOIRE_LEVELS.length];
    const subMode=lvlDef.mode;
    currentMode='histoire'; // keep as histoire, but apply sub-mode init
    _applyHistoireSubMode(subMode);
    histoireGoalMet=false;
  }
}

function _applyHistoireSubMode(subMode){
  if(subMode==='chrono'){
    chronoTimeLeft=chronoMaxTime;chronoLastTick=Date.now();
  }else if(subMode==='choix'){
    _generateChoixOptions();
  }else if(subMode==='contraintes'){
    _generateContraBlocked();
    contraBlocked.forEach(({r,c})=>{grid[r][c]='__BLOCKED__';});
  }
}

function _getHistoireSubMode(){
  if(currentMode!=='histoire')return currentMode;
  return HISTOIRE_LEVELS[histoireLevel%HISTOIRE_LEVELS.length].mode;
}

function _checkHistoireGoal(){
  if(currentMode!=='histoire'||histoireGoalMet)return;
  const lvlDef=HISTOIRE_LEVELS[histoireLevel%HISTOIRE_LEVELS.length];
  let met=false;
  if(lvlDef.goalType==='score'&&score>=lvlDef.goalVal)met=true;
  else if(lvlDef.goalType==='pieces'&&placed>=lvlDef.goalVal)met=true;
  else if(lvlDef.goalType==='lines'&&totalLinesCleared>=lvlDef.goalVal)met=true;
  else if(lvlDef.goalType==='combo'&&maxComboGame>=lvlDef.goalVal)met=true;
  if(met){histoireGoalMet=true;histoireGoalMetT=Date.now();}
}

    const lig=ctx.createLinearGradient(x,y,x,y+h*0.4);
    lig.addColorStop(0,'rgba(255,255,255,0.12)');lig.addColorStop(1,'rgba(255,255,255,0)');
    rrect(ctx,x,y,w,h*0.45,h/5,lig,null);
    // Border
    rp(ctx,x,y,w,h,h/5);ctx.strokeStyle=sel?th.tm:hexA(th.sl,0.5);ctx.lineWidth=sel?2:1;ctx.stroke();

  });
  // THEME label
  if(themeRects.length){labelText(ctx,'THÈME',W/2,themeRects[0].y-lblSz-1,th.tg,`bold ${lblSz}px Arial`,'center',true);}
  // Theme buttons
  themeRects.forEach((tr,i)=>{
    const sth=THEMES[i],sel=i===selTheme;const{x,y,w,h}=tr;
    if(sel){ctx.save();ctx.shadowColor=sth.tm;ctx.shadowBlur=9;rp(ctx,x,y,w,h,h/3);ctx.strokeStyle=sth.tm;ctx.lineWidth=2;ctx.stroke();ctx.restore();}
    // Full color theme bg
    const tg=ctx.createLinearGradient(x,y,x,y+h);
    tg.addColorStop(0,hexA(sth.tm,sel?0.92:0.78));tg.addColorStop(1,hexA(sth.ta,sel?0.82:0.62));
    rrect(ctx,x,y,w,h,h/3,tg,null);
    const tsh=ctx.createLinearGradient(x,y,x,y+h*0.5);tsh.addColorStop(0,'rgba(255,255,255,0.22)');tsh.addColorStop(1,'rgba(255,255,255,0)');
    rp(ctx,x,y,w,h,h/3);ctx.fillStyle=tsh;ctx.fill();
    rp(ctx,x,y,w,h,h/3);ctx.strokeStyle=sel?sth.tm:hexA(sth.dc,0.7);ctx.lineWidth=sel?2:1;ctx.stroke();
    const tfz=cl(Math.floor(h*0.44),6,12);

  });
  // ── JOUER ──
  if(playRect){
    const{x,y,w,h}=playRect;const now=Date.now();
    const pulse=0.5+0.5*Math.sin(now*0.004);

    ctx.textAlign='center';ctx.textBaseline='middle';
  }
  // ── REPRENDRE (si sauvegarde) ── [between JOUER and CLASSEMENT]
  if(hasSave&&resumeRect){

    const pulse2=0.5+0.5*Math.sin(Date.now()*0.003);

    ctx.restore();

  // ── CLASSEMENT MONDIAL ──
  if(_lbRect){
    const{x,y,w,h}=_lbRect;

  // ── BOUTON SON (icône fixée en haut à droite) ──
  if(_soundRect){
    const{x,y,w,h}=_soundRect;const on=_soundEnabled;
    ctx.save();
    const pulse=0.5+0.5*Math.sin(Date.now()*0.003);

  ctx.font=`${bsz*0.76}px Arial`;ctx.fillStyle=hexA(th.tg,0.45);ctx.fillText('Toucher JOUER pour commencer',W/2,H-4);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
}

// ─── PAUSE MENU ──────────────────────────────────────────────────────────────
function layoutPause(){
  const pw=Math.min(W-32,310);
  const bh=cl(H*0.076,40,58);
  const gap=10;
  const titleH=cl(H*0.10,48,68);
  const badgeH=26;
  const scoreH=24;
  const padV=20;
  const panelH=padV+titleH+10+badgeH+gap+bh*4+gap*3+scoreH+padV+52;
  const px=(W-pw)/2|0;
  const py=((H-panelH)/2)|0;
  _pauseBtns={_panel:{x:px,y:py,w:pw,h:panelH},_titleY:py+padV+titleH*0.78,_badgeY:py+padV+titleH+10,_scoreY:py+panelH-padV-scoreH-52};
  let cy=py+padV+titleH+10+badgeH+gap;
  ['resume','restart','sound','quit'].forEach(k=>{_pauseBtns[k]={x:px+10,y:cy,w:pw-20,h:bh};cy+=bh+gap;});
  const sliderY=_pauseBtns._scoreY+20;
  _volumeSliderRect={x:_pauseBtns._panel.x+20,y:sliderY,w:_pauseBtns._panel.w-40,h:20};
}

function drawPause(t){
  layoutPause();
  const th=THEMES[curTheme];
  const now=Date.now();
  const p=_pauseBtns._panel;
  // Dark overlay
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
  // Panel glass
  const pg=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
  pg.addColorStop(0,hexA(th.gbg,0.97));pg.addColorStop(1,hexA(th.bg,0.95));
  rrect(ctx,p.x,p.y,p.w,p.h,20,pg,null);
  // Panel shine top
  const ps=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h*0.45);
  ps.addColorStop(0,'rgba(255,255,255,0.10)');ps.addColorStop(1,'rgba(255,255,255,0)');
  ctx.save();rp(ctx,p.x,p.y,p.w,p.h,20);ctx.clip();ctx.fillStyle=ps;ctx.fillRect(p.x,p.y,p.w,p.h*0.45);ctx.restore();
  // Panel border
  rp(ctx,p.x,p.y,p.w,p.h,20);ctx.strokeStyle=hexA(th.sl,0.7);ctx.lineWidth=1.5;ctx.stroke();
  // Title
  const tsz=cl(p.h*0.10,18,30);
  drawPremText(ctx,'⏸  PAUSE',p.x+p.w/2,_pauseBtns._titleY,`bold ${tsz}px Arial`,th.hi||th.tm,th.ta,'rgba(0,0,0,0.5)',th.hi||th.tm,10,2);
  // Mode badge
  const mode=MODES[currentMode]||MODES.survie;
  const bw2=ctx.measureText(mode.icon+' '+mode.name).width+30;
  ctx.font=`bold 13px Arial`;
  const bx2=(W-bw2)/2|0;
  const by2=_pauseBtns._badgeY|0;
  rrect(ctx,bx2,by2,bw2,24,12,hexA(mode.color,0.22),hexA(mode.color,0.80),1.5);
  ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=mode.color;
  ctx.fillText(mode.icon+' '+mode.name,p.x+p.w/2,by2+12);
  // Buttons
  const btnDefs={
    resume:{icon:'▶',lbl:'REPRENDRE',g0:th.ta,g1:lerpC(th.ta,'#000000',0.5),border:th.tm},
    restart:{icon:'🔁',lbl:'RECOMMENCER',g0:'#1C3A3A',g1:'#0C1E1E',border:th.tg},
    sound:{icon:_soundEnabled?'🔊':'🔇',lbl:_soundEnabled?'SON  ON':'SON  OFF',
      g0:_soundEnabled?'#1A4455':'#5A1A1A',g1:_soundEnabled?'#0A2230':'#2C0D0D',
      border:_soundEnabled?'#40D8FF':'#FF6060'},
    quit:{icon:'🏠',lbl:'MENU PRINCIPAL',g0:'#6A2C0A',g1:'#381505',border:'#FF7040'}
  };
  ['resume','restart','sound','quit'].forEach((k,i)=>{
    const btn=_pauseBtns[k];const def=btnDefs[k];
    const{x:bx,y:by,w:bw,h:bh}=btn;const br=bh/2;
    const pulse=0.5+0.5*Math.sin(now*0.003+i*1.2);
    // Glow border
    ctx.save();ctx.shadowColor=def.border;ctx.shadowBlur=8+pulse*8;
    rp(ctx,bx,by,bw,bh,br);ctx.strokeStyle=def.border;ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
    // Fill gradient
    const bg=ctx.createLinearGradient(bx,by,bx,by+bh);
    bg.addColorStop(0,def.g0);bg.addColorStop(1,def.g1);
    rrect(ctx,bx,by,bw,bh,br,bg,def.border,1.5);
    // Shine
    const sh=ctx.createLinearGradient(bx,by,bx,by+bh*0.45);
    sh.addColorStop(0,'rgba(255,255,255,0.16)');sh.addColorStop(1,'rgba(255,255,255,0)');
    ctx.save();rp(ctx,bx,by,bw,bh,br);ctx.clip();ctx.fillStyle=sh;ctx.fillRect(bx,by,bw,bh*0.45);ctx.restore();
    // Label
    const fs=cl(bh*0.40,12,20);
    ctx.font=`bold ${fs}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.shadowColor=def.border;ctx.shadowBlur=4;
    ctx.fillText(def.icon+'  '+def.lbl,bx+bw/2,by+bh/2);
    ctx.shadowBlur=0;
  });
  // Score actuel
  const scSz=cl(H*0.026,10,14);
  ctx.font=`${scSz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=th.tm;
  ctx.fillText(`Score actuel : ${score}`,p.x+p.w/2,_pauseBtns._scoreY+scSz/2);
  // Volume slider
  if(_volumeSliderRect){
    const{x:vx,y:vy,w:vw,h:vh}=_volumeSliderRect;
    const th2=THEMES[curTheme];
    // Label
    ctx.font=`bold ${cl(vh*0.7,9,13)}px Arial`;ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle=th2.tg;ctx.fillText('🔊 Volume',vx,vy-10);
    // Track background
    rrect(ctx,vx,vy,vw,vh,vh/2,hexA(th2.sl,0.4),hexA(th2.sl,0.7),1);
    // Filled portion
    const fillW=Math.max(vh,vw*_volume);
    rrect(ctx,vx,vy,fillW,vh,vh/2,hexA(th2.ta,0.85),null);
    // Shine
    const ssh2=ctx.createLinearGradient(vx,vy,vx,vy+vh*0.5);
    ssh2.addColorStop(0,'rgba(255,255,255,0.25)');ssh2.addColorStop(1,'rgba(255,255,255,0)');
    ctx.save();rp(ctx,vx,vy,fillW,vh,vh/2);ctx.clip();ctx.fillStyle=ssh2;ctx.fillRect(vx,vy,fillW,vh);ctx.restore();
    // Thumb
    const tx2=vx+vw*_volume;
    ctx.save();ctx.shadowColor=th2.tm;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(tx2,vy+vh/2,vh*0.75,0,Math.PI*2);
    ctx.fillStyle=th2.tm;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.restore();
    // Value text
    ctx.font=`bold ${cl(vh*0.65,8,12)}px Arial`;ctx.textAlign='right';ctx.fillStyle=th2.tm;
    ctx.fillText(`${Math.round(_volume*100)}%`,vx+vw,vy-10);
  }
  ctx.restore();
}

function handlePauseTap(x,y){
  if(_volumeSliderRect){
    const{x:vx,y:vy,w:vw,h:vh}=_volumeSliderRect;
    if(x>=vx-10&&x<=vx+vw+10&&y>=vy-10&&y<=vy+vh+10){
      _volume=cl((x-vx)/vw,0,1);
      return;
    }
  }
  if(!_pauseBtns.resume)return;
  ['resume','restart','sound','quit'].forEach(k=>{
    const b=_pauseBtns[k];if(!b)return;
    if(x>=b.x&&x<b.x+b.w&&y>=b.y&&y<b.y+b.h){
      if(k==='resume'){
        if(_pauseStartTime>0){chronoLastTick+=Date.now()-_pauseStartTime;_pauseStartTime=0;}
        gameState='playing';
      }else if(k==='restart'){_pauseStartTime=0;resetGame();gameState='playing';}
      else if(k==='sound'){_soundEnabled=!_soundEnabled;}
      else if(k==='quit'){_pauseStartTime=0;gameState='menu';}
    }
  });
}

// ─── MODE SELECT SCREEN ──────────────────────────────────────────────────────
function layoutModeSelect(){
  modeSelectRects=[];
  const cols=2,rows=3;
  const padX=10,padY=8;
  const bw=Math.floor((W-padX*(cols+1))/cols);
  const bh=cl(Math.floor((H*0.62)/rows),52,90);
  const totalH=rows*(bh+padY)-padY;
  const startY=Math.round((H-totalH)*0.52);
  MODE_KEYS.forEach((k,i)=>{
    const col=i%cols,row=Math.floor(i/cols);
    modeSelectRects.push({key:k,x:padX+(bw+padX)*col,y:startY+(bh+padY)*row,w:bw,h:bh});
  });
}

function drawModeSelect(t){
  const th=THEMES[selTheme];
  ctx.drawImage(menuBg,0,0);
  drawFx(ctx,menuFx,t);
  menuDeco.forEach(b=>{b.x=(b.x+b.vx+W)%W;b.y=(b.y+b.vy+H)%H;ctx.globalAlpha=0.08;drawCell(ctx,b.color,b.x-b.sz/2|0,b.y-b.sz/2|0,b.sz|0,b.skin,t);ctx.globalAlpha=1;});
  ctx.fillStyle='rgba(0,0,0,0.62)';ctx.fillRect(0,0,W,H);

  // Title
  const tsz=cl(Math.floor(H*0.06),14,40);
  ctx.save();ctx.font=`bold ${tsz}px Impact,Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=th.tm;ctx.shadowColor=th.tm;ctx.shadowBlur=10;
  ctx.fillText('CHOISIR UN MODE',W/2,Math.round(H*0.10));ctx.restore();
  // Subtitle
  const ssz=cl(Math.floor(H*0.022),8,14);
  ctx.save();ctx.font=`${ssz}px Arial`;ctx.textAlign='center';ctx.fillStyle=hexA(th.tg,0.65);
  ctx.fillText('Quel défi veux-tu relever ?',W/2,Math.round(H*0.17));ctx.restore();
  // Mode cards
  modeSelectRects.forEach(({key,x,y,w,h})=>{
    const m=MODES[key];const sel=key===currentMode;const now=Date.now();
    // Glow if selected
    if(sel){ctx.save();ctx.shadowColor=m.color;ctx.shadowBlur=18+6*Math.sin(now*0.004);
      rp(ctx,x-2,y-2,w+4,h+4,12);ctx.strokeStyle=hexA(m.color,0.7);ctx.lineWidth=2.5;ctx.stroke();ctx.restore();}
    // Card bg
    const cbg=ctx.createLinearGradient(x,y,x,y+h);
    cbg.addColorStop(0,hexA(th.gbg,sel?0.9:0.62));cbg.addColorStop(1,hexA(th.bg,sel?0.8:0.45));
    rrect(ctx,x,y,w,h,12,cbg,null);
    // Top shine
    const csh=ctx.createLinearGradient(x,y,x,y+h*0.4);
    csh.addColorStop(0,'rgba(255,255,255,0.12)');csh.addColorStop(1,'rgba(255,255,255,0)');
    rp(ctx,x+2,y+2,w-4,h*0.4,10);ctx.fillStyle=csh;ctx.fill();
    // Border
    rp(ctx,x,y,w,h,12);ctx.strokeStyle=sel?hexA(m.color,0.8):hexA(th.sl,0.4);ctx.lineWidth=sel?2:1;ctx.stroke();
    // Color accent bar top
    const ab=ctx.createLinearGradient(x,y,x+w,y);
    ab.addColorStop(0,hexA(m.color,0.8));ab.addColorStop(1,hexA(m.color,0.2));
    rp(ctx,x,y,w,4,12);ctx.fillStyle=ab;ctx.fill();
    // Icon
    const isz=cl(Math.floor(h*0.38),14,32);
    ctx.save();ctx.font=`${isz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(m.icon,x+w*0.18,y+h*0.38);ctx.restore();
    // Name
    const nsz=cl(Math.floor(h*0.22),8,18);
    ctx.save();ctx.font=`bold ${nsz}px Arial`;ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle=sel?m.color:th.tm;
    if(sel){ctx.shadowColor=m.color;ctx.shadowBlur=5;}
    ctx.fillText(m.name,x+w*0.32,y+h*0.35);ctx.restore();
    // Description
    const dsz=cl(Math.floor(h*0.15),6,12);
    ctx.save();ctx.font=`${dsz}px Arial`;ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillStyle=hexA(th.tg,0.75);
    const lines=m.desc.split('\n');
    lines.forEach((ln,li)=>ctx.fillText(ln,x+w*0.32,y+h*0.55+li*(dsz*1.35)));
    ctx.restore();
    // Selected check
    if(sel){ctx.save();ctx.font=`bold ${nsz}px Arial`;ctx.fillStyle=m.color;ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText('✓',x+w-8,y+h*0.35);ctx.restore();}
  });
  // Histoire progression indicator
  if(histoireLevel>0){
    const hz=cl(Math.floor(H*0.02),7,13);

  // Live badge

  // Entries

    ctx.fillStyle=hexA(th.tg,0.55);ctx.fillText('Chargement…',W/2,listTop+listH/2);ctx.restore();

      ctx.save();ctx.textBaseline='middle';
      // Rank / medal

      // Pseudo

  rrect(ctx,bx2,by2,bw,bh2,bh2/2,bbg,null);
  rp(ctx,bx2,by2,bw,bh2,bh2/2);ctx.strokeStyle=hexA(th.dc,0.5);ctx.lineWidth=1.5;ctx.stroke();
  const bfz=cl(Math.floor(bh2*0.5),10,18);
  ctx.save();ctx.font=`bold ${bfz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fillText('← RETOUR',bx2+bw/2,by2+bh2/2);ctx.restore();
  _backLbRect={x:bx2,y:by2,w:bw,h:bh2};
}

// ─── GAME RENDER ─────────────────────────────────────────────────────────────
function drawGame(t){
  const newTh=getCurTheme();
  if(newTh!==curTheme){curTheme=newTh;gameBg=buildBg(curTheme);gameFx=initFx(curTheme);screenFlash=180;screenFlashCol=THEMES[curTheme].tm;}
  // Score animé
  if(displayScore<score){displayScore=Math.min(score,displayScore+Math.max(1,Math.ceil((score-displayScore)*0.12)));}
  const th=THEMES[curTheme];
  if(shake>0){shake--;shakeX=rnd(-shakePow,shakePow)|0;shakeY=rnd(-shakePow,shakePow)|0;}else{shakeX=0;shakeY=0;}
  ctx.drawImage(gameBg,shakeX,shakeY);
  drawFx(ctx,gameFx,t);
  ctx.save();ctx.translate(shakeX,shakeY);
  // Grid frame (glass effect)
  const b2=Math.max(4,CELL*0.1|0);
  const fg3=ctx.createLinearGradient(GRID_X-b2,GRID_Y-b2,GRID_X-b2,GRID_Y+GH+b2);
  fg3.addColorStop(0,hexA(th.sl,0.8));fg3.addColorStop(1,hexA(th.dc,0.8));
  rrect(ctx,GRID_X-b2,GRID_Y-b2,GW+b2*2,GH+b2*2,CR+b2,fg3,null);
  // Grid glass inner
  const gig=ctx.createLinearGradient(GRID_X,GRID_Y,GRID_X,GRID_Y+GH);
  gig.addColorStop(0,hexA(th.gbg,0.88));gig.addColorStop(1,hexA(th.ge,0.88));
  ctx.fillStyle=gig;ctx.fillRect(GRID_X,GRID_Y,GW,GH);
  // Cells
  for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){
    const x=GRID_X+c*CELL,y=GRID_Y+r*CELL,color=grid[r][c];
    // Pop animation for recently placed cells
    const popF=placedCellsMap.get(r*100+c);
    if(color){
      if(popF!==undefined&&popF<8){const sc=0.72+0.28*(popF/8);const off=CELL*(1-sc)/2;drawCell(ctx,color,(x+off)|0,(y+off)|0,Math.ceil(CELL*sc),selSkin,t);}
      else drawCell(ctx,color,x,y,CELL,selSkin,t);
      // Star overlay
      if(gridStars[r][c]){const sfsz=Math.max(8,CELL*0.38)|0;ctx.save();ctx.font=`${sfsz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=0.9;ctx.fillStyle='#FFE030';ctx.shadowColor='#FFD700';ctx.shadowBlur=7;ctx.fillText('★',x+CELL/2,y+CELL/2);ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.restore();}
      // Bonus overlay
      if(gridBonus[r][c]){const bsz=Math.max(10,CELL*0.72)|0;ctx.globalAlpha=0.93;if(gridBonus[r][c]==='bomb')drawBombIcon(ctx,x+CELL/2,y+CELL/2,bsz);else drawX2Icon(ctx,x+CELL/2,y+CELL/2,bsz);ctx.globalAlpha=1;}
      // Parasite overlay (if this cell is an active parasite source)
      if(parasites.some(p=>p.r===r&&p.c===c)){drawParasiteOverlay(ctx,x,y,CELL,t,r*17+c*31);}
    }else{
      ctx.fillStyle=hexA(th.ge,0.6);ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
      ctx.strokeStyle=hexA(th.sl,0.18);ctx.lineWidth=1;ctx.strokeRect(x+1,y+1,CELL-2,CELL-2);
    }
  }}
  // Update pop animations (O(1) per entry)
  placedCellsMap.forEach((f,k)=>{if(f+1>=8)placedCellsMap.delete(k);else placedCellsMap.set(k,f+1);});
  // Clear line sweep animations
  clearAnims=clearAnims.filter(a=>{
    const p=Math.min(1,(Date.now()-a.born)/400);
    if(p>=1)return false;
    const alpha=Math.sin(p*Math.PI)*0.75;
    a.cells.forEach(({r,c})=>{
      const x=GRID_X+c*CELL,y=GRID_Y+r*CELL;
      ctx.fillStyle=`rgba(255,255,255,${alpha.toFixed(3)})`;
      ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
    });
    const sweepX=GRID_X+p*GW;
    const sg=ctx.createLinearGradient(sweepX-CELL*2,0,sweepX+CELL,0);
    sg.addColorStop(0,'rgba(255,255,255,0)');
    sg.addColorStop(0.6,hexA(a.color,0.7*Math.sin(p*Math.PI)));
    sg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sg;ctx.fillRect(GRID_X,GRID_Y,GW,GH);
    return true;
  });
  // Ghost piece (snap preview)
  if(drag&&gameState==='playing'&&!over){
    const piece=tray[drag.idx];
    if(piece){
      const{gr,gc}=snapPos(mouseX,mouseY,piece.shape);
      const valid=_modeCanPlace(grid,piece.shape,gr,gc);
      const ghostColor=valid?piece.color:'#FF4040';
      const ghostAlpha=valid?0.35:0.25;
      ctx.globalAlpha=ghostAlpha;
      piece.shape.forEach((line,rr)=>line.forEach((v,cc)=>{if(v){const pr2=gr+rr,pc2=gc+cc;if(pr2>=0&&pr2<ROWS&&pc2>=0&&pc2<COLS){drawCell(ctx,ghostColor,GRID_X+pc2*CELL,GRID_Y+pr2*CELL,CELL,selSkin,t);}}
      }));
      ctx.globalAlpha=1;
    }
  }
  // Tray (glass)
  const tbg2=ctx.createLinearGradient(GRID_X,TRAY_Y,GRID_X,TRAY_Y+TRAY_H);
  tbg2.addColorStop(0,hexA(th.gbg,0.55));tbg2.addColorStop(1,hexA(th.ge,0.4));
  rrect(ctx,GRID_X,TRAY_Y,GW,TRAY_H,CR,tbg2,hexA(th.dc,0.5),1);
  const topShine=ctx.createLinearGradient(GRID_X,TRAY_Y,GRID_X,TRAY_Y+TRAY_H*0.4);
  topShine.addColorStop(0,'rgba(255,255,255,0.08)');topShine.addColorStop(1,'rgba(255,255,255,0)');
  rrect(ctx,GRID_X,TRAY_Y,GW,TRAY_H,CR,topShine,null);
  const pw=GW/3;
  for(let i=0;i<3;i++){
    if(i>0){ctx.strokeStyle=hexA(th.dc,0.3);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(GRID_X+i*pw,TRAY_Y+4);ctx.lineTo(GRID_X+i*pw,TRAY_Y+TRAY_H-4);ctx.stroke();}
    const piece=tray[i];if(!piece)continue;
    const sh=piece.shape,pcw=sh[0].length*PIECE_CELL,pch=sh.length*PIECE_CELL;
    const ox=(GRID_X+i*pw+pw/2-pcw/2)|0,oy=(TRAY_Y+(TRAY_H-pch)/2)|0;
    const dim=drag&&drag.idx===i;
    if(piece.isParasite){
      // Parasite piece: draw with special corrupted skin + glow border
      const pulse=0.5+0.5*Math.sin(t*0.006+i*2.1);
      ctx.save();ctx.shadowColor=`rgba(0,255,80,${0.5+0.4*pulse})`;ctx.shadowBlur=PIECE_CELL*0.6;
      sh.forEach((line,rr)=>line.forEach((v,cc)=>{if(v)drawParasiteCell(ctx,ox+cc*PIECE_CELL,oy+rr*PIECE_CELL,PIECE_CELL,t,rr*17+cc*31);}));
      ctx.shadowBlur=0;ctx.restore();
      // Label "☠ PARASITE"
      const lsz=cl(Math.floor(TRAY_H*0.16),7,12);
      ctx.save();ctx.font=`bold ${lsz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle=`rgba(0,${(200+55*pulse)|0},60,0.95)`;ctx.shadowColor='#00FF60';ctx.shadowBlur=6;
      ctx.fillText('☠ PARASITE',GRID_X+i*pw+pw/2,TRAY_Y+TRAY_H-lsz*0.75);ctx.shadowBlur=0;ctx.restore();
    }else{
      sh.forEach((line,rr)=>line.forEach((v,cc)=>{if(v)drawCell(ctx,piece.color,ox+cc*PIECE_CELL,oy+rr*PIECE_CELL,PIECE_CELL,selSkin,t,dim?0.3:1);}));
    }
  }
  // ── Aperçu 2 prochains blocs ─────────────────────────────────────────────
  if(nextTrayPreview){
    const pvH=Math.max((CELL*1.3)|0,44);
    const pvY=TRAY_Y+TRAY_H+4;
    // Panel
    const pvBg=ctx.createLinearGradient(GRID_X,pvY,GRID_X,pvY+pvH);
    pvBg.addColorStop(0,hexA(th.gbg,0.38));pvBg.addColorStop(1,hexA(th.ge,0.25));
    rrect(ctx,GRID_X,pvY,GW,pvH,CR,pvBg,hexA(th.dc,0.28),1);
    // Label "SUIVANT" à gauche
    const lsz=Math.max(7,pvH*0.22)|0;
    ctx.save();ctx.font=`bold ${lsz}px Arial`;ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle=hexA(th.tg,0.7);ctx.fillText('SUIVANT',GRID_X+5,pvY+pvH/2);ctx.restore();
    // Affiche les 2 premiers blocs du prochain tray (indices 0 et 1)
    const pvPc=Math.floor(CELL*0.42);
    const pvSlotW=GW/2;
    for(let i=0;i<2;i++){
      const piece=nextTrayPreview[i];if(!piece)continue;
      const sh=piece.shape;
      const pcw=sh[0].length*pvPc,pch=sh.length*pvPc;
      const ox=(GRID_X+i*pvSlotW+pvSlotW/2-pcw/2)|0,oy=(pvY+(pvH-pch)/2)|0;
      sh.forEach((line,rr)=>line.forEach((v,cc)=>{
        if(v)drawCell(ctx,piece.color,ox+cc*pvPc,oy+rr*pvPc,pvPc,selSkin,t,0.55);
      }));
      // Séparateur entre les 2 slots
      if(i===0){ctx.strokeStyle=hexA(th.dc,0.22);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(GRID_X+pvSlotW,pvY+4);ctx.lineTo(GRID_X+pvSlotW,pvY+pvH-4);ctx.stroke();}
    }
  }
  ctx.restore();
  // Dragged piece (on top, no shake) + speed timer indicator
  if(drag&&!over){
    const piece=tray[drag.idx];
    if(piece){
      const sh=piece.shape,ox=(mouseX-sh[0].length*CELL/2)|0,oy=(mouseY-sh.length*CELL/2)|0;
      sh.forEach((line,rr)=>line.forEach((v,cc)=>{if(v){if(piece.isParasite)drawParasiteCell(ctx,ox+cc*CELL,oy+rr*CELL,CELL,t,rr*17+cc*31);else drawCell(ctx,piece.color,ox+cc*CELL,oy+rr*CELL,CELL,selSkin,t);}}));
      // Speed ring indicator (arc showing elapsed think time)
      if(lastPlaceTime>0){
        const elapsed=Date.now()-lastPlaceTime;
        const maxT=SPEED_SLOW; // full ring at SLOW threshold
        const frac=Math.min(1,elapsed/maxT);
        // Color: green → yellow → orange → red
        let rc,gc2,bc2;
        if(frac<0.25){rc=lerp(40,255,frac/0.25)|0;gc2=220;bc2=40;}
        else if(frac<0.55){rc=255;gc2=lerp(220,140,(frac-0.25)/0.3)|0;bc2=40;}
        else{rc=255;gc2=lerp(140,40,(frac-0.55)/0.45)|0;bc2=40;}
        const pcx=ox+sh[0].length*CELL/2,pcy=oy+sh.length*CELL/2;
        const ringR=sh[0].length*CELL*0.6;
        ctx.save();
        ctx.strokeStyle=`rgba(${rc},${gc2},${bc2},0.82)`;ctx.lineWidth=4;ctx.lineCap='round';
        ctx.shadowColor=`rgba(${rc},${gc2},${bc2},0.6)`;ctx.shadowBlur=8;
        ctx.beginPath();ctx.arc(pcx,pcy,ringR,-Math.PI/2,-Math.PI/2+frac*Math.PI*2);ctx.stroke();
        // Label near ring
        const lsz=Math.max(8,CELL*0.28)|0;
        ctx.font=`bold ${lsz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowBlur=0;
        const label=elapsed<SPEED_TURBO?'⚡ TURBO':elapsed<SPEED_FAST?'⚡ RAPIDE':elapsed>=SPEED_SLOW?'🐢 LENT':'';
        if(label){ctx.fillStyle=`rgba(${rc},${gc2},${bc2},0.9)`;ctx.fillText(label,pcx,pcy-ringR-lsz);}
        ctx.restore();
      }
    }
  }
  // Particles + Debris
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.13;p.life--;if(p.life<=0)return false;const ratio=p.life/p.ml,sz=Math.max(1,p.size*ratio);ctx.fillStyle=hexA(p.color,0.82*ratio);if(p.circle){ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);ctx.fill();}else ctx.fillRect(p.x-sz,p.y-sz,sz*2,sz*2);return true;});
  debris=debris.filter(d=>{d.draw(ctx);return d.update();});
  floats=floats.filter(f=>{f.draw(ctx);return f.update();});
  // Screen flash
  if(screenFlash>0){ctx.fillStyle=hexA(screenFlashCol,screenFlash/255*0.48);ctx.fillRect(0,0,W,H);screenFlash=Math.max(0,screenFlash-5);}
  // Fade in
  if(fadeAlpha>0){ctx.fillStyle=`rgba(0,0,0,${fadeAlpha.toFixed(3)})`;ctx.fillRect(0,0,W,H);fadeAlpha=Math.max(0,fadeAlpha-0.04);}
  // HUD
  drawHUD(th);
  // Vignette
  const vig=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.28,W/2,H/2,Math.max(W,H)*0.68);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.38)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  // Bonus banner (piece picker)
  if(showAddCellsBonus&&!over&&!showSecondChance&&!showBonusPicker){
    const bw2=Math.min(W-20,360),bh2=Math.round(H*0.092)+2;
    const bx2=(W-bw2)/2,by2=H-bh2-8;
    const pulse2=0.5+0.5*Math.sin(Date.now()*0.005);
    // Background
    const bbg=ctx.createLinearGradient(bx2,by2,bx2,by2+bh2);
    bbg.addColorStop(0,'rgba(20,0,60,0.97)');bbg.addColorStop(1,'rgba(60,20,120,0.95)');
    rrect(ctx,bx2,by2,bw2,bh2,bh2/2,bbg,null);
    // Gold border pulse
    rp(ctx,bx2,by2,bw2,bh2,bh2/2);
    const bord=ctx.createLinearGradient(bx2,by2,bx2+bw2,by2+bh2);
    bord.addColorStop(0,'#FFE040');bord.addColorStop(0.5,'#FFA000');bord.addColorStop(1,'#FFE040');
    ctx.strokeStyle=bord;ctx.lineWidth=1.5+pulse2;ctx.stroke();
    // Star icon left
    const ico=bh2*0.45;
    ctx.save();ctx.font=`${ico|0}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='#FFD700';ctx.shadowBlur=10;ctx.fillStyle='#FFD700';ctx.fillText('🎁',bx2+bh2*0.62,by2+bh2/2);ctx.shadowBlur=0;ctx.restore();
    // Text
    const bfsz2=cl(Math.floor(bh2*0.29),8,14);
    ctx.save();ctx.font=`bold ${bfsz2}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    const tg2=ctx.createLinearGradient(0,by2+bh2*0.15,0,by2+bh2*0.85);
    tg2.addColorStop(0,'#FFF0A0');tg2.addColorStop(0.5,'#FFD700');tg2.addColorStop(1,'#FFA020');
    ctx.fillStyle=tg2;ctx.shadowColor='rgba(255,200,0,0.6)';ctx.shadowBlur=8;
    ctx.fillText('BONUS  —  Touchez pour choisir une pièce !',bx2+bw2/2+bh2*0.2,by2+bh2/2);
    ctx.shadowBlur=0;ctx.restore();
    addCellsBonusRect={x:bx2,y:by2,w:bw2,h:bh2};
  }else if(!showAddCellsBonus&&!showBonusPicker){addCellsBonusRect=null;}
  // Bonus piece picker overlay
  if(showBonusPicker&&!over&&!showSecondChance){
    bonusPickerRects=[];
    ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,0,W,H);
    const pw3=Math.min(W-20,400),ph3=Math.round(H*0.38);
    const px3=(W-pw3)/2,py3=(H-ph3)/2;
    // Panel
    const ppg=ctx.createLinearGradient(px3,py3,px3,py3+ph3);
    ppg.addColorStop(0,'rgba(20,0,60,0.98)');ppg.addColorStop(1,'rgba(5,0,20,0.97)');
    rrect(ctx,px3,py3,pw3,ph3,16,ppg,null);
    // Gold border
    const pbord=ctx.createLinearGradient(px3,py3,px3+pw3,py3+ph3);
    pbord.addColorStop(0,'#FFE040');pbord.addColorStop(0.5,'#FFA000');pbord.addColorStop(1,'#FFE040');
    rp(ctx,px3,py3,pw3,ph3,16);ctx.strokeStyle=pbord;ctx.lineWidth=2;ctx.stroke();
    // Shine top
    const psh=ctx.createLinearGradient(px3,py3,px3,py3+ph3*0.35);
    psh.addColorStop(0,'rgba(255,255,255,0.1)');psh.addColorStop(1,'rgba(255,255,255,0)');
    rp(ctx,px3,py3,pw3,ph3*0.35,16);ctx.fillStyle=psh;ctx.fill();
    // Title
    const tsz=cl(pw3*0.062|0,10,19);
    ctx.save();ctx.font=`bold ${tsz}px Impact,Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    const ttg=ctx.createLinearGradient(0,py3+ph3*0.06,0,py3+ph3*0.2);
    ttg.addColorStop(0,'#FFF0A0');ttg.addColorStop(1,'#FFA000');
    ctx.fillStyle=ttg;ctx.shadowColor='rgba(255,200,0,0.7)';ctx.shadowBlur=12;
    ctx.fillText('✦  BONUS — Choisissez une pièce !  ✦',px3+pw3/2,py3+ph3*0.13);
    ctx.shadowBlur=0;ctx.restore();
    // 5 pieces grid
    const N=bonusPickerPieces.length;
    const slotW=pw3/N;const slotH=ph3*0.72;const slotY=py3+ph3*0.23;
    bonusPickerPieces.forEach((piece,i)=>{
      const sx=px3+i*slotW,sy=slotY;
      // Slot background
      const ishov=(mouseX>=sx&&mouseX<sx+slotW&&mouseY>=sy&&mouseY<sy+slotH);
      const slBg=ctx.createLinearGradient(sx,sy,sx,sy+slotH);
      slBg.addColorStop(0,ishov?'rgba(255,200,0,0.22)':'rgba(255,255,255,0.06)');
      slBg.addColorStop(1,ishov?'rgba(255,140,0,0.12)':'rgba(255,255,255,0.02)');
      rrect(ctx,sx+3,sy+3,slotW-6,slotH-6,10,slBg,ishov?hexA('#FFD700',0.6):hexA('#FFFFFF',0.15),ishov?1.5:0.8);
      // Draw piece centered in slot
      const sh=piece.shape;
      const pcol=sh[0].length,prow=sh.length;
      const maxDim=Math.max(pcol,prow);
      const pc2=Math.floor((slotW-16)/maxDim);
      const ox=sx+(slotW-pcol*pc2)/2,oy=sy+(slotH-prow*pc2)/2;
      sh.forEach((line,rr)=>line.forEach((v,cc)=>{if(v)drawCell(ctx,piece.color,ox+cc*pc2|0,oy+rr*pc2|0,pc2,selSkin,t);}));
      bonusPickerRects.push({x:sx,y:sy,w:slotW,h:slotH,idx:i});
    });
    // Dismiss hint
    const hsz=cl(pw3*0.038|0,8,12);
    ctx.save();ctx.font=`${hsz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='rgba(180,180,200,0.7)';
    ctx.fillText('(appuyez en dehors pour ignorer)',px3+pw3/2,py3+ph3*0.93);ctx.restore();
  }
  // Second Chance Panel
  if(showSecondChance){
    const scpW=Math.min(W-24,360),scpH=Math.round(H*0.4);
    const scpX=(W-scpW)/2,scpY=(H-scpH)/2;
    ctx.fillStyle='rgba(0,0,0,0.76)';ctx.fillRect(0,0,W,H);
    const spg=ctx.createLinearGradient(scpX,scpY,scpX,scpY+scpH);
    spg.addColorStop(0,hexA(th.gbg,0.97));spg.addColorStop(1,hexA(th.bg,0.95));
    rrect(ctx,scpX,scpY,scpW,scpH,16,spg,null);
    const spsh=ctx.createLinearGradient(scpX,scpY,scpX,scpY+scpH*0.35);
    spsh.addColorStop(0,'rgba(255,255,255,0.11)');spsh.addColorStop(1,'rgba(255,255,255,0)');
    rp(ctx,scpX,scpY,scpW,scpH*0.35,16);ctx.fillStyle=spsh;ctx.fill();
    rp(ctx,scpX,scpY,scpW,scpH,16);ctx.strokeStyle=hexA(th.dc,0.7);ctx.lineWidth=2;ctx.stroke();
    const qSz=cl(scpW*0.068|0,10,20);
    ctx.save();ctx.font=`bold ${qSz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=th.hi||th.tm;ctx.shadowColor=th.tm;ctx.shadowBlur=12;
    ctx.fillText('SECONDE CHANCE ?',scpX+scpW/2,scpY+scpH*0.18);
    ctx.shadowBlur=0;
    const scSub=cl(qSz*0.72|0,8,14);
    ctx.font=`${scSub}px Arial`;ctx.fillStyle=hexA(th.tg,0.9);ctx.shadowBlur=0;
    ctx.fillText('OUI : retire les 5 derniers blocs posés',scpX+scpW/2,scpY+scpH*0.33);
    ctx.fillText('et remplace le plateau par 3 à 5 nouvelles pièces',scpX+scpW/2,scpY+scpH*0.44);
    ctx.shadowBlur=0;ctx.restore();
    const btnW=Math.floor(scpW*0.32),btnH=Math.floor(scpH*0.2);
    const ouiX=scpX+scpW*0.12,ouiY=scpY+scpH*0.55;
    const ouiG=ctx.createLinearGradient(ouiX,ouiY,ouiX,ouiY+btnH);
    ouiG.addColorStop(0,'#40C060');ouiG.addColorStop(1,'#205030');
    rrect(ctx,ouiX,ouiY,btnW,btnH,btnH/3,ouiG,null);
    ctx.save();ctx.font=`bold ${Math.floor(btnH*0.5)}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#FFF';ctx.shadowColor='#60FF80';ctx.shadowBlur=6;ctx.fillText('OUI',ouiX+btnW/2,ouiY+btnH/2);ctx.restore();
    secondChanceBtns.oui={x:ouiX,y:ouiY,w:btnW,h:btnH};
    const nonX=scpX+scpW*0.56,nonY=ouiY;
    const nonG=ctx.createLinearGradient(nonX,nonY,nonX,nonY+btnH);
    nonG.addColorStop(0,'#C04040');nonG.addColorStop(1,'#601020');
    rrect(ctx,nonX,nonY,btnW,btnH,btnH/3,nonG,null);
    ctx.save();ctx.font=`bold ${Math.floor(btnH*0.5)}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#FFF';ctx.shadowColor='#FF6060';ctx.shadowBlur=6;ctx.fillText('NON',nonX+btnW/2,nonY+btnH/2);ctx.restore();
    secondChanceBtns.non={x:nonX,y:nonY,w:btnW,h:btnH};
  }
  // Game Over
  if(over){
    const el=Date.now()-overT;
    ctx.fillStyle=`rgba(0,0,0,${Math.min(0.78,el/600*0.78).toFixed(3)})`;ctx.fillRect(0,0,W,H);
    if(el>350){
      const pw2=Math.min(W-24,390),ph2=Math.round(H*0.52);
      const px=(W-pw2)/2,py=(H-ph2)/2-10;
      // Panel glass
      const pg2=ctx.createLinearGradient(px,py,px,py+ph2);
      pg2.addColorStop(0,hexA(th.gbg,0.95));pg2.addColorStop(1,hexA(th.bg,0.92));
      rrect(ctx,px,py,pw2,ph2,18,pg2,null);
      // Panel shine
      const psg=ctx.createLinearGradient(px,py,px,py+ph2*0.4);
      psg.addColorStop(0,'rgba(255,255,255,0.1)');psg.addColorStop(1,'rgba(255,255,255,0)');
      rp(ctx,px,py,pw2,ph2*0.4,18);ctx.fillStyle=psg;ctx.fill();
      rp(ctx,px,py,pw2,ph2,18);ctx.strokeStyle=hexA(th.dc,0.7);ctx.lineWidth=2;ctx.stroke();
      // Title
      const goSz=cl(pw2*0.12|0,16,40);
      drawPremText(ctx,'GAME OVER',W/2,py+ph2*0.20,`bold ${goSz}px Impact,Arial`,'#FF6040','#CC2010','rgba(0,0,0,0.6)','#FF4020',18,3);
      ctx.textAlign='center';ctx.textBaseline='middle';
      // Score
      const scSz=cl(pw2*0.075|0,12,26);
      const isRec=score>=best&&score>0;
      if(isRec){drawPremText(ctx,`★  ${score}  ★`,W/2,py+ph2*0.39,`bold ${scSz}px Impact,Arial`,'#FFEE60','#FFA020','rgba(0,0,0,0.5)','#FFCC00',12,2.5);}
      else{ctx.font=`bold ${scSz}px Impact,Arial`;ctx.fillStyle=th.tm;ctx.fillText(`Score : ${score}`,W/2,py+ph2*0.39);}
      ctx.font=`bold ${scSz*0.88}px Arial`;
      ctx.fillStyle=isRec?th.hi||th.ta:th.ta;ctx.fillText(isRec?'NOUVEAU RECORD !':` Record : ${best}`,W/2,py+ph2*0.54);
      // Stats détaillées
      const stSz=cl(scSz*0.65|0,8,14);
      ctx.font=`${stSz}px Arial`;ctx.fillStyle=th.tg;
      const elapsed=Date.now()-gameStartTime;
      ctx.fillText(`⏱ ${Math.floor(elapsed/60000)}:${String(Math.floor(elapsed%60000/1000)).padStart(2,'0')}  |  📊 ${totalLinesCleared} lignes  |  ×${maxComboGame} max`,W/2,py+ph2*0.73);
      if(el>1200){
        const tapA=0.5+0.5*Math.abs(Math.sin(Date.now()*0.004));
        ctx.globalAlpha=tapA;ctx.font=`bold ${scSz*0.85}px Arial`;ctx.fillStyle='#A0E8A0';ctx.shadowColor='#A0E8A0';ctx.shadowBlur=6;
        ctx.fillText('Toucher pour continuer',W/2,py+ph2*0.88);ctx.shadowBlur=0;ctx.globalAlpha=1;
      }
      ctx.textAlign='left';ctx.textBaseline='alphabetic';
    }
  }
  // ── MODE OVERLAYS ────────────────────────────────────────────────────────────
  _drawModeOverlays(t,th);
}

function _drawModeOverlays(t,th){
  const subMode=_getHistoireSubMode();
  const effectiveMode=currentMode==='histoire'?subMode:currentMode;
  // ── CHRONO ──
  if(effectiveMode==='chrono'&&!over){
    const now=Date.now();
    const dt=now-chronoLastTick;chronoLastTick=now;
    chronoTimeLeft=Math.max(0,chronoTimeLeft-dt);
    const frac=chronoTimeLeft/chronoMaxTime;
    const barW=GW,barH=Math.max(6,CELL*0.18)|0;
    const barX=GRID_X,barY=GRID_Y-barH-3;
    // Track bg
    rrect(ctx,barX,barY,barW,barH,barH/2,'rgba(0,0,0,0.5)',null);
    // Fill — green→yellow→orange→red
    const col=frac>0.5?lerpC('#40FF60','#FFD700',(1-frac)*2):lerpC('#FFD700','#FF2020',(0.5-frac)*2);
    if(frac>0)rrect(ctx,barX,barY,Math.ceil(barW*frac),barH,barH/2,col,null);
    // Pulsing border when critical
    if(frac<0.25){ctx.save();ctx.shadowColor='#FF2020';ctx.shadowBlur=8+4*Math.sin(t*0.015);rp(ctx,barX,barY,barW,barH,barH/2);ctx.strokeStyle='rgba(255,50,20,0.7)';ctx.lineWidth=2;ctx.stroke();ctx.restore();}
    // Seconds label
    const sec=Math.ceil(chronoTimeLeft/1000);
    const csz=cl(Math.floor(CELL*0.55),10,20);
    ctx.save();ctx.font=`bold ${csz}px Impact,Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    if(frac<0.3){ctx.fillStyle='#FF4020';ctx.shadowColor='#FF2010';ctx.shadowBlur=8+4*Math.abs(Math.sin(t*0.012));}else ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.fillText(`⏱ ${sec}`,GRID_X+GW/2,barY-csz*0.6);ctx.restore();
    // Timeout → game over
    if(chronoTimeLeft<=0&&!over){
      over=true;overT=Date.now();
      if(score>best){best=score;try{localStorage.setItem('blockpuzzle_best',String(best));}catch(e2){}}
      scoreHistory.push(score);scoreHistory.sort((a,b)=>b-a);scoreHistory=scoreHistory.slice(0,5);
      try{localStorage.setItem('bp_scores',JSON.stringify(scoreHistory));}catch(e2){}
      try{localStorage.removeItem('bp_save');}catch(e2){}hasSave=false;
      _triggerScoreSubmit(score);sndGameOver();
      setTimeout(()=>{gameState='gameover';},2000);
    }
  }
  // ── CHOIX / STRATÉGIE ──
  if((effectiveMode==='choix')&&choixState==='picking'&&!over){
    // Full picker overlay
    ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,0,W,H);
    const cw=Math.min(W-16,380),ch=Math.round(H*0.44);
    const cx2=(W-cw)/2,cy2=(H-ch)/2;
    const cbg=ctx.createLinearGradient(cx2,cy2,cx2,cy2+ch);
    cbg.addColorStop(0,'rgba(30,10,50,0.97)');cbg.addColorStop(1,'rgba(15,5,25,0.95)');
    rrect(ctx,cx2,cy2,cw,ch,16,cbg,null);
    rp(ctx,cx2,cy2,cw,ch,16);ctx.strokeStyle='rgba(200,80,255,0.55)';ctx.lineWidth=2;ctx.stroke();
    const ctsz=cl(Math.floor(ch*0.12),10,20);
    ctx.save();ctx.font=`bold ${ctsz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#D040FF';ctx.shadowColor='#D040FF';ctx.shadowBlur=8;
    ctx.fillText('🎯 CHOISIS TON BLOC',cx2+cw/2,cy2+ch*0.11);ctx.restore();
    // 3 piece cards
    const slotW=cw/3;choixOptionRects=[];
    choixOptions.forEach((piece,i)=>{
      const sx=cx2+i*slotW+6,sy=cy2+ch*0.2,sw=slotW-12,sh=ch*0.62;
      choixOptionRects.push({x:sx,y:sy,w:sw,h:sh});
      const hover=mouseX>=sx&&mouseX<sx+sw&&mouseY>=sy&&mouseY<sy+sh;
      const sbg2=ctx.createLinearGradient(sx,sy,sx,sy+sh);
      sbg2.addColorStop(0,hexA(piece.color,hover?0.38:0.20));sbg2.addColorStop(1,hexA(piece.color,hover?0.22:0.10));
      rrect(ctx,sx,sy,sw,sh,10,sbg2,null);
      rp(ctx,sx,sy,sw,sh,10);ctx.strokeStyle=hexA(piece.color,hover?0.9:0.45);ctx.lineWidth=hover?2:1;ctx.stroke();
      if(hover){ctx.save();ctx.shadowColor=piece.color;ctx.shadowBlur=12;rp(ctx,sx,sy,sw,sh,10);ctx.strokeStyle=hexA(piece.color,0.8);ctx.lineWidth=2;ctx.stroke();ctx.restore();}
      // Piece preview centred in card
      const pcw=piece.shape[0].length,pch=piece.shape.length;
      const pc=cl(Math.floor(sw/(pcw+1.5)),8,28);
      const ox2=(sx+sw/2-pcw*pc/2)|0,oy2=(sy+sh*0.42-pch*pc/2)|0;
      piece.shape.forEach((line,rr)=>line.forEach((v,cc)=>{if(v)drawCell(ctx,piece.color,ox2+cc*pc,oy2+rr*pc,pc,selSkin,t);}));
    });
    ctx.save();ctx.font=`${cl(Math.floor(ch*0.075),8,13)}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,255,0.45)';ctx.fillText('Touche un bloc pour le sélectionner',cx2+cw/2,cy2+ch*0.9);ctx.restore();
  }
  // ── CONTRAINTES ──
  if((effectiveMode==='contraintes')&&!over){
    // Render blocked cells with crosshatch + red tint
    contraBlocked.forEach(({r,c})=>{
      const x=GRID_X+c*CELL,y=GRID_Y+r*CELL;
      ctx.save();ctx.globalAlpha=0.72;
      ctx.fillStyle='rgba(180,20,20,0.45)';ctx.fillRect(x,y,CELL,CELL);
      // Crosshatch
      ctx.strokeStyle='rgba(255,60,40,0.55)';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+CELL,y+CELL);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+CELL,y);ctx.lineTo(x,y+CELL);ctx.stroke();
      ctx.strokeStyle='rgba(255,60,40,0.35)';ctx.strokeRect(x+1,y+1,CELL-2,CELL-2);
      ctx.globalAlpha=1;ctx.restore();
    });
    // Blocked count badge
    const bcount=contraBlocked.length;
    const bw2=cl(Math.round(GW*0.52),80,180),bh2=cl(Math.round(H*0.048),20,34);
    const bx2=GRID_X+(GW-bw2)/2,by2=GRID_Y-bh2-4;
    rrect(ctx,bx2,by2,bw2,bh2,bh2/2,'rgba(100,10,10,0.85)',null);
    rp(ctx,bx2,by2,bw2,bh2,bh2/2);ctx.strokeStyle='rgba(255,60,40,0.55)';ctx.lineWidth=1.2;ctx.stroke();
    const bfsz=cl(Math.floor(bh2*0.52),8,14);
    ctx.save();ctx.font=`bold ${bfsz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#FF6050';ctx.fillText(`⚠ ${bcount} cases bloquées`,bx2+bw2/2,by2+bh2/2);ctx.restore();
  }
  // ── HISTOIRE ──
  if(currentMode==='histoire'&&!over){
    const lvlDef=HISTOIRE_LEVELS[histoireLevel%HISTOIRE_LEVELS.length];
    const bw2=Math.min(GW,280),bh2=cl(Math.round(H*0.055),22,38);
    const bx2=GRID_X+(GW-bw2)/2,by2=GRID_Y-bh2-4;
    const hmet=histoireGoalMet;
    const hcol=hmet?'#40FF80':'#FF6080';
    rrect(ctx,bx2,by2,bw2,bh2,bh2/2,hmet?'rgba(10,40,15,0.9)':'rgba(40,8,20,0.9)',null);
    rp(ctx,bx2,by2,bw2,bh2,bh2/2);ctx.strokeStyle=hexA(hcol,0.55);ctx.lineWidth=1.5;ctx.stroke();
    const hfsz=cl(Math.floor(bh2*0.52),7,14);
    ctx.save();ctx.font=`bold ${hfsz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=hcol;
    const lvNum=histoireLevel+1;
    const isLastLvl=histoireLevel>=HISTOIRE_LEVELS.length-1;
    ctx.fillText(`📖 Niv.${lvNum}/${HISTOIRE_LEVELS.length}: ${lvlDef.label}`,bx2+bw2/2,by2+bh2/2);ctx.restore();
    // Goal met → show next button or completion screen
    if(hmet){
      const el2=Date.now()-histoireGoalMetT;
      if(el2>1000){
        ctx.fillStyle=`rgba(0,0,0,${Math.min(0.75,el2/1500*0.75).toFixed(3)})`;ctx.fillRect(0,0,W,H);
        const npw=Math.min(W-24,320),nph=cl(Math.round(H*0.42),130,230);
        const npx=(W-npw)/2,npy=(H-nph)/2;
        if(isLastLvl){
          // ── HISTOIRE TERMINÉE ──
          const cbg=ctx.createLinearGradient(npx,npy,npx,npy+nph);
          cbg.addColorStop(0,'rgba(20,10,40,0.98)');cbg.addColorStop(1,'rgba(5,3,12,0.98)');
          rrect(ctx,npx,npy,npw,nph,16,cbg,null);
          rp(ctx,npx,npy,npw,nph,16);ctx.strokeStyle='rgba(255,200,50,0.9)';ctx.lineWidth=2.5;ctx.stroke();
          const nfsz=cl(npw*0.09|0,12,26);
          ctx.save();ctx.font=`bold ${nfsz*1.2}px Impact,Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillStyle='#FFD700';ctx.shadowColor='#FFD700';ctx.shadowBlur=18;
          ctx.fillText('🏆 HISTOIRE TERMINÉE !',W/2,npy+nph*0.22);ctx.shadowBlur=0;
          ctx.font=`${nfsz*0.7}px Arial`;ctx.fillStyle='rgba(255,220,100,0.9)';
          ctx.fillText('50 niveaux complétés !',W/2,npy+nph*0.40);
          ctx.font=`${nfsz*0.6}px Arial`;ctx.fillStyle='rgba(200,180,255,0.7)';
          ctx.fillText('La progression repart de zéro',W/2,npy+nph*0.54);ctx.restore();
          const nbw=Math.min(npw-40,200),nbh=cl(Math.round(nph*0.20),28,44);
          const nbx=(W-nbw)/2,nby=npy+nph*0.68;
          const nbg2=ctx.createLinearGradient(nbx,nby,nbx,nby+nbh);
          nbg2.addColorStop(0,'#806000');nbg2.addColorStop(1,'#402800');
          rrect(ctx,nbx,nby,nbw,nbh,nbh/2,nbg2,null);

// ─── INPUT ───────────────────────────────────────────────────────────────────
function getPos(e){if(e.touches&&e.touches.length>0)return{x:e.touches[0].clientX,y:e.touches[0].clientY};if(e.changedTouches&&e.changedTouches.length>0)return{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};return{x:e.clientX,y:e.clientY};}
function onDown(e){e.preventDefault();const{x,y}=getPos(e);mouseX=x;mouseY=y;
  if(gameState==='menu'){handleMenuTap(x,y);return;}
  if(gameState==='modeselect'){handleModeSelectTap(x,y);return;}
  if(gameState==='pause'){return;}
  if(gameState==='leaderboard'){if(_backLbRect&&x>=_backLbRect.x&&x<_backLbRect.x+_backLbRect.w&&y>=_backLbRect.y&&y<_backLbRect.y+_backLbRect.h){gameState='menu';}return;}
  if(gameState==='gameover'){if(Date.now()-overT>1200)gameState='menu';return;}
  // Block tray drag only when in choix PICKING phase; all other modes allow normal drag
  const _inChoixPick=(currentMode==='choix'||_getHistoireSubMode()==='choix')&&choixState==='picking';
  if(gameState==='playing'&&!over&&!showSecondChance&&!showBonusPicker&&!_inChoixPick){const pw=GW/3;for(let i=0;i<3;i++){if(x>=GRID_X+i*pw&&x<GRID_X+(i+1)*pw&&y>=TRAY_Y&&y<TRAY_Y+TRAY_H&&tray[i]){drag={idx:i};break;}}}}
function onMove(e){e.preventDefault();const{x,y}=getPos(e);mouseX=x;mouseY=y;
  if(gameState==='pause'&&_volumeSliderRect){
    const{x:vx,y:vy,w:vw,h:vh}=_volumeSliderRect;
    if(mouseY>=vy-14&&mouseY<=vy+vh+14){
      _volume=cl((mouseX-vx)/vw,0,1);
    }
  }
}
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function onUp(e){
  e.preventDefault();const{x,y}=getPos(e);mouseX=x;mouseY=y;
  // Pause overlay
  if(gameState==='pause'){handlePauseTap(x,y);return;}
  // Pause HUD button
  if(gameState==='playing'&&_pauseHudRect&&x>=_pauseHudRect.x&&x<_pauseHudRect.x+_pauseHudRect.w&&y>=_pauseHudRect.y&&y<_pauseHudRect.y+_pauseHudRect.h){gameState='pause';_pauseStartTime=Date.now();return;}
  // Sound toggle (in-game bar only — menu has its own handler in handleMenuTap)
  if(gameState==='playing'&&_soundRect&&x>=_soundRect.x&&x<_soundRect.x+_soundRect.w&&y>=_soundRect.y&&y<_soundRect.y+_soundRect.h){_soundEnabled=!_soundEnabled;return;}
  // ── MODE taps ──
  if(gameState==='playing'){
    const subMode=_getHistoireSubMode();
    const eMode=currentMode==='histoire'?subMode:currentMode;
    // Choix: pick a piece from overlay
    if(eMode==='choix'&&choixState==='picking'){
      for(let i=0;i<choixOptionRects.length;i++){
        const r=choixOptionRects[i];
        if(x>=r.x&&x<r.x+r.w&&y>=r.y&&y<r.y+r.h){
          tray[0]=choixOptions[i];tray[1]=null;tray[2]=null;
          choixState='placing';return;
        }
      }
      return; // tap outside overlay → ignore
    }
    // (Choix tray refresh is handled in the placement block below)
    // Histoire: tap "niveau suivant" button
    if(currentMode==='histoire'&&histoireGoalMet&&histoireNextRect){
      const r=histoireNextRect;
      if(x>=r.x&&x<r.x+r.w&&y>=r.y&&y<r.y+r.h){
        const isLast=histoireLevel>=HISTOIRE_LEVELS.length-1;
        if(isLast){
          // Histoire complétée — retour menu, reset progression
          histoireLevel=0;
          try{localStorage.setItem('bp_histoire','0');}catch(e2){}
          gameState='menu';return;
        }
        histoireLevel=histoireLevel+1;
        try{localStorage.setItem('bp_histoire',String(histoireLevel));}catch(e2){}
        resetGame();return;
      }
    }
  }
  // Second chance buttons
  if(showSecondChance){
    const ob=secondChanceBtns.oui,nb=secondChanceBtns.non;
    if(ob&&x>=ob.x&&x<ob.x+ob.w&&y>=ob.y&&y<ob.y+ob.h){
      // Remove last up to 5 placed cells still on the grid
      const toUndo=placeHistory.splice(-5);
      toUndo.reverse().forEach(entry=>{
        entry.cells.forEach(({r,c})=>{
          grid[r][c]=null;gridStars[r][c]=false;gridBonus[r][c]=null;
        });
        // remove any parasites from those cells
        parasites=parasites.filter(p=>!entry.cells.some(cl=>cl.r===p.r&&cl.c===p.c));
      });
      // Refresh tray with 3–5 new pieces
      tray=newTray();
      showSecondChance=false;secondChanceUsed=true;combo=0;drag=null;
      screenFlash=160;screenFlashCol='#40FF80';
      floats.push(new FloatText('SECONDE CHANCE !',W/2,H/2,'#40FF80',1.4,120));
      return;
    }
    if(nb&&x>=nb.x&&x<nb.x+nb.w&&y>=nb.y&&y<nb.y+nb.h){
      showSecondChance=false;secondChanceUsed=true;
      over=true;overT=Date.now();
      if(score>best){best=score;try{localStorage.setItem('blockpuzzle_best',String(best));}catch(e2){}}
      scoreHistory.push(score);scoreHistory.sort((a,b)=>b-a);scoreHistory=scoreHistory.slice(0,5);
      try{localStorage.setItem('bp_scores',JSON.stringify(scoreHistory));}catch(e2){}
      try{localStorage.removeItem('bp_save');}catch(e2){}hasSave=false;
      _triggerScoreSubmit(score);
      sndGameOver();
      setTimeout(()=>{gameState='gameover';},2000);drag=null;return;
    }
    drag=null;return;
  }
  // Bonus picker overlay
  if(showBonusPicker){
    // Check if a piece was picked
    let picked=false;
    for(let i=0;i<bonusPickerRects.length;i++){
      const br2=bonusPickerRects[i];
      if(x>=br2.x&&x<br2.x+br2.w&&y>=br2.y&&y<br2.y+br2.h){
        const chosen=bonusPickerPieces[br2.idx];
        // Fill first empty slot (there is always one since bonus triggers right after placing)
        let placed2=false;
        for(let s=0;s<tray.length;s++){if(!tray[s]){tray[s]=chosen;placed2=true;break;}}
        if(!placed2){tray[0]=chosen;}
        showBonusPicker=false;bonusPickerPieces=[];bonusPickerRects=[];
        drag=null;picked=true;break;
      }
    }
    if(!picked){
      // Tapped outside panel — dismiss
      const pw3=Math.min(W-20,400),ph3=Math.round(H*0.38);
      const px3=(W-pw3)/2,py3=(H-ph3)/2;
      if(x<px3||x>px3+pw3||y<py3||y>py3+ph3){
        showBonusPicker=false;bonusPickerPieces=[];bonusPickerRects=[];
      }
    }
    drag=null;return;
  }
  // Bonus banner click — open picker
  if(showAddCellsBonus&&addCellsBonusRect){
    const br=addCellsBonusRect;
    if(x>=br.x&&x<br.x+br.w&&y>=br.y&&y<br.y+br.h){
      bonusPickerPieces=Array.from({length:5},()=>newPiece());
      showBonusPicker=true;showAddCellsBonus=false;addCellsBonusRect=null;
      sndBonus();
      drag=null;return;
    }
  }
  if(drag&&gameState==='playing'&&!over&&!showSecondChance){
    const piece=tray[drag.idx];
    if(piece){const{gr,gc}=snapPos(x,y,piece.shape);if(_modeCanPlace(grid,piece.shape,gr,gc)){
      placePiece(grid,piece.shape,piece.color,gr,gc);
      sndPlace();
      // ── Speed mechanic ───────────────────────────────────────────────────
      const now2=Date.now();
      const thinkMs=lastPlaceTime>0?now2-lastPlaceTime:4000;
      lastPlaceTime=now2;
      // Chrono: reset timer on successful placement
      if(_getHistoireSubMode()==='chrono'||currentMode==='chrono'){chronoTimeLeft=chronoMaxTime;chronoLastTick=now2;}
      let speedMul=1.0,speedLabel=null,speedCol='#FFFFFF';
      if(thinkMs<SPEED_TURBO){speedMul=1.8;speedLabel='⚡ TURBO ×1.8';speedCol='#FF4020';}
      else if(thinkMs<SPEED_FAST){speedMul=1.3;speedLabel='⚡ RAPIDE ×1.3';speedCol='#FFA020';}
      else if(thinkMs>=SPEED_SLOW){speedMul=0.8;speedLabel='🐢 LENT ×0.8';speedCol='#88AAFF';}
      // ── Pop anim + stars/bonus assignment per cell ────────────────────────
      piece.shape.forEach((line,rr)=>line.forEach((v,cc)=>{if(v){const ri=gr+rr,ci=gc+cc;placedCellsMap.set(ri*100+ci,0);
        if(piece.isParasite){
          parasites.push({r:ri,c:ci,born:now2,lastTick:now2});
          gridStars[ri][ci]=false;gridBonus[ri][ci]=null;
        }else{
          const rn=Math.random();gridStars[ri][ci]=rn<0.15;
          if(!gridStars[ri][ci]){const rn2=Math.random();gridBonus[ri][ci]=rn2<0.05?'bomb':rn2<0.09?'x2':null;}else gridBonus[ri][ci]=null;
        }
      }}));
      // ── Record in place history (for second chance undo) ─────────────────
      {
        const hCells=[];
        piece.shape.forEach((line,rr)=>line.forEach((v,cc)=>{if(v)hCells.push({r:gr+rr,c:gc+cc,color:piece.color});}));
        placeHistory.push({cells:hCells});
        if(placeHistory.length>5)placeHistory.shift();
      }
      // Petites particules de placement
      {const pcells2=[];piece.shape.forEach((line,rr)=>line.forEach((v,cc)=>{if(v)pcells2.push({r:gr+rr,c:gc+cc});}));spawnParticles(pcells2,2,0.45,[piece.color]);}
      tray[drag.idx]=null;placed++;
      showAddCellsBonus=false;addCellsBonusTimer--;
      if(addCellsBonusTimer<=0){showAddCellsBonus=true;addCellsBonusTimer=Math.floor(rnd(8,15));}
      const ti=getCurTheme(),{n,cells,colors}=clearLines(grid);
      if(n>0){
        sndClear(n);
        totalLinesCleared+=n;
        // Animation sweep
        clearAnims.push({cells:[...cells],born:Date.now(),color:THEMES[ti].tm});
        let starPts=0;const bombList=[];let hasX2=false;
        // Kill parasites in cleared lines
        const clearedSet=new Set(cells.map(({r,c})=>r*100+c));
        const pBefore=parasites.length;
        parasites=parasites.filter(p=>!clearedSet.has(p.r*100+p.c));
        if(parasites.length<pBefore)floats.push(new FloatText('☠ PARASITE ÉLIMINÉ',GRID_X+GW/2,GRID_Y+GH*0.4,'#00FF80',1.0,90));
        cells.forEach(({r,c})=>{if(gridStars[r][c])starPts+=25;if(gridBonus[r][c]==='bomb')bombList.push({r,c});if(gridBonus[r][c]==='x2')hasX2=true;gridStars[r][c]=false;gridBonus[r][c]=null;});
        const bombKilled=[];
        bombList.forEach(({r,c})=>{for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const br=r+dr,bc=c+dc;if(br>=0&&br<ROWS&&bc>=0&&bc<COLS&&grid[br][bc]){bombKilled.push({r:br,c:bc});grid[br][bc]=null;gridStars[br][bc]=false;gridBonus[br][bc]=null;}}});
        if(bombKilled.length>0){spawnParticles(bombKilled,8,2,['#FF6020','#FFA020','#FF2010']);shake=Math.max(shake,14);shakePow=Math.max(shakePow,6);screenFlash=Math.min(255,screenFlash+120);screenFlashCol='#FF4010';}
        if(hasX2)doublePointsUntil=Date.now()+60000;
        combo++;
        if(combo>bestCombo){bestCombo=combo;try{localStorage.setItem('bp_bestcombo',String(bestCombo));}catch(e2){}}
        maxComboGame=Math.max(maxComboGame,combo);
        if(combo>=2)sndCombo(combo);
        let pts=Math.round(n===1?100*(1+(combo-1)*0.5):n===2?350*(1+(combo-1)*0.5):n*165*(1+(combo-1)*0.5));
        pts+=starPts;
        pts=Math.round(pts*speedMul);
        if(Date.now()<doublePointsUntil)pts=pts*2;
        score+=pts;
        spawnParticles(cells,6,1.2,THEMES[ti].pc);spawnDebris(colors,ti,8);
        if(n>=2){shake=Math.max(shake,10);shakePow=Math.max(shakePow,3+(n>=3?4:0));}
        screenFlash=Math.max(screenFlash,80+(n>=3?120:0));screenFlashCol=THEMES[ti].tm;
        const miny=Math.min(...cells.map(c=>c.r));
        floats.push(new FloatText(n>=3?`★ +${pts} ★`:`+${pts}`,GRID_X+GW/2,GRID_Y+miny*CELL,THEMES[ti].tm));
        if(n>=2){const cn=Math.min(n,4);floats.push(new FloatText(`COMBO ×${cn} POINT`,GRID_X+GW/2,GRID_Y+GH/2,THEMES[ti].hi||'#FFD700',1.6,110));}
        if(starPts>0)floats.push(new FloatText(`★+${starPts}`,GRID_X+GW/2,GRID_Y+miny*CELL-CELL*1.5,THEMES[ti].hi||'#FFE030',1.2,90));
        if(hasX2)floats.push(new FloatText('×2 POINTS 60s',GRID_X+GW/2,GRID_Y+GH*0.35,'#30FFAA',1.1,100));
        const newTh=getCurTheme();if(newTh!==curTheme){curTheme=newTh;gameBg=buildBg(curTheme);gameFx=initFx(curTheme);screenFlash=200;screenFlashCol=THEMES[newTh].tm;}
      }else combo=0;
      // Speed float (show regardless of line clear)
      if(speedLabel)floats.push(new FloatText(speedLabel,GRID_X+GW/2,GRID_Y+GH*0.25,speedCol,0.85,70));
      const subM=_getHistoireSubMode();const eM=currentMode==='histoire'?subM:currentMode;
      if(tray.every(p=>p===null)&&eM!=='choix'){tray=nextTrayPreview||newTray();nextTrayPreview=newTray();}
      if(tray.every(p=>p===null)&&eM==='choix'){_generateChoixOptions();}
      // Sauvegarde automatique
      try{localStorage.setItem('bp_save',JSON.stringify({v:1,grid,score,placed,combo,curTheme,gridStars,gridBonus,tray:tray.map(p=>p?{shape:p.shape,color:p.color,isParasite:!!p.isParasite}:null),ntp:nextTrayPreview?nextTrayPreview.map(p=>p?{shape:p.shape,color:p.color}:null):null,gameStartTime,totalLinesCleared,maxComboGame}));}catch(e2){}
      hasSave=true;
      // For choix mode use choixOptions as the validity check (tray is empty between picks)
      const _validCheck=eM==='choix'?choixOptions:tray;
      if(_validCheck.length>0&&!anyValid(grid,_validCheck)){
        const _eM_zen=currentMode==='histoire'?_getHistoireSubMode():currentMode;
        if(_eM_zen==='zen'){
          // Zen: no game over — clear 2 bottom-most filled rows instead
          _zenClearRows();
          tray=newTray();
        }else{
          if(score>best){best=score;try{localStorage.setItem('blockpuzzle_best',String(best));}catch(e2){}}
          scoreHistory.push(score);scoreHistory.sort((a,b)=>b-a);scoreHistory=scoreHistory.slice(0,5);
          try{localStorage.setItem('bp_scores',JSON.stringify(scoreHistory));}catch(e2){}
          if(_eM_zen!=='zen'&&!secondChanceUsed){showSecondChance=true;}
          else{
            over=true;overT=Date.now();
            try{localStorage.removeItem('bp_save');}catch(e2){}hasSave=false;
            _triggerScoreSubmit(score);
            sndGameOver();
            setTimeout(()=>{gameState='gameover';},2000);
          }
        }
      }
    }}
    drag=null;
  }
}
function handleMenuTap(x,y){
  layoutMenu();
  for(let i=0;i<skinRects.length;i++){const{x:rx,y:ry,w,h}=skinRects[i];if(x>=rx&&x<rx+w&&y>=ry&&y<ry+h){selSkin=i;return;}}
  for(let i=0;i<themeRects.length;i++){const{x:rx,y:ry,w,h}=themeRects[i];if(x>=rx&&x<rx+w&&y>=ry&&y<ry+h){selTheme=i;menuBg=buildBg(i);menuFx=initFx(i);return;}}
  if(playRect){const{x:rx,y:ry,w,h}=playRect;if(x>=rx&&x<rx+w&&y>=ry&&y<ry+h){gameState='modeselect';return;}}
  if(hasSave&&resumeRect){const{x:rx,y:ry,w,h}=resumeRect;if(x>=rx&&x<rx+w&&y>=ry&&y<ry+h){if(loadSave())return;}}
  if(_lbRect){const{x:rx,y:ry,w,h}=_lbRect;if(x>=rx&&x<rx+w&&y>=ry&&y<ry+h){gameState='leaderboard';return;}}
  if(_soundRect){const{x:rx,y:ry,w,h}=_soundRect;if(x>=rx&&x<rx+w&&y>=ry&&y<ry+h){_soundEnabled=!_soundEnabled;return;}}
}
function handleModeSelectTap(x,y){
  layoutModeSelect();
  // Back
  if(_modeBackRect&&x>=_modeBackRect.x&&x<_modeBackRect.x+_modeBackRect.w&&y>=_modeBackRect.y&&y<_modeBackRect.y+_modeBackRect.h){gameState='menu';return;}
  // Mode cards — select
  for(const rect of modeSelectRects){if(x>=rect.x&&x<rect.x+rect.w&&y>=rect.y&&y<rect.y+rect.h){currentMode=rect.key;return;}}
  // Play button
  if(_modePlayRect){const{x:rx,y:ry,w,h}=_modePlayRect;if(x>=rx&&x<rx+w&&y>=ry&&y<ry+h){try{localStorage.removeItem('bp_save');}catch(e2){}hasSave=false;resize();resetGame();gameState='playing';return;}}
}
window.addEventListener('keydown',e=>{
  if(gameState==='gameover'){gameState='menu';return;}
  if(gameState==='leaderboard'){gameState='menu';return;}
  if(gameState==='modeselect'){if(e.key==='Escape')gameState='menu';return;}
  if(gameState==='menu'&&(e.key==='Enter'||e.key===' ')){gameState='modeselect';return;}
  if(gameState==='pause'){
    if(e.key==='Escape'||e.key==='p'||e.key==='P'){
      if(_pauseStartTime>0){chronoLastTick+=Date.now()-_pauseStartTime;_pauseStartTime=0;}
      gameState='playing';
    }
    return;
  }
  if(gameState==='playing'){
    if(e.key==='Escape'||e.key==='p'||e.key==='P'){gameState='pause';_pauseStartTime=Date.now();return;}
    if(e.key==='r'||e.key==='R'){
      if(score>best){best=score;try{localStorage.setItem('blockpuzzle_best',String(best));}catch(err){}}
      resetGame();
    }
  }
});
canvas.addEventListener('mousedown',onDown,{passive:false});
canvas.addEventListener('mousemove',onMove,{passive:false});
canvas.addEventListener('mouseup',onUp,{passive:false});
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onUp,{passive:false});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// ─── LOOP ─────────────────────────────────────────────────────────────────────
function loop(ts){
  ctx.clearRect(0,0,W,H);
  if(gameState==='menu')drawMenu(ts);
  else if(gameState==='modeselect')drawModeSelect(ts);
  else if(gameState==='leaderboard')drawLeaderboard(ts);
  else if(gameState==='pause'){drawGame(ts);drawPause(ts);}
  else drawGame(ts);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
