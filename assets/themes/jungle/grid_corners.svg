<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" opacity="0.85">
  <defs>
    <radialGradient id="jungle-leaf-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </radialGradient>
    <radialGradient id="jungle-flower-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </radialGradient>
    <filter id="jungle-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1b5e20" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Liane principale depuis le coin (0,0) -->
  <path d="M0,0 C8,12 5,25 14,32 C22,39 18,52 28,58 C36,63 40,72 38,80"
        fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round"
        filter="url(#jungle-shadow)"/>
  <!-- Liane secondaire -->
  <path d="M0,0 C15,6 28,10 32,22 C36,32 48,36 52,48 C56,58 62,66 68,72"
        fill="none" stroke="#388e3c" stroke-width="1.8" stroke-linecap="round"
        filter="url(#jungle-shadow)"/>

  <!-- Feuille 1 (grande, le long de la liane principale) -->
  <ellipse cx="18" cy="28" rx="10" ry="5" fill="url(#jungle-leaf-grad)"
           transform="rotate(-35, 18, 28)" filter="url(#jungle-shadow)"/>
  <!-- Nervure feuille 1 -->
  <line x1="10" y1="31" x2="26" y2="25" stroke="#1b5e20" stroke-width="0.8"/>

  <!-- Feuille 2 -->
  <ellipse cx="30" cy="50" rx="9" ry="4.5" fill="url(#jungle-leaf-grad)"
           transform="rotate(20, 30, 50)" filter="url(#jungle-shadow)"/>
  <line x1="22" y1="52" x2="38" y2="48" stroke="#1b5e20" stroke-width="0.8"/>

  <!-- Feuille 3 (sur liane secondaire) -->
  <ellipse cx="36" cy="18" rx="8" ry="4" fill="#33691e"
           transform="rotate(10, 36, 18)" filter="url(#jungle-shadow)"/>
  <line x1="29" y1="19" x2="43" y2="17" stroke="#1b5e20" stroke-width="0.7"/>

  <!-- Feuille 4 (petite, en bas) -->
  <ellipse cx="56" cy="62" rx="7" ry="3.5" fill="url(#jungle-leaf-grad)"
           transform="rotate(-15, 56, 62)" filter="url(#jungle-shadow)"/>

  <!-- Fleur tropicale (pétales + centre) -->
  <g transform="translate(52, 30)" filter="url(#jungle-shadow)">
    <ellipse cx="0" cy="-7" rx="3" ry="5.5" fill="#e91e63" transform="rotate(0)"/>
    <ellipse cx="0" cy="-7" rx="3" ry="5.5" fill="#e91e63" transform="rotate(72)"/>
    <ellipse cx="0" cy="-7" rx="3" ry="5.5" fill="#e91e63" transform="rotate(144)"/>
    <ellipse cx="0" cy="-7" rx="3" ry="5.5" fill="#ad1457" transform="rotate(216)"/>
    <ellipse cx="0" cy="-7" rx="3" ry="5.5" fill="#ad1457" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="4" fill="url(#jungle-flower-grad)"/>
  </g>

  <!-- Petite vrille -->
  <path d="M14,32 Q8,38 10,44 Q12,50 8,54"
        fill="none" stroke="#2e7d32" stroke-width="1.2" stroke-linecap="round"/>
</svg>
