<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 60" width="160" height="60">
  <defs>
    <linearGradient id="bg_histoire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#201800"/>
      <stop offset="100%" stop-color="#3C2C00"/>
    </linearGradient>
    <linearGradient id="icon_histoire" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE860"/>
      <stop offset="100%" stop-color="#B88A00"/>
    </linearGradient>
    <filter id="shadow_histoire" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FFD700" flood-opacity="0.5"/>
    </filter>
    <filter id="glow_histoire">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#FFD700" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Badge pill background -->
  <rect x="1" y="1" width="158" height="58" rx="28" ry="28"
        fill="url(#bg_histoire)"
        stroke="#FFD700" stroke-width="1.5"
        filter="url(#shadow_histoire)"/>

  <!-- Inner highlight border -->
  <rect x="2.5" y="2.5" width="155" height="55" rx="27" ry="27"
        fill="none" stroke="#FFD700" stroke-width="0.4" stroke-opacity="0.3"/>

  <!-- Open book icon with star -->
  <g transform="translate(30,31)" filter="url(#glow_histoire)">
    <!-- Left page -->
    <path d="M-1,-10 L-11,-9 L-11,9 Q-6,7 -1,10 Z"
          fill="url(#icon_histoire)" stroke="#FFD700" stroke-width="0.8"/>
    <!-- Right page -->
    <path d="M1,-10 L11,-9 L11,9 Q6,7 1,10 Z"
          fill="url(#icon_histoire)" stroke="#FFD700" stroke-width="0.8"/>
    <!-- Spine center -->
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#3C2C00" stroke-width="1.5"/>
    <!-- Lines on pages (text effect) -->
    <line x1="-9" y1="-4" x2="-3" y2="-4.5" stroke="#3C2C00" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="-9" y1="-1" x2="-3" y2="-1.5" stroke="#3C2C00" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="-9" y1="2" x2="-3" y2="1.5" stroke="#3C2C00" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="3" y1="-4.5" x2="9" y2="-4" stroke="#3C2C00" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="3" y1="-1.5" x2="9" y2="-1" stroke="#3C2C00" stroke-width="0.7" stroke-opacity="0.6"/>
    <!-- Star above book -->
    <text x="0" y="-12" text-anchor="middle" font-size="8" fill="#FFE860"
          font-family="Arial" filter="url(#glow_histoire)">★</text>
  </g>

  <!-- Separator line -->
  <line x1="52" y1="12" x2="52" y2="48" stroke="#FFD700" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- Mode name -->
  <text x="90" y="27" text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif" font-weight="900"
        font-size="15" fill="#FFD700" letter-spacing="1.5">HISTOIRE</text>

  <!-- Subtitle -->
  <text x="90" y="41" text-anchor="middle"
        font-family="Arial, sans-serif" font-weight="400"
        font-size="9" fill="#FFD700" fill-opacity="0.7" letter-spacing="0.5">Campagne guidée</text>

  <!-- Light burst top-left -->
  <ellipse cx="18" cy="11" rx="7" ry="4" fill="#FFD700" fill-opacity="0.18" transform="rotate(-30,18,11)"/>
  <ellipse cx="18" cy="11" rx="3" ry="1.5" fill="#FFFFFF" fill-opacity="0.25" transform="rotate(-30,18,11)"/>
</svg>
