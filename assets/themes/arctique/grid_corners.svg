<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" opacity="0.85">
  <defs>
    <linearGradient id="arctique-crystal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="50%" stop-color="#4dd0e1"/>
      <stop offset="100%" stop-color="#0097a7"/>
    </linearGradient>
    <radialGradient id="arctique-glare-grad" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#b2ebf2" stop-opacity="0.2"/>
    </radialGradient>
    <filter id="arctique-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#0077a8" flood-opacity="0.5"/>
    </filter>
    <filter id="arctique-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#4dd0e1" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Cristal de glace hexagonal principal ancré dans le coin -->
  <!-- Centre du cristal à (14,14) -->
  <g transform="translate(14,14)" filter="url(#arctique-shadow)">
    <!-- Hexagone principal -->
    <polygon
      points="0,-14 12.1,-7 12.1,7 0,14 -12.1,7 -12.1,-7"
      fill="url(#arctique-crystal-grad)" stroke="#b2ebf2" stroke-width="1.2"
      opacity="0.92"/>
    <!-- Hexagone intérieur -->
    <polygon
      points="0,-8 6.9,-4 6.9,4 0,8 -6.9,4 -6.9,-4"
      fill="url(#arctique-glare-grad)" stroke="#e0f7fa" stroke-width="0.8"/>
    <!-- Axes du cristal -->
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#e0f7fa" stroke-width="0.8" opacity="0.7"/>
    <line x1="-12.1" y1="-7" x2="12.1" y2="7" stroke="#e0f7fa" stroke-width="0.8" opacity="0.7"/>
    <line x1="-12.1" y1="7" x2="12.1" y2="-7" stroke="#e0f7fa" stroke-width="0.8" opacity="0.7"/>
    <!-- Reflet -->
    <polygon points="-4,-12 0,-14 4,-12 2,-6 -2,-6"
             fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- Flèches de givre rayonnantes depuis le cristal central -->
  <!-- Direction haut-droite -->
  <g stroke="#80deea" stroke-linecap="round" fill="none" filter="url(#arctique-glow)">
    <!-- Rayon 1 : vers droite -->
    <line x1="26" y1="14" x2="58" y2="14" stroke-width="1.8"/>
    <line x1="38" y1="14" x2="34" y2="10" stroke-width="1.2"/>
    <line x1="38" y1="14" x2="34" y2="18" stroke-width="1.2"/>
    <line x1="50" y1="14" x2="46" y2="10" stroke-width="1.2"/>
    <line x1="50" y1="14" x2="46" y2="18" stroke-width="1.2"/>
    <!-- Rayon 2 : vers bas -->
    <line x1="14" y1="26" x2="14" y2="58" stroke-width="1.8"/>
    <line x1="14" y1="38" x2="10" y2="34" stroke-width="1.2"/>
    <line x1="14" y1="38" x2="18" y2="34" stroke-width="1.2"/>
    <line x1="14" y1="50" x2="10" y2="46" stroke-width="1.2"/>
    <line x1="14" y1="50" x2="18" y2="46" stroke-width="1.2"/>
    <!-- Rayon 3 : diagonale bas-droite -->
    <line x1="24" y1="24" x2="52" y2="52" stroke-width="1.5"/>
    <line x1="36" y1="36" x2="31" y2="35" stroke-width="1.1"/>
    <line x1="36" y1="36" x2="35" y2="31" stroke-width="1.1"/>
    <line x1="46" y1="46" x2="41" y2="45" stroke-width="1.1"/>
    <line x1="46" y1="46" x2="45" y2="41" stroke-width="1.1"/>
  </g>

  <!-- Petits cristaux secondaires -->
  <g filter="url(#arctique-shadow)">
    <!-- Petit cristal haut-droite -->
    <polygon points="62,6 68,10 68,18 62,22 56,18 56,10"
             fill="#b2ebf2" stroke="#4dd0e1" stroke-width="0.8" opacity="0.8"/>
    <line x1="62" y1="6" x2="62" y2="22" stroke="#e0f7fa" stroke-width="0.6" opacity="0.6"/>
    <line x1="56" y1="10" x2="68" y2="18" stroke="#e0f7fa" stroke-width="0.6" opacity="0.6"/>

    <!-- Petit cristal bas-gauche -->
    <polygon points="6,56 10,60 10,68 6,72 2,68 2,60"
             fill="#b2ebf2" stroke="#4dd0e1" stroke-width="0.8" opacity="0.8"/>
    <line x1="6" y1="56" x2="6" y2="72" stroke="#e0f7fa" stroke-width="0.6" opacity="0.6"/>
  </g>

  <!-- Pointe de givre au coin (0,0) -->
  <path d="M0,0 L4,10 L0,8 L-4,10Z" fill="#e0f7fa"
        transform="translate(4,2) rotate(10)" opacity="0.7"/>

  <!-- Éclats de glace -->
  <g fill="#cceeff" opacity="0.8">
    <circle cx="64" cy="36" r="1.8"/>
    <circle cx="72" cy="28" r="1.4"/>
    <circle cx="34" cy="68" r="1.6"/>
    <circle cx="22" cy="74" r="1.2"/>
  </g>
</svg>
