<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Heart fill: pink highlight top-left → deep crimson bottom -->
    <radialGradient id="heartRed" cx="36%" cy="28%" r="68%" fx="34%" fy="25%">
      <stop offset="0%"   stop-color="#FF8FAA"/>
      <stop offset="25%"  stop-color="#FF3868"/>
      <stop offset="60%"  stop-color="#CC0035"/>
      <stop offset="90%"  stop-color="#880020"/>
      <stop offset="100%" stop-color="#5A0018"/>
    </radialGradient>
    <!-- Shine: white → transparent going down-right -->
    <linearGradient id="heartShine" x1="18%" y1="0%" x2="65%" y2="60%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="40%"  stop-color="#FFCCDD" stop-opacity="0.28"/>
      <stop offset="75%"  stop-color="#FF90AA" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF4466" stop-opacity="0"/>
    </linearGradient>
    <!-- Depth shadow: transparent top → dark bottom -->
    <linearGradient id="heartDepth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="65%"  stop-color="#550010" stop-opacity="0"/>
      <stop offset="100%" stop-color="#330008" stop-opacity="0.45"/>
    </linearGradient>
    <!-- Pink outer bloom -->
    <filter id="heartGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="heartShadow" x="-25%" y="-25%" width="165%" height="165%">
      <feDropShadow dx="3" dy="6" stdDeviation="7" flood-color="#880030" flood-opacity="0.60"/>
    </filter>
    <!-- Bloom -->
    <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Specular soft -->
    <filter id="specSoft">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- Inner pulse ring soft -->
    <filter id="pulseSoft">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <!-- Ground shadow -->
    <radialGradient id="groundShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#880030" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#880030" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip to heart shape -->
    <clipPath id="heartClip">
      <path d="M 64,114 C 64,114 10,80 10,46 C 10,24 26,12 42,12 C 52,12 60,18 64,26 C 68,18 76,12 86,12 C 102,12 118,24 118,46 C 118,80 64,114 64,114 Z"/>
    </clipPath>
  </defs>

  <!-- ── GROUND SHADOW ── -->
  <ellipse cx="64" cy="122" rx="36" ry="8" fill="url(#groundShadow)"/>

  <!-- ── OUTER PINK GLOW HALO ── -->
  <path d="M 64,114 C 64,114 10,80 10,46 C 10,24 26,12 42,12 C 52,12 60,18 64,26 C 68,18 76,12 86,12 C 102,12 118,24 118,46 C 118,80 64,114 64,114 Z"
        fill="#FF2255" opacity="0.32" filter="url(#heartGlow)"/>

  <!-- ── HEART BODY ── -->
  <path d="M 64,114 C 64,114 10,80 10,46 C 10,24 26,12 42,12 C 52,12 60,18 64,26 C 68,18 76,12 86,12 C 102,12 118,24 118,46 C 118,80 64,114 64,114 Z"
        fill="url(#heartRed)" stroke="#660020" stroke-width="2"
        filter="url(#heartShadow)"/>

  <!-- ── DEPTH SHADOW OVERLAY ── -->
  <path d="M 64,114 C 64,114 10,80 10,46 C 10,24 26,12 42,12 C 52,12 60,18 64,26 C 68,18 76,12 86,12 C 102,12 118,24 118,46 C 118,80 64,114 64,114 Z"
        fill="url(#heartDepth)"/>

  <!-- ── SHINE OVERLAY (clipped to heart) ── -->
  <path d="M 64,114 C 64,114 10,80 10,46 C 10,24 26,12 42,12 C 52,12 60,18 64,26 C 68,18 76,12 86,12 C 102,12 118,24 118,46 C 118,80 64,114 64,114 Z"
        fill="url(#heartShine)" clip-path="url(#heartClip)" opacity="0.70"/>

  <!-- ── SPECULAR HIGHLIGHT (top-left) ── -->
  <ellipse cx="44" cy="34" rx="18" ry="10" fill="#FFFFFF" opacity="0.50"
           transform="rotate(-35 44 34)" filter="url(#specSoft)"/>
  <!-- Hard glint -->
  <ellipse cx="40" cy="28" rx="7" ry="4"  fill="#FFFFFF" opacity="0.65"
           transform="rotate(-35 40 28)"/>

  <!-- ── INNER PULSE RING ── -->
  <!-- Lighter pink inner stroke suggesting interior glow / pulse -->
  <path d="M 64,96 C 64,96 24,74 24,52 C 24,40 32,32 42,32 C 50,32 56,36 60,42 C 62,38 66,32 74,32 C 86,32 98,40 98,52 C 98,74 64,96 64,96 Z"
        fill="none" stroke="#FF88AA" stroke-width="2.5" stroke-opacity="0.40"
        filter="url(#pulseSoft)"/>
</svg>
