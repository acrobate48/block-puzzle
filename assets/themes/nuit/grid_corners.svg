<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" opacity="0.85">
  <defs>
    <linearGradient id="nuit-poteau-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#546e7a"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <radialGradient id="nuit-lumiere-grad" cx="50%" cy="10%" r="90%">
      <stop offset="0%" stop-color="#fff9c4" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#fff176" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f9a825" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="nuit-ampoule-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </radialGradient>
    <filter id="nuit-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#0d1b2a" flood-opacity="0.7"/>
    </filter>
    <filter id="nuit-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#fff176" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Poteau du réverbère (ancré dans le coin bas-gauche, courbé vers le haut) -->
  <path d="M6,80 C6,60 6,50 8,38 C10,28 18,22 22,14"
        fill="none" stroke="url(#nuit-poteau-grad)" stroke-width="4"
        stroke-linecap="round" filter="url(#nuit-shadow)"/>
  <!-- Base du poteau -->
  <rect x="2" y="74" width="8" height="6" rx="2" fill="#37474f"
        filter="url(#nuit-shadow)"/>

  <!-- Bras horizontal du réverbère -->
  <path d="M22,14 C28,10 38,10 42,12"
        fill="none" stroke="url(#nuit-poteau-grad)" stroke-width="3"
        stroke-linecap="round" filter="url(#nuit-shadow)"/>

  <!-- Suspension fil -->
  <line x1="42" y1="12" x2="42" y2="20" stroke="#37474f" stroke-width="1.5"/>

  <!-- Lanterne (boîtier) -->
  <rect x="36" y="20" width="14" height="18" rx="3" fill="#455a64"
        filter="url(#nuit-shadow)"/>
  <!-- Toit lanterne -->
  <path d="M34,22 L43,16 L52,22Z" fill="#37474f" filter="url(#nuit-shadow)"/>
  <!-- Vitre lumineuse -->
  <rect x="38" y="23" width="10" height="12" rx="1.5"
        fill="url(#nuit-ampoule-grad)" filter="url(#nuit-glow)"/>
  <!-- Armature vitre -->
  <line x1="43" y1="23" x2="43" y2="35" stroke="#546e7a" stroke-width="0.8"/>
  <line x1="38" y1="29" x2="48" y2="29" stroke="#546e7a" stroke-width="0.8"/>

  <!-- Cône de lumière projeté vers le bas -->
  <path d="M38,38 L22,72 L64,72 L52,38Z"
        fill="url(#nuit-lumiere-grad)" opacity="0.6"/>

  <!-- Étoile 5 branches (haut droit) -->
  <g transform="translate(62, 10)" filter="url(#nuit-glow)">
    <polygon
      points="0,-9 2.1,-2.9 8.6,-2.9 3.5,1.1 5.3,7.4 0,3.6 -5.3,7.4 -3.5,1.1 -8.6,-2.9 -2.1,-2.9"
      fill="#fff176" stroke="#f9a825" stroke-width="0.5"/>
  </g>

  <!-- Petites étoiles ponctuelles -->
  <g fill="#cfd8dc" filter="url(#nuit-shadow)">
    <circle cx="70" cy="28" r="1.5"/>
    <circle cx="58" cy="6" r="1.2"/>
    <circle cx="76" cy="16" r="1"/>
    <circle cx="50" cy="14" r="0.9"/>
  </g>

  <!-- Halo lumineux autour de la lanterne -->
  <circle cx="43" cy="29" r="12" fill="#fff176" opacity="0.07"/>
</svg>
