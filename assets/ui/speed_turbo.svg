<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Blue-white electric glow -->
    <filter id="bolt-glow" x="-40%" y="-20%" width="180%" height="140%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Yellow bolt gradient -->
    <linearGradient id="bolt-fill" x1="0.4" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="#FFFDE0"/>
      <stop offset="30%"  stop-color="#FFE840"/>
      <stop offset="70%"  stop-color="#FFD000"/>
      <stop offset="100%" stop-color="#FF9900"/>
    </linearGradient>
    <!-- Blue outer glow halo gradient -->
    <radialGradient id="halo-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#80E8FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0040FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Blue-white glow halo ── -->
  <ellipse cx="32" cy="34" rx="22" ry="28" fill="url(#halo-grad)"/>

  <!-- ── Glow pass (behind bolt) ── -->
  <path d="M 40,4 L 24,32 L 34,32 L 22,60 L 46,28 L 34,28 L 44,4 Z"
        fill="#A0F0FF" opacity="0.55" filter="url(#bolt-glow)"/>

  <!-- ── Lightning bolt body ── -->
  <path d="M 40,4 L 24,32 L 34,32 L 22,60 L 46,28 L 34,28 L 44,4 Z"
        fill="url(#bolt-fill)" stroke="rgba(255,255,255,0.6)" stroke-width="0.8"
        stroke-linejoin="round" filter="url(#bolt-glow)"/>

  <!-- ── White inner shine strip (left upper face) ── -->
  <path d="M 39,6 L 29,28 L 34,28 L 42,7 Z"
        fill="rgba(255,255,255,0.45)"/>
</svg>
