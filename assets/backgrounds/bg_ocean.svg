    <circle cx="1115" cy="1920" r="9" fill="#50C8F0" opacity="0.55"/>
    <circle cx="1125" cy="1740" r="6" fill="#A0F0FF" opacity="0.5"/>
    <circle cx="1112" cy="1550" r="8" fill="#50C8F0" opacity="0.45"/>
    <circle cx="1118" cy="1360" r="5" fill="#A0F0FF" opacity="0.4"/>
    <circle cx="1108" cy="1160" r="7" fill="#50C8F0" opacity="0.35"/>
    <circle cx="1122" cy="940" r="4" fill="#A0F0FF" opacity="0.3"/>
    <!-- Column 3 -->
    <circle cx="1960" cy="2100" r="9" fill="#A0F0FF" opacity="0.6"/>
    <circle cx="1952" cy="1900" r="6" fill="#50C8F0" opacity="0.55"/>
    <circle cx="1965" cy="1700" r="8" fill="#A0F0FF" opacity="0.5"/>
    <circle cx="1958" cy="1500" r="7" fill="#50C8F0" opacity="0.45"/>
    <circle cx="1950" cy="1280" r="5" fill="#A0F0FF" opacity="0.4"/>
    <circle cx="1962" cy="1060" r="8" fill="#50C8F0" opacity="0.35"/>
    <circle cx="1955" cy="840" r="4" fill="#A0F0FF" opacity="0.28"/>
    <!-- Column 4 -->
    <circle cx="2800" cy="2100" r="8" fill="#A0F0FF" opacity="0.6"/>
    <circle cx="2790" cy="1930" r="6" fill="#50C8F0" opacity="0.55"/>
    <circle cx="2808" cy="1760" r="9" fill="#A0F0FF" opacity="0.5"/>
    <circle cx="2795" cy="1580" r="7" fill="#50C8F0" opacity="0.45"/>
    <circle cx="2802" cy="1380" r="5" fill="#A0F0FF" opacity="0.4"/>
    <circle cx="2788" cy="1180" r="8" fill="#50C8F0" opacity="0.35"/>
    <circle cx="2798" cy="960" r="4" fill="#A0F0FF" opacity="0.3"/>
    <!-- Column 5 -->
    <circle cx="3500" cy="2100" r="7" fill="#A0F0FF" opacity="0.6"/>
    <circle cx="3494" cy="1920" r="9" fill="#50C8F0" opacity="0.55"/>
    <circle cx="3506" cy="1740" r="6" fill="#A0F0FF" opacity="0.5"/>
    <circle cx="3498" cy="1550" r="8" fill="#50C8F0" opacity="0.45"/>
    <circle cx="3503" cy="1360" r="5" fill="#A0F0FF" opacity="0.4"/>
    <circle cx="3492" cy="1150" r="7" fill="#50C8F0" opacity="0.35"/>
    <circle cx="3501" cy="940" r="4" fill="#A0F0FF" opacity="0.28"/>
  </g>

  <!-- LAYER 7: Bioluminescent glow spots -->
  <ellipse cx="640" cy="1500" rx="120" ry="80" fill="url(#oBioGlow1)" filter="url(#blurHeavy)" opacity="0.7"/>
  <ellipse cx="1400" cy="1650" rx="100" ry="65" fill="url(#oBioGlow2)" filter="url(#blurHeavy)" opacity="0.65"/>
  <ellipse cx="2200" cy="1400" rx="130" ry="85" fill="url(#oBioGlow1)" filter="url(#blurHeavy)" opacity="0.7"/>
  <ellipse cx="3000" cy="1580" rx="110" ry="72" fill="url(#oBioGlow2)" filter="url(#blurHeavy)" opacity="0.65"/>
  <ellipse cx="3700" cy="1450" rx="95" ry="62" fill="url(#oBioGlow1)" filter="url(#blurHeavy)" opacity="0.6"/>

  <!-- Caustic light radials -->
  <rect width="3840" height="2160" fill="url(#oCaustic1)" filter="url(#blurHeavy)" opacity="0.6"/>
  <rect width="3840" height="2160" fill="url(#oCaustic2)" filter="url(#blurHeavy)" opacity="0.5"/>

  <!-- LAYER 8: Plankton particles (50+) -->
  <g filter="url(#glow)">
    <circle cx="420" cy="1050" r="4" fill="#50C8F0" opacity="0.88"/>
    <circle cx="680" cy="900" r="3" fill="#A0F0FF" opacity="0.82"/>
    <circle cx="940" cy="1180" r="5" fill="#50C8F0" opacity="0.92"/>
