<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" opacity="0.85">
  <defs>
    <radialGradient id="enchante-cap-grad" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </radialGradient>
    <radialGradient id="enchante-cap-shine" cx="30%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="enchante-pied-grad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#bcaaa4"/>
    </radialGradient>
    <filter id="enchante-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.8" flood-color="#4a0000" flood-opacity="0.5"/>
    </filter>
    <filter id="enchante-sparkle">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#ffe57f" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Pied du champignon -->
  <path d="M20,80 C16,72 14,64 16,56 C18,50 24,48 28,48 C32,48 38,50 40,56 C42,62 40,72 36,80Z"
        fill="url(#enchante-pied-grad)" filter="url(#enchante-shadow)"/>
  <!-- Taches sur le pied (anneau) -->
  <path d="M16,58 Q28,54 40,58" fill="none" stroke="#d7ccc8" stroke-width="1.5" opacity="0.7"/>

  <!-- Chapeau du champignon (cap rouge) -->
  <path d="M4,52 C4,30 10,16 28,12 C46,8 56,22 56,44 C56,50 50,56 44,56 C36,58 20,58 12,56 C6,55 4,54 4,52Z"
        fill="url(#enchante-cap-grad)" filter="url(#enchante-shadow)"/>
  <!-- Reflet sur le chapeau -->
  <path d="M4,52 C4,30 10,16 28,12 C46,8 56,22 56,44"
        fill="url(#enchante-cap-shine)" opacity="0.4"/>

  <!-- Taches blanches (spots de l'amanite) -->
  <g fill="#ffffff" filter="url(#enchante-shadow)" opacity="0.92">
    <circle cx="28" cy="22" r="6"/>
    <circle cx="12" cy="36" r="4.5"/>
    <circle cx="44" cy="30" r="4"/>
    <circle cx="38" cy="46" r="3.5"/>
    <circle cx="18" cy="50" r="3"/>
    <circle cx="28" cy="44" r="2.5"/>
  </g>

  <!-- Bord ondulé du chapeau (jupe) -->
  <path d="M4,52 C8,56 12,58 16,56 C20,54 24,58 28,58 C32,58 36,56 40,58 C44,60 50,58 56,54"
        fill="none" stroke="#c62828" stroke-width="2" stroke-linecap="round"
        filter="url(#enchante-shadow)"/>

  <!-- Étoile scintillante 1 (haut droite) -->
  <g transform="translate(66, 12)" filter="url(#enchante-sparkle)">
    <!-- 4 branches -->
    <path d="M0,-8 C0.5,-1 1,-0.5 8,0 C1,0.5 0.5,1 0,8 C-0.5,1 -1,0.5 -8,0 C-1,-0.5 -0.5,-1 0,-8Z"
          fill="#ffe57f"/>
    <!-- 4 petites branches diagonales -->
    <path d="M3,-5 C1.5,-0.5 0.5,-1.5 5,3 M-3,-5 C-1.5,-0.5 -0.5,-1.5 -5,3
             M3,5 C1.5,0.5 0.5,1.5 5,-3 M-3,5 C-1.5,0.5 -0.5,1.5 -5,-3"
          fill="none" stroke="#ffe57f" stroke-width="0.8" opacity="0.6"/>
    <circle cx="0" cy="0" r="2" fill="#fff9c4"/>
  </g>

  <!-- Étoile scintillante 2 (milieu bas) -->
  <g transform="translate(68, 50)" filter="url(#enchante-sparkle)">
    <path d="M0,-6 C0.4,-0.8 0.8,-0.4 6,0 C0.8,0.4 0.4,0.8 0,6 C-0.4,0.8 -0.8,0.4 -6,0 C-0.8,-0.4 -0.4,-0.8 0,-6Z"
          fill="#f8bbd9"/>
    <circle cx="0" cy="0" r="1.5" fill="#fce4ec"/>
  </g>

  <!-- Feuille de trèfle (bas droite) -->
  <g transform="translate(62, 68)" filter="url(#enchante-shadow)">
    <!-- Tige -->
    <path d="M0,12 C0,8 -2,4 0,0" fill="none" stroke="#2e7d32" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 3 lobes du trèfle -->
    <circle cx="0" cy="-2" r="6" fill="#43a047"/>
    <circle cx="-5" cy="4" r="6" fill="#388e3c"/>
    <circle cx="5" cy="4" r="6" fill="#43a047"/>
    <!-- Centre -->
    <circle cx="0" cy="2" r="2.5" fill="#2e7d32"/>
    <!-- Nervures -->
    <line x1="0" y1="-8" x2="0" y2="2" stroke="#1b5e20" stroke-width="0.7"/>
    <line x1="-10" y1="2" x2="0" y2="2" stroke="#1b5e20" stroke-width="0.7"/>
    <line x1="10" y1="2" x2="0" y2="2" stroke="#1b5e20" stroke-width="0.7"/>
  </g>

  <!-- Petits points féeriques -->
  <g fill="#ffe57f" opacity="0.8">
    <circle cx="56" cy="64" r="1.5"/>
    <circle cx="62" cy="36" r="1.2"/>
    <circle cx="74" cy="28" r="1"/>
  </g>
</svg>
