<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 3840 2160" width="100%" height="100%"
     preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="cAtm1" cx="50%" cy="45%" r="65%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#380880" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#200060" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#020008" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cAtm2" cx="30%" cy="35%" r="50%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B040F0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#020008" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cAtm3" cx="70%" cy="60%" r="45%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6080F0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#010004" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cGalaxyCore" cx="50%" cy="45%" r="40%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0A0FF" stop-opacity="0.8"/>
      <stop offset="20%" stop-color="#B040F0" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#380880" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#020008" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cNebula1" cx="35%" cy="40%" r="35%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B040F0" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#380880" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#020008" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cNebula2" cx="68%" cy="55%" r="30%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6080F0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#010004" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cVignette" cx="50%" cy="50%" r="72%" gradientUnits="userSpaceOnUse">
      <stop offset="30%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.92"/>
    </radialGradient>
    <radialGradient id="cSpecular" cx="22%" cy="6%" r="28%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0A0FF" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#B040F0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#020008" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cSpace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#010004"/>
      <stop offset="30%" stop-color="#020008"/>
      <stop offset="70%" stop-color="#060012"/>
      <stop offset="100%" stop-color="#020008"/>
    </linearGradient>
    <linearGradient id="cMilkyWay" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B040F0" stop-opacity="0"/>
      <stop offset="20%" stop-color="#6080F0" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#E0A0FF" stop-opacity="0.35"/>
      <stop offset="80%" stop-color="#B040F0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#380880" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="30" result="b2"/>
      <feColorMatrix in="b1" type="matrix"
        values="0 0 0 0 0.69  0 0 0 0 0.25  0 0 0 0 0.94  0 0 0 2.2 0" result="c1"/>
      <feColorMatrix in="b2" type="matrix"
        values="0 0 0 0 0.69  0 0 0 0 0.25  0 0 0 0 0.94  0 0 0 1 0" result="c2"/>
      <feMerge><feMergeNode in="c2"/><feMergeNode in="c1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBlue" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b1"/>
      <feColorMatrix in="b1" type="matrix"
        values="0 0 0 0 0.38  0 0 0 0 0.50  0 0 0 0 0.94  0 0 0 2.5 0" result="c1"/>
      <feMerge><feMergeNode in="c1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#010004" flood-opacity="0.95"/>
    </filter>
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="gn"/>
      <feBlend in="SourceGraphic" in2="gn" mode="overlay" result="bl"/>
      <feComposite in="bl" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="blur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="blurHeavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blurMid" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="nebulaFilter">
      <feTurbulence type="turbulence" baseFrequency="0.008 0.006" numOctaves="5" seed="13" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="40" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="dustFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.015" numOctaves="4" seed="7" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0.4 0 0 0 0.4  0 0.1 0 0 0.1  0 0 0.5 0 0.5  0 0 0 0.35 0" result="colored"/>
      <feBlend in="SourceGraphic" in2="colored" mode="screen"/>
    </filter>
  </defs>

