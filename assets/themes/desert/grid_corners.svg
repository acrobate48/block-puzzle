<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" opacity="0.85">
  <defs>
    <linearGradient id="desert-sand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#bf8c00"/>
    </linearGradient>
    <linearGradient id="desert-dune-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffca28"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <filter id="desert-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#8d4000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Motif arabesque : séries de V imbriqués depuis le coin -->
  <g stroke="url(#desert-sand-grad)" stroke-linecap="round" stroke-linejoin="round"
     fill="none" filter="url(#desert-shadow)">
    <!-- V 1 (le plus petit, au coin) -->
    <polyline points="0,0 8,12 16,0" stroke-width="2"/>
    <!-- V 2 -->
    <polyline points="0,6 10,22 20,6" stroke-width="1.8"/>
    <!-- V 3 -->
    <polyline points="0,14 12,32 24,14" stroke-width="1.6"/>
    <!-- V 4 -->
    <polyline points="0,22 14,42 28,22" stroke-width="1.4"/>

    <!-- Série horizontale symétrique -->
    <polyline points="0,0 12,8 0,16" stroke-width="2"/>
    <polyline points="6,0 18,10 6,20" stroke-width="1.8"/>
    <polyline points="14,0 26,10 14,22" stroke-width="1.6"/>
    <polyline points="22,0 34,10 22,22" stroke-width="1.4"/>

    <!-- Losange central arabesque -->
    <path d="M28,18 L38,8 L48,18 L38,28 Z" stroke-width="1.8"/>
    <path d="M32,18 L38,12 L44,18 L38,24 Z" stroke-width="1.2"/>
    <!-- Croix dans le losange -->
    <line x1="38" y1="8" x2="38" y2="28" stroke-width="0.8"/>
    <line x1="28" y1="18" x2="48" y2="18" stroke-width="0.8"/>

    <!-- Motif répété en diagonale basse -->
    <polyline points="8,40 18,52 28,40" stroke-width="1.4"/>
    <polyline points="16,48 26,60 36,48" stroke-width="1.2"/>
  </g>

  <!-- Petite dune en bas -->
  <path d="M0,72 Q20,58 40,65 Q58,72 80,62 L80,80 L0,80 Z"
        fill="url(#desert-dune-grad)" filter="url(#desert-shadow)" opacity="0.9"/>
  <!-- Reflet dune -->
  <path d="M0,72 Q20,58 40,65 Q58,72 80,62"
        fill="none" stroke="#ffe082" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Petits points décoratifs (sable) -->
  <g fill="#ffca28" filter="url(#desert-shadow)">
    <circle cx="54" cy="28" r="2"/>
    <circle cx="62" cy="22" r="1.5"/>
    <circle cx="70" cy="32" r="1.5"/>
    <circle cx="58" cy="40" r="1"/>
  </g>
</svg>
