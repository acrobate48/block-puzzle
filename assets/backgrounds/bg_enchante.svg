<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 3840 2160" width="100%" height="100%"
     preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="eAtm1" cx="50%" cy="40%" r="60%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#40F060" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#148040" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#030A06" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eAtm2" cx="30%" cy="55%" r="50%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#80F040" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#020604" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eAtm3" cx="70%" cy="60%" r="45%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#307048" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#030A06" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eMagicCore" cx="50%" cy="45%" r="40%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A0FFC0" stop-opacity="0.7"/>
      <stop offset="25%" stop-color="#40F060" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#148040" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#030A06" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eFairyLight1" cx="40%" cy="50%" r="25%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A0FFC0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#030A06" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eFairyLight2" cx="65%" cy="55%" r="20%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#80F040" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#030A06" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eVignette" cx="50%" cy="50%" r="72%" gradientUnits="userSpaceOnUse">
      <stop offset="35%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="eSpecular" cx="22%" cy="6%" r="28%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A0FFC0" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#40F060" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#030A06" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="eSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020604"/>
      <stop offset="20%" stop-color="#030A06"/>
      <stop offset="55%" stop-color="#051008"/>
      <stop offset="80%" stop-color="#148040"/>
      <stop offset="100%" stop-color="#0C3020"/>
    </linearGradient>
    <linearGradient id="eGroundGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#40F060" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#30F050" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="b2"/>
      <feColorMatrix in="b1" type="matrix"
        values="0 0 0 0 0.25  0 0 0 0 0.94  0 0 0 0 0.38  0 0 0 2.2 0" result="c1"/>
      <feColorMatrix in="b2" type="matrix"
        values="0 0 0 0 0.25  0 0 0 0 0.94  0 0 0 0 0.38  0 0 0 1 0" result="c2"/>
      <feMerge><feMergeNode in="c2"/><feMergeNode in="c1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowLime" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b1"/>
      <feColorMatrix in="b1" type="matrix"
        values="0 0 0 0 0.50  0 0 0 0 0.94  0 0 0 0 0.25  0 0 0 2.5 0" result="c1"/>
      <feMerge><feMergeNode in="c1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#020604" flood-opacity="0.95"/>
    </filter>
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="gn"/>
      <feBlend in="SourceGraphic" in2="gn" mode="overlay" result="bl"/>
      <feComposite in="bl" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="blur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="blurHeavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blurMid" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="bokeh" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="magicSwirl">
      <feTurbulence type="turbulence" baseFrequency="0.015 0.01" numOctaves="4" seed="9" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="30" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- LAYER 1: Enchanted sky -->
  <rect width="3840" height="2160" fill="url(#eSky)"/>

  <!-- LAYER 2: Magical atmosphere -->
  <rect width="3840" height="2160" fill="url(#eAtm1)" filter="url(#blurHeavy)" opacity="0.85"/>
  <rect width="3840" height="2160" fill="url(#eAtm2)" filter="url(#blurMid)" opacity="0.65"/>
  <rect width="3840" height="2160" fill="url(#eAtm3)" filter="url(#blurMid)" opacity="0.55"/>
  <rect width="3840" height="2160" fill="url(#eMagicCore)" filter="url(#blurHeavy)" opacity="0.75"/>

