<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 60" width="160" height="60">
  <defs>
    <linearGradient id="bg_contraintes" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#200408"/>
      <stop offset="100%" stop-color="#380A10"/>
    </linearGradient>
    <linearGradient id="icon_contraintes" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF8098"/>
      <stop offset="100%" stop-color="#C02040"/>
    </linearGradient>
    <filter id="shadow_contraintes" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FF4060" flood-opacity="0.5"/>
    </filter>
    <filter id="glow_contraintes">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#FF4060" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Badge pill background -->
  <rect x="1" y="1" width="158" height="58" rx="28" ry="28"
        fill="url(#bg_contraintes)"
        stroke="#FF4060" stroke-width="1.5"
        filter="url(#shadow_contraintes)"/>

  <!-- Inner highlight border -->
  <rect x="2.5" y="2.5" width="155" height="55" rx="27" ry="27"
        fill="none" stroke="#FF4060" stroke-width="0.4" stroke-opacity="0.3"/>

  <!-- Padlock icon -->
  <g transform="translate(30,31)" filter="url(#glow_contraintes)">
    <!-- Shackle (arch) -->
    <path d="M-6,-4 L-6,-10 Q-6,-15 0,-15 Q6,-15 6,-10 L6,-4"
          fill="none" stroke="url(#icon_contraintes)" stroke-width="2.8"
          stroke-linecap="round"/>
    <!-- Lock body -->
    <rect x="-9" y="-5" width="18" height="14" rx="3"
          fill="url(#icon_contraintes)" stroke="#FF4060" stroke-width="0.8"/>
    <!-- Keyhole -->
    <circle cx="0" cy="3" r="2.5" fill="#200408"/>
    <rect x="-1.2" y="3" width="2.4" height="4" rx="1" fill="#200408"/>
  </g>

  <!-- Separator line -->
  <line x1="52" y1="12" x2="52" y2="48" stroke="#FF4060" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- Mode name — smaller to fit -->
  <text x="103" y="26" text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif" font-weight="900"
        font-size="12" fill="#FF4060" letter-spacing="1.5">CONTRAINTES</text>

  <!-- Subtitle -->
  <text x="103" y="40" text-anchor="middle"
        font-family="Arial, sans-serif" font-weight="400"
        font-size="9" fill="#FF4060" fill-opacity="0.7" letter-spacing="0.5">Défis spéciaux</text>

  <!-- Light burst top-left -->
  <ellipse cx="18" cy="11" rx="7" ry="4" fill="#FF4060" fill-opacity="0.18" transform="rotate(-30,18,11)"/>
  <ellipse cx="18" cy="11" rx="3" ry="1.5" fill="#FFFFFF" fill-opacity="0.25" transform="rotate(-30,18,11)"/>
</svg>
