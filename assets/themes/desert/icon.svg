<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56" width="100%" height="100%">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A3010"/>
      <stop offset="100%" stop-color="#301C06"/>
    </linearGradient>
    <radialGradient id="dsun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD060"/>
      <stop offset="40%" stop-color="#F08820"/>
      <stop offset="100%" stop-color="#C05000" stop-opacity="0.8"/>
    </radialGradient>
    <linearGradient id="ddune1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B06828"/>
      <stop offset="100%" stop-color="#7A4010"/>
    </linearGradient>
    <linearGradient id="ddune2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D07830"/>
      <stop offset="100%" stop-color="#904820"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="80" height="56" rx="6" fill="url(#dbg)"/>

  <!-- Sky glow behind sun -->
  <ellipse cx="40" cy="30" rx="26" ry="16" fill="#FF6600" opacity="0.15"/>

  <!-- Sun (half circle) -->
  <clipPath id="sunclip">
    <rect x="14" y="0" width="52" height="30"/>
  </clipPath>
  <circle cx="40" cy="30" r="14" fill="url(#dsun)" clip-path="url(#sunclip)"/>

  <!-- Sun rays -->
  <g stroke="#FFB830" stroke-width="1.2" opacity="0.6">
    <line x1="40" y1="12" x2="40" y2="7"/>
    <line x1="52" y1="15" x2="56" y2="11"/>
    <line x1="28" y1="15" x2="24" y2="11"/>
    <line x1="57" y1="26" x2="63" y2="24"/>
    <line x1="23" y1="26" x2="17" y2="24"/>
  </g>

  <!-- Horizon line -->
  <line x1="0" y1="30" x2="80" y2="30" stroke="#C07030" stroke-width="0.5" opacity="0.4"/>

  <!-- Dune 1 (back) -->
  <path d="M-5,44 Q15,28 35,36 Q50,42 80,34 L80,56 L-5,56 Z" fill="url(#ddune2)"/>

  <!-- Dune 2 (front) -->
  <path d="M-5,56 Q10,38 30,44 Q50,50 80,40 L80,56 Z" fill="url(#ddune1)"/>

  <!-- Dune highlight -->
  <path d="M10,42 Q20,36 32,40" stroke="#E8A050" stroke-width="0.8" fill="none" opacity="0.6"/>

  <!-- Theme name -->
  <text x="40" y="52" font-family="Arial, sans-serif" font-size="8" font-weight="bold"
        fill="#E8B838" text-anchor="middle" dominant-baseline="middle">DESERT</text>

  <!-- Gloss overlay -->
  <rect width="80" height="20" rx="6" fill="white" opacity="0.07"/>
  <rect x="0" y="0" width="80" height="8" rx="6" fill="white" opacity="0.08"/>
</svg>
