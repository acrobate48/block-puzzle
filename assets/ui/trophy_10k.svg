<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <defs>
    <!-- Gold cup gradient -->
    <linearGradient id="cupGrad10k" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFF060"/>
      <stop offset="30%"  stop-color="#FFE040"/>
      <stop offset="65%"  stop-color="#D49018"/>
      <stop offset="100%" stop-color="#C88010"/>
    </linearGradient>
    <!-- Gold pedestal gradient -->
    <linearGradient id="pedGrad10k" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#D49018"/>
      <stop offset="50%"  stop-color="#9A6008"/>
      <stop offset="100%" stop-color="#6A4000"/>
    </linearGradient>
    <!-- Stem gradient -->
    <linearGradient id="stemGrad10k" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#9A6008"/>
      <stop offset="50%"  stop-color="#FFD030"/>
      <stop offset="100%" stop-color="#9A6008"/>
    </linearGradient>
    <!-- Rim gradient -->
    <linearGradient id="rimGrad10k" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFF060"/>
      <stop offset="100%" stop-color="#C88010"/>
    </linearGradient>
    <!-- Radial gold halo around trophy -->
    <radialGradient id="halo10k" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFE040" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#FFD000" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFD000" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="shadow10k" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#6A4000" flood-opacity="0.8"/>
    </filter>
    <!-- Gold glow filter -->
    <filter id="goldGlow10k" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#FFD030" flood-opacity="0.7"/>
    </filter>
    <!-- Star glow -->
    <filter id="starGlow10k" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#FFE040" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Radial halo background -->
  <ellipse cx="50" cy="55" rx="48" ry="52" fill="url(#halo10k)"/>

  <!-- Pedestal (wider, with line motif) -->
  <rect x="18" y="100" width="64" height="14" rx="4" ry="4"
        fill="url(#pedGrad10k)" filter="url(#shadow10k)"/>
  <!-- Pedestal engraved line motif -->
  <rect x="22" y="102" width="56" height="1.5" rx="0.5" fill="#D49018" opacity="0.6"/>
  <rect x="22" y="105" width="56" height="1.5" rx="0.5" fill="#D49018" opacity="0.6"/>
  <rect x="22" y="108" width="56" height="1.5" rx="0.5" fill="#D49018" opacity="0.6"/>
  <rect x="22" y="111" width="56" height="1.5" rx="0.5" fill="#D49018" opacity="0.6"/>

  <!-- Stem -->
  <rect x="43" y="87" width="14" height="15" fill="url(#stemGrad10k)"/>
  <rect x="36" y="93" width="28" height="6" rx="3" fill="url(#stemGrad10k)"/>

  <!-- Cup body -->
  <path d="
    M 15 28
    C 15 22, 22 18, 30 18
    L 70 18
    C 78 18, 85 22, 85 28
    C 85 52, 76 68, 66 76
    C 62 79, 57 80, 56 81
    L 56 87
    L 44 87
    L 44 81
    C 43 80, 38 79, 34 76
    C 24 68, 15 52, 15 28 Z
  " fill="url(#cupGrad10k)" filter="url(#shadow10k)"/>

  <!-- Left handle -->
  <path d="M 15 33 C -1 33, -1 62, 15 62" fill="none" stroke="url(#cupGrad10k)"
        stroke-width="6" stroke-linecap="round"/>
  <path d="M 15 33 C 4 33, 4 62, 15 62" fill="none" stroke="#C88010"
        stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Right handle -->
  <path d="M 85 33 C 101 33, 101 62, 85 62" fill="none" stroke="url(#cupGrad10k)"
        stroke-width="6" stroke-linecap="round"/>
  <path d="M 85 33 C 96 33, 96 62, 85 62" fill="none" stroke="#C88010"
        stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Reflection on body -->
  <ellipse cx="33" cy="42" rx="9" ry="17" fill="white" opacity="0.20"
           transform="rotate(-16 33 42)"/>
  <ellipse cx="29" cy="27" rx="5" ry="4" fill="white" opacity="0.28"/>

  <!-- Rim top bar -->
  <rect x="15" y="16" width="70" height="7" rx="3.5" fill="url(#rimGrad10k)"/>
  <rect x="17" y="16" width="66" height="3.5" rx="2" fill="white" opacity="0.38"/>

  <!-- Star halo ring behind star -->
  <circle cx="50" cy="50" r="16" fill="#FFE040" opacity="0.15" filter="url(#goldGlow10k)"/>

  <!-- 5-point gold star inside cup -->
  <g transform="translate(50,50)" filter="url(#starGlow10k)">
    <polygon points="0,-15 3.5,-6 13,-6 6,0.5 9,12 0,6 -9,12 -6,0.5 -13,-6 -3.5,-6"
             fill="#FFE040" stroke="#C88010" stroke-width="0.8"/>
    <!-- Star inner highlight -->
    <polygon points="0,-9 2,-3.5 7.5,-3.5 3.5,0 5,6.5 0,3.5 -5,6.5 -3.5,0 -7.5,-3.5 -2,-3.5"
             fill="white" opacity="0.38"/>
  </g>

  <!-- "10K" label bold gold -->
  <text x="50" y="71"
        font-family="'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="10"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="#FFE040"
        filter="url(#shadow10k)">10K</text>

  <!-- Decorative 4 ornament stars (corners of cup area) -->
  <g transform="translate(20,32)" filter="url(#goldGlow10k)">
    <polygon points="0,-6 1.4,-2.5 5,-2.5 2.5,0.5 3.5,4 0,2 -3.5,4 -2.5,0.5 -5,-2.5 -1.4,-2.5"
             fill="#FFE040" stroke="#C88010" stroke-width="0.5" opacity="0.9"/>
  </g>
  <g transform="translate(20,62)" filter="url(#goldGlow10k)">
    <polygon points="0,-6 1.4,-2.5 5,-2.5 2.5,0.5 3.5,4 0,2 -3.5,4 -2.5,0.5 -5,-2.5 -1.4,-2.5"
             fill="#FFE040" stroke="#C88010" stroke-width="0.5" opacity="0.9"/>
  </g>
  <g transform="translate(80,32)" filter="url(#goldGlow10k)">
    <polygon points="0,-6 1.4,-2.5 5,-2.5 2.5,0.5 3.5,4 0,2 -3.5,4 -2.5,0.5 -5,-2.5 -1.4,-2.5"
             fill="#FFE040" stroke="#C88010" stroke-width="0.5" opacity="0.9"/>
  </g>
  <g transform="translate(80,62)" filter="url(#goldGlow10k)">
    <polygon points="0,-6 1.4,-2.5 5,-2.5 2.5,0.5 3.5,4 0,2 -3.5,4 -2.5,0.5 -5,-2.5 -1.4,-2.5"
             fill="#FFE040" stroke="#C88010" stroke-width="0.5" opacity="0.9"/>
  </g>

  <!-- Bottom score label -->
  <text x="50" y="113"
        font-family="Arial, sans-serif"
        font-size="7"
        font-weight="bold"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="#FFD030"
        opacity="0.9">SCORE</text>
</svg>
