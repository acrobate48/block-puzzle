<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="100%" height="100%">
  <defs>
    <linearGradient id="mb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8D0C8"/>
      <stop offset="100%" stop-color="#A8A098"/>
    </linearGradient>
    <linearGradient id="mb-shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mb-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4F0E8"/>
      <stop offset="40%" stop-color="#D8CEB8"/>
      <stop offset="100%" stop-color="#C8B898"/>
    </linearGradient>
    <linearGradient id="mb-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#908068"/>
      <stop offset="100%" stop-color="#B09880"/>
    </linearGradient>
    <linearGradient id="mb-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C0A880"/>
      <stop offset="100%" stop-color="#A89070"/>
    </linearGradient>
    <!-- Texture marbre -->
    <filter id="mb-marble" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.025 0.08" numOctaves="4" seed="11" result="noise"/>
      <feColorMatrix type="matrix" values="0.2 0.15 0.1 0 0.7
                                           0.15 0.1 0.08 0 0.6
                                           0.1 0.08 0.05 0 0.5
                                           0 0 0 1 0" in="noise" result="cn"/>
      <feBlend in="SourceGraphic" in2="cn" mode="screen" result="t" stdDeviation="0"/>
      <feComposite in="t" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="mb-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#504030" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#mb-bg)"/>

  <g filter="url(#mb-shadow)">
    <polygon points="100,30 127.7,46 100,62 72.3,46"
             fill="url(#mb-top)" filter="url(#mb-marble)"
             stroke="#90805A" stroke-width="0.8"/>
    <polygon points="72.3,46 100,62 100,78 72.3,62"
             fill="url(#mb-left)"
             stroke="#706040" stroke-width="0.8"/>
    <polygon points="127.7,46 100,62 100,78 127.7,62"
             fill="url(#mb-right)"
             stroke="#A08858" stroke-width="0.8"/>
  </g>

  <!-- Veines marbre dorées sur top -->
  <path d="M 78,56 Q 90,44 102,50 Q 112,54 120,42"
        stroke="#C8A850" stroke-width="0.8" fill="none" opacity="0.55"/>
  <path d="M 82,48 Q 94,38 108,46"
        stroke="#D0B860" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M 85,60 Q 96,52 110,54"
        stroke="#B89848" stroke-width="0.6" fill="none" opacity="0.35"/>
  <!-- Veine flanc droit -->
  <path d="M 115,52 Q 110,62 106,70"
        stroke="#C0A040" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Reflet brillant top-gauche -->
  <polygon points="100,30 115,38 100,46 85,38" fill="#FFFFFF" opacity="0.18"/>

  <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#mb-shine)"/>

  <text x="100" y="115" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="14" text-anchor="middle" letter-spacing="2" fill="#806040"
        paint-order="stroke" stroke="#F0EAD8" stroke-width="2.5">MARBRE</text>

  <rect x="1" y="1" width="198" height="138" rx="9.5" fill="none"
        stroke="#C8B890" stroke-width="1.5" opacity="0.8"/>
</svg>
