  <g filter="url(#blurHeavy)" opacity="0.55">
    <ellipse cx="300" cy="1000" rx="380" ry="650" fill="#051008"/>
    <ellipse cx="800" cy="940" rx="420" ry="700" fill="#040C07"/>
    <ellipse cx="1400" cy="970" rx="360" ry="660" fill="#051008"/>
