<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" opacity="0.85">
  <defs>
    <linearGradient id="volcan-lava-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6f00"/>
      <stop offset="50%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
    <linearGradient id="volcan-lava2-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcc02"/>
      <stop offset="60%" stop-color="#ff6f00"/>
      <stop offset="100%" stop-color="#e53935"/>
    </linearGradient>
    <radialGradient id="volcan-rock-grad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#546e7a"/>
      <stop offset="100%" stop-color="#212121"/>
    </radialGradient>
    <filter id="volcan-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1.5" dy="1.5" stdDeviation="2" flood-color="#b71c1c" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Coulée de lave principale depuis le coin (0,0) -->
  <path d="M0,0 C4,8 2,18 8,24 C14,30 10,42 18,50 C24,56 22,68 26,78 L22,80 L0,80 L0,0Z"
        fill="url(#volcan-lava-grad)" filter="url(#volcan-shadow)" opacity="0.9"/>

  <!-- Coulée lave secondaire, plus claire (centre de la coulée) -->
  <path d="M0,0 C3,6 1,16 6,22 C10,28 8,38 14,46 C18,52 17,64 20,76"
        fill="none" stroke="url(#volcan-lava2-grad)" stroke-width="4"
        stroke-linecap="round" filter="url(#volcan-shadow)"/>

  <!-- Coulée lave tertiaire vers la droite -->
  <path d="M0,0 C10,4 22,6 28,16 C34,26 48,28 56,40 C62,50 72,58 80,62 L80,58 C72,54 64,46 58,36 C50,24 36,22 30,12 C24,4 12,2 0,0Z"
        fill="url(#volcan-lava-grad)" filter="url(#volcan-shadow)" opacity="0.75"/>

  <!-- Filet jaune vif au milieu de la coulée horizontale -->
  <path d="M0,0 C12,3 24,5 30,14 C36,24 50,26 58,38 C64,48 74,56 80,60"
        fill="none" stroke="#ffee58" stroke-width="1.5"
        stroke-linecap="round" opacity="0.8"/>

  <!-- Pierres volcaniques noires -->
  <g filter="url(#volcan-shadow)">
    <!-- Grosse pierre -->
    <path d="M36,52 C32,48 30,44 34,42 C38,40 44,42 46,46 C48,50 46,55 42,56 C40,57 37,54 36,52Z"
          fill="url(#volcan-rock-grad)"/>
    <!-- Pierre moyenne -->
    <path d="M56,28 C53,24 52,20 55,19 C58,18 63,20 64,23 C65,26 63,30 60,30 C58,30 57,29 56,28Z"
          fill="url(#volcan-rock-grad)"/>
    <!-- Petite pierre -->
    <path d="M18,62 C16,59 16,56 18,55 C20,54 23,56 23,59 C23,61 21,63 19,63Z"
          fill="#37474f"/>
    <!-- Caillou -->
    <ellipse cx="66" cy="48" rx="4" ry="3" fill="#37474f"
             transform="rotate(-15, 66, 48)"/>
  </g>

  <!-- Petites étincelles/braises -->
  <g fill="#ffcc02" opacity="0.9">
    <polygon points="48,18 50,14 52,18 48,16" />
    <polygon points="62,12 64,8 66,12 62,10" />
    <polygon points="72,22 74,18 76,22 72,20" />
    <circle cx="44" cy="10" r="1.5"/>
    <circle cx="58" cy="6" r="1.2"/>
  </g>
</svg>
