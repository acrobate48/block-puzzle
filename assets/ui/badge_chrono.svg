<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 60" width="160" height="60">
  <defs>
    <linearGradient id="bg_chrono" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A1004"/>
      <stop offset="100%" stop-color="#4A1C08"/>
    </linearGradient>
    <linearGradient id="icon_chrono" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB050"/>
      <stop offset="100%" stop-color="#C05010"/>
    </linearGradient>
    <filter id="shadow_chrono" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#F08020" flood-opacity="0.5"/>
    </filter>
    <filter id="glow_chrono">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#F08020" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Badge pill background -->
  <rect x="1" y="1" width="158" height="58" rx="28" ry="28"
        fill="url(#bg_chrono)"
        stroke="#F08020" stroke-width="1.5"
        filter="url(#shadow_chrono)"/>

  <!-- Inner highlight border -->
  <rect x="2.5" y="2.5" width="155" height="55" rx="27" ry="27"
        fill="none" stroke="#F08020" stroke-width="0.4" stroke-opacity="0.3"/>

  <!-- Stopwatch icon -->
  <g transform="translate(30,31)" filter="url(#glow_chrono)">
    <!-- Crown / top buttons -->
    <rect x="-3" y="-15" width="6" height="3" rx="1" fill="url(#icon_chrono)"/>
    <rect x="5" y="-16" width="4" height="3" rx="1" fill="url(#icon_chrono)" transform="rotate(30,7,-14)"/>
    <!-- Main circle -->
    <circle cx="0" cy="-1" r="11" fill="url(#icon_chrono)" stroke="#F08020" stroke-width="1"/>
    <circle cx="0" cy="-1" r="8.5" fill="#2A1004" stroke="#F08020" stroke-width="0.5"/>
    <!-- Clock hand -->
    <line x1="0" y1="-1" x2="0" y2="-7" stroke="#F08020" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-1" x2="5" y2="2" stroke="#FFB050" stroke-width="1" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="-1" r="1.2" fill="#F08020"/>
  </g>

  <!-- Separator line -->
  <line x1="52" y1="12" x2="52" y2="48" stroke="#F08020" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- Mode name -->
  <text x="90" y="27" text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif" font-weight="900"
        font-size="15" fill="#F08020" letter-spacing="2">CHRONO</text>

  <!-- Subtitle -->
  <text x="90" y="41" text-anchor="middle"
        font-family="Arial, sans-serif" font-weight="400"
        font-size="9" fill="#F08020" fill-opacity="0.7" letter-spacing="0.5">Contre la montre</text>

  <!-- Light burst top-left -->
  <ellipse cx="18" cy="11" rx="7" ry="4" fill="#F08020" fill-opacity="0.18" transform="rotate(-30,18,11)"/>
  <ellipse cx="18" cy="11" rx="3" ry="1.5" fill="#FFFFFF" fill-opacity="0.25" transform="rotate(-30,18,11)"/>
</svg>
