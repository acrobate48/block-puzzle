<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="100%" height="100%">
  <defs>
    <linearGradient id="gl-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A0D8F0"/>
      <stop offset="100%" stop-color="#4090C0"/>
    </linearGradient>
    <linearGradient id="gl-shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.40"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gl-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F8FF"/>
      <stop offset="40%" stop-color="#C0E8FA"/>
      <stop offset="100%" stop-color="#80C8F0"/>
    </linearGradient>
    <linearGradient id="gl-reflet" x1="0%" y1="0%" x2="55%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gl-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3070A8"/>
      <stop offset="100%" stop-color="#4888C0"/>
    </linearGradient>
    <linearGradient id="gl-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A8D8"/>
      <stop offset="100%" stop-color="#80C0E8"/>
    </linearGradient>
    <filter id="gl-frost" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="2" seed="9" result="noise"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.9
                                           0 0 0 0 0.96
                                           0 0 0 0 1
                                           0 0 0 0.15 0" in="noise" result="cn"/>
      <feBlend in="SourceGraphic" in2="cn" mode="screen" result="t"/>
      <feComposite in="t" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="gl-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#2060A0" flood-opacity="0.4"/>
    </filter>
    <filter id="gl-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#gl-bg)"/>

  <!-- Halo froid -->
  <ellipse cx="100" cy="60" rx="40" ry="22" fill="#D0F0FF" opacity="0.18" filter="url(#gl-glow)"/>

  <g filter="url(#gl-shadow)">
    <polygon points="100,30 127.7,46 100,62 72.3,46"
             fill="url(#gl-top)" filter="url(#gl-frost)" opacity="0.90"
             stroke="#A0D8FF" stroke-width="0.8"/>
    <polygon points="72.3,46 100,62 100,78 72.3,62"
             fill="url(#gl-left)" opacity="0.88"
             stroke="#306898" stroke-width="0.8"/>
    <polygon points="127.7,46 100,62 100,78 127.7,62"
             fill="url(#gl-right)" opacity="0.85"
             stroke="#60A8D0" stroke-width="0.8"/>
  </g>

  <!-- Reflet glace translucide top -->
  <polygon points="100,30 127.7,46 100,62 72.3,46" fill="url(#gl-reflet)"/>
  <!-- Brillance centrale -->
  <ellipse cx="98" cy="43" rx="10" ry="5" fill="#FFFFFF" opacity="0.55"/>
  <!-- Arêtes lumineuses -->
  <line x1="72.3" y1="46" x2="100" y2="30" stroke="#E8F8FF" stroke-width="1.8" opacity="0.9"/>
  <line x1="100" y1="30" x2="127.7" y2="46" stroke="#D0F0FF" stroke-width="1.2" opacity="0.7"/>
  <!-- Craquelures givrées -->
  <line x1="88" y1="38" x2="84" y2="42" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>
  <line x1="84" y1="42" x2="88" y2="44" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>
  <line x1="112" y1="40" x2="116" y2="44" stroke="#FFFFFF" stroke-width="0.4" opacity="0.5"/>
  <line x1="116" y1="44" x2="112" y2="48" stroke="#FFFFFF" stroke-width="0.4" opacity="0.5"/>

  <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#gl-shine)"/>

  <text x="100" y="115" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="14" text-anchor="middle" letter-spacing="2" fill="#FFFFFF"
        paint-order="stroke" stroke="#3070A8" stroke-width="2">GLACE</text>

  <rect x="1" y="1" width="198" height="138" rx="9.5" fill="none"
        stroke="#C0E8FF" stroke-width="1.5" opacity="0.8"/>
</svg>
