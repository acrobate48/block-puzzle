<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <defs>
    <!-- Top face gradient bleu translucide -->
    <linearGradient id="cristal-top-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A0DCFF"/>
      <stop offset="50%" stop-color="#60B8F0"/>
      <stop offset="100%" stop-color="#2888C8"/>
    </linearGradient>
    <!-- Reflet diagonal top -->
    <linearGradient id="cristal-reflet" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Gradient left -->
    <linearGradient id="cristal-left-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1850A0"/>
      <stop offset="100%" stop-color="#2868B8"/>
    </linearGradient>
    <!-- Gradient right -->
    <linearGradient id="cristal-right-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3888C0"/>
      <stop offset="100%" stop-color="#5098CC"/>
    </linearGradient>
    <!-- Halo/glow bleu -->
    <filter id="cristal-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Drop shadow lumineux -->
    <filter id="cristal-shadow" x="-15%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#40A8FF" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g filter="url(#cristal-shadow)">
    <!-- Top face opaque -->
    <polygon points="60,24 105.2,50 60,76 14.8,50"
             fill="url(#cristal-top-grad)" opacity="0.85"
             stroke="#A0D8FF" stroke-width="0.7"/>
    <!-- Left face -->
    <polygon points="14.8,50 60,76 60,102 14.8,76"
             fill="url(#cristal-left-grad)" opacity="0.92"
             stroke="#204890" stroke-width="0.7"/>
    <!-- Right face -->
    <polygon points="105.2,50 60,76 60,102 105.2,76"
             fill="url(#cristal-right-grad)" opacity="0.90"
             stroke="#4090C0" stroke-width="0.7"/>
  </g>

  <!-- Reflet diagonal sur top -->
  <polygon points="60,24 105.2,50 60,76 14.8,50"
           fill="url(#cristal-reflet)" opacity="1"/>

  <!-- Brillance interne top face (polygon blanc diffus) -->
  <polygon points="60,28 90,48 60,58 30,48"
           fill="#FFFFFF" opacity="0.12"/>

  <!-- Ligne brillante bord haut-gauche -->
  <line x1="14.8" y1="50" x2="60" y2="24" stroke="#C0ECFF" stroke-width="1.2" opacity="0.7"/>
  <!-- Ligne brillante bord haut-droite -->
  <line x1="60" y1="24" x2="105.2" y2="50" stroke="#C0ECFF" stroke-width="1.2" opacity="0.7"/>
</svg>
