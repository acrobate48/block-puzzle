<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" opacity="0.85">
  <defs>
    <radialGradient id="cosmos-nebula-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ce93d8" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#7b1fa2" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#4a148c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#12005e" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="cosmos-nebula2-grad" cx="60%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#80deea" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00acc1" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="cosmos-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#7b1fa2" flood-opacity="0.6"/>
    </filter>
    <filter id="cosmos-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#e040fb" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Nébuleuse ronde principale dans le coin (centré ~28,28) -->
  <circle cx="22" cy="22" r="30" fill="url(#cosmos-nebula-grad)"/>
  <!-- Couche néon cyan de la nébuleuse -->
  <circle cx="30" cy="36" r="22" fill="url(#cosmos-nebula2-grad)"/>

  <!-- Filaments de nébuleuse -->
  <path d="M4,14 C12,10 22,18 28,14 C34,10 38,4 46,8"
        fill="none" stroke="#ce93d8" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M10,28 C16,22 24,30 32,26 C40,22 44,28 52,24"
        fill="none" stroke="#b39ddb" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M14,42 C20,36 30,42 38,38 C46,34 52,40 60,36"
        fill="none" stroke="#80cbc4" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

  <!-- Étoile 4 branches — grande -->
  <g transform="translate(56, 14)" filter="url(#cosmos-glow)">
    <path d="M0,-10 C1,-2 2,-1 10,0 C2,1 1,2 0,10 C-1,2 -2,1 -10,0 C-2,-1 -1,-2 0,-10Z"
          fill="#fff9c4" stroke="#f9a825" stroke-width="0.4"/>
  </g>

  <!-- Étoile 4 branches — moyenne -->
  <g transform="translate(68, 42)" filter="url(#cosmos-glow)">
    <path d="M0,-7 C0.8,-1.4 1.4,-0.8 7,0 C1.4,0.8 0.8,1.4 0,7 C-0.8,1.4 -1.4,0.8 -7,0 C-1.4,-0.8 -0.8,-1.4 0,-7Z"
          fill="#ffe082" stroke="#f9a825" stroke-width="0.4"/>
  </g>

  <!-- Étoile 4 branches — petite -->
  <g transform="translate(36, 64)" filter="url(#cosmos-glow)">
    <path d="M0,-5 C0.6,-1 1,-0.6 5,0 C1,0.6 0.6,1 0,5 C-0.6,1 -1,0.6 -5,0 C-1,-0.6 -0.6,-1 0,-5Z"
          fill="#fff9c4" stroke="#f9a825" stroke-width="0.3"/>
  </g>

  <!-- Météorite avec traînée -->
  <g filter="url(#cosmos-shadow)">
    <!-- Traînée -->
    <path d="M72,4 L44,36" stroke="url(#cosmos-nebula2-grad)" stroke-width="0"
          fill="none"/>
    <!-- Traînée dégradée (gradient simulé par plusieurs traits) -->
    <line x1="72" y1="4" x2="60" y2="18" stroke="#ffffff" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="68" y1="6" x2="56" y2="22" stroke="#ce93d8" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="64" y1="10" x2="50" y2="28" stroke="#7b1fa2" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <line x1="60" y1="14" x2="46" y2="34" stroke="#4a148c" stroke-width="0.8" opacity="0.2" stroke-linecap="round"/>
    <!-- Corps météorite -->
    <ellipse cx="74" cy="3" rx="5" ry="3.5"
             fill="#bdbdbd" transform="rotate(-45, 74, 3)"/>
    <ellipse cx="73" cy="2.5" rx="2.5" ry="1.5"
             fill="#f5f5f5" transform="rotate(-45, 73, 2.5)" opacity="0.7"/>
  </g>

  <!-- Étoiles ponctuelles (champ stellaire) -->
  <g fill="#ffffff">
    <circle cx="6" cy="6" r="1.2" opacity="0.9"/>
    <circle cx="44" cy="8" r="0.9" opacity="0.8"/>
    <circle cx="12" cy="52" r="1" opacity="0.7"/>
    <circle cx="28" cy="58" r="0.8" opacity="0.8"/>
    <circle cx="52" cy="56" r="1.1" opacity="0.7"/>
    <circle cx="16" cy="68" r="0.9" opacity="0.6"/>
    <circle cx="64" cy="62" r="0.8" opacity="0.7"/>
    <circle cx="76" cy="58" r="0.7" opacity="0.6"/>
    <circle cx="48" cy="72" r="1" opacity="0.6"/>
  </g>
</svg>
