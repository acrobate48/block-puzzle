<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a00"/>
      <stop offset="100%" stop-color="#050500"/>
    </radialGradient>
    <radialGradient id="bolt4" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#FFFF80"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </radialGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FFD700" flood-opacity="0.6"/>
    </filter>
    <filter id="boltglow4">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FFD700" flood-opacity="1"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#FFFF00" flood-opacity="0.5"/>
    </filter>
    <filter id="sparkglow4">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#FFFFFF" flood-opacity="0.9"/>
    </filter>
  </defs>
  <!-- Hexagonal background - near black -->
  <polygon points="40,4 73,22 73,58 40,76 7,58 7,22" fill="url(#bg4)" filter="url(#shadow4)"/>
  <!-- Subtle radial glow behind bolt -->
  <radialGradient id="halo4" cx="50%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#FFD700" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
  </radialGradient>
  <polygon points="40,4 73,22 73,58 40,76 7,58 7,22" fill="url(#halo4)"/>
  <!-- Lightning bolt zigzag - bold stylized -->
  <polygon points="46,13 33,38 41,38 34,65 54,35 44,35" fill="url(#bolt4)" filter="url(#boltglow4)"/>
  <!-- Inner white core -->
  <polygon points="44,19 36,38 41.5,38 36.5,57 50,37 43.5,37" fill="white" opacity="0.35"/>
  <!-- Speed sparks -->
  <line x1="20" y1="28" x2="28" y2="30" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" filter="url(#sparkglow4)" opacity="0.8"/>
  <line x1="18" y1="36" x2="27" y2="36" stroke="#FFFF80" stroke-width="1.2" stroke-linecap="round" filter="url(#sparkglow4)" opacity="0.7"/>
  <line x1="20" y1="44" x2="28" y2="42" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" filter="url(#sparkglow4)" opacity="0.8"/>
  <line x1="52" y1="28" x2="60" y2="26" stroke="#FFD700" stroke-width="1.2" stroke-linecap="round" filter="url(#sparkglow4)" opacity="0.6"/>
  <line x1="55" y1="36" x2="63" y2="36" stroke="#FFFF80" stroke-width="1.0" stroke-linecap="round" filter="url(#sparkglow4)" opacity="0.5"/>
  <!-- Label -->
  <text x="40" y="72.5" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#FFD700" text-anchor="middle" letter-spacing="0.5">VITESSE ÉCLAIR</text>
  <!-- Hex border -->
  <polygon points="40,4 73,22 73,58 40,76 7,58 7,22" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.9"/>
  <polygon points="40,5.5 71.5,23 71.5,57 40,74.5 8.5,57 8.5,23" fill="none" stroke="#FFFF80" stroke-width="0.5" opacity="0.4"/>
</svg>
