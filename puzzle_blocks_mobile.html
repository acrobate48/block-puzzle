  {name:'PLAGE',   bg:'#200C08',gbg:'#2E1210',ge:'#381618',sl:'#C05028',dc:'#903018',
   tm:'#FFB050',ta:'#FF7040',tg:'#C07050',sky:'#180806',pc:['#FFB050','#FF8040','#FFDC80']},
  {name:'CYBER',   bg:'#030810',gbg:'#050D1A',ge:'#070F20',sl:'#007AB4',dc:'#004888',
   tm:'#00E8FF',ta:'#40B8FF',tg:'#2080A0',sky:'#020508',pc:['#00E8FF','#40B8FF','#80FFDC']}

const SKIN_NAMES=['PIERRE','CRISTAL','BOIS','MÉTAL','MARBRE','CANDY','GLACE','FEU','NÉON','GALAXIE'];
const ANIMATED_SKINS=new Set([7,8]); // Feu, Néon
const COLS=10,ROWS=10;

// ─── CANVAS + LAYOUT ─────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,CELL,GRID_X,GRID_Y,GW,GH,TRAY_Y,TRAY_H,PIECE_CELL;

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  const portrait=H>W;
  CELL=portrait?Math.floor((W-12)/COLS):Math.floor((H-52)/ROWS);
  GW=CELL*COLS;GH=CELL*ROWS;
  GRID_X=portrait?((W-GW)/2)|0:(W*0.06)|0;
  TRAY_H=Math.max((CELL*2.1)|0,70);
  const topBar=portrait?52:0;
  GRID_Y=portrait?topBar+Math.max(((H-topBar-GH-TRAY_H-16)/2)|0,0):((H-GH)/2)|0;
  TRAY_Y=GRID_Y+GH+6;
  PIECE_CELL=Math.floor(CELL*0.58);
  CELL_CACHE.clear();
}
window.addEventListener('resize',()=>{resize();menuBg=buildBg(selTheme);});
resize();

// ─── UTILS ───────────────────────────────────────────────────────────────────
function hr(h){return parseInt(h.slice(1,3),16)}
function hg(h){return parseInt(h.slice(3,5),16)}
function hb(h){return parseInt(h.slice(5,7),16)}
function rgb(r,g,b){return`rgb(${r|0},${g|0},${b|0})`}
function rgba(r,g,b,a){return`rgba(${r|0},${g|0},${b|0},${a.toFixed(3)})`}
function hexA(h,a){return rgba(hr(h),hg(h),hb(h),a)}
function cl(v,lo,hi){return v<lo?lo:v>hi?hi:v}
function lerp(a,b,t){return a+(b-a)*t}
function lerpC(c1,c2,t){return rgb(lerp(hr(c1),hr(c2),t),lerp(hg(c1),hg(c2),t),lerp(hb(c1),hb(c2),t))}
function rnd(lo,hi){return lo+Math.random()*(hi-lo)}
function rndI(lo,hi){return lo+(Math.random()*(hi-lo+1))|0}
function rndc(a){return a[Math.floor(Math.random()*a.length)]}
function seeded(s){let v=s;return()=>{v=(v*1664525+1013904223)&0xffffffff;return(v>>>0)/4294967296}}

function rrect(ctx,x,y,w,h,r,fill,stroke,lw=1){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill()}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke()}
}

// ─── CELL CACHE (perf) ───────────────────────────────────────────────────────
const CELL_CACHE=new Map();
function getCached(col,sz,skin){
  const k=`${skin}_${col}_${sz}`;
  if(CELL_CACHE.has(k))return CELL_CACHE.get(k);
  const oc=document.createElement('canvas');oc.width=sz;oc.height=sz;
  const c2=oc.getContext('2d');
  SKIN_FNS[skin](c2,col,0,0,sz,0);
  CELL_CACHE.set(k,oc);return oc;
}
function drawCell(ctx,col,x,y,sz,skin,t,alpha=1){
  x=x|0;y=y|0;
  if(ANIMATED_SKINS.has(skin)){
    if(alpha<1)ctx.globalAlpha=alpha;
    SKIN_FNS[skin](ctx,col,x,y,sz,t);
    if(alpha<1)ctx.globalAlpha=1;
  }else{
    if(alpha<1)ctx.globalAlpha=alpha;
    ctx.drawImage(getCached(col,sz,skin),x,y);
    if(alpha<1)ctx.globalAlpha=1;
  }
}

// ─── 10 SKINS ────────────────────────────────────────────────────────────────
function skinPierre(c,col,x,y,sz,_t){
  const r=hr(col),g=hg(col),b=hb(col);
  const li=rgb(cl(r+80,0,255),cl(g+80,0,255),cl(b+80,0,255));
  const dk=rgb(cl(r-70,0,255),cl(g-70,0,255),cl(b-70,0,255));
  const h3=(sz-4)/3|0;
  c.fillStyle=li;c.fillRect(x+2,y+2,sz-4,h3);
  c.fillStyle=col;c.fillRect(x+2,y+2+h3,sz-4,h3);
  c.fillStyle=rgb(cl(r-20,0,255),cl(g-20,0,255),cl(b-20,0,255));
  c.fillRect(x+2,y+2+h3*2,sz-4,sz-4-h3*2);
  c.strokeStyle=li;c.lineWidth=2;
  c.beginPath();c.moveTo(x+1,y+1);c.lineTo(x+sz-3,y+1);c.stroke();
  c.beginPath();c.moveTo(x+1,y+1);c.lineTo(x+1,y+sz-3);c.stroke();
  c.strokeStyle=dk;
  c.beginPath();c.moveTo(x+1,y+sz-2);c.lineTo(x+sz-2,y+sz-2);c.stroke();
  c.beginPath();c.moveTo(x+sz-2,y+1);c.lineTo(x+sz-2,y+sz-2);c.stroke();
  c.fillStyle=rgba(255,255,255,0.5);c.fillRect(x+3,y+3,sz/3|0,2);c.fillRect(x+3,y+3,2,sz/4|0);
}

function skinCristal(c,col,x,y,sz,_t){
  const r=hr(col),g=hg(col),b=hb(col);
  const c2=rgb(cl(r+75,0,255),cl(g+75,0,255),cl(b+75,0,255));
  c.fillStyle=c2;c.fillRect(x+1,y+1,sz-2,sz-2);
  c.fillStyle=rgba(cl(r+120,0,255),cl(g+120,0,255),cl(b+120,0,255),0.85);
  c.beginPath();c.moveTo(x+2,y+2);c.lineTo(x+sz-3,y+2);c.lineTo(x+2,y+sz-3);c.closePath();c.fill();
  const cx=x+sz/2,cy=y+sz/2,r2=sz/4;
  c.strokeStyle=rgba(cl(r+40,0,255),cl(g+40,0,255),cl(b+40,0,255),0.9);c.lineWidth=1;
  c.beginPath();c.moveTo(cx,cy-r2);c.lineTo(cx+r2,cy);c.lineTo(cx,cy+r2);c.lineTo(cx-r2,cy);c.closePath();c.stroke();
  c.strokeStyle='rgba(255,255,255,0.8)';c.strokeRect(x+1,y+1,sz-2,sz-2);
  c.fillStyle='rgba(255,255,255,0.85)';c.fillRect(x+3,y+3,sz/4|0,3);c.fillRect(x+3,y+3,3,sz/4|0);
}

function skinBois(c,col,x,y,sz,_t){
  const r=hr(col),g=hg(col),b=hb(col);
  const wc=rgb(cl(r*0.6+55|0,0,255),cl(g*0.6+38|0,0,255),cl(b*0.4+15|0,0,255));
  const dk=rgb(cl(hr(wc)-35,0,255),cl(hg(wc)-35,0,255),cl(hb(wc)-35,0,255));
  const li=rgb(cl(hr(wc)+25,0,255),cl(hg(wc)+25,0,255),cl(hb(wc)+25,0,255));
  c.fillStyle=wc;c.fillRect(x+1,y+1,sz-2,sz-2);
  for(let i=0,gy=y+4;gy<y+sz-2;gy+=4,i++){
    const ox=Math.sin(gy*0.22+i*0.7)*2.5|0;
    c.fillStyle=i%2===0?dk:li;c.fillRect(x+2+ox,gy,sz-4,2);
  }
  const nx=x+sz-7,ny=y+sz-7;
  c.fillStyle=dk;c.beginPath();c.arc(nx,ny,4,0,Math.PI*2);c.fill();
  c.fillStyle=wc;c.beginPath();c.arc(nx,ny,2.5,0,Math.PI*2);c.fill();
  c.fillStyle=li;c.beginPath();c.arc(nx,ny,1,0,Math.PI*2);c.fill();
  c.strokeStyle=dk;c.lineWidth=1;c.strokeRect(x+1,y+1,sz-2,sz-2);
}

function skinMetal(c,col,x,y,sz,_t){
  const r=hr(col),g=hg(col),b=hb(col);
  const base=rgb(cl(r*0.3+120,0,255),cl(g*0.3+120,0,255),cl(b*0.3+120,0,255));
  const hi=rgb(cl(r*0.2+195,0,255),cl(g*0.2+195,0,255),cl(b*0.2+195,0,255));
  const sh=rgb(cl(r*0.2+55,0,255),cl(g*0.2+55,0,255),cl(b*0.2+55,0,255));
  c.fillStyle=base;c.fillRect(x+1,y+1,sz-2,sz-2);
  const strips=4;const sw=(sz-2)/strips;
  for(let i=0;i<strips;i++){
    const t2=i/(strips-1);
    const sr=lerp(sh===base?80:hr(sh),hr(hi),Math.sin(t2*Math.PI));
    c.fillStyle=`rgba(${sr|0},${sr|0},${sr|0},0.45)`;
    c.fillRect(x+1+i*sw,y+1,sw,sz-2);
  }
  c.fillStyle=rgba(cl(r+40,0,255),cl(g+40,0,255),cl(b+40,0,255),0.6);
  c.fillRect(x+2,y+2,sz-4,3);
  c.strokeStyle=rgba(255,255,255,0.3);c.lineWidth=1;c.strokeRect(x+1,y+1,sz-2,sz-2);
  c.strokeStyle=rgba(0,0,0,0.4);c.strokeRect(x+2,y+2,sz-4,sz-4);
}

function skinMarbre(c,col,x,y,sz,_t){
  const r=hr(col),g=hg(col),b=hb(col);
  const base=rgb(cl(r*0.15+195,0,255),cl(g*0.15+195,0,255),cl(b*0.15+195,0,255));
  const vein=rgb(cl(r*0.4+80,0,255),cl(g*0.4+80,0,255),cl(b*0.4+80,0,255));
  c.fillStyle=base;c.fillRect(x+1,y+1,sz-2,sz-2);
  c.strokeStyle=rgba(hr(vein),hg(vein),hb(vein),0.5);c.lineWidth=2;
  c.beginPath();c.moveTo(x+sz*0.1,y+sz*0.3);
  c.bezierCurveTo(x+sz*0.4,y+sz*0.1,x+sz*0.6,y+sz*0.9,x+sz*0.9,y+sz*0.7);c.stroke();
  c.strokeStyle=rgba(hr(vein),hg(vein),hb(vein),0.25);c.lineWidth=1;
  c.beginPath();c.moveTo(x+sz*0.2,y+sz*0.7);
  c.bezierCurveTo(x+sz*0.5,y+sz*0.5,x+sz*0.7,y+sz*0.2,x+sz*0.85,y+sz*0.4);c.stroke();
  c.fillStyle='rgba(255,255,255,0.18)';c.fillRect(x+2,y+2,sz*0.4,sz*0.35);
  c.strokeStyle=rgba(180,180,200,0.6);c.lineWidth=1;c.strokeRect(x+1,y+1,sz-2,sz-2);
}

function skinCandy(c,col,x,y,sz,_t){
  const r=hr(col),g=hg(col),b=hb(col);
  const g2=c.createLinearGradient(x,y,x+sz,y+sz);
  g2.addColorStop(0,rgb(cl(r+60,0,255),cl(g+60,0,255),cl(b+60,0,255)));
  g2.addColorStop(0.5,col);
  g2.addColorStop(1,rgb(cl(r-50,0,255),cl(g-50,0,255),cl(b-50,0,255)));
  c.fillStyle=g2;c.fillRect(x+1,y+1,sz-2,sz-2);
  const sg=c.createRadialGradient(x+sz*0.3,y+sz*0.28,1,x+sz*0.3,y+sz*0.28,sz*0.38);
  sg.addColorStop(0,'rgba(255,255,255,0.75)');sg.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle=sg;c.beginPath();c.ellipse(x+sz*0.3,y+sz*0.28,sz*0.28,sz*0.2,0,0,Math.PI*2);c.fill();
  c.strokeStyle=rgba(cl(r-40,0,255),cl(g-40,0,255),cl(b-40,0,255),0.5);c.lineWidth=1;
  c.strokeRect(x+1,y+1,sz-2,sz-2);
}

function skinGlace(c,col,x,y,sz,_t){
  const r=hr(col),g=hg(col),b=hb(col);
  const ic=rgb(cl(r*0.25+165,0,255),cl(g*0.25+185,0,255),cl(b*0.25+200,0,255));
  const fr=rgb(cl(r*0.15+205,0,255),cl(g*0.15+215,0,255),cl(b*0.15+225,0,255));
  c.fillStyle=ic;c.fillRect(x+1,y+1,sz-2,sz-2);
  const cx=x+sz/2,cy=y+sz/2;
  c.strokeStyle=rgba(hr(fr),hg(fr),hb(fr),0.7);c.lineWidth=1;
  for(let a=0;a<6;a++){
    const rad=a*Math.PI/3;const ex=cx+Math.cos(rad)*(sz/2.5),ey=cy+Math.sin(rad)*(sz/2.5);
    c.beginPath();c.moveTo(cx,cy);c.lineTo(ex,ey);c.stroke();
    const mx=cx+Math.cos(rad)*(sz/4),my=cy+Math.sin(rad)*(sz/4);
    const br1=Math.cos(rad+Math.PI/6)*(sz/7),br2=Math.sin(rad+Math.PI/6)*(sz/7);
    c.beginPath();c.moveTo(mx-br1,my-br2);c.lineTo(mx+br1,my+br2);c.stroke();
  }
  c.fillStyle='rgba(255,255,255,0.8)';c.fillRect(x+2,y+2,sz/4|0,3);c.fillRect(x+2,y+2,3,sz/4|0);
  c.strokeStyle=rgba(200,230,255,0.5);c.strokeRect(x+1,y+1,sz-2,sz-2);
}

function skinFeu(c,col,x,y,sz,t){
  const r=hr(col),g=hg(col),b=hb(col);
  const fl=Math.sin(t*0.009+x*0.11+y*0.09)*14|0;
  const tip=rgb(255,cl(200+fl,0,255),cl(20+fl,0,30));
  const mid=rgb(cl(r+15+fl,0,255),cl(g*0.3+40+fl/2,0,255),0);
  const bas=rgb(cl(r-15,0,255),cl(g-80,0,255),0);
  const h4=(sz-4)/4|0;
  c.fillStyle=tip;c.fillRect(x+2,y+2,sz-4,h4+1);
  c.fillStyle=rgb(lerp(255,hr(mid),0.5)|0,lerp(cl(200+fl,0,255),hg(mid),0.5)|0,lerp(cl(20+fl,0,30),0,0.5)|0);
  c.fillRect(x+2,y+2+h4,sz-4,h4);
  c.fillStyle=mid;c.fillRect(x+2,y+2+h4*2,sz-4,h4);
  c.fillStyle=bas;c.fillRect(x+2,y+2+h4*3,sz-4,sz-4-h4*3);
  const flame=[[x+sz/2,y+3],[x+sz*0.75,y+sz/3+fl/5],[x+sz*0.65,y+sz/2],
               [x+sz/2,y+sz/3],[x+sz*0.35,y+sz/2],[x+sz*0.25,y+sz/3+fl/5]];
  c.fillStyle=rgba(255,cl(200+fl,0,255),100,0.7);
  c.beginPath();flame.forEach(([fx,fy],i)=>i?c.lineTo(fx,fy):c.moveTo(fx,fy));c.closePath();c.fill();
  c.fillStyle='rgba(255,240,120,0.9)';c.beginPath();c.arc(x+sz*0.65,y+sz/3+fl/7,2,0,Math.PI*2);c.fill();
}

function skinNeon(c,col,x,y,sz,t){
  const r=hr(col),g=hg(col),b=hb(col);
  const p=Math.sin(t*0.006+x*0.04+y*0.03)*22;
  const gr=cl(r+90+p,0,255)|0,gg=cl(g+90+p,0,255)|0,gb=cl(b+90+p,0,255)|0;
  c.fillStyle=rgb(r/8|0,g/8|0,b/8|0);c.fillRect(x+1,y+1,sz-2,sz-2);
  c.strokeStyle=rgb(gr,gg,gb);c.lineWidth=3;c.strokeRect(x+1,y+1,sz-2,sz-2);
  c.strokeStyle=rgb(cl(r+50+p/2,0,255)|0,cl(g+50+p/2,0,255)|0,cl(b+50+p/2,0,255)|0);
  c.lineWidth=2;c.strokeRect(x+3,y+3,sz-6,sz-6);
  c.strokeStyle='rgba(255,255,255,0.55)';c.lineWidth=1;c.strokeRect(x+4,y+4,sz-8,sz-8);
  c.fillStyle=rgb(gr,gg,gb);
  [[x+4,y+4],[x+sz-5,y+4],[x+4,y+sz-5],[x+sz-5,y+sz-5]].forEach(([cx,cy])=>{
    c.beginPath();c.arc(cx,cy,2,0,Math.PI*2);c.fill();
  });
}

function skinGalaxie(c,col,x,y,sz,_t){
  const r=hr(col),g=hg(col),b=hb(col);
  c.fillStyle=rgb(r/6|0,g/6|0,b/6|0);c.fillRect(x+1,y+1,sz-2,sz-2);
  const ng=c.createRadialGradient(x+sz/2,y+sz/2,1,x+sz/2,y+sz/2,sz/2);
  ng.addColorStop(0,rgba(r,g,b,0.35));ng.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=ng;c.fillRect(x+1,y+1,sz-2,sz-2);
  const rng=seeded(r*31+g*17+b*7+sz*3);
  for(let i=0;i<12;i++){
    const sx=x+2+rng()*(sz-4),sy=y+2+rng()*(sz-4),sbr=rng();
    c.fillStyle=`rgba(${cl(r+100|0,0,255)},${cl(g+100|0,0,255)},${cl(b+150|0,0,255)},${(0.4+sbr*0.6).toFixed(2)})`;
    c.fillRect(sx,sy,sbr<0.15?2:1,sbr<0.15?2:1);
  }
  c.strokeStyle=rgba(cl(r+60,0,255),cl(g+60,0,255),cl(b+100,0,255),0.5);c.lineWidth=1;
  c.strokeRect(x+1,y+1,sz-2,sz-2);
}

const SKIN_FNS=[skinPierre,skinCristal,skinBois,skinMetal,skinMarbre,
                skinCandy,skinGlace,skinFeu,skinNeon,skinGalaxie];

// ─── BACKGROUND BUILDER ───────────────────────────────────────────────────────
function buildBg(ti){
  const th=THEMES[ti];
  const oc=document.createElement('canvas');oc.width=W;oc.height=H;
  const c=oc.getContext('2d');
  const g=c.createLinearGradient(0,0,0,H);
  g.addColorStop(0,th.sky);g.addColorStop(1,th.bg);
  c.fillStyle=g;c.fillRect(0,0,W,H);
  const rng=seeded(ti*7919+W+H);
  for(let i=0;i<50;i++){
    const lx=rng()*W,ly=rng()*H,lr=rng()*28+7;
    c.fillStyle=rgba(hr(th.dc),hg(th.dc),hb(th.dc),0.05+rng()*0.09);
    c.beginPath();c.ellipse(lx,ly,lr,lr*0.7,rng()*Math.PI,0,Math.PI*2);c.fill();
  }
  if(ti===4||ti===6){// Stars for Night + Cosmos
    for(let i=0;i<(ti===6?280:160);i++){
      const sx=rng()*W,sy=rng()*H,br=100+rng()*155|0,big=rng()<(ti===6?0.08:0.04);
      c.fillStyle=ti===6?
        `rgba(${cl(br+30,0,255)},${cl(br/2,0,255)},${cl(br+30,0,255)},0.88)`:
        `rgba(${br},${br},${cl(br+20,0,255)},0.85)`;
      c.beginPath();c.arc(sx,sy,big?2.5:1,0,Math.PI*2);c.fill();
    }
  }
  if(ti===8){// Plage: sun disc
    const sx=W*0.82,sy=H*0.22;
    const sg=c.createRadialGradient(sx,sy,5,sx,sy,70);
    sg.addColorStop(0,'rgba(255,200,80,0.6)');sg.addColorStop(1,'rgba(255,100,30,0)');
    c.fillStyle=sg;c.fillRect(sx-70,sy-70,140,140);
    c.fillStyle='rgba(255,160,40,0.35)';c.beginPath();c.arc(sx,sy,28,0,Math.PI*2);c.fill();
  }
  if(ti===9){// Cyber: grid lines
    c.strokeStyle='rgba(0,200,255,0.06)';c.lineWidth=1;
    for(let gx=0;gx<W;gx+=40){c.beginPath();c.moveTo(gx,0);c.lineTo(gx,H);c.stroke();}
    for(let gy=0;gy<H;gy+=40){c.beginPath();c.moveTo(0,gy);c.lineTo(W,gy);c.stroke();}
  }
  return oc;
}

// ─── THEME FX ─────────────────────────────────────────────────────────────────
function initFx(ti){
  const fx={ti};
  switch(ti){
    case 0:// Jungle: leaves
      fx.leaves=Array.from({length:20},()=>({x:rnd(0,W),y:rnd(0,H),vy:rnd(0.3,1.0),vx:rnd(-0.3,0.3),ang:rnd(0,360),vrot:rnd(-1.5,1.5),sz:rnd(6,13),wave:rnd(0,Math.PI*2)}));break;
    case 1:// Desert: sand + heat shimmer
      fx.grains=Array.from({length:50},()=>({x:rnd(0,W),y:rnd(0,H),vx:rnd(1.5,3),vy:rnd(-0.15,0.15),sz:rnd(1,2.5),a:rnd(0.18,0.45)}));break;
    case 2:// Ocean: bubbles + waves
      fx.bubbles=Array.from({length:25},()=>({x:rnd(0,W),y:rnd(H*0.4,H),vy:rnd(-0.4,-0.1),vx:rnd(-0.12,0.12),sz:rnd(2,7),a:rnd(0.14,0.36),wave:rnd(0,Math.PI*2)}));
      fx.wo=0;break;
    case 3:// Volcan: embers
      fx.embers=Array.from({length:32},()=>({x:rnd(0,W),y:rnd(0,H),vy:rnd(-1.4,-0.35),vx:rnd(-0.4,0.4),sz:rnd(1,4),life:rnd(0,120),ml:120,rc:rndc([255,255,200]),gc_:rndc([80,140,40]),bc_:rndc([10,30,5])}));break;
    case 4:// Nuit: twinkling stars + shooting star

      fx.shoot=null;fx.st=rnd(80,200);fx.ao=0;break;
    case 5:// Arctique: snowflakes
      fx.snow=Array.from({length:45},()=>({x:rnd(0,W),y:rnd(0,H),vy:rnd(0.3,1.0),vx:rnd(-0.3,0.3),sz:rnd(3,9),rot:rnd(0,360),vrot:rnd(-1,1),a:rnd(0.4,0.9)}));

    case 6:// Cosmos: nebula + moving star field
      fx.nebula=Array.from({length:6},()=>({x:rnd(W*0.1,W*0.9),y:rnd(H*0.1,H*0.9),r:rnd(60,150),col:rndc(['#4010A0','#801060','#1040A0','#60208C']),a:rnd(0.06,0.14),vx:rnd(-0.08,0.08),vy:rnd(-0.06,0.06)}));
      fx.comet=null;fx.ct=rnd(120,300);break;
    case 7:// Enchanté: glowing fireflies
      fx.flies=Array.from({length:28},()=>({x:rnd(0,W),y:rnd(0,H),vx:rnd(-0.4,0.4),vy:rnd(-0.5,0.5),ph:rnd(0,Math.PI*2),col:rndc(['#60FF80','#A0FF60','#40FFBC','#80FF40']),sz:rnd(2,5)}));break;
    case 8:// Plage: waves + seagulls
      fx.waves=[];fx.wo=0;
      fx.birds=Array.from({length:4},()=>({x:rnd(0,W),y:rnd(H*0.1,H*0.35),vx:rnd(0.4,1.1),phase:rnd(0,Math.PI*2),sz:rnd(8,16)}));break;
    case 9:// Cyber: data rain columns
      fx.cols=Array.from({length:Math.floor(W/22)},(_,i)=>({x:i*22+2,drops:Array.from({length:rndI(2,6)},()=>({y:rnd(0,H),speed:rnd(2,5),len:rndI(4,12),a:rnd(0.4,0.9)}))}));

function drawFx(ctx,fx,t){
  const th=THEMES[fx.ti];
  switch(fx.ti){
    case 0:{// Jungle leaves
      ctx.save();
      fx.leaves.forEach(lf=>{
        lf.x+=lf.vx+Math.sin(t*0.001+lf.wave)*0.35;lf.y+=lf.vy;lf.ang+=lf.vrot;lf.wave+=0.02;
        if(lf.y>H+20){lf.y=-18;lf.x=Math.random()*W;}
        const a=lf.ang*Math.PI/180,sz=lf.sz;
        ctx.globalAlpha=0.42;ctx.fillStyle=th.ta;
        ctx.beginPath();ctx.moveTo(lf.x+Math.cos(a)*sz,lf.y+Math.sin(a)*sz);
        ctx.lineTo(lf.x+Math.cos(a+2.2)*sz*0.5,lf.y+Math.sin(a+2.2)*sz*0.5);
        ctx.lineTo(lf.x,lf.y);ctx.closePath();ctx.fill();
      });ctx.restore();break;
    }
    case 1:{// Desert sand + sun
      fx.grains.forEach(g=>{
        g.x=(g.x+g.vx)%W;g.y+=g.vy+Math.sin(t*0.002+g.x*0.01)*0.1;
        ctx.fillStyle=`rgba(195,155,75,${g.a})`;
        ctx.beginPath();ctx.arc(g.x,g.y,g.sz,0,Math.PI*2);ctx.fill();
      });
      const sx=W-52,sy=42;
      const sg=ctx.createRadialGradient(sx,sy,8,sx,sy,38);
      sg.addColorStop(0,'rgba(255,235,80,0.92)');sg.addColorStop(1,'rgba(255,200,60,0)');
      ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sx,sy,38,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#FFD740';ctx.beginPath();ctx.arc(sx,sy,16,0,Math.PI*2);ctx.fill();
      for(let a=0;a<12;a++){const rad=a*Math.PI/6+t*0.0004;ctx.strokeStyle='rgba(255,220,60,0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(sx+Math.cos(rad)*20,sy+Math.sin(rad)*20);ctx.lineTo(sx+Math.cos(rad)*31,sy+Math.sin(rad)*31);ctx.stroke();}
      break;
    }
    case 2:{// Ocean waves + bubbles
      fx.wo+=0.013;
      [[17,1.0,0.1,H-46],[12,1.3,0.17,H-29],[8,1.6,0.26,H-13]].forEach(([amp,sp,a,yb])=>{
        ctx.fillStyle=hexA(th.dc,a);ctx.beginPath();ctx.moveTo(0,H);
        for(let wx=0;wx<=W+8;wx+=6){const wy=yb+amp*Math.sin(wx*0.012+fx.wo*sp);wx===0?ctx.moveTo(wx,wy):ctx.lineTo(wx,wy);}
        ctx.lineTo(W,H);ctx.closePath();ctx.fill();
      });
      fx.bubbles.forEach(b=>{
        b.x+=b.vx+Math.sin(t*0.001+b.wave)*0.28;b.y+=b.vy;b.wave+=0.014;
        if(b.y<-10){b.y=H+10;b.x=Math.random()*W;}
        ctx.strokeStyle=`rgba(180,230,255,${b.a})`;ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(b.x,b.y,b.sz,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle=`rgba(255,255,255,${(b.a*0.3).toFixed(2)})`;
        ctx.beginPath();ctx.arc(b.x-b.sz*0.3,b.y-b.sz*0.3,Math.max(1,b.sz*0.3),0,Math.PI*2);ctx.fill();
      });break;
    }
    case 3:{// Volcan embers + lava
      const lg=ctx.createLinearGradient(0,H-52,0,H);
      lg.addColorStop(0,'rgba(220,55,8,0)');lg.addColorStop(1,'rgba(220,55,8,0.52)');
      ctx.fillStyle=lg;ctx.fillRect(0,H-52,W,52);
      ctx.fillStyle='rgb(195,42,5)';ctx.beginPath();ctx.moveTo(0,H);
      for(let lx=0;lx<=W+8;lx+=8){const ly=H-13+8*Math.sin(lx*0.025+t*0.002);lx===0?ctx.moveTo(lx,ly):ctx.lineTo(lx,ly);}
      ctx.lineTo(W,H);ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(255,130,20,0.6)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,H-13);
      for(let lx=0;lx<=W+8;lx+=8)ctx.lineTo(lx,H-13+8*Math.sin(lx*0.025+t*0.002));ctx.stroke();
      fx.embers.forEach(em=>{
        em.x+=em.vx+Math.sin(t*0.003+em.x*0.02)*0.45;em.y+=em.vy;em.life--;
        if(em.life<=0||em.y<-10){em.x=Math.random()*W;em.y=H-22;em.vy=rnd(-1.4,-0.35);em.life=120;}
        const ratio=em.life/em.ml;
        ctx.fillStyle=`rgba(${em.rc},${em.gc_},${em.bc_},${(0.72*ratio).toFixed(2)})`;
        ctx.beginPath();ctx.arc(em.x,em.y,em.sz,0,Math.PI*2);ctx.fill();
      });break;
    }
    case 4:{// Nuit: aurora + stars
      fx.ao+=0.007;
      [[60,180,120],[80,120,220],[120,60,200],[40,160,180]].forEach(([r,g,b],i)=>{
        const ay=H*0.06+i*33+14*Math.sin(t*0.001+i*1.2);
        const aw=20+10*Math.sin(t*0.0014+i*0.7);
        const ag=ctx.createLinearGradient(0,ay,0,ay+aw+25);
        const aa=(0.18*Math.abs(Math.sin(t*0.001+i))).toFixed(3);
        ag.addColorStop(0,`rgba(${r},${g},${b},0)`);ag.addColorStop(0.5,`rgba(${r},${g},${b},${aa})`);ag.addColorStop(1,`rgba(${r},${g},${b},0)`);
        ctx.fillStyle=ag;ctx.fillRect(0,ay,W,aw+25);
      });
      fx.stars.forEach(st=>{
        const br=cl(st.br*(0.5+0.5*Math.sin(t*st.sp+st.ph)),20,255)|0;
        ctx.fillStyle=`rgba(${br},${br},${cl(br+22,0,255)},0.88)`;
        ctx.beginPath();ctx.arc(st.x,st.y,st.sz,0,Math.PI*2);ctx.fill();
      });
      fx.st-=1/60;
      if(fx.st<=0){fx.shoot={x:rnd(0,W),y:rnd(0,H*0.28),vx:rnd(5,9),vy:rnd(2,4),life:28};fx.st=rnd(90,220);}
      if(fx.shoot){
        fx.shoot.x+=fx.shoot.vx;fx.shoot.y+=fx.shoot.vy;fx.shoot.life--;
        if(fx.shoot.life>0){const a=(fx.shoot.life/28).toFixed(2);ctx.strokeStyle=`rgba(255,255,210,${a})`;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(fx.shoot.x,fx.shoot.y);ctx.lineTo(fx.shoot.x-fx.shoot.vx*4,fx.shoot.y-fx.shoot.vy*4);ctx.stroke();}
        else fx.shoot=null;
      }break;
    }
    case 5:{// Arctique: snowflakes + aurora
      fx.ao+=0.006;
      [[80,200,255],[120,180,255],[100,220,200]].forEach(([r,g,b],i)=>{
        const ay=H*0.04+i*28+12*Math.sin(t*0.001+i*1.4);const aw=16+8*Math.sin(t*0.0012+i*0.9);
        const ag=ctx.createLinearGradient(0,ay,0,ay+aw+20);
        const aa=(0.14*Math.abs(Math.sin(t*0.0008+i))).toFixed(3);
        ag.addColorStop(0,`rgba(${r},${g},${b},0)`);ag.addColorStop(0.5,`rgba(${r},${g},${b},${aa})`);ag.addColorStop(1,`rgba(${r},${g},${b},0)`);
        ctx.fillStyle=ag;ctx.fillRect(0,ay,W,aw+20);
      });
      fx.snow.forEach(sf=>{
        sf.x+=sf.vx+Math.sin(t*0.001+sf.y*0.02)*0.3;sf.y+=sf.vy;sf.rot+=sf.vrot;
        if(sf.y>H+20){sf.y=-15;sf.x=Math.random()*W;}
        ctx.save();ctx.translate(sf.x,sf.y);ctx.rotate(sf.rot*Math.PI/180);
        ctx.strokeStyle=`rgba(200,240,255,${sf.a})`;ctx.lineWidth=1;
        const sl=sf.sz;
        for(let a=0;a<6;a++){const rad=a*Math.PI/3;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(rad)*sl,Math.sin(rad)*sl);ctx.stroke();}
        ctx.restore();
      });break;
    }
    case 6:{// Cosmos: nebula clouds + comet
      fx.nebula.forEach(nb=>{
        nb.x=(nb.x+nb.vx+W)%W;nb.y=(nb.y+nb.vy+H)%H;
        const ng=ctx.createRadialGradient(nb.x,nb.y,5,nb.x,nb.y,nb.r);
        ng.addColorStop(0,hexA(nb.col,nb.a));ng.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=ng;ctx.beginPath();ctx.arc(nb.x,nb.y,nb.r,0,Math.PI*2);ctx.fill();
      });
      fx.ct-=1/60;
      if(fx.ct<=0){fx.comet={x:rnd(0,W),y:rnd(0,H*0.25),vx:rnd(6,11),vy:rnd(2,5),life:35};fx.ct=rnd(150,350);}
      if(fx.comet){
        fx.comet.x+=fx.comet.vx;fx.comet.y+=fx.comet.vy;fx.comet.life--;
        if(fx.comet.life>0){
          const a=(fx.comet.life/35).toFixed(2);
          const cg=ctx.createLinearGradient(fx.comet.x,fx.comet.y,fx.comet.x-fx.comet.vx*6,fx.comet.y-fx.comet.vy*6);
          cg.addColorStop(0,`rgba(200,150,255,${a})`);cg.addColorStop(1,'rgba(100,50,200,0)');
          ctx.strokeStyle=cg;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(fx.comet.x,fx.comet.y);ctx.lineTo(fx.comet.x-fx.comet.vx*6,fx.comet.y-fx.comet.vy*6);ctx.stroke();
          ctx.fillStyle=`rgba(220,180,255,${a})`;ctx.beginPath();ctx.arc(fx.comet.x,fx.comet.y,2.5,0,Math.PI*2);ctx.fill();
        }else fx.comet=null;
      }break;
    }
    case 7:{// Enchanté: fireflies + ground glow
      const gg=ctx.createLinearGradient(0,H-60,0,H);
      gg.addColorStop(0,'rgba(20,100,40,0)');gg.addColorStop(1,'rgba(20,100,40,0.25)');
      ctx.fillStyle=gg;ctx.fillRect(0,H-60,W,60);
      fx.flies.forEach(fl=>{
        fl.x+=fl.vx+Math.sin(t*0.0015+fl.ph)*0.5;fl.y+=fl.vy+Math.cos(t*0.001+fl.ph)*0.35;
        fl.x=(fl.x+W)%W;fl.y=(fl.y+H)%H;fl.ph+=0.01;
        const fa=0.3+0.7*Math.abs(Math.sin(t*0.003+fl.ph));
        ctx.fillStyle=fl.col.replace(')',`,${fa.toFixed(2)})`).replace('rgb','rgba');
        if(ctx.fillStyle==='[object CanvasGradient]'||ctx.fillStyle===fl.col)ctx.fillStyle=`rgba(96,255,128,${fa.toFixed(2)})`;
        ctx.fillStyle=hexA(fl.col,fa);
        ctx.beginPath();ctx.arc(fl.x,fl.y,fl.sz*fa,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=hexA(fl.col,fa*0.3);
        ctx.beginPath();ctx.arc(fl.x,fl.y,fl.sz*2.5,0,Math.PI*2);ctx.fill();
      });break;
    }
    case 8:{// Plage: animated sunset waves + birds
      fx.wo+=0.01;
      const wcolors=[[0.08,H-42],[0.14,H-26],[0.22,H-10]];
      wcolors.forEach(([a,yb])=>{
        ctx.fillStyle=hexA(th.dc,a);ctx.beginPath();ctx.moveTo(0,H);
        for(let wx=0;wx<=W+8;wx+=6){const wy=yb+10*Math.sin(wx*0.015+fx.wo);wx===0?ctx.moveTo(wx,wy):ctx.lineTo(wx,wy);}
        ctx.lineTo(W,H);ctx.closePath();ctx.fill();
      });
      // Shimmer on water
      ctx.fillStyle='rgba(255,200,100,0.06)';ctx.fillRect(0,H-50,W,50);
      fx.birds.forEach(b=>{
        b.x=(b.x+b.vx)%W;const by=b.y+Math.sin(t*0.002+b.phase)*6;
        ctx.strokeStyle='rgba(60,20,10,0.6)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(b.x,by);ctx.quadraticCurveTo(b.x+b.sz/2,by-b.sz*0.4,b.x+b.sz,by);ctx.stroke();
      });break;
    }
    case 9:{// Cyber: data rain + scan line
      fx.cols.forEach(col=>{
        col.drops.forEach(drop=>{
          drop.y=(drop.y+drop.speed)%H;
          ctx.fillStyle=`rgba(0,232,255,${drop.a})`;ctx.font=`${12}px monospace`;
          for(let di=0;di<drop.len;di++){
            const dy=drop.y-di*14;if(dy<0||dy>H)continue;
            const fa=(1-di/drop.len)*drop.a;
            ctx.fillStyle=`rgba(0,232,255,${(fa*0.7).toFixed(2)})`;
            ctx.fillText((Math.random()*9|0).toString(),col.x,dy);
          }
        });
      });
      fx.scanY=(fx.scanY+1.2)%H;
      ctx.fillStyle='rgba(0,220,255,0.04)';ctx.fillRect(0,fx.scanY,W,3);
      ctx.fillStyle='rgba(0,220,255,0.015)';ctx.fillRect(0,fx.scanY-8,W,8);
      break;
    }
  }
}

// ─── GAME LOGIC ───────────────────────────────────────────────────────────────
function newPiece(){return{shape:rndc(SHAPES),color:rndc(COLORS)};}
function newTray(){return[newPiece(),newPiece(),newPiece()];}

function canPlace(grid,shape,row,col){
  for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++)
    if(shape[r][c]){const gr=row+r,gc=col+c;if(gr<0||gr>=ROWS||gc<0||gc>=COLS||grid[gr][gc])return false;}
  return true;
}
function placePiece(grid,shape,color,row,col){
  for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++)
    if(shape[r][c])grid[row+r][col+c]=color;
}
function clearLines(grid){
  const rf=[],cf=[];
  for(let r=0;r<ROWS;r++)if(grid[r].every(v=>v))rf.push(r);
  for(let c=0;c<COLS;c++){let f=true;for(let r=0;r<ROWS;r++)if(!grid[r][c]){f=false;break;}if(f)cf.push(c);}
  const cl=new Set(),clC={};
  rf.forEach(r=>{for(let c=0;c<COLS;c++){const k=r*100+c;cl.add(k);clC[k]=grid[r][c];}});
  cf.forEach(c=>{for(let r=0;r<ROWS;r++){const k=r*100+c;cl.add(k);clC[k]=grid[r][c];}});
  cl.forEach(k=>{grid[Math.floor(k/100)][k%100]=null;});
  return{n:rf.length+cf.length,cells:[...cl].map(k=>({r:Math.floor(k/100),c:k%100})),colors:clC};
}
function anyValid(grid,tray){
  for(const p of tray)if(p)for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(canPlace(grid,p.shape,r,c))return true;
  return false;
}
function snapPos(mx,my,shape){
  return{gr:Math.round((my-GRID_Y)/CELL-shape.length/2),gc:Math.round((mx-GRID_X)/CELL-shape[0].length/2)};
}

// ─── PARTICLES / DEBRIS / FLOATTEXT ──────────────────────────────────────────
function spawnParticles(cells,n,pow,colors){
  cells.forEach(({r,c})=>{
    const cx=GRID_X+c*CELL+CELL/2,cy=GRID_Y+r*CELL+CELL/2;
    for(let i=0;i<n;i++){
      const a=rnd(0,Math.PI*2),s=rnd(1.5,4)*pow;
      particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-rnd(0,1.5),
        color:rndc(colors),life:28+rnd(0,28),ml:56,size:rnd(2,3.5*pow),circle:Math.random()<0.5});
    }
  });
}
class Debris{
  constructor(x,y,color,ti){
    this.x=x;this.y=y;this.ml=44+rnd(0,28);this.life=this.ml;
    this.sz=4+rnd(0,9);this.wave=rnd(0,Math.PI*2);
    const r=hr(color||'#3AC644'),g=hg(color||'#3AC644'),b=hb(color||'#3AC644');
    if(ti===2){this.vx=rnd(-1,1);this.vy=rnd(-3,-0.8);this.grav=-0.02;this.circ=true;this.r=cl(r*0.2+70|0,0,255);this.g=cl(g*0.4+105|0,0,255);this.b=cl(b*0.55+140|0,0,255);}
    else if(ti===3){this.vx=rnd(-1.2,1.2);this.vy=rnd(1.2,4);this.grav=0.22;this.circ=false;this.r=cl(r*0.3+205|0,0,255);this.g=cl(g*0.1+45|0,0,255);this.b=5;}
    else{const a=rnd(0,Math.PI*2),sp=rnd(2.5,6);this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp-rnd(0,2.5);this.grav=0.13;this.circ=Math.random()<0.5;this.r=r;this.g=g;this.b=b;}
  }
  update(){this.x+=this.vx+Math.sin(this.wave)*0.3;this.y+=this.vy;this.vy+=this.grav;this.wave+=0.1;this.life--;return this.life>0;}
  draw(ctx){const rat=this.life/this.ml,a=(0.82*rat).toFixed(3),sz=Math.max(1,this.sz*(0.25+0.75*rat));ctx.fillStyle=`rgba(${this.r},${this.g},${this.b},${a})`;if(this.circ){ctx.beginPath();ctx.arc(this.x,this.y,sz,0,Math.PI*2);ctx.fill();}else ctx.fillRect(this.x-sz,this.y-sz,sz*2,sz*2);}
}
function spawnDebris(clC,ti,n){
  Object.entries(clC).forEach(([k,color])=>{
    const r=Math.floor(+k/100),c=(+k)%100;
    const cx=GRID_X+c*CELL+CELL/2,cy=GRID_Y+r*CELL+CELL/2;
    for(let i=0;i<n;i++){debris.push(new Debris(cx+rnd(-CELL/4,CELL/4),cy+rnd(-CELL/4,CELL/4),color,ti));}
  });
}
class FloatText{
  constructor(text,x,y,color){this.text=text;this.x=x;this.y=y;this.color=color;this.life=72;this.ml=72;}
  update(){this.y-=0.85;this.life--;return this.life>0;}
  draw(ctx){
    const a=this.life/this.ml,sz=Math.max(10,CELL*0.46)|0;
    ctx.globalAlpha=a;ctx.font=`bold ${sz}px Impact,Arial`;ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.42)';ctx.fillText(this.text,this.x+2,this.y+2);
    ctx.fillStyle=this.color;ctx.fillText(this.text,this.x,this.y);
    ctx.textAlign='left';ctx.globalAlpha=1;
  }
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let best=parseInt(localStorage.getItem('blockpuzzle_best')||'0');
let gameState='menu';
let selSkin=0,selTheme=0;
let grid,tray,score,placed,over,combo,overT,curTheme;
let particles=[],debris=[],floats=[];
let screenFlash=0,screenFlashCol='#fff';
let shake=0,shakePow=0;
let drag=null,mouseX=W/2,mouseY=H/2;
let gameFx=null,gameBg=null;

function resetGame(){
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  tray=newTray();score=0;placed=0;over=false;combo=0;overT=0;
  particles=[];debris=[];floats=[];screenFlash=0;shake=0;drag=null;
  curTheme=selTheme;gameFx=initFx(selTheme);gameBg=buildBg(selTheme);
}
function getCurTheme(){return(selTheme+Math.floor(score/500))%THEMES.length;}

// ─── ANIMATED TITLE ───────────────────────────────────────────────────────────
function bounceTitle(ctx,text,bx,by,color,t,font,amp=6){
  ctx.save();ctx.font=font;
  let x=bx;
  for(let i=0;i<text.length;i++){
    const ch=text[i],bob=Math.sin(t*0.0024+i*0.8)*amp;
    ctx.fillStyle='rgba(0,0,0,0.38)';ctx.fillText(ch,x+2,by+bob+2);
    ctx.fillStyle=color;ctx.fillText(ch,x,by+bob);
    x+=ctx.measureText(ch).width+1;
  }
  ctx.restore();
}
function measureTitle(ctx,text,font){ctx.save();ctx.font=font;const w=text.split('').reduce((s,c)=>s+ctx.measureText(c).width+1,0);ctx.restore();return w;}

// ─── MENU ────────────────────────────────────────────────────────────────────
let menuBg=buildBg(0),menuFx=initFx(0);
let menuDeco=Array.from({length:8},()=>({x:rnd(0,W),y:rnd(0,H),vx:rnd(-0.3,0.3),vy:rnd(-0.2,0.2),color:rndc(COLORS),skin:rndI(0,9),sz:rnd(22,44)}));
let menuParts=Array.from({length:35},()=>({x:rnd(0,W),y:rnd(0,H),vx:rnd(-0.4,0.4),vy:rnd(-1.1,-0.28),color:rndc(COLORS),size:rnd(2,5.5),life:rnd(0,180),ml:180}));
let skinRects=[],themeRects=[],playRect=null;

function layoutMenu(){
  // Skin cards: 5 per row × 2 rows = 10 skins
  const SKW=Math.floor((W-22)/5)-5,SKH=Math.round(SKW*0.88);
  const skGY=Math.round(H*0.29);
  skinRects=Array.from({length:10},(_,i)=>({x:10+(i%5)*(SKW+5),y:skGY+(i<5?0:SKH+6),w:SKW,h:SKH}));
  // Theme buttons: 5 per row × 2 rows = 10 themes
  const THW=Math.floor((W-22)/5)-5,THH=cl(Math.round(H*0.048),20,35);
  const THY=skGY+SKH*2+14;
  themeRects=Array.from({length:10},(_,i)=>({x:10+(i%5)*(THW+5),y:THY+(i<5?0:THH+5),w:THW,h:THH}));
  const PW=cl(W-60,150,280),PH=cl(Math.round(H*0.07),34,56);
  const lastThY=THY+THH*2+8;
  playRect={x:(W-PW)/2,y:lastThY+Math.round(H*0.025),w:PW,h:PH};
}

function drawMenu(t){
  const th=THEMES[selTheme];
  ctx.drawImage(menuBg,0,0);
  drawFx(ctx,menuFx,t);
  menuDeco.forEach(b=>{b.x=(b.x+b.vx+W)%W;b.y=(b.y+b.vy+H)%H;ctx.globalAlpha=0.12;drawCell(ctx,b.color,b.x-b.sz/2|0,b.y-b.sz/2|0,b.sz|0,b.skin,t);ctx.globalAlpha=1;});
  menuParts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0||p.y<-10){p.x=rnd(0,W);p.y=H+10;p.vy=rnd(-1.1,-0.28);p.life=180;}ctx.fillStyle=hexA(p.color,(p.life/p.ml)*0.55);ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='rgba(0,0,0,0.46)';ctx.fillRect(0,0,W,H);
  layoutMenu();
  const fsz=cl(Math.floor(H*0.079),22,64),font=`${fsz}px Impact,Arial`;
  const tw1=measureTitle(ctx,'BLOCK',font),tw2=measureTitle(ctx,'PUZZLE',font);
  const titleY=Math.round(H*0.088)+fsz;
  bounceTitle(ctx,'BLOCK',(W-tw1)/2,titleY,th.tm,t,font,7);
  bounceTitle(ctx,'PUZZLE',(W-tw2)/2,titleY+fsz*1.07,th.ta,t,font,5);
  const subSz=cl(Math.floor(H*0.025),9,18);
  ctx.font=`bold ${subSz}px Arial`;ctx.fillStyle=th.tg;ctx.textAlign='center';
  ctx.fillText('— Choisis ton style —',W/2,titleY+fsz*2.22);ctx.textAlign='left';
  // SKIN label
  const lblSz=cl(Math.floor(H*0.022),8,16);
  ctx.font=`bold ${lblSz}px Arial`;ctx.fillStyle=th.tg;ctx.textAlign='center';
  if(skinRects.length)ctx.fillText('SKIN',W/2,skinRects[0].y-lblSz*0.5);ctx.textAlign='left';
  // Skin cards
  skinRects.forEach((sr,i)=>{
    const sel=i===selSkin;const{x,y,w,h}=sr;
    if(sel){ctx.save();ctx.shadowColor=th.tm;ctx.shadowBlur=12;rrect(ctx,x,y,w,h,7,null,th.tm,2);ctx.restore();}
    rrect(ctx,x,y,w,h,7,hexA(th.gbg,sel?0.92:0.7),sel?th.tm:th.dc,sel?2:1);
    const psz=Math.floor(h*0.44);
    drawCell(ctx,COLORS[i%COLORS.length],x+w/2-psz/2|0,y+5,psz,i,t);
    const nfz=cl(Math.floor(h*0.2),7,13);
    ctx.font=`bold ${nfz}px Arial`;ctx.fillStyle=sel?th.tm:th.ta;ctx.textAlign='center';
    ctx.fillText(SKIN_NAMES[i],x+w/2,y+h-5);ctx.textAlign='left';
    if(sel){ctx.font=`${nfz}px Arial`;ctx.fillStyle=th.tm;ctx.fillText('✓',x+4,y+nfz+3);}
  });
  // THEME label
  ctx.font=`bold ${lblSz}px Arial`;ctx.fillStyle=th.tg;ctx.textAlign='center';
  if(themeRects.length)ctx.fillText('THÈME',W/2,themeRects[0].y-lblSz*0.5);ctx.textAlign='left';
  // Theme buttons
  themeRects.forEach((tr,i)=>{
    const sth=THEMES[i],sel=i===selTheme;const{x,y,w,h}=tr;
    if(sel){ctx.save();ctx.shadowColor=sth.tm;ctx.shadowBlur=7;rrect(ctx,x,y,w,h,5,null,sth.tm,2);ctx.restore();}
    rrect(ctx,x,y,w,h,5,hexA(sth.gbg,0.9),sel?sth.tm:sth.dc,sel?2:1);
    const tfz=cl(Math.floor(h*0.46),6,12);
    ctx.font=`bold ${tfz}px Arial`;ctx.fillStyle=sel?sth.tm:sth.tg;ctx.textAlign='center';
    ctx.fillText(sth.name,x+w/2,y+h/2+tfz*0.38);ctx.textAlign='left';
  });
  // Play button
  if(playRect){
    const{x,y,w,h}=playRect;const pulse=Math.sin(t*0.005)*7|0;
    ctx.save();ctx.shadowColor=th.ta;ctx.shadowBlur=14;
    rrect(ctx,x,y,w,h,13,rgb(cl(hr(th.ta)+pulse,0,255),cl(hg(th.ta)+pulse,0,255),cl(hb(th.ta)+pulse,0,255)),th.tm,2);
    ctx.restore();ctx.globalAlpha=0.1;ctx.fillStyle='#fff';ctx.fillRect(x+4,y+3,w-8,h/3);ctx.globalAlpha=1;
    const pfz=cl(Math.floor(h*0.5),11,20);
    ctx.font=`bold ${pfz}px Arial`;ctx.fillStyle=th.tm;ctx.textAlign='center';
    ctx.fillText('▶  JOUER',x+w/2,y+h/2+pfz*0.37);ctx.textAlign='left';
  }
  const bsz=cl(Math.floor(H*0.023),8,16);
  ctx.textAlign='center';
  if(best>0){ctx.font=`bold ${bsz}px Arial`;ctx.fillStyle=th.tm;ctx.fillText(`RECORD : ${best}`,W/2,(playRect?playRect.y+playRect.h:H*0.84)+bsz*1.5);}
  ctx.font=`${bsz*0.8}px Arial`;ctx.fillStyle=th.tg;ctx.fillText('Toucher JOUER pour commencer',W/2,H-7);
  ctx.textAlign='left';
}

// ─── GAME RENDER ─────────────────────────────────────────────────────────────
function drawGame(t){
  const newTh=getCurTheme();
  if(newTh!==curTheme){curTheme=newTh;gameBg=buildBg(curTheme);gameFx=initFx(curTheme);screenFlash=180;screenFlashCol=THEMES[curTheme].tm;}
  const th=THEMES[curTheme];
  let sx=0,sy=0;
  if(shake>0){shake--;sx=rnd(-shakePow,shakePow)|0;sy=rnd(-shakePow,shakePow)|0;}
  ctx.drawImage(gameBg,sx,sy);
  drawFx(ctx,gameFx,t);
  ctx.save();ctx.translate(sx,sy);
  // Grid
  const b2=Math.max(3,CELL*0.08|0);
  rrect(ctx,GRID_X-b2,GRID_Y-b2,GW+b2*2,GH+b2*2,5,th.sl,th.sl,1);
  ctx.fillStyle=th.gbg;ctx.fillRect(GRID_X,GRID_Y,GW,GH);
  for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){
    const x=GRID_X+c*CELL,y=GRID_Y+r*CELL,color=grid[r][c];
    if(color){drawCell(ctx,color,x,y,CELL,selSkin,t);}
    else{ctx.fillStyle=th.ge;ctx.fillRect(x+1,y+1,CELL-2,CELL-2);ctx.strokeStyle=hexA(th.sl,0.22);ctx.lineWidth=1;ctx.strokeRect(x+1,y+1,CELL-2,CELL-2);}
  }}
  // Snap preview
  if(drag&&!over){
    const piece=tray[drag.idx];
    if(piece){
      const{gr,gc}=snapPos(mouseX,mouseY,piece.shape);
      const valid=canPlace(grid,piece.shape,gr,gc);
      const pr=valid?hr(piece.color):220,pg=valid?hg(piece.color):55,pb_=valid?hb(piece.color):45;
      piece.shape.forEach((line,rr)=>line.forEach((v,cc)=>{if(v){const pr2=gr+rr,pc2=gc+cc;if(pr2>=0&&pr2<ROWS&&pc2>=0&&pc2<COLS){ctx.fillStyle=`rgba(${pr},${pg},${pb_},0.3)`;ctx.fillRect(GRID_X+pc2*CELL+1,GRID_Y+pr2*CELL+1,CELL-2,CELL-2);ctx.strokeStyle=`rgba(${pr},${pg},${pb_},0.78)`;ctx.lineWidth=2;ctx.strokeRect(GRID_X+pc2*CELL+1,GRID_Y+pr2*CELL+1,CELL-2,CELL-2);}}
      }));
    }
  }
  // Tray
  ctx.fillStyle=hexA(th.dc,0.2);ctx.fillRect(GRID_X,TRAY_Y,GW,TRAY_H);
  rrect(ctx,GRID_X,TRAY_Y,GW,TRAY_H,7,null,th.dc,1);
  const pw=GW/3;
  for(let i=0;i<3;i++){
    if(i>0){ctx.strokeStyle=hexA(th.dc,0.38);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(GRID_X+i*pw,TRAY_Y+4);ctx.lineTo(GRID_X+i*pw,TRAY_Y+TRAY_H-4);ctx.stroke();}
    const piece=tray[i];if(!piece)continue;
    const sh=piece.shape,pcw=sh[0].length*PIECE_CELL,pch=sh.length*PIECE_CELL;
    const ox=(GRID_X+i*pw+pw/2-pcw/2)|0,oy=(TRAY_Y+(TRAY_H-pch)/2)|0;
    const dim=drag&&drag.idx===i;
    sh.forEach((line,rr)=>line.forEach((v,cc)=>{if(v)drawCell(ctx,piece.color,ox+cc*PIECE_CELL,oy+rr*PIECE_CELL,PIECE_CELL,selSkin,t,dim?0.3:1);}));
  }
  ctx.restore();
  // Floating dragged piece
  if(drag&&!over){
    const piece=tray[drag.idx];
    if(piece){
      const sh=piece.shape,ox=(mouseX-(sh[0].length*CELL)/2)|0,oy=(mouseY-(sh.length*CELL)/2)|0;
      sh.forEach((line,rr)=>line.forEach((v,cc)=>{if(v)drawCell(ctx,piece.color,ox+cc*CELL,oy+rr*CELL,CELL,selSkin,t);}));
    }
  }
  // FX
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.13;p.life--;if(p.life<=0)return false;const ratio=p.life/p.ml,sz=Math.max(1,p.size*ratio);ctx.fillStyle=hexA(p.color,0.85*ratio);if(p.circle){ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);ctx.fill();}else ctx.fillRect(p.x-sz,p.y-sz,sz*2,sz*2);return true;});
  debris=debris.filter(d=>{d.draw(ctx);return d.update();});
  floats=floats.filter(f=>{f.draw(ctx);return f.update();});
  if(screenFlash>0){ctx.fillStyle=hexA(screenFlashCol,screenFlash/255*0.52);ctx.fillRect(0,0,W,H);screenFlash=Math.max(0,screenFlash-5);}
  drawHUD(th,t);
  // Game over
  if(over){
    const el=Date.now()-overT;
    ctx.fillStyle=`rgba(0,0,0,${Math.min(0.75,el/500*0.75).toFixed(3)})`;ctx.fillRect(0,0,W,H);
    if(el>300){
      const pw2=Math.min(W-26,380),ph2=Math.round(H*0.42);
      const px=(W-pw2)/2,py=(H-ph2)/2;
      rrect(ctx,px,py,pw2,ph2,16,hexA(th.gbg,0.96),th.dc,3);
      const pulse=Math.sin(Date.now()*0.006)*12|0;
      const gcr=cl(235+pulse,0,255),gcg=cl(65-pulse/2,0,255),gcb=cl(45-pulse/2,0,255);
      const goSz=cl(pw2*0.11|0,15,36);
      ctx.save();ctx.shadowColor=rgb(gcr,gcg,gcb);ctx.shadowBlur=16;
      ctx.font=`bold ${goSz}px Impact,Arial`;ctx.fillStyle=rgb(gcr,gcg,gcb);ctx.textAlign='center';
      ctx.fillText('GAME OVER',W/2,py+ph2*0.26);ctx.restore();
      const isRec=score>=best&&score>0;
      const scSz=cl(pw2*0.07|0,11,22);
      ctx.font=`bold ${scSz}px Arial`;ctx.textAlign='center';
      ctx.fillStyle=isRec?'#FFDC3C':th.tm;ctx.fillText(`Score : ${score}`,W/2,py+ph2*0.46);
      ctx.fillStyle=th.ta;ctx.fillText(isRec?'★  NOUVEAU RECORD !  ★':`Record : ${best}`,W/2,py+ph2*0.62);
      if(el>1200){
        ctx.globalAlpha=0.5+0.5*Math.abs(Math.sin(Date.now()*0.004));
        ctx.font=`bold ${scSz*0.88}px Arial`;ctx.fillStyle='#B9EB9B';
        ctx.fillText('Toucher pour continuer',W/2,py+ph2*0.82);ctx.globalAlpha=1;
      }
      ctx.font=`${scSz*0.8}px Arial`;ctx.fillStyle=th.tg;ctx.fillText('R = rejouer',W/2,py+ph2*0.92);
      ctx.textAlign='left';
    }
  }
}

function drawHUD(th,t){
  if(H>W){// Portrait: top bar
    const bh=GRID_Y-3;ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,W,bh);
    const fz=cl(bh*0.52|0,10,22);
    ctx.font=`bold ${fz*1.25}px Impact,Arial`;ctx.fillStyle=th.tm;ctx.fillText(`${score}`,9,fz*1.4);
    ctx.font=`${fz*0.7}px Arial`;ctx.fillStyle=th.tg;ctx.fillText(`REC: ${best}`,9,bh-3);
    ctx.textAlign='right';
    ctx.font=`${fz*0.72}px Arial`;ctx.fillStyle=th.ta;ctx.fillText(THEMES[curTheme].name,W-7,fz*1.3);
    if(combo>1){ctx.font=`bold ${fz*0.9}px Arial`;ctx.fillStyle=th.tm;ctx.fillText(`×${combo} COMBO`,W-7,bh-3);}
    ctx.textAlign='left';
  }else{// Landscape: right panel
    const hx=GRID_X+GW+9,hw=W-hx-5;
    rrect(ctx,hx-3,GRID_Y,hw+3,GH,7,hexA(th.gbg,0.68),th.dc,1);
    let cy=GRID_Y+10;const fz=cl(hw*0.14|0,8,17);
    ctx.font=`${fz*0.73}px Arial`;ctx.fillStyle=th.tg;ctx.fillText('SCORE',hx,cy);cy+=fz*0.88;
    ctx.font=`bold ${fz*1.32}px Impact`;ctx.fillStyle=th.tm;ctx.fillText(`${score}`,hx,cy);cy+=fz*1.5;
    ctx.font=`${fz*0.73}px Arial`;ctx.fillStyle=th.tg;ctx.fillText(`REC: ${best}`,hx,cy);cy+=fz;
    ctx.fillText(`Pièces: ${placed}`,hx,cy);cy+=fz*1.2;
    if(combo>1){ctx.font=`bold ${fz}px Arial`;ctx.fillStyle=th.tm;ctx.fillText(`★ ×${combo}`,hx,cy);cy+=fz*1.2;}
    ctx.font=`${fz*0.73}px Arial`;ctx.fillStyle=th.tg;ctx.fillText(THEMES[curTheme].name,hx,cy);
  }
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
function getPos(e){
  if(e.touches&&e.touches.length>0)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  if(e.changedTouches&&e.changedTouches.length>0)return{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}
function onDown(e){
  e.preventDefault();const{x,y}=getPos(e);mouseX=x;mouseY=y;
  if(gameState==='menu'){handleMenuTap(x,y);return;}
  if(gameState==='gameover'){if(Date.now()-overT>1200)gameState='menu';return;}
  if(gameState==='playing'&&!over){
    const pw=GW/3;
    for(let i=0;i<3;i++){if(x>=GRID_X+i*pw&&x<GRID_X+(i+1)*pw&&y>=TRAY_Y&&y<TRAY_Y+TRAY_H&&tray[i]){drag={idx:i};break;}}
  }
}
function onMove(e){e.preventDefault();const{x,y}=getPos(e);mouseX=x;mouseY=y;}
function onUp(e){
  e.preventDefault();const{x,y}=getPos(e);mouseX=x;mouseY=y;
  if(drag&&gameState==='playing'&&!over){
    const piece=tray[drag.idx];
    if(piece){
      const{gr,gc}=snapPos(x,y,piece.shape);
      if(canPlace(grid,piece.shape,gr,gc)){
        placePiece(grid,piece.shape,piece.color,gr,gc);tray[drag.idx]=null;placed++;
        const ti=getCurTheme(),{n,cells,colors}=clearLines(grid);
        if(n>0){
          combo++;const pts=Math.round(n===1?100*(1+(combo-1)*0.5):n===2?350*(1+(combo-1)*0.5):n*165*(1+(combo-1)*0.5));
          score+=pts;
          spawnParticles(cells,5,1.2,THEMES[ti].pc);
          spawnDebris(colors,ti,8);
          if(n>=2){shake=10;shakePow=3+(n>=3?4:0);}
          screenFlash=80+(n>=3?100:0);screenFlashCol=THEMES[ti].tm;
          const cy=GRID_Y+Math.min(...cells.map(c=>c.r))*CELL;
          floats.push(new FloatText(n>=3?`★ +${pts} ★`:`+${pts}`,GRID_X+GW/2,cy,THEMES[ti].tm));
          const newTh=getCurTheme();if(newTh!==curTheme){curTheme=newTh;gameBg=buildBg(curTheme);gameFx=initFx(curTheme);screenFlash=200;screenFlashCol=THEMES[newTh].tm;}
        }else combo=0;
        if(tray.every(p=>p===null))tray=newTray();
        if(!anyValid(grid,tray)){over=true;overT=Date.now();if(score>best){best=score;localStorage.setItem('blockpuzzle_best',best);}setTimeout(()=>{gameState='gameover';},1800);}
      }
    }
    drag=null;
  }
}
function handleMenuTap(x,y){
  layoutMenu();
  for(let i=0;i<skinRects.length;i++){const{x:rx,y:ry,w,h}=skinRects[i];if(x>=rx&&x<rx+w&&y>=ry&&y<ry+h){selSkin=i;return;}}
  for(let i=0;i<themeRects.length;i++){const{x:rx,y:ry,w,h}=themeRects[i];if(x>=rx&&x<rx+w&&y>=ry&&y<ry+h){selTheme=i;menuBg=buildBg(i);menuFx=initFx(i);return;}}
  if(playRect){const{x:rx,y:ry,w,h}=playRect;if(x>=rx&&x<rx+w&&y>=ry&&y<ry+h){resize();resetGame();gameState='playing';}}
}
window.addEventListener('keydown',e=>{
  if(gameState==='gameover'){gameState='menu';return;}
  if(gameState==='menu'&&(e.key==='Enter'||e.key===' ')){resize();resetGame();gameState='playing';return;}
  if(gameState==='playing'){
    if(e.key==='Escape'){gameState='menu';return;}
    if(e.key==='r'||e.key==='R'){if(score>best){best=score;localStorage.setItem('blockpuzzle_best',best);}resetGame();}
  }
});
canvas.addEventListener('mousedown',onDown,{passive:false});
canvas.addEventListener('mousemove',onMove,{passive:false});
canvas.addEventListener('mouseup',onUp,{passive:false});
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onUp,{passive:false});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop(ts){
  ctx.clearRect(0,0,W,H);
  if(gameState==='menu')drawMenu(ts);
  else drawGame(ts);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
