<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a2010"/>
      <stop offset="100%" stop-color="#040f06"/>
    </radialGradient>
    <linearGradient id="bar3a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#40C060"/>
      <stop offset="100%" stop-color="#20A040" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bar3b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#30B050" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#40C060"/>
      <stop offset="100%" stop-color="#20A040" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="star3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#80FFB0"/>
      <stop offset="100%" stop-color="#40C060"/>
    </radialGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#40C060" flood-opacity="0.7"/>
    </filter>
    <filter id="starglow3">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#40C060" flood-opacity="0.9"/>
    </filter>
  </defs>
  <!-- Hexagonal background -->
  <polygon points="40,4 73,22 73,58 40,76 7,58 7,22" fill="url(#bg3)" filter="url(#shadow3)"/>
  <!-- 10 horizontal line bars -->
  <rect x="16" y="14" width="48" height="3.2" rx="1.5" fill="url(#bar3a)" opacity="0.9"/>
  <rect x="16" y="18.5" width="40" height="3.2" rx="1.5" fill="url(#bar3b)" opacity="0.8"/>
  <rect x="16" y="23" width="44" height="3.2" rx="1.5" fill="url(#bar3a)" opacity="0.85"/>
  <rect x="16" y="27.5" width="36" height="3.2" rx="1.5" fill="url(#bar3b)" opacity="0.7"/>
  <rect x="16" y="32" width="46" height="3.2" rx="1.5" fill="url(#bar3a)" opacity="0.9"/>
  <!-- Star center overlapping bars -->
  <polygon points="40,35 42.5,41 49,41 43.8,45 45.9,51.5 40,47.5 34.1,51.5 36.2,45 31,41 37.5,41" fill="url(#star3)" filter="url(#starglow3)"/>
  <!-- Star inner highlight -->
  <polygon points="40,37.5 41.5,41.5 45.5,41.5 42.3,44 43.5,48 40,45.5 36.5,48 37.7,44 34.5,41.5 38.5,41.5" fill="white" opacity="0.4"/>
  <!-- 5 more bars below star -->
  <rect x="16" y="53" width="44" height="3.2" rx="1.5" fill="url(#bar3a)" opacity="0.85"/>
  <rect x="16" y="57.5" width="38" height="3.2" rx="1.5" fill="url(#bar3b)" opacity="0.75"/>
  <rect x="16" y="62" width="42" height="3.2" rx="1.5" fill="url(#bar3a)" opacity="0.8"/>
  <!-- Label -->
  <text x="40" y="72.5" font-family="Arial, sans-serif" font-size="6.5" font-weight="bold" fill="#80ee90" text-anchor="middle" letter-spacing="0.5">10 LIGNES</text>
  <!-- Hex border -->
  <polygon points="40,4 73,22 73,58 40,76 7,58 7,22" fill="none" stroke="#40C060" stroke-width="1.5" opacity="0.9"/>
  <polygon points="40,5.5 71.5,23 71.5,57 40,74.5 8.5,57 8.5,23" fill="none" stroke="#80FF90" stroke-width="0.5" opacity="0.4"/>
</svg>
