<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="100%" height="100%">
  <defs>
    <linearGradient id="m-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#708090"/>
      <stop offset="100%" stop-color="#303840"/>
    </linearGradient>
    <linearGradient id="m-shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Bloc chromé: reflets multiples sur top -->
    <linearGradient id="m-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EEF4"/>
      <stop offset="30%" stop-color="#A8B8C8"/>
      <stop offset="60%" stop-color="#D0D8E0"/>
      <stop offset="100%" stop-color="#788898"/>
    </linearGradient>
    <linearGradient id="m-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#404850"/>
      <stop offset="50%" stop-color="#586068"/>
      <stop offset="100%" stop-color="#485058"/>
    </linearGradient>
    <linearGradient id="m-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#788898"/>
      <stop offset="50%" stop-color="#A0B0C0"/>
      <stop offset="100%" stop-color="#889098"/>
    </linearGradient>
    <filter id="m-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#101820" flood-opacity="0.7"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#m-bg)"/>

  <g filter="url(#m-shadow)">
    <polygon points="100,30 127.7,46 100,62 72.3,46"
             fill="url(#m-top)"
             stroke="#506070" stroke-width="0.8"/>
    <polygon points="72.3,46 100,62 100,78 72.3,62"
             fill="url(#m-left)"
             stroke="#303840" stroke-width="0.8"/>
    <polygon points="127.7,46 100,62 100,78 127.7,62"
             fill="url(#m-right)"
             stroke="#607080" stroke-width="0.8"/>
  </g>

  <!-- Reflet brillant top (chromed) -->
  <polygon points="100,30 127.7,46 115,54 87.3,38" fill="#FFFFFF" opacity="0.22"/>
  <!-- Ligne spéculaire arête haute-gauche -->
  <line x1="72.3" y1="46" x2="100" y2="30" stroke="#E0EAF4" stroke-width="1.5" opacity="0.8"/>
  <!-- Ligne spéculaire arête haute-droite -->
  <line x1="100" y1="30" x2="127.7" y2="46" stroke="#D0DCE8" stroke-width="1.0" opacity="0.6"/>
  <!-- Rayure horizontale métallique sur flanc droit -->
  <line x1="127.7" y1="52" x2="100" y2="68" stroke="#C0D0E0" stroke-width="0.6" opacity="0.4"/>
  <line x1="127.7" y1="58" x2="100" y2="74" stroke="#C0D0E0" stroke-width="0.4" opacity="0.3"/>

  <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#m-shine)"/>

  <text x="100" y="115" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="14" text-anchor="middle" letter-spacing="2" fill="#C0D0E0"
        paint-order="stroke" stroke="#181E24" stroke-width="2">MÉTAL</text>

  <rect x="1" y="1" width="198" height="138" rx="9.5" fill="none"
        stroke="#90A8C0" stroke-width="1.5" opacity="0.75"/>
</svg>
