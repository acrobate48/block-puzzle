<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56" width="100%" height="100%">
  <defs>
    <linearGradient id="jbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3A0A"/>
      <stop offset="100%" stop-color="#081508"/>
    </linearGradient>
    <radialGradient id="jcanopy" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A7A10"/>
      <stop offset="100%" stop-color="#144A06"/>
    </radialGradient>
    <radialGradient id="jfly1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFEE44" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFEE44" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="jfly2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CCFF22" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#CCFF22" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="80" height="56" rx="6" fill="url(#jbg)"/>

  <!-- Ground strip -->
  <rect x="0" y="42" width="80" height="14" rx="0" fill="#0D2008" opacity="0.7"/>
  <rect x="0" y="50" width="80" height="6" rx="0" fill="#061004" opacity="0.5"/>

  <!-- Trunk -->
  <rect x="36" y="28" width="8" height="18" rx="2" fill="#4A2E10"/>
  <rect x="37.5" y="30" width="2" height="14" rx="1" fill="#5C3A14" opacity="0.6"/>

  <!-- Canopy layers -->
  <ellipse cx="40" cy="26" rx="22" ry="14" fill="url(#jcanopy)"/>
  <ellipse cx="40" cy="20" rx="16" ry="10" fill="#2E8812"/>
  <ellipse cx="33" cy="24" rx="10" ry="7" fill="#1E6808" opacity="0.8"/>
  <ellipse cx="47" cy="24" rx="10" ry="7" fill="#1E6808" opacity="0.8"/>
  <ellipse cx="40" cy="14" rx="11" ry="7" fill="#3AAA18"/>

  <!-- Leaf highlights -->
  <ellipse cx="40" cy="13" rx="6" ry="3" fill="#4ACC20" opacity="0.5"/>

  <!-- Firefly 1 -->
  <circle cx="18" cy="22" r="4" fill="url(#jfly1)"/>
  <circle cx="18" cy="22" r="1.5" fill="#FFEE44"/>

  <!-- Firefly 2 -->
  <circle cx="62" cy="30" r="3.5" fill="url(#jfly2)"/>
  <circle cx="62" cy="30" r="1.2" fill="#CCFF44"/>

  <!-- Theme name -->
  <text x="40" y="52" font-family="Arial, sans-serif" font-size="8" font-weight="bold"
        fill="#D4B030" text-anchor="middle" dominant-baseline="middle">JUNGLE</text>

  <!-- Gloss overlay -->
  <rect width="80" height="20" rx="6" fill="white" opacity="0.07"/>
  <rect x="0" y="0" width="80" height="8" rx="6" fill="white" opacity="0.08"/>
</svg>
