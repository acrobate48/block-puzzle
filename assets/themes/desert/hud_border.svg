<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 20" width="100%" height="20" opacity="0.90">
  <defs>
    <filter id="dglow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#f0a020" flood-opacity="0.6"/>
    </filter>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#c8922a"/>
    </linearGradient>
    <!-- Diamond -->
    <g id="diamond">
      <polygon points="0,-3 3,0 0,3 -3,0" fill="#d4a855" stroke="#8b5c00" stroke-width="0.4" filter="url(#dglow)"/>
    </g>
  </defs>

  <!-- Sand wave fill: sinusoidal path -->
  <path d="M0,14 C10,10 20,14 30,12 C40,10 50,14 60,12 C70,10 80,14 90,12 C100,10 110,14 120,12 C130,10 140,14 150,12 C160,10 170,14 180,12 C190,10 200,14 210,12 C220,10 230,14 240,12 C250,10 260,14 270,12 C280,10 290,14 300,12 C310,10 320,14 330,12 C340,10 350,14 360,12 C370,10 380,14 390,12 C395,11 400,12 400,12 L400,20 L0,20 Z"
        fill="url(#sand)" opacity="0.85"/>

  <!-- Second lighter wave layer -->
  <path d="M0,16 C10,13 20,16 30,14 C40,13 50,16 60,14 C70,13 80,16 90,14 C100,13 110,16 120,14 C130,13 140,16 150,14 C160,13 170,16 180,14 C190,13 200,16 210,14 C220,13 230,16 240,14 C250,13 260,16 270,14 C280,13 290,16 300,14 C310,13 320,16 330,14 C340,13 350,16 360,14 C370,13 380,16 400,14 L400,20 L0,20 Z"
        fill="#f5d98a" opacity="0.45"/>

  <!-- Diamond decorations along the wave -->
  <use href="#diamond" transform="translate(20,10)"/>
  <use href="#diamond" transform="translate(60,9)"/>
  <use href="#diamond" transform="translate(100,10)"/>
  <use href="#diamond" transform="translate(140,9)"/>
  <use href="#diamond" transform="translate(180,10)"/>
  <use href="#diamond" transform="translate(220,9)"/>
  <use href="#diamond" transform="translate(260,10)"/>
  <use href="#diamond" transform="translate(300,9)"/>
  <use href="#diamond" transform="translate(340,10)"/>
  <use href="#diamond" transform="translate(380,9)"/>
</svg>
