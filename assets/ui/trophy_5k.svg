<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <defs>
    <!-- Silver cup gradient -->
    <linearGradient id="cupGrad5k" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8EEF4"/>
      <stop offset="35%"  stop-color="#D0D8E0"/>
      <stop offset="70%"  stop-color="#9AAABB"/>
      <stop offset="100%" stop-color="#8090A0"/>
    </linearGradient>
    <!-- Silver pedestal gradient -->
    <linearGradient id="pedGrad5k" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#A0B0C0"/>
      <stop offset="50%"  stop-color="#6A7A8A"/>
      <stop offset="100%" stop-color="#4A5A6A"/>
    </linearGradient>
    <!-- Stem gradient -->
    <linearGradient id="stemGrad5k" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6A7A8A"/>
      <stop offset="50%"  stop-color="#A0B0C0"/>
      <stop offset="100%" stop-color="#6A7A8A"/>
    </linearGradient>
    <!-- Rim silver gradient -->
    <linearGradient id="rimGrad5k" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E8EEF4"/>
      <stop offset="100%" stop-color="#8090A0"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow5k" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#4A5A6A" flood-opacity="0.75"/>
    </filter>
    <!-- Soft glow -->
    <filter id="glow5k" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#C0D0E0" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Pedestal -->
  <rect x="20" y="100" width="60" height="14" rx="4" ry="4"
        fill="url(#pedGrad5k)" filter="url(#shadow5k)"/>
  <!-- Pedestal engraved line decoration -->
  <rect x="24" y="103" width="52" height="1.5" rx="0.5" fill="#8090A0" opacity="0.7"/>
  <rect x="24" y="108" width="52" height="1.5" rx="0.5" fill="#8090A0" opacity="0.7"/>
  <!-- Pedestal center diamond motif -->
  <polygon points="50,104.5 53,107 50,109.5 47,107" fill="#A0B0C0" opacity="0.5"/>

  <!-- Stem -->
  <rect x="44" y="88" width="12" height="14" fill="url(#stemGrad5k)"/>
  <rect x="38" y="95" width="24" height="5" rx="2" fill="url(#stemGrad5k)"/>

  <!-- Cup body -->
  <path d="
    M 16 30
    C 16 24, 23 20, 30 20
    L 70 20
    C 77 20, 84 24, 84 30
    C 84 52, 75 67, 66 74
    C 62 77, 58 78, 56 79
    L 56 88
    L 44 88
    L 44 79
    C 42 78, 38 77, 34 74
    C 25 67, 16 52, 16 30 Z
  " fill="url(#cupGrad5k)" filter="url(#shadow5k)"/>

  <!-- Left handle -->
  <path d="M 16 34 C 1 34, 1 60, 16 60" fill="none" stroke="url(#cupGrad5k)"
        stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 16 34 C 5 34, 5 60, 16 60" fill="none" stroke="#8090A0"
        stroke-width="2" stroke-linecap="round" opacity="0.45"/>

  <!-- Right handle -->
  <path d="M 84 34 C 99 34, 99 60, 84 60" fill="none" stroke="url(#cupGrad5k)"
        stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 84 34 C 95 34, 95 60, 84 60" fill="none" stroke="#8090A0"
        stroke-width="2" stroke-linecap="round" opacity="0.45"/>

  <!-- Reflection on body -->
  <ellipse cx="35" cy="40" rx="9" ry="16" fill="white" opacity="0.22"
           transform="rotate(-18 35 40)"/>
  <ellipse cx="31" cy="28" rx="5" ry="3.5" fill="white" opacity="0.30"/>

  <!-- Rim top bar -->
  <rect x="16" y="18" width="68" height="7" rx="3.5" fill="url(#rimGrad5k)"/>
  <rect x="18" y="18" width="64" height="3" rx="2" fill="white" opacity="0.35"/>

  <!-- 5-point silver star inside cup -->
  <g transform="translate(50,50)" filter="url(#glow5k)">
    <polygon points="0,-13 3,-5 12,-5 5,1 8,10 0,5 -8,10 -5,1 -12,-5 -3,-5"
             fill="#D0D8E0" stroke="#8090A0" stroke-width="0.8"/>
    <!-- Star center highlight -->
    <polygon points="0,-7 1.5,-2.5 6,-2.5 2.5,0.5 4,5 0,2.5 -4,5 -2.5,0.5 -6,-2.5 -1.5,-2.5"
             fill="white" opacity="0.4"/>
  </g>

  <!-- "5K" label under star -->
  <text x="50" y="70"
        font-family="'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="10"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="#C0CCD8"
        filter="url(#shadow5k)">5K</text>

  <!-- Small decorative stars left side -->
  <g transform="translate(22,35)">
    <polygon points="0,-5 1.2,-2 4,-2 2,0.5 3,3.5 0,2 -3,3.5 -2,0.5 -4,-2 -1.2,-2"
             fill="#D0D8E0" stroke="#9AAABB" stroke-width="0.5" opacity="0.85"/>
  </g>
  <g transform="translate(22,60)">
    <polygon points="0,-5 1.2,-2 4,-2 2,0.5 3,3.5 0,2 -3,3.5 -2,0.5 -4,-2 -1.2,-2"
             fill="#D0D8E0" stroke="#9AAABB" stroke-width="0.5" opacity="0.85"/>
  </g>

  <!-- Small decorative stars right side -->
  <g transform="translate(78,35)">
    <polygon points="0,-5 1.2,-2 4,-2 2,0.5 3,3.5 0,2 -3,3.5 -2,0.5 -4,-2 -1.2,-2"
             fill="#D0D8E0" stroke="#9AAABB" stroke-width="0.5" opacity="0.85"/>
  </g>
  <g transform="translate(78,60)">
    <polygon points="0,-5 1.2,-2 4,-2 2,0.5 3,3.5 0,2 -3,3.5 -2,0.5 -4,-2 -1.2,-2"
             fill="#D0D8E0" stroke="#9AAABB" stroke-width="0.5" opacity="0.85"/>
  </g>

  <!-- Bottom score label -->
  <text x="50" y="113"
        font-family="Arial, sans-serif"
        font-size="7"
        font-weight="bold"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="#B0C0D0"
        opacity="0.9">SCORE</text>
</svg>
