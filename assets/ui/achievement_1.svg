<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </radialGradient>
    <radialGradient id="shield1" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6090FF"/>
      <stop offset="100%" stop-color="#1a3090"/>
    </radialGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4080FF" flood-opacity="0.7"/>
    </filter>
    <filter id="glow1">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#4080FF" flood-opacity="0.9"/>
    </filter>
    <linearGradient id="block1top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#aaccff"/>
      <stop offset="100%" stop-color="#6699ee"/>
    </linearGradient>
    <linearGradient id="block1side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3355aa"/>
      <stop offset="100%" stop-color="#2244aa"/>
    </linearGradient>
    <linearGradient id="block1front" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4477dd"/>
      <stop offset="100%" stop-color="#2255bb"/>
    </linearGradient>
  </defs>
  <!-- Hexagonal background -->
  <polygon points="40,4 73,22 73,58 40,76 7,58 7,22" fill="url(#bg1)" filter="url(#shadow1)"/>
  <!-- Shield shape -->
  <path d="M40 14 L58 22 L58 42 Q58 56 40 64 Q22 56 22 42 L22 22 Z" fill="url(#shield1)" opacity="0.95"/>
  <!-- Shield inner highlight -->
  <path d="M40 17 L55 24 L55 42 Q55 54 40 61 Q25 54 25 42 L25 24 Z" fill="none" stroke="#8ab0ff" stroke-width="0.8" opacity="0.5"/>
  <!-- Isometric 3D block -->
  <!-- Top face -->
  <polygon points="40,28 49,33 40,38 31,33" fill="url(#block1top)" filter="url(#glow1)"/>
  <!-- Right face -->
  <polygon points="49,33 49,43 40,48 40,38" fill="url(#block1side)"/>
  <!-- Left face -->
  <polygon points="40,38 40,48 31,43 31,33" fill="url(#block1front)"/>
  <!-- Block edges -->
  <polygon points="40,28 49,33 40,38 31,33" fill="none" stroke="#88aaff" stroke-width="0.5"/>
  <polygon points="49,33 49,43 40,48 40,38" fill="none" stroke="#3355aa" stroke-width="0.5"/>
  <polygon points="40,38 40,48 31,43 31,33" fill="none" stroke="#4466cc" stroke-width="0.5"/>
  <!-- Label -->
  <text x="40" y="72" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#aaccff" text-anchor="middle" letter-spacing="0.5">1ER BLOC</text>
  <!-- Hex border glow -->
  <polygon points="40,4 73,22 73,58 40,76 7,58 7,22" fill="none" stroke="#4080FF" stroke-width="1.5" opacity="0.8"/>
  <polygon points="40,5.5 71.5,23 71.5,57 40,74.5 8.5,57 8.5,23" fill="none" stroke="#80b0ff" stroke-width="0.5" opacity="0.4"/>
</svg>
