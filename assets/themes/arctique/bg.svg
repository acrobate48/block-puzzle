<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 3840 2160" width="100%" height="100%"
     preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="aAtm1" cx="50%" cy="25%" r="60%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#88E0F8" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#3878A8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#08121E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aAtm2" cx="25%" cy="55%" r="50%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60C0F0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#040C16" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aAtm3" cx="75%" cy="65%" r="45%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#204C78" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#04081A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aIceCrystal" cx="50%" cy="40%" r="45%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C0F8FF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#88E0F8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#08121E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aRefract" cx="40%" cy="30%" r="35%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C0F8FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#08121E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aVignette" cx="50%" cy="50%" r="72%" gradientUnits="userSpaceOnUse">
      <stop offset="35%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.88"/>
    </radialGradient>
    <radialGradient id="aSpecular" cx="22%" cy="6%" r="30%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C0F8FF" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#88E0F8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#08121E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#040C16"/>
      <stop offset="20%" stop-color="#08121E"/>
      <stop offset="50%" stop-color="#0E1C2E"/>
      <stop offset="80%" stop-color="#3878A8"/>
      <stop offset="100%" stop-color="#204C78"/>
    </linearGradient>
    <linearGradient id="aIceSheet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C0F8FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#88E0F8" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="aAurora1" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#88E0F8" stop-opacity="0"/>
      <stop offset="20%" stop-color="#60C0F0" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#C0F8FF" stop-opacity="0.7"/>
      <stop offset="80%" stop-color="#88E0F8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#88E0F8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aAurora2" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#4888A8" stop-opacity="0"/>
      <stop offset="25%" stop-color="#60C0F0" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#88E0F8" stop-opacity="0.55"/>
      <stop offset="85%" stop-color="#4888A8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4888A8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aAurora3" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#C0F8FF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#88E0F8" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#60C0F0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#C0F8FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="b2"/>
      <feColorMatrix in="b1" type="matrix"
        values="0 0 0 0 0.53  0 0 0 0 0.88  0 0 0 0 0.97  0 0 0 2.2 0" result="c1"/>
      <feColorMatrix in="b2" type="matrix"
        values="0 0 0 0 0.53  0 0 0 0 0.88  0 0 0 0 0.97  0 0 0 0.9 0" result="c2"/>
      <feMerge><feMergeNode in="c2"/><feMergeNode in="c1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowIce" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b1"/>
      <feColorMatrix in="b1" type="matrix"
        values="0 0 0 0 0.75  0 0 0 0 0.97  0 0 0 0 1.0  0 0 0 2.5 0" result="c1"/>
      <feMerge><feMergeNode in="c1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#040C16" flood-opacity="0.95"/>
    </filter>
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="gn"/>
      <feBlend in="SourceGraphic" in2="gn" mode="overlay" result="bl"/>
      <feComposite in="bl" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="blur" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="blurHeavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blurMid" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="iceRefract">
      <feTurbulence type="turbulence" baseFrequency="0.02 0.015" numOctaves="4" seed="11" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="22" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="frostEdge">
      <feTurbulence type="fractalNoise" baseFrequency="0.08 0.06" numOctaves="5" seed="4" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0.5 0 0 0 0.5  0 0.8 0 0 0.85  0 0 1 0 1  0 0 0 0.6 0" result="colored"/>
      <feBlend in="SourceGraphic" in2="colored" mode="overlay"/>
    </filter>
  </defs>

  <!-- LAYER 1: Arctic sky base -->
  <rect width="3840" height="2160" fill="url(#aSky)"/>

  <!-- LAYER 2: Atmospheric depth -->
  <rect width="3840" height="2160" fill="url(#aAtm1)" filter="url(#blurHeavy)" opacity="0.85"/>
  <rect width="3840" height="2160" fill="url(#aAtm2)" filter="url(#blurMid)" opacity="0.65"/>
  <rect width="3840" height="2160" fill="url(#aAtm3)" filter="url(#blurMid)" opacity="0.55"/>
  <rect width="3840" height="2160" fill="url(#aIceCrystal)" filter="url(#blurHeavy)" opacity="0.6"/>

  <!-- LAYER 3: Northern lights aurora (smooth horizontal waves) -->
  <g filter="url(#blurHeavy)">
    <rect x="0" y="180" width="3840" height="140" fill="url(#aAurora1)" opacity="0.85"/>
    <rect x="0" y="280" width="3840" height="110" fill="url(#aAurora2)" opacity="0.75"/>
    <rect x="0" y="360" width="3840" height="90" fill="url(#aAurora3)" opacity="0.65"/>
    <rect x="0" y="420" width="3840" height="120" fill="url(#aAurora1)" opacity="0.6"/>
    <rect x="0" y="500" width="3840" height="100" fill="url(#aAurora2)" opacity="0.5"/>
    <rect x="0" y="100" width="3840" height="120" fill="url(#aAurora3)" opacity="0.55"/>
    <!-- Wavy aurora shapes -->
    <path d="M0,220 Q480,180 960,240 Q1440,300 1920,220 Q2400,140 2880,200 Q3360,260 3840,220 L3840,320 Q3360,360 2880,300 Q2400,240 1920,320 Q1440,400 960,340 Q480,280 0,320 Z" fill="#60C0F0" opacity="0.4"/>
    <path d="M0,300 Q600,250 1200,320 Q1800,390 2400,300 Q3000,210 3840,290 L3840,390 Q3000,310 2400,400 Q1800,490 1200,420 Q600,350 0,390 Z" fill="#88E0F8" opacity="0.35"/>
    <path d="M0,380 Q500,340 1000,400 Q1500,460 2000,390 Q2500,320 3000,380 Q3400,430 3840,380 L3840,460 Q3400,510 3000,460 Q2500,410 2000,470 Q1500,540 1000,480 Q500,420 0,460 Z" fill="#C0F8FF" opacity="0.28"/>
  </g>

  <!-- LAYER 4: Ice sheet at ground level -->
  <rect x="0" y="1300" width="3840" height="860" fill="url(#aIceSheet)" filter="url(#iceRefract)" opacity="0.55"/>
  <rect x="0" y="1400" width="3840" height="760" fill="#88E0F8" opacity="0.06" filter="url(#blurMid)"/>

  <!-- LAYER 5: Crystal ice facet polygons -->
  <g opacity="0.65" filter="url(#blur)" stroke-width="1.5">
    <!-- Large ice facets -->
    <polygon points="200,1350 520,1280 680,1420 440,1520" fill="#C0F8FF" fill-opacity="0.12" stroke="#88E0F8" stroke-opacity="0.6"/>
    <polygon points="520,1280 880,1250 1020,1380 680,1420" fill="#88E0F8" fill-opacity="0.1" stroke="#60C0F0" stroke-opacity="0.55"/>
    <polygon points="880,1250 1200,1290 1340,1430 1020,1380" fill="#C0F8FF" fill-opacity="0.12" stroke="#88E0F8" stroke-opacity="0.6"/>
    <polygon points="1200,1290 1560,1260 1700,1410 1340,1430" fill="#88E0F8" fill-opacity="0.1" stroke="#60C0F0" stroke-opacity="0.55"/>
    <polygon points="1560,1260 1900,1300 2040,1450 1700,1410" fill="#C0F8FF" fill-opacity="0.12" stroke="#88E0F8" stroke-opacity="0.6"/>
    <polygon points="1900,1300 2260,1270 2400,1420 2040,1450" fill="#88E0F8" fill-opacity="0.1" stroke="#60C0F0" stroke-opacity="0.55"/>
    <polygon points="2260,1270 2600,1300 2740,1440 2400,1420" fill="#C0F8FF" fill-opacity="0.12" stroke="#88E0F8" stroke-opacity="0.6"/>
    <polygon points="2600,1300 2960,1280 3100,1420 2740,1440" fill="#88E0F8" fill-opacity="0.1" stroke="#60C0F0" stroke-opacity="0.55"/>
    <polygon points="2960,1280 3300,1310 3440,1460 3100,1420" fill="#C0F8FF" fill-opacity="0.12" stroke="#88E0F8" stroke-opacity="0.6"/>
    <polygon points="3300,1310 3620,1290 3840,1400 3440,1460" fill="#88E0F8" fill-opacity="0.1" stroke="#60C0F0" stroke-opacity="0.55"/>
    <!-- Ice crack lines -->
    <path d="M400,1380 Q450,1420 420,1480 Q390,1540 440,1600 Q490,1660 460,1720" stroke="#C0F8FF" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M900,1320 Q960,1370 940,1440 Q920,1510 970,1580" stroke="#88E0F8" stroke-width="2" fill="none" opacity="0.65"/>
    <path d="M1400,1360 Q1440,1420 1410,1500 Q1380,1580 1430,1650 Q1480,1720 1450,1800" stroke="#C0F8FF" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M1900,1340 Q1950,1400 1920,1480 Q1890,1560 1940,1640" stroke="#88E0F8" stroke-width="2" fill="none" opacity="0.65"/>
    <path d="M2400,1380 Q2440,1450 2410,1530 Q2380,1610 2430,1690 Q2480,1770 2450,1850" stroke="#C0F8FF" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M2900,1360 Q2950,1420 2930,1500 Q2910,1580 2960,1660" stroke="#88E0F8" stroke-width="2" fill="none" opacity="0.65"/>
    <path d="M3400,1390 Q3440,1460 3410,1540 Q3380,1620 3430,1700" stroke="#C0F8FF" stroke-width="2" fill="none" opacity="0.7"/>
    <!-- Intersecting cracks -->
    <path d="M200,1500 Q600,1460 1000,1520 Q1400,1580 1800,1500 Q2200,1420 2600,1490 Q3000,1560 3400,1500 Q3700,1450 3840,1480" stroke="#88E0F8" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M0,1620 Q400,1580 800,1640 Q1200,1700 1600,1620 Q2000,1540 2400,1600 Q2800,1660 3200,1600 Q3600,1540 3840,1580" stroke="#60C0F0" stroke-width="1.5" fill="none" opacity="0.45"/>
  </g>

  <!-- LAYER 6: Light refraction beams through ice -->
  <g opacity="0.4" filter="url(#blurHeavy)">
    <polygon points="1840,0 1920,0 2100,1500 1820,1500" fill="#C0F8FF"/>
    <polygon points="1720,0 1800,0 1940,1500 1680,1500" fill="#88E0F8"/>
    <polygon points="1960,0 2040,0 2260,1500 1980,1500" fill="#C0F8FF"/>
    <polygon points="1580,0 1660,0 1780,1500 1540,1500" fill="#88E0F8"/>
    <polygon points="2080,0 2160,0 2420,1500 2140,1500" fill="#C0F8FF"/>
    <polygon points="1440,0 1520,0 1620,1500 1400,1500" fill="#88E0F8"/>
    <polygon points="2200,0 2280,0 2580,1500 2300,1500" fill="#C0F8FF"/>
  </g>

  <!-- LAYER 7: Snow drift particles -->
  <g filter="url(#glow)">
    <circle cx="380" cy="950" r="3" fill="#C0F8FF" opacity="0.85"/>
    <circle cx="620" cy="820" r="2" fill="#88E0F8" opacity="0.8"/>
    <circle cx="880" cy="1050" r="4" fill="#C0F8FF" opacity="0.9"/>
    <circle cx="1140" cy="750" r="2" fill="#88E0F8" opacity="0.78"/>
    <circle cx="1380" cy="980" r="3" fill="#C0F8FF" opacity="0.85"/>
    <circle cx="1640" cy="720" r="2" fill="#88E0F8" opacity="0.8"/>
    <circle cx="1900" cy="1080" r="4" fill="#C0F8FF" opacity="0.9"/>
    <circle cx="2160" cy="780" r="2" fill="#88E0F8" opacity="0.78"/>
    <circle cx="2400" cy="1010" r="3" fill="#C0F8FF" opacity="0.85"/>
    <circle cx="2660" cy="760" r="2" fill="#88E0F8" opacity="0.8"/>
    <circle cx="2920" cy="1050" r="4" fill="#C0F8FF" opacity="0.9"/>
    <circle cx="3180" cy="810" r="2" fill="#88E0F8" opacity="0.78"/>
    <circle cx="3440" cy="980" r="3" fill="#C0F8FF" opacity="0.85"/>
    <circle cx="280" cy="1200" r="3" fill="#60C0F0" opacity="0.72"/>
    <circle cx="540" cy="1350" r="2" fill="#C0F8FF" opacity="0.68"/>
    <circle cx="800" cy="1270" r="4" fill="#88E0F8" opacity="0.75"/>
    <circle cx="1060" cy="1340" r="2" fill="#C0F8FF" opacity="0.65"/>
    <circle cx="1320" cy="1210" r="3" fill="#60C0F0" opacity="0.72"/>
    <circle cx="1580" cy="1360" r="2" fill="#C0F8FF" opacity="0.68"/>
    <circle cx="1840" cy="1230" r="4" fill="#88E0F8" opacity="0.75"/>
    <circle cx="2100" cy="1350" r="2" fill="#C0F8FF" opacity="0.65"/>
    <circle cx="2360" cy="1220" r="3" fill="#60C0F0" opacity="0.72"/>
    <circle cx="2620" cy="1360" r="2" fill="#C0F8FF" opacity="0.68"/>
    <circle cx="2880" cy="1240" r="4" fill="#88E0F8" opacity="0.75"/>
    <circle cx="3140" cy="1350" r="2" fill="#C0F8FF" opacity="0.65"/>
    <circle cx="3400" cy="1220" r="3" fill="#60C0F0" opacity="0.72"/>
    <circle cx="3660" cy="1360" r="2" fill="#C0F8FF" opacity="0.68"/>
    <circle cx="460" cy="580" r="2" fill="#C0F8FF" opacity="0.62"/>
    <circle cx="760" cy="510" r="1.5" fill="#88E0F8" opacity="0.58"/>
    <circle cx="1060" cy="550" r="2" fill="#C0F8FF" opacity="0.62"/>
    <circle cx="1360" cy="530" r="1.5" fill="#88E0F8" opacity="0.58"/>
    <circle cx="1660" cy="560" r="2" fill="#C0F8FF" opacity="0.62"/>
    <circle cx="1960" cy="540" r="1.5" fill="#88E0F8" opacity="0.58"/>
    <circle cx="2260" cy="555" r="2" fill="#C0F8FF" opacity="0.62"/>
    <circle cx="2560" cy="535" r="1.5" fill="#88E0F8" opacity="0.58"/>
    <circle cx="2860" cy="560" r="2" fill="#C0F8FF" opacity="0.62"/>
    <circle cx="3160" cy="545" r="1.5" fill="#88E0F8" opacity="0.58"/>
    <circle cx="3460" cy="565" r="2" fill="#C0F8FF" opacity="0.62"/>
    <circle cx="3760" cy="540" r="1.5" fill="#88E0F8" opacity="0.58"/>
    <circle cx="580" cy="1750" r="3" fill="#60C0F0" opacity="0.5"/>
    <circle cx="1180" cy="1780" r="3" fill="#C0F8FF" opacity="0.45"/>
    <circle cx="1780" cy="1760" r="3" fill="#60C0F0" opacity="0.5"/>
    <circle cx="2380" cy="1740" r="3" fill="#C0F8FF" opacity="0.45"/>
    <circle cx="2980" cy="1755" r="3" fill="#60C0F0" opacity="0.5"/>
    <circle cx="3580" cy="1765" r="3" fill="#C0F8FF" opacity="0.45"/>
  </g>

  <!-- LAYER 8: Specular top-left (ice reflecting sky) -->
  <ellipse cx="850" cy="160" rx="900" ry="300" fill="url(#aSpecular)" filter="url(#blurHeavy)" opacity="0.8"/>
  <ellipse cx="1920" cy="80" rx="500" ry="180" fill="#C0F8FF" opacity="0.07" filter="url(#blurHeavy)"/>

  <!-- Frost edge vignette on ice sheet -->
  <rect x="0" y="1280" width="3840" height="880" fill="#C0F8FF" opacity="0.04" filter="url(#frostEdge)"/>

  <!-- Refraction glow radials on ice -->
  <rect width="3840" height="2160" fill="url(#aRefract)" filter="url(#blurHeavy)" opacity="0.55"/>

  <!-- Dark sky top -->
  <rect x="0" y="0" width="3840" height="350" fill="#040C16" opacity="0.6" filter="url(#blurMid)"/>
  <rect x="0" y="0" width="3840" height="180" fill="#030A12" opacity="0.8"/>

  <!-- Deep ice bottom -->
  <rect x="0" y="1800" width="3840" height="360" fill="#08121E" opacity="0.5" filter="url(#blur)"/>
  <rect x="0" y="2000" width="3840" height="160" fill="#040C16" opacity="0.85"/>

  <!-- LAYER 9: Foreground vignette -->
  <rect width="3840" height="2160" fill="url(#aVignette)"/>

  <!-- Ice noise texture -->
  <rect width="3840" height="2160" fill="#88E0F8" opacity="0.03" filter="url(#noise)"/>
</svg>
