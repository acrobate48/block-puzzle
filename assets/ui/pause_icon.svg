<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <!-- Dark glass background gradient -->
    <radialGradient id="pauseBg" cx="38%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#22384E"/>
      <stop offset="55%"  stop-color="#0E1E2C"/>
      <stop offset="100%" stop-color="#04090F"/>
    </radialGradient>
    <!-- Bar fill: bright cyan top → deep teal bottom -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#A8F2FF"/>
      <stop offset="30%"  stop-color="#60D8FF"/>
      <stop offset="70%"  stop-color="#2090B0"/>
      <stop offset="100%" stop-color="#0A5A7A"/>
    </linearGradient>
    <!-- Bar inner shine: white top → transparent -->
    <linearGradient id="barShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.70"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="80%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Cyan border glow -->
    <filter id="pauseGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#40D8FF" flood-opacity="0.80"/>
    </filter>
    <!-- Bloom -->
    <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Glass bg inner glow -->
    <filter id="bgGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#60D8FF" flood-opacity="0.25"/>
    </filter>
    <!-- Specular soft -->
    <filter id="specSoft">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- ── BACKGROUND CIRCLE (dark glass) ── -->
  <circle cx="30" cy="30" r="28" fill="url(#pauseBg)" filter="url(#bgGlow)"/>

  <!-- Circle inner rim: subtle gradient stroke (glass edge) -->
  <circle cx="30" cy="30" r="28" fill="none"
          stroke="#40D8FF" stroke-width="2" stroke-opacity="0.55"/>
  <!-- Outer cyan glow ring -->
  <circle cx="30" cy="30" r="28" fill="none"
          stroke="#40D8FF" stroke-width="1.5" stroke-opacity="0.30"
          filter="url(#pauseGlow)"/>

  <!-- Glass top-left highlight arc -->
  <path d="M 12,14 A 22,22 0 0 1 46,11" fill="none"
        stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity="0.20"/>

  <!-- ── LEFT PAUSE BAR ── -->
  <rect x="16" y="15" width="10" height="30" rx="3.5"
        fill="url(#barGrad)" filter="url(#pauseGlow)"/>
  <!-- Left bar inner shine -->
  <rect x="17" y="16" width="3.5" height="13" rx="1.8"
        fill="url(#barShine)"/>

  <!-- ── RIGHT PAUSE BAR ── -->
  <rect x="34" y="15" width="10" height="30" rx="3.5"
        fill="url(#barGrad)" filter="url(#pauseGlow)"/>
  <!-- Right bar inner shine -->
  <rect x="35" y="16" width="3.5" height="13" rx="1.8"
        fill="url(#barShine)"/>
</svg>
