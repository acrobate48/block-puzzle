<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <defs>
    <!-- Fond blanc cassé top -->
    <linearGradient id="marbre-top-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8F4EE"/>
      <stop offset="100%" stop-color="#E8E0D0"/>
    </linearGradient>
    <!-- Texture marbre (veines) -->
    <filter id="marbre-veines" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.025 0.04" numOctaves="5" seed="12" result="turb"/>
      <feColorMatrix type="matrix"
        values="0.5 0.3 0 0 0.2
                0.4 0.2 0 0 0.15
                0   0   0 0 0
                0   0   0 4 -2"
        in="turb" result="marbreNoise"/>
      <feBlend in="SourceGraphic" in2="marbreNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <!-- Left face -->
    <linearGradient id="marbre-left-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C0B8A8"/>
      <stop offset="100%" stop-color="#D0C8B8"/>
    </linearGradient>
    <!-- Right face -->
    <linearGradient id="marbre-right-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0D8C8"/>
      <stop offset="100%" stop-color="#D8D0C0"/>
    </linearGradient>
    <!-- Ombre douce -->
    <filter id="marbre-shadow" x="-15%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#402800" flood-opacity="0.3"/>
    </filter>
    <!-- Clip top face -->
    <clipPath id="marbre-top-clip">
      <polygon points="60,24 105.2,50 60,76 14.8,50"/>
    </clipPath>
  </defs>

  <g filter="url(#marbre-shadow)">
    <!-- Top face marbre -->
    <polygon points="60,24 105.2,50 60,76 14.8,50"
             fill="url(#marbre-top-grad)" filter="url(#marbre-veines)"
             stroke="#B0A890" stroke-width="0.7"/>
    <!-- Left face -->
    <polygon points="14.8,50 60,76 60,102 14.8,76"
             fill="url(#marbre-left-grad)"
             stroke="#A09880" stroke-width="0.7"/>
    <!-- Right face -->
    <polygon points="105.2,50 60,76 60,102 105.2,76"
             fill="url(#marbre-right-grad)"
             stroke="#A09880" stroke-width="0.7"/>
  </g>

  <!-- Veines or sinueuses sur top face -->
  <g clip-path="url(#marbre-top-clip)" opacity="0.55">
    <path d="M 20,52 C 30,44 42,58 55,48 C 65,40 78,54 95,46"
          fill="none" stroke="#C8A030" stroke-width="0.9"/>
    <path d="M 30,62 C 44,54 58,66 70,58 C 80,52 90,62 104,56"
          fill="none" stroke="#C8A030" stroke-width="0.7"/>
    <path d="M 16,48 C 28,40 36,52 48,44 C 60,36 72,50 85,42"
          fill="none" stroke="#D4B040" stroke-width="0.5" opacity="0.7"/>
  </g>

  <!-- Brillance top -->
  <line x1="14.8" y1="50" x2="60" y2="24" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <line x1="60"   y1="24" x2="105.2" y2="50" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
</svg>
