<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="100%" height="100%">
  <defs>
    <linearGradient id="ga-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0018"/>
      <stop offset="100%" stop-color="#200040"/>
    </linearGradient>
    <linearGradient id="ga-shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#C080FF" stop-opacity="0.14"/>
      <stop offset="50%" stop-color="#C080FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#C080FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ga-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6030C0"/>
      <stop offset="50%" stop-color="#3A1880"/>
      <stop offset="100%" stop-color="#180838"/>
    </linearGradient>
    <linearGradient id="ga-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0C0420"/>
      <stop offset="100%" stop-color="#180838"/>
    </linearGradient>
    <linearGradient id="ga-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#280858"/>
      <stop offset="100%" stop-color="#1C0640"/>
    </linearGradient>
    <!-- Nébuleuse/cosmos sur top -->
    <filter id="ga-nebula" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="4" seed="17" result="noise"/>
      <feColorMatrix type="matrix" values="0.4 0 0.6 0 0.1
                                           0 0.1 0.4 0 0.0
                                           0.5 0 0.8 0 0.2
                                           0 0 0 0.6 0" in="noise" result="cn"/>
      <feBlend in="SourceGraphic" in2="cn" mode="screen" result="t"/>
      <feComposite in="t" in2="SourceGraphic" operator="in"/>
    </filter>
    <!-- Glow violet -->
    <filter id="ga-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="ga-glow2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="ga-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#8020FF" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#ga-bg)"/>

  <!-- Étoiles de fond -->
  <circle cx="18" cy="12" r="0.8" fill="#FFFFFF" opacity="0.75"/>
  <circle cx="47" cy="8" r="0.6" fill="#FFFFFF" opacity="0.60"/>
  <circle cx="72" cy="18" r="1.0" fill="#FFFFFF" opacity="0.80"/>
  <circle cx="130" cy="11" r="0.7" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="158" cy="7" r="0.9" fill="#FFFFFF" opacity="0.70"/>
  <circle cx="185" cy="15" r="0.6" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="25" cy="30" r="0.5" fill="#FFFFFF" opacity="0.50"/>
  <circle cx="165" cy="25" r="0.8" fill="#FFFFFF" opacity="0.60"/>
  <circle cx="12" cy="95" r="0.7" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="38" cy="110" r="0.6" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="175" cy="100" r="0.9" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="188" cy="120" r="0.7" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="145" cy="130" r="0.6" fill="#FFFFFF" opacity="0.50"/>
  <circle cx="55" cy="125" r="0.8" fill="#FFFFFF" opacity="0.60"/>
  <!-- Étoiles tintées violettes/roses -->
  <circle cx="30" cy="50" r="1.0" fill="#E0A0FF" opacity="0.60"/>
  <circle cx="170" cy="55" r="0.8" fill="#C080FF" opacity="0.50"/>
  <circle cx="60" cy="105" r="0.7" fill="#FF80C0" opacity="0.45"/>
  <circle cx="140" cy="115" r="0.9" fill="#A060FF" opacity="0.55"/>

  <!-- Halo nébuleuse derrière le bloc -->
  <ellipse cx="100" cy="60" rx="52" ry="30" fill="#6020C0" opacity="0.18" filter="url(#ga-glow2)"/>
  <ellipse cx="100" cy="60" rx="34" ry="19" fill="#9040E0" opacity="0.15" filter="url(#ga-glow2)"/>

  <g filter="url(#ga-shadow)">
    <polygon points="100,30 127.7,46 100,62 72.3,46"
             fill="url(#ga-top)" filter="url(#ga-nebula)"
             stroke="#9040E0" stroke-width="0.9"/>
    <polygon points="72.3,46 100,62 100,78 72.3,62"
             fill="url(#ga-left)"
             stroke="#4010A0" stroke-width="0.9"/>
    <polygon points="127.7,46 100,62 100,78 127.7,62"
             fill="url(#ga-right)"
             stroke="#6020C0" stroke-width="0.9"/>
  </g>

  <!-- Particules cosmiques sur la face top -->
  <circle cx="88" cy="42" r="1.5" fill="#C080FF" opacity="0.80" filter="url(#ga-glow)"/>
  <circle cx="106" cy="36" r="1.0" fill="#E0A0FF" opacity="0.70" filter="url(#ga-glow)"/>
  <circle cx="114" cy="48" r="0.8" fill="#FF80C0" opacity="0.60" filter="url(#ga-glow)"/>
  <circle cx="92" cy="54" r="1.2" fill="#8040E0" opacity="0.65" filter="url(#ga-glow)"/>
  <!-- Traînée cosmique -->
  <path d="M 80,52 Q 94,40 112,44"
        stroke="#C080FF" stroke-width="0.7" fill="none" opacity="0.35"/>
  <path d="M 84,46 Q 96,36 110,40"
        stroke="#E0B0FF" stroke-width="0.5" fill="none" opacity="0.25"/>

  <!-- Arêtes lumineuses -->
  <line x1="72.3" y1="46" x2="100" y2="30" stroke="#C080FF" stroke-width="1.5" opacity="0.80" filter="url(#ga-glow)"/>
  <line x1="100" y1="30" x2="127.7" y2="46" stroke="#9050E0" stroke-width="1.2" opacity="0.70" filter="url(#ga-glow)"/>

  <!-- Vertex brillants -->
  <circle cx="100" cy="30" r="2.5" fill="#D090FF" opacity="0.85" filter="url(#ga-glow)"/>
  <circle cx="72.3" cy="46" r="1.8" fill="#A060E0" opacity="0.65" filter="url(#ga-glow)"/>
  <circle cx="127.7" cy="46" r="1.8" fill="#A060E0" opacity="0.65" filter="url(#ga-glow)"/>

  <rect x="0" y="0" width="200" height="140" rx="10" fill="url(#ga-shine)"/>

  <text x="100" y="115" font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="14" text-anchor="middle" letter-spacing="2" fill="#C080FF"
        paint-order="stroke" stroke="#050010" stroke-width="2"
        filter="url(#ga-glow)">GALAXIE</text>

  <rect x="1" y="1" width="198" height="138" rx="9.5" fill="none"
        stroke="#8040C0" stroke-width="1.5" opacity="0.65" filter="url(#ga-glow)"/>
</svg>
