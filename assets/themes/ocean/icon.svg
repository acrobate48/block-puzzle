<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56" width="100%" height="100%">
  <defs>
    <linearGradient id="obg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A2860"/>
      <stop offset="100%" stop-color="#040C28"/>
    </linearGradient>
    <linearGradient id="owave1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1888CC"/>
      <stop offset="100%" stop-color="#0A4A88"/>
    </linearGradient>
    <linearGradient id="owave2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#40A8E8"/>
      <stop offset="100%" stop-color="#1868A8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="80" height="56" rx="6" fill="url(#obg)"/>

  <!-- Underwater depth glow -->
  <ellipse cx="40" cy="38" rx="30" ry="14" fill="#0840A0" opacity="0.3"/>

  <!-- Bubbles -->
  <circle cx="12" cy="20" r="1.5" fill="#80D0FF" opacity="0.4"/>
  <circle cx="68" cy="16" r="1" fill="#80D0FF" opacity="0.4"/>
  <circle cx="58" cy="28" r="1.2" fill="#80D0FF" opacity="0.3"/>

  <!-- Wave 2 (back) -->
  <path d="M-5,34 C5,28 15,36 25,31 C35,26 45,34 55,29 C65,24 72,32 85,27 L85,56 L-5,56 Z"
        fill="url(#owave1)" opacity="0.7"/>

  <!-- Wave 1 (front) -->
  <path d="M-5,40 C8,33 18,41 30,36 C42,31 52,39 65,34 C72,31 78,36 85,33 L85,56 L-5,56 Z"
        fill="url(#owave2)"/>

  <!-- Wave crests -->
  <path d="M-2,36 C4,32 10,37 18,34" stroke="#88E0FF" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M30,32 C38,28 44,33 52,30" stroke="#88E0FF" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- Fish body -->
  <ellipse cx="32" cy="22" rx="9" ry="5" fill="#50C8F0"/>
  <!-- Fish tail -->
  <path d="M41,22 L48,17 L48,27 Z" fill="#38A0CC"/>
  <!-- Fish eye -->
  <circle cx="25" cy="21" r="1.5" fill="white"/>
  <circle cx="25" cy="21" r="0.8" fill="#0A2860"/>
  <!-- Fish stripe -->
  <path d="M30,17.5 Q32,22 30,26.5" stroke="#38A8D8" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Fish fin -->
  <path d="M28,18 Q32,14 36,18" stroke="#38A0CC" stroke-width="1.2" fill="none"/>

  <!-- Theme name -->
  <text x="40" y="52" font-family="Arial, sans-serif" font-size="8" font-weight="bold"
        fill="#50C8F0" text-anchor="middle" dominant-baseline="middle">OCEAN</text>

  <!-- Gloss overlay -->
  <rect width="80" height="20" rx="6" fill="white" opacity="0.07"/>
  <rect x="0" y="0" width="80" height="8" rx="6" fill="white" opacity="0.08"/>
</svg>
