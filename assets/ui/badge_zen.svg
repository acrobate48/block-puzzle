<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 60" width="160" height="60">
  <defs>
    <linearGradient id="bg_zen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#041C1C"/>
      <stop offset="100%" stop-color="#083028"/>
    </linearGradient>
    <linearGradient id="icon_zen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80F0E8"/>
      <stop offset="100%" stop-color="#208878"/>
    </linearGradient>
    <filter id="shadow_zen" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#40C8C0" flood-opacity="0.5"/>
    </filter>
    <filter id="glow_zen">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#40C8C0" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Badge pill background -->
  <rect x="1" y="1" width="158" height="58" rx="28" ry="28"
        fill="url(#bg_zen)"
        stroke="#40C8C0" stroke-width="1.5"
        filter="url(#shadow_zen)"/>

  <!-- Inner highlight border -->
  <rect x="2.5" y="2.5" width="155" height="55" rx="27" ry="27"
        fill="none" stroke="#40C8C0" stroke-width="0.4" stroke-opacity="0.3"/>

  <!-- Enso circle (open brush stroke) icon -->
  <g transform="translate(30,30)" filter="url(#glow_zen)">
    <!-- Enso open arc — stroke only, open at bottom-right -->
    <path d="M4,-12 A13,13 0 1,1 10,7"
          fill="none"
          stroke="url(#icon_zen)" stroke-width="3.5"
          stroke-linecap="round"/>
    <!-- Brush tip tapered end -->
    <ellipse cx="10" cy="7" rx="2.5" ry="1.2"
             fill="#80F0E8" fill-opacity="0.7"
             transform="rotate(40,10,7)"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2" fill="#40C8C0" fill-opacity="0.5"/>
  </g>

  <!-- Separator line -->
  <line x1="52" y1="12" x2="52" y2="48" stroke="#40C8C0" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- Mode name -->
  <text x="88" y="27" text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif" font-weight="900"
        font-size="15" fill="#40C8C0" letter-spacing="3">ZEN</text>

  <!-- Subtitle -->
  <text x="88" y="41" text-anchor="middle"
        font-family="Arial, sans-serif" font-weight="400"
        font-size="9" fill="#40C8C0" fill-opacity="0.7" letter-spacing="0.3">Sans limite de temps</text>

  <!-- Light burst top-left -->
  <ellipse cx="18" cy="11" rx="7" ry="4" fill="#40C8C0" fill-opacity="0.18" transform="rotate(-30,18,11)"/>
  <ellipse cx="18" cy="11" rx="3" ry="1.5" fill="#FFFFFF" fill-opacity="0.25" transform="rotate(-30,18,11)"/>
</svg>
