<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <defs>
    <!-- Rich gold cup gradient -->
    <linearGradient id="cupGrad50k" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFF580"/>
      <stop offset="25%"  stop-color="#FFE840"/>
      <stop offset="55%"  stop-color="#F0B800"/>
      <stop offset="80%"  stop-color="#C88010"/>
      <stop offset="100%" stop-color="#9A5800"/>
    </linearGradient>
    <!-- Pedestal gradient (wider, richer) -->
    <linearGradient id="pedGrad50k" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#D49018"/>
      <stop offset="40%"  stop-color="#8A5800"/>
      <stop offset="100%" stop-color="#5A3400"/>
    </linearGradient>
    <!-- Stem gradient -->
    <linearGradient id="stemGrad50k" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8A5800"/>
      <stop offset="50%"  stop-color="#FFD030"/>
      <stop offset="100%" stop-color="#8A5800"/>
    </linearGradient>
    <!-- Rim gradient -->
    <linearGradient id="rimGrad50k" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFF580"/>
      <stop offset="100%" stop-color="#C88010"/>
    </linearGradient>
    <!-- Intense gold radial halo -->
    <radialGradient id="halo50k" cx="50%" cy="46%" r="50%">
      <stop offset="0%"   stop-color="#FFE840" stop-opacity="0.45"/>
      <stop offset="55%"  stop-color="#FFB800" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0"/>
    </radialGradient>
    <!-- Laurel leaf gradient -->
    <linearGradient id="laurelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#60C030"/>
      <stop offset="100%" stop-color="#208000"/>
    </linearGradient>
    <!-- Drop shadow intense -->
    <filter id="shadow50k" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#5A3400" flood-opacity="0.85"/>
    </filter>
    <!-- Intense gold glow -->
    <filter id="goldGlow50k" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FFD030" flood-opacity="0.85"/>
    </filter>
    <!-- Gem glow -->
    <filter id="gemGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="white" flood-opacity="0.8"/>
    </filter>
    <!-- Star glow -->
    <filter id="starGlow50k" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#FFE840" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Intense radial halo background -->
  <ellipse cx="50" cy="54" rx="50" ry="55" fill="url(#halo50k)"/>

  <!-- Pedestal (wider, decorated) -->
  <rect x="16" y="99" width="68" height="16" rx="4" ry="4"
        fill="url(#pedGrad50k)" filter="url(#shadow50k)"/>
  <!-- Pedestal decoration lines -->
  <rect x="20" y="101" width="60" height="1.5" rx="0.5" fill="#D49018" opacity="0.65"/>
  <rect x="20" y="104" width="60" height="1.5" rx="0.5" fill="#D49018" opacity="0.65"/>
  <rect x="20" y="107" width="60" height="1.5" rx="0.5" fill="#D49018" opacity="0.65"/>
  <rect x="20" y="110" width="60" height="1.5" rx="0.5" fill="#D49018" opacity="0.65"/>
  <rect x="20" y="113" width="60" height="1.5" rx="0.5" fill="#D49018" opacity="0.65"/>
  <!-- Pedestal corner diamonds -->
  <polygon points="24,107 27,104 30,107 27,110" fill="#FFD030" opacity="0.5"/>
  <polygon points="70,107 73,104 76,107 73,110" fill="#FFD030" opacity="0.5"/>

  <!-- Stem -->
  <rect x="43" y="86" width="14" height="15" fill="url(#stemGrad50k)"/>
  <rect x="35" y="92" width="30" height="6" rx="3" fill="url(#stemGrad50k)"/>

  <!-- Cup body -->
  <path d="
    M 14 27
    C 14 21, 21 16, 30 16
    L 70 16
    C 79 16, 86 21, 86 27
    C 86 53, 77 70, 67 77
    C 62 81, 57 82, 56 83
    L 56 86
    L 44 86
    L 44 83
    C 43 82, 38 81, 33 77
    C 23 70, 14 53, 14 27 Z
  " fill="url(#cupGrad50k)" filter="url(#shadow50k)"/>

  <!-- Left handle (thicker) -->
  <path d="M 14 32 C -2 32, -2 63, 14 63" fill="none" stroke="url(#cupGrad50k)"
        stroke-width="6.5" stroke-linecap="round"/>
  <path d="M 14 32 C 3 32, 3 63, 14 63" fill="none" stroke="#C88010"
        stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Right handle (thicker) -->
  <path d="M 86 32 C 102 32, 102 63, 86 63" fill="none" stroke="url(#cupGrad50k)"
        stroke-width="6.5" stroke-linecap="round"/>
  <path d="M 86 32 C 97 32, 97 63, 86 63" fill="none" stroke="#C88010"
        stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Reflection on body -->
  <ellipse cx="31" cy="42" rx="10" ry="18" fill="white" opacity="0.18"
           transform="rotate(-16 31 42)"/>
  <ellipse cx="27" cy="26" rx="6" ry="4.5" fill="white" opacity="0.26"/>

  <!-- Rim top bar -->
  <rect x="14" y="14" width="72" height="8" rx="4" fill="url(#rimGrad50k)"/>
  <rect x="16" y="14" width="68" height="4" rx="2" fill="white" opacity="0.35"/>

  <!-- ===== LAURELS LEFT ===== -->
  <!-- Left laurel branch — 5 leaves fanning left -->
  <g opacity="0.92">
    <ellipse cx="10" cy="50" rx="7" ry="3.5" fill="url(#laurelGrad)" stroke="#105800" stroke-width="0.5"
             transform="rotate(-70 10 50)"/>
    <ellipse cx="8"  cy="42" rx="7" ry="3.5" fill="url(#laurelGrad)" stroke="#105800" stroke-width="0.5"
             transform="rotate(-55 8 42)"/>
    <ellipse cx="9"  cy="34" rx="6.5" ry="3" fill="url(#laurelGrad)" stroke="#105800" stroke-width="0.5"
             transform="rotate(-40 9 34)"/>
    <ellipse cx="12" cy="27" rx="6" ry="2.8" fill="url(#laurelGrad)" stroke="#105800" stroke-width="0.5"
             transform="rotate(-25 12 27)"/>
    <ellipse cx="16" cy="22" rx="5.5" ry="2.5" fill="url(#laurelGrad)" stroke="#105800" stroke-width="0.5"
             transform="rotate(-12 16 22)"/>
    <!-- Branch line -->
    <path d="M 14 64 C 10 55, 7 42, 14 18" fill="none" stroke="#208000" stroke-width="1.2" opacity="0.7"/>
  </g>

  <!-- ===== LAURELS RIGHT ===== -->
  <g opacity="0.92">
    <ellipse cx="90" cy="50" rx="7" ry="3.5" fill="url(#laurelGrad)" stroke="#105800" stroke-width="0.5"
             transform="rotate(70 90 50)"/>
    <ellipse cx="92" cy="42" rx="7" ry="3.5" fill="url(#laurelGrad)" stroke="#105800" stroke-width="0.5"
             transform="rotate(55 92 42)"/>
    <ellipse cx="91" cy="34" rx="6.5" ry="3" fill="url(#laurelGrad)" stroke="#105800" stroke-width="0.5"
             transform="rotate(40 91 34)"/>
    <ellipse cx="88" cy="27" rx="6" ry="2.8" fill="url(#laurelGrad)" stroke="#105800" stroke-width="0.5"
             transform="rotate(25 88 27)"/>
    <ellipse cx="84" cy="22" rx="5.5" ry="2.5" fill="url(#laurelGrad)" stroke="#105800" stroke-width="0.5"
             transform="rotate(12 84 22)"/>
    <!-- Branch line -->
    <path d="M 86 64 C 90 55, 93 42, 86 18" fill="none" stroke="#208000" stroke-width="1.2" opacity="0.7"/>
  </g>

  <!-- Gold star halo ring -->
  <circle cx="50" cy="48" r="18" fill="#FFE040" opacity="0.12" filter="url(#goldGlow50k)"/>

  <!-- 5-point star (larger, gold) -->
  <g transform="translate(50,46)" filter="url(#starGlow50k)">
    <polygon points="0,-16 3.8,-6.5 14,-6.5 6.5,1 9.5,13 0,6.5 -9.5,13 -6.5,1 -14,-6.5 -3.8,-6.5"
             fill="#FFE840" stroke="#C88010" stroke-width="0.8"/>
    <polygon points="0,-9 2,-3.5 8,-3.5 3.5,0.5 5.5,7 0,3.5 -5.5,7 -3.5,0.5 -8,-3.5 -2,-3.5"
             fill="white" opacity="0.38"/>
  </g>

  <!-- 3 gemstones embedded on cup body -->
  <!-- Red gem (ruby) -->
  <circle cx="50" cy="67" r="4" fill="#CC1020" stroke="#FF4050" stroke-width="0.8"
          filter="url(#gemGlow)"/>
  <circle cx="49" cy="66" r="1.5" fill="white" opacity="0.55"/>
  <!-- Blue gem (sapphire) -->
  <circle cx="38" cy="64" r="3.5" fill="#1030CC" stroke="#4060FF" stroke-width="0.8"
          filter="url(#gemGlow)"/>
  <circle cx="37" cy="63" r="1.3" fill="white" opacity="0.55"/>
  <!-- Green gem (emerald) -->
  <circle cx="62" cy="64" r="3.5" fill="#10AA20" stroke="#30DD40" stroke-width="0.8"
          filter="url(#gemGlow)"/>
  <circle cx="61" cy="63" r="1.3" fill="white" opacity="0.55"/>

  <!-- "50K" gold brilliant text -->
  <text x="50" y="79"
        font-family="'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="11"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="#FFE840"
        stroke="#C88010"
        stroke-width="0.6"
        filter="url(#goldGlow50k)">50K</text>

  <!-- Bottom score label -->
  <text x="50" y="113"
        font-family="Arial, sans-serif"
        font-size="7"
        font-weight="bold"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="#FFD030"
        opacity="0.9">SCORE</text>
</svg>
