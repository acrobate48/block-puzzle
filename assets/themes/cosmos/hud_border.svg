<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 20" width="100%" height="20" opacity="0.90">
  <defs>
    <filter id="csglow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#cc88ff" flood-opacity="0.8"/>
    </filter>
    <filter id="stbright" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#ffffff" flood-opacity="1"/>
    </filter>
    <linearGradient id="nebula" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a001a"/>
      <stop offset="25%"  stop-color="#1a0040"/>
      <stop offset="50%"  stop-color="#0d0030"/>
      <stop offset="75%"  stop-color="#200050"/>
      <stop offset="100%" stop-color="#0a001a"/>
    </linearGradient>
    <!-- Comet: dot + trail -->
    <g id="comet">
      <circle cx="0" cy="0" r="1.5" fill="#ffffff" filter="url(#stbright)"/>
      <line x1="0" y1="0" x2="-12" y2="0" stroke="#cc88ff" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="-9"  y2="-1" stroke="#ffffff" stroke-width="0.5" opacity="0.35" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Deep space background -->
  <rect x="0" y="0" width="400" height="20" fill="url(#nebula)"/>

  <!-- Faint nebula cloud blobs -->
  <ellipse cx="100" cy="10" rx="80" ry="7" fill="#3300aa" opacity="0.18"/>
  <ellipse cx="280" cy="10" rx="90" ry="8" fill="#550066" opacity="0.16"/>

  <!-- Star baseline strip -->
  <rect x="0" y="17" width="400" height="3" fill="#0d0030" opacity="0.9"/>

  <!-- Stars of varying sizes -->
  <circle cx="5"   cy="9"  r="1.8" fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="18"  cy="5"  r="0.8" fill="#ddbbff"/>
  <circle cx="30"  cy="12" r="1.2" fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="45"  cy="4"  r="0.7" fill="#eeddff"/>
  <circle cx="58"  cy="8"  r="2"   fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="72"  cy="14" r="0.9" fill="#ccaaff"/>
  <circle cx="88"  cy="6"  r="1.5" fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="102" cy="11" r="0.7" fill="#ddbbff"/>
  <circle cx="118" cy="3"  r="1"   fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="133" cy="9"  r="1.8" fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="148" cy="5"  r="0.7" fill="#eeddff"/>
  <circle cx="162" cy="13" r="1.3" fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="175" cy="7"  r="0.9" fill="#ccaaff"/>
  <circle cx="190" cy="2"  r="1.6" fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="205" cy="11" r="0.8" fill="#ddbbff"/>
  <circle cx="220" cy="6"  r="2.1" fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="235" cy="14" r="0.7" fill="#eeddff"/>
  <circle cx="250" cy="4"  r="1.1" fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="265" cy="9"  r="1.7" fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="280" cy="5"  r="0.8" fill="#ccaaff"/>
  <circle cx="295" cy="12" r="1.4" fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="310" cy="3"  r="0.7" fill="#ddbbff"/>
  <circle cx="325" cy="8"  r="1.9" fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="340" cy="14" r="0.9" fill="#eeddff"/>
  <circle cx="355" cy="6"  r="1.2" fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="370" cy="10" r="0.7" fill="#ccaaff"/>
  <circle cx="385" cy="4"  r="1.6" fill="#ffffff" filter="url(#stbright)"/>
  <circle cx="396" cy="11" r="0.8" fill="#ddbbff"/>

  <!-- Comets -->
  <use href="#comet" transform="translate(70,7) rotate(8)"/>
  <use href="#comet" transform="translate(200,5) rotate(12)"/>
  <use href="#comet" transform="translate(330,8) rotate(6)"/>
</svg>
