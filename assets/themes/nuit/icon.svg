<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56" width="100%" height="100%">
  <defs>
    <linearGradient id="nbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#120830"/>
      <stop offset="100%" stop-color="#050312"/>
    </linearGradient>
    <radialGradient id="nmoon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EEE8FF"/>
      <stop offset="100%" stop-color="#C8B8F0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="80" height="56" rx="6" fill="url(#nbg)"/>

  <!-- Moon glow -->
  <circle cx="22" cy="16" r="11" fill="#8848C8" opacity="0.2"/>

  <!-- Crescent moon -->
  <circle cx="22" cy="16" r="8" fill="url(#nmoon)"/>
  <circle cx="26" cy="13" r="6.5" fill="#120830"/>

  <!-- Stars -->
  <!-- Star 1 -->
  <polygon points="52,8 53.2,11.6 57,11.6 54,13.8 55.2,17.4 52,15.2 48.8,17.4 50,13.8 47,11.6 50.8,11.6"
           fill="#A878F0" opacity="0.9" transform="scale(0.55) translate(42,2)"/>
  <!-- Star 2 small -->
  <polygon points="65,13 65.7,15.1 68,15.1 66.2,16.4 66.9,18.5 65,17.2 63.1,18.5 63.8,16.4 62,15.1 64.3,15.1"
           fill="#C8A8FF" opacity="0.8" transform="scale(0.5) translate(62,8)"/>
  <!-- Star 3 -->
  <polygon points="72,6 72.6,7.8 74.6,7.8 73,9 73.6,10.8 72,9.6 70.4,10.8 71,9 69.4,7.8 71.4,7.8"
           fill="#A878F0" opacity="0.7" transform="scale(0.45) translate(88,0)"/>
  <!-- Star 4 tiny -->
  <circle cx="58" cy="8" r="1" fill="#E8D8FF" opacity="0.8"/>
  <!-- Star 5 tiny -->
  <circle cx="70" cy="18" r="0.8" fill="#C8B0FF" opacity="0.7"/>
  <!-- Extra sparkles -->
  <circle cx="44" cy="6" r="0.7" fill="#A878F0" opacity="0.6"/>
  <circle cx="38" cy="12" r="0.6" fill="#C8A8FF" opacity="0.5"/>

  <!-- City skyline silhouette -->
  <path d="M0,44 L0,38 L5,38 L5,34 L8,34 L8,30 L11,30 L11,28 L14,28 L14,32 L16,32 L16,26 L19,26 L19,30 L22,30 L22,34 L24,34 L24,36 L27,36 L27,28 L30,28 L30,24 L33,24 L33,28 L36,28 L36,32 L39,32 L39,30 L42,30 L42,26 L45,26 L45,22 L48,22 L48,26 L51,26 L51,30 L54,30 L54,28 L57,28 L57,32 L60,32 L60,36 L63,36 L63,30 L66,30 L66,34 L69,34 L69,38 L72,38 L72,36 L75,36 L75,38 L80,38 L80,44 Z"
        fill="#0A0520" opacity="0.95"/>

  <!-- Windows in buildings (small dots) -->
  <rect x="17" y="28" width="1.5" height="1" fill="#A878F0" opacity="0.7"/>
  <rect x="31" y="26" width="1.5" height="1" fill="#8860D8" opacity="0.6"/>
  <rect x="46" y="24" width="1.5" height="1" fill="#A878F0" opacity="0.8"/>
  <rect x="43" y="28" width="1.5" height="1" fill="#C8A8FF" opacity="0.5"/>
  <rect x="55" y="30" width="1.5" height="1" fill="#A878F0" opacity="0.6"/>
  <rect x="64" y="32" width="1.5" height="1" fill="#8860D8" opacity="0.7"/>

  <!-- Theme name -->
  <text x="40" y="52" font-family="Arial, sans-serif" font-size="8" font-weight="bold"
        fill="#A878F0" text-anchor="middle" dominant-baseline="middle">NUIT</text>

  <!-- Gloss overlay -->
  <rect width="80" height="20" rx="6" fill="white" opacity="0.06"/>
  <rect x="0" y="0" width="80" height="8" rx="6" fill="white" opacity="0.07"/>
</svg>
